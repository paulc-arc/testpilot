name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  project-policy:
    uses: hamanpaul/paulsha-conventions/.github/workflows/reusable-policy-check.yml@4ff59b6c35a46a87af3c3e641975743ee8fa0858
    with:
      policy_profile: flat
      policy_version: "1.0.1"
      policy_engine_ref: 4ff59b6c35a46a87af3c3e641975743ee8fa0858

  publish:
    runs-on: ubuntu-latest
    needs: project-policy
    env:
      SERIALWRAP_BIN: /tmp/serialwrap

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv and project dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e ".[dev]"

      - name: Bootstrap CI testbed and serialwrap stub
        run: |
          mkdir -p configs
          rm -rf /tmp/serialwrap
          cat > configs/testbed.yaml <<'EOF'
          testbed:
            name: lab-bench-1
            devices:
              DUT:
                role: ap
                transport: serial
                selector: COM0
                serial_port: /dev/ttyUSB0
                baudrate: 115200
              STA:
                role: sta
                transport: serial
                selector: COM1
                serial_port: /dev/ttyUSB1
                baudrate: 115200
              EndpointPC:
                role: endpoint
                transport: ssh
                host: 192.168.1.100
                user: testpilot
            variables:
              SSID_5G: testpilot5G
              KEY_5G: "00000000"
              SSID_6G: testpilot6G
              KEY_6G: "00000000"
              SSID_24G: testpilot2G
              KEY_24G: "00000000"
              sta_available_bands: [5g, 6g, 2.4g]
          EOF
          cat > /tmp/serialwrap <<'EOF'
          #!/usr/bin/env sh
          exit 0
          EOF
          chmod +x /tmp/serialwrap

      - name: Verify tag matches project version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: python scripts/check_release_version.py --tag "$TAG_NAME"

      - name: Validate release governance policy
        run: python -m pytest -q tests/test_release_governance.py

      - name: Run test suite
        run: uv run pytest -q

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release already exists for $TAG_NAME"
            exit 0
          fi
          gh release create "$TAG_NAME" --verify-tag --generate-notes --title "$TAG_NAME"
