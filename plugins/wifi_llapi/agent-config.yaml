version: 1
default_mode: headless
selection_policy:
  fallback: automatic
  on_unavailable: next_priority
execution:
  scope: per_case
  mode: sequential
  max_concurrency: 1
  failure_policy: retry_then_fail_and_continue
  retry:
    max_attempts: 2
    backoff_seconds: 5
  timeout:
    base_seconds: 120
    per_step_seconds: 45
    retry_multiplier: 1.25
    max_seconds: 900
hooks:
  enabled_hooks:
    - pre_case
    - post_case
    - pre_step
    - post_step
    - on_failure
    - on_retry
  fail_open: true
remediation:
  enabled: true
  mode: safe_env_only
  max_actions_per_attempt: 3
  allowed_actions:
    - serial_session_recover
    - sta_band_reconnect
    - sta_band_rebaseline
    - dut_band_rebaseline
    - case_env_reverify
runners:
  - priority: 1
    cli_agent: copilot
    model: gpt-5.4
    effort: high
    enabled: true
  - priority: 2
    cli_agent: copilot
    model: sonnet-4.6
    effort: high
    enabled: true
  - priority: 3
    cli_agent: copilot
    model: gpt-5-mini
    effort: high
    enabled: true
