id: d214-radio-rifsenabled
name: D214 Radio RIFSEnabled
source:
  row: 214
  object: WiFi.Radio.{i}.
  api: RIFSEnabled
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: workbook pass intent is tri-band Default -> Auto -> Default replay via northbound setter/readback on active 0403 lab state
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step1_rifs_default_5g
  target: DUT
  action: exec
  band: 5g
  capture: default_5g
  command: >-
    ubus-cli "WiFi.Radio.1.RIFSEnabled?" | sed -n 's/.*RIFSEnabled="\([^"]*\)".*/DefaultRIFSEnabled5g=\1/p'
  expected: 5g getter 應先回報 workbook default `Default`
  description: Radio.1 (5g) 先確認 RIFSEnabled 初值為 Default。
- id: step2_rifs_set_auto_5g
  target: DUT
  action: exec
  band: 5g
  capture: set_auto_5g
  command:
  - printf 'RequestedRIFSEnabled5g=Auto\n'
  - >-
    ubus-cli 'WiFi.Radio.1.RIFSEnabled="Auto"'
  expected: 5g setter 應接受 Auto
  depends_on: step1_rifs_default_5g
  description: Radio.1 (5g) 將 RIFSEnabled 設為 Auto。
- id: step3_rifs_after_set_5g
  target: DUT
  action: exec
  band: 5g
  capture: after_set_5g
  command: >-
    sleep 5; ubus-cli "WiFi.Radio.1.RIFSEnabled?" | sed -n 's/.*RIFSEnabled="\([^"]*\)".*/AfterSetRIFSEnabled5g=\1/p'
  expected: 5g setter=Auto 後 getter 應回報 Auto
  depends_on: step2_rifs_set_auto_5g
  description: Radio.1 (5g) setter=Auto 後驗證 getter readback。
- id: step4_rifs_restore_5g
  target: DUT
  action: exec
  band: 5g
  capture: restore_5g
  command:
  - printf 'RestoreRIFSEnabled5g=Default\n'
  - >-
    ubus-cli 'WiFi.Radio.1.RIFSEnabled="Default"'
  expected: 5g restore 應接受 Default
  depends_on: step3_rifs_after_set_5g
  description: Radio.1 (5g) restore 回 Default。
- id: step5_rifs_after_restore_5g
  target: DUT
  action: exec
  band: 5g
  capture: after_restore_5g
  command: >-
    sleep 5; ubus-cli "WiFi.Radio.1.RIFSEnabled?" | sed -n 's/.*RIFSEnabled="\([^"]*\)".*/AfterRestoreRIFSEnabled5g=\1/p'
  expected: 5g restore 後 getter 應回報 Default
  depends_on: step4_rifs_restore_5g
  description: Radio.1 (5g) restore 後再次確認 getter。
