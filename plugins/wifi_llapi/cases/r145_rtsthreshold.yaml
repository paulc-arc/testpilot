id: wifi-llapi-r145-rtsthreshold
name: RtsThreshold — WiFi.Radio.{i}.DriverConfig.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 145
  object: WiFi.Radio.{i}.DriverConfig.
  api: RtsThreshold
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.DriverConfig.RtsThreshold=-1
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Set RtsThreshold "ex. 1500 ubus-cli WiFi.Radio.*.DriverConfig.RtsThreshold=1500 > WiFi.Radio.*.DriverConfig.RtsThreshold=1500
    WiFi.Radio.1.DriverConfig. WiFi.Radio.1.DriverConfig.RtsThreshold=1500 WiFi.Radio.2.DriverConfig. WiFi.Radio.2.DriverConfig.RtsThreshold=1500
    WiFi.Radio.3.DriverConfig. WiFi.Radio.3.DriverConfig.RtsThreshold=1500
- id: step2
  action: exec
  target: DUT
  command: Connect WiFi Station to GW.
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Run ping from GW to Station Note: add -S "size" to Ping. Example given the threshold of 1500 then run ping with
    data size larger than 1500. => Ping 192.168.1.x -S 1500'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Capture air packet between GW and Station to check for RTS/CTS
  depends_on: step3
  capture: result
pass_criteria:
- field: result.RtsThreshold
  operator: contains
  value: '-1'
  description: RtsThreshold 應回傳包含 RtsThreshold=-1
verification_command: 'root@prplOS:/# wl -i wl0 rtsthresh

  1500 (0x5dc)

  root@prplOS:/# wl -i wl1 rtsthresh

  1500 (0x5dc)

  root@prplOS:/# wl -i wl2 rtsthresh

  1500 (0x5dc)'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
