results_reference:
  v4.0.1:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: 'ARC : The WMM FailedBytes counters for all access categories (AC_BE, AC_BK, AC_VI, AC_VO) remained at zero during
      testing.

      These counters increment only when QoS-classified Wi-Fi frames experience transmission or reception failures.

      In our test environment, no Wi-Fi station capable of generating manipulated 802.11e/WMM-tagged traffic (e.g., VoIP,
      video streaming, QoS-marked packets) was available, and Scapy could not be used to generate such frames due to driver
      limitations.


      As a result, no WMM queue failures were triggered, and the counters remained at zero, which is expected behavior under
      low-load, low-interference test conditions.'
  v4.0.3:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: not support per ssid
