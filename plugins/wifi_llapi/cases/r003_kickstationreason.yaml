id: wifi-llapi-r003-kickstationreason
name: kickStationReason() — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 3
  object: WiFi.AccessPoint.{i}.
  api: kickStationReason()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.kickStationReason(macaddress=string, reason:int):bool
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW
- id: step2
  action: exec
  target: DUT
  command: Kick connected Station using specified reason codes. CodeMeaning 1 Unspecified 5 Disassociated because AP is busy
    8 Deauthenticated because STA is leaving 34 Insufficient resources ubus-cli WiFi.AccessPoint.5.kickStationReason"(macaddress=7E:04:6
    0:D8:FC:6E,reason=1)" > WiFi.AccessPoint.5.kickStationReason(macaddress=7E:04:60:D8:FC:6E,reason=1) WiFi.AccessPoint.5.kickStationReason()
    returned [ "" ]
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Verify system event logs - Confirm that the event log reports the station disconnection. - Expected log message
    includes: * Station MAC address 42:33:64:A3:9F:B0 * Disconnection indication such as: “disassociated” or “deauthenticated”  CONSOLE[wl2]:
    004528.186 wl2: STA 42:33:64:A3:9F:B0 has disassociated tx_type 33'
  depends_on: step2
  capture: result
pass_criteria:
- field: result.kickStationReason()
  operator: contains
  value: string, reason:int):bool
  description: kickStationReason() 應回傳包含 kickStationReason()=string, reason:int):bool
verification_command: 'AuthenticationState=1 "The station has successfully completed the association procedure and is listed
  in the AP association table"

  root@prplOS:/# wl -i wl0 assoclist

  assoclist 42:33:64:A3:9F:B0


  AuthenticationState=0 "The station is not associated with the AP and therefore does not appear in the AP association table."

  root@prplOS:/# wl -i wl0 assoclist'
results_reference:
