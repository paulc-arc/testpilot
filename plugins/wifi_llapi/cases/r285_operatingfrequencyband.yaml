id: wifi-llapi-r285-operatingfrequencyband
name: OperatingFrequencyBand — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 384
  object: "WiFi.Radio.{i}."
  api: "OperatingFrequencyBand"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.OperatingFrequencyBand="2.4GHz"
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.OperatingFrequencyBand="2.4GHz"
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.OperatingFrequencyBand="2.4GHz"
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.OperatingFrequencyBand?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. get OperatingFrequencyBand ubus-cli WiFi.Radio.*.OperatingFrequencyBand? > WiFi.Radio.*.OperatingFrequencyBand?
    WiFi.Radio.1.OperatingFrequencyBand="5GHz" WiFi.Radio.2.OperatingFrequencyBand="6GHz" WiFi.Radio.3.OperatingFrequencyBand="2.4GHz"
  capture: result
pass_criteria:
- field: result.OperatingFrequencyBand
  operator: contains
  value: '"2.4GHz"'
  description: OperatingFrequencyBand 應回傳包含 OperatingFrequencyBand="2.4GHz"
verification_command: 'root@prplOS:/# wl -i wl0 band

  a

  root@prplOS:/# wl -i wl1 band

  6g

  root@prplOS:/# wl -i wl2 band

  b'
results_reference:
  v4.0.1:
    5g: Pass
    6g: pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
