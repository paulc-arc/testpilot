id: d529-spectruminfo-channel
name: D529 getSpectrumInfo channel
source:
  row: 529
  object: WiFi.Radio.{i}.
  api: getSpectrumInfo()
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_method
  target: dut
  action: exec
  capture: method_5g
  command: 'ubus-cli "WiFi.Radio.1.getSpectrumInfo()" | grep -m1 "channel =" | sed -n "s/.*channel = \([0-9][0-9]*\).*/channel=\1/p"'
  expected: 5g getSpectrumInfo() 第一個 spectrum entry 的 channel 需維持 36
  description: Radio.1 (5g) getSpectrumInfo → first channel extractor
- id: step_6g_method
  target: dut
  action: exec
  capture: method_6g
  command: 'ubus-cli "WiFi.Radio.2.getSpectrumInfo()" | grep -m1 "channel =" | sed -n "s/.*channel = \([0-9][0-9]*\).*/channel=\1/p"'
  expected: 6g getSpectrumInfo() 第一個 spectrum entry 的 channel 需維持 2
  description: Radio.2 (6g) getSpectrumInfo → first channel extractor
- id: step_24g_method
  target: dut
  action: exec
  capture: method_24g
  command: 'ubus-cli "WiFi.Radio.3.getSpectrumInfo()" | grep -m1 "channel =" | sed -n "s/.*channel = \([0-9][0-9]*\).*/channel=\1/p"'
  expected: 2.4g getSpectrumInfo() 第一個 spectrum entry 的 channel 需維持 1
  description: Radio.3 (2.4g) getSpectrumInfo → first channel extractor
pass_criteria:
- field: method_5g.channel
  operator: equals
  value: '36'
  description: 5g getSpectrumInfo() sync path 目前第一個 spectrum entry 固定從 channel 36 開始
- field: method_6g.channel
  operator: equals
  value: '2'
  description: 6g getSpectrumInfo() sync path 目前第一個 spectrum entry 固定從 channel 2 開始
- field: method_24g.channel
  operator: equals
  value: '1'
  description: 2.4g getSpectrumInfo() sync path 目前第一個 spectrum entry 固定從 channel 1 開始
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'Multiband source-backed retest: active 0403 `getSpectrumInfo()` returns spectrum entries through `_getSpectrumInfo()` -> `s_prepareSpectrumOutput()` -> `amxc_var_add_key(uint32_t, "channel", llEntry->channel)`. Live rerun plus repeated direct probes currently lock the first serialized spectrum-entry channels at `36 / 2 / 1` on 5g / 6g / 2.4g.'
