      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: it is the same as RxSupportedVhtMCS and TxSupportedVhtMCS as shown below? ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.?
    | grep Supported VhtMCS WiFi.AccessPoint.1.AssociatedDevice.1.RxSupportedVhtMCS="9,9,9,9" WiFi.AccessPoint.1.AssociatedDevice.1.TxSupportedVhtMCS="9,9,9,9"
    WiFi.AccessPoint.3.AssociatedDevice.1.RxSupportedVhtMCS="" WiFi.AccessPoint.3.AssociatedDevice.1.TxSupportedVhtMCS=""
    WiFi.AccessPoint.5.AssociatedDevice.1.RxSupportedVhtMCS="" WiFi.AccessPoint.5.AssociatedDevice.1.TxSupportedVhtMCS=""
  capture: result
pass_criteria:
- field: result.SupportedVhtMCS
  operator: contains
  value: 9,9
  description: SupportedVhtMCS 應回傳包含 SupportedVhtMCS=9,9
