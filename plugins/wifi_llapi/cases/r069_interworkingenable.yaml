id: wifi-llapi-r069-interworkingenable
name: InterworkingEnable — WiFi.AccessPoint.{i}.IEEE80211u
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 77
  object: "WiFi.AccessPoint.{i}.IEEE80211u"
  api: "InterworkingEnable"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.IEEE80211u.InterworkingEnable=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.IEEE80211u.InterworkingEnable=0
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.IEEE80211u.InterworkingEnable=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.IEEE80211u.InterworkingEnable?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: //Set IEEE80211u.InterworkingEnable=1 ubus-cli WiFi.AccessPoint.{i}.IEEE80211u.InterworkingEnable=1 ubus-cli WiFi.AccessPoint.?
    | grep IEEE80211u.InterworkingEnable WiFi.AccessPoint.1.IEEE80211u.InterworkingEnable=1 WiFi.AccessPoint.3.IEEE80211u.InterworkingEnable=1
    WiFi.AccessPoint.5.IEEE80211u.InterworkingEnable=1
  capture: result
pass_criteria:
- field: result.InterworkingEnable
  operator: contains
  value: '0'
  description: InterworkingEnable 應回傳包含 InterworkingEnable=0
verification_command: 'Check Beacon packets:

  IEEE 802.11 Management Frame

  Tagged parameters

  Interworking (Tag: 107)


  **Access Network Type = Public, Private, Private with Guest, etc.

  **Internet Availability = "0 = not available, 1 = available"

  **ASRA (Access Network Query Protocol Service)= Automatic association rejection support

  **Venue Info = Optional: airport, hotel, cafe, etc.

  **HESSID = Optional: Homogenous ESS ID (for roaming)'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: ''
