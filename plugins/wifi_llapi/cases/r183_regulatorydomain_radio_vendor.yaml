id: wifi-llapi-r183-regulatorydomain-radio-vendor
name: RegulatoryDomain — WiFi.Radio.{i}.Vendor.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 253
  object: "WiFi.Radio.{i}.Vendor."
  api: "RegulatoryDomain"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Vendor.Brcm.RegulatoryDomainRev=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.Vendor.Brcm.RegulatoryDomainRev=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.Vendor.RegulatoryDomain?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Get API default value: ubus-cli WiFi.Radio.*.Vendor.Brcm.RegulatoryDomainRev? > WiFi.Radio.*.Vendor.Brcm.RegulatoryDomainRev?
    WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0 WiFi.Radio.2.Vendor.Brcm.RegulatoryDomainRev=0 WiFi.Radio.3.Vendor.Brcm.RegulatoryDomainRev=0'
- id: step2
  action: exec
  target: DUT
  command: 'Change the parameter to any other value: ubus-cli WiFi.Radio.*.Vendor.Brcm.RegulatoryDomainRev=8 > WiFi.Radio.*.Vendor.Brcm.RegulatoryDomainRev=8
    WiFi.Radio.1.Vendor.Brcm. WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=8 WiFi.Radio.2.Vendor.Brcm. WiFi.Radio.2.Vendor.Brcm.RegulatoryDomainRev=8
    WiFi.Radio.3.Vendor.Brcm. WiFi.Radio.3.Vendor.Brcm.RegulatoryDomainRev=8'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check supported RegulatoryDomainSupported: ubus-cli WiFi.Radio.*.Vendor.Brcm.RegulatoryDomainSupported? > WiFi.Radio.*.Vendor.Brcm.RegulatoryDomainSupported?
    WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainSupported="#a,CA/169,CA/170,CA/886,E0/713,E0/781,E0/858,E0/859,GB/36,JP/894,Q1/149,Q1/151,Q1/155,Q1/158,Q1/159,Q1/160,Q1/161,Q1/167,Q1/168,Q1/169,Q1/170,Q1/176,Q1/178,Q1/179,"
    WiFi.Radio.2.Vendor.Brcm.RegulatoryDomainSupported="#a,CA/169,CA/170,CA/886,E0/713,E0/781,E0/858,E0/859,JP/894,Q1/149,Q1/151,Q1/155,Q1/158,Q1/159,Q1/160,Q1/161,Q1/167,Q1/168,Q1/169,Q1/170,Q1/176,Q1/178,Q1/179,"
    WiFi.Radio.3.Vendor.Brcm.RegulatoryDomainSupported="#a,CA/169,CA/170,CA/886,E0/713,E0/781,E0/858,E0/859,GB/36,JP/894,Q1/149,Q1/151,Q1/155,Q1/158,Q1/159,Q1/160,Q1/161,Q1/167,Q1/168,Q1/169,Q1/170,Q1/176,Q1/178,Q1/179,XV,"'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Check if "wl -i wl* country" gets representing rev value(in my case, expecting wl0=GB/36, wl1= JP/89, wl2=GB/36)
  depends_on: step3
  capture: result
pass_criteria:
- field: result.RegulatoryDomain
  operator: contains
  value: '0'
  description: RegulatoryDomain 應回傳包含 RegulatoryDomain=0
verification_command: 'wl -i wl0 country

  wl -i wl1 country

  wl -i wl2 country


  root@prplOS:/# wl -i wl0 country

  #a (#a/0) <unknown>

  root@prplOS:/# wl -i wl1 country

  #a (#a/0) <unknown>

  root@prplOS:/# wl -i wl2 country

  #a (#a/0) <unknown>'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: "supported; \nwl -i wl0 country list\nwl -i wl0 contry_rev xx\nubus-cli WiFi.Radio.1.RegulatoryDomain=CA; ubus-cli\
      \ WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=170"
