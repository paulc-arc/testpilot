id: wifi-llapi-D104-enable-accesspoint-wps
name: Enable — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  baseline: 0310-BGW720-300
  row: 104
  object: WiFi.AccessPoint.{i}.WPS.
  api: Enable
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WPS.Enable={0|1}"
llapi_support: Support
implemented_by: Vendor Module
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: "Topology:\n  - DUT: COM1 (B0, AP role)\n  Transport:\n  - DUT via serialwrap COM0\n  Baseline:\n  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal\n  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE\n  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal\n  Notes:\n  - Workbook row 104 is a setter/readback case; each band is normalized to WPS.Enable=0 before replay so prior cases cannot pollute the baseline.\n  - 5G and 2.4G keep WPS.Configured=1, so enable=1 projects hostapd wps_state=2.\n  - 6G under WPA3/SAE accepts Enable=1 in getter but hostapd wps_state stays 0, so workbook authority remains Not Supported."
steps:
- id: step_5g_setter
  action: exec
  target: DUT
  command:
  - ubus-cli "WiFi.AccessPoint.1.WPS.Enable=0" 2>/dev/null
  - sleep 3
  - echo "Baseline5g=$(ubus-cli 'WiFi.AccessPoint.1.WPS.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
  - echo "WpsState5gBaseline=$(grep 'wps_state=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.1.WPS.Enable=1" 2>/dev/null
  - sleep 3
  - echo "AfterSet5g=$(ubus-cli 'WiFi.AccessPoint.1.WPS.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
  - echo "WpsState5gAfter=$(grep 'wps_state=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.1.WPS.Enable=0" 2>/dev/null
  - sleep 3
  - echo "Restore5g=$(ubus-cli 'WiFi.AccessPoint.1.WPS.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
  - echo "WpsState5gRestore=$(grep 'wps_state=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  capture: wps_5g
- id: step_6g_setter
  action: exec
  target: DUT
  depends_on: step_5g_setter
  command:
  - ubus-cli "WiFi.AccessPoint.3.WPS.Enable=0" 2>/dev/null
  - sleep 3
  - echo "Baseline6g=$(ubus-cli 'WiFi.AccessPoint.3.WPS.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
  - echo "WpsState6gBaseline=$(grep 'wps_state=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.3.WPS.Enable=1" 2>/dev/null
  - sleep 3
  - echo "AfterSet6g=$(ubus-cli 'WiFi.AccessPoint.3.WPS.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
  - echo "WpsState6gAfter=$(grep 'wps_state=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.3.WPS.Enable=0" 2>/dev/null
  - sleep 3
  - echo "Restore6g=$(ubus-cli 'WiFi.AccessPoint.3.WPS.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
  - echo "WpsState6gRestore=$(grep 'wps_state=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  capture: wps_6g
- id: step_24g_setter
  action: exec
  target: DUT
  depends_on: step_6g_setter
  command:
  - ubus-cli "WiFi.AccessPoint.5.WPS.Enable=0" 2>/dev/null
  - sleep 3
  - echo "Baseline24g=$(ubus-cli 'WiFi.AccessPoint.5.WPS.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
  - echo "WpsState24gBaseline=$(grep 'wps_state=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.5.WPS.Enable=1" 2>/dev/null
  - sleep 3
  - echo "AfterSet24g=$(ubus-cli 'WiFi.AccessPoint.5.WPS.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
  - echo "WpsState24gAfter=$(grep 'wps_state=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.5.WPS.Enable=0" 2>/dev/null
  - sleep 3
  - echo "Restore24g=$(ubus-cli 'WiFi.AccessPoint.5.WPS.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
  - echo "WpsState24gRestore=$(grep 'wps_state=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  capture: wps_24g
pass_criteria:
- field: wps_5g.Baseline5g
  operator: equals
  value: '0'
  description: 5G baseline WPS.Enable=0
- field: wps_5g.AfterSet5g
  operator: equals
  value: '1'
  description: 5G after setter WPS.Enable=1
- field: wps_5g.WpsState5gAfter
  operator: equals
  value: '2'
  description: 5G hostapd wps_state=2 after enable
- field: wps_5g.Restore5g
  operator: equals
  value: '0'
  description: 5G restore WPS.Enable=0
- field: wps_6g.Baseline6g
  operator: equals
  value: '0'
  description: 6G normalized baseline WPS.Enable=0
- field: wps_6g.AfterSet6g
  operator: equals
  value: '1'
  description: 6G getter accepts setter but hostapd stays 0
- field: wps_6g.WpsState6gAfter
  operator: equals
  value: '0'
  description: 6G hostapd wps_state stays 0 (Not Supported)
- field: wps_6g.Restore6g
  operator: equals
  value: '0'
  description: 6G restore WPS.Enable=0
- field: wps_24g.Baseline24g
  operator: equals
  value: '0'
  description: 2.4G normalized baseline WPS.Enable=0
- field: wps_24g.AfterSet24g
  operator: equals
  value: '1'
  description: 2.4G after setter WPS.Enable=1
- field: wps_24g.WpsState24gAfter
  operator: equals
  value: '2'
  description: 2.4G hostapd wps_state=2 after enable
- field: wps_24g.Restore24g
  operator: equals
  value: '0'
  description: 2.4G restore WPS.Enable=0
verification_command:
  - 'grep ''wps_state='' /tmp/wl0_hapd.conf /tmp/wl1_hapd.conf /tmp/wl2_hapd.conf'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Not Supported
    2.4g: Pass
    comment: Normalize each band to WPS.Enable=0, then replay workbook row-104 enable/readback. 5G and 2.4G project wps_state=2; 6G stays 0 under WPA3/SAE.
