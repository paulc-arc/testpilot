  - 'ubus-cli "WiFi.AccessPoint.3.Enable?"'
  - 'ubus-cli "WiFi.AccessPoint.5.Enable?"'
  - ubus-cli WiFi.AccessPoint.1.Enable=0
  - 'ubus-cli "WiFi.AccessPoint.1.?" | sed -n ''s/^WiFi\.AccessPoint\.1\.Enable=/Enable5g=/p; s/^WiFi\.AccessPoint\.1\.Status=/Status5g=/p'''
  - 'wl -i wl0 bss | sed -n ''s/^/DriverBssState5g=/p'''
  - 'awk -F= ''/^start_disabled=/{print "StartDisabled5g=" $2; if ($2 == 1) ones++; if ($2 == 0) zeros++; total++} END {print "StartDisabled5gOneCount=" ones+0; print "StartDisabled5gZeroCount=" zeros+0; print "StartDisabled5gTotalCount=" total+0}'' /tmp/wl0_hapd.conf'
