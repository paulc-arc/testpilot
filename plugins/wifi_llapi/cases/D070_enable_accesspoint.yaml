id: wifi-llapi-D070-enable-accesspoint
name: "Enable — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 72
  object: WiFi.AccessPoint.{i}.
  api: Enable
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.1.Enable=1'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; Enable is validated as an AP-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before the probe
  - validate each band one-by-one by toggling Enable from 1 -> 0 -> 1
  - cross-check northbound Enable / Status against driver `wl -i wlX bss` and hostapd `start_disabled`
setup_steps: |
  1) DUT baseline:
     - force AP1 / AP3 / AP5 back to Enable=1 before the probe starts
     - confirm wl0 / wl1 / wl2 BSS instances are reachable on the documented non-open baseline
  2) Per-band Enable probe:
     - read each band's baseline Enable getter
     - disable one AP, then verify Enable=0 / Status=Disabled / wl bss=down / hostapd start_disabled=1
     - enable the same AP again, then verify Enable=1 / Status=Enabled / wl bss=up / hostapd start_disabled disappears
  3) Cleanup:
     - finish with AP1 / AP3 / AP5 restored to Enable=1
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Read WiFi.AccessPoint.1/3/5.Enable directly from the DUT.
  2) Disable AP1 and verify the northbound setter/readback, Status getter, driver bss state, and hostapd `start_disabled` all converge on the disabled state.
  3) Re-enable AP1 and verify the same northbound / driver / hostapd views all return to the enabled state.
  4) Repeat the same disable -> enable sequence for AP3 and AP5.
  Verdict: To be tested. The current DUT converges cleanly on 5G, 6G, and 2.4G for this AP-only toggle/readback path, but the workbook baseline for all three bands remains `To be tested`.
steps:
- id: step1_default_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.Enable?"'
  capture: default_5g
- id: step2_default_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.AccessPoint.3.Enable?"'
  depends_on: step1_default_5g
  capture: default_6g
- id: step3_default_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.Enable?"'
  depends_on: step2_default_6g
  capture: default_24g
- id: step4_disable_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.Enable=0'
  depends_on: step3_default_24g
  capture: disable_5g
- id: step5_state_disable_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    ubus-cli "WiFi.AccessPoint.1.?" | sed -n 's/^WiFi\.AccessPoint\.1\.Enable=/Enable5g=/p; s/^WiFi\.AccessPoint\.1\.Status=/Status5g=/p'
  depends_on: step4_disable_5g
  capture: state_disable_5g
- id: step6_bss_disable_5g
  action: exec
  target: DUT
  band: 5g
  command: "wl -i wl0 bss | sed -n 's/^/DriverBssState5g=/p'"
  depends_on: step5_state_disable_5g
  capture: bss_disable_5g
- id: step7_cfg_disable_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    awk -F= '/^start_disabled=/{print "StartDisabled5g=" $2; if ($2 == 1) ones++; if ($2 == 0) zeros++; total++} END {print "StartDisabled5gOneCount=" ones+0; print "StartDisabled5gZeroCount=" zeros+0; print "StartDisabled5gTotalCount=" total+0}' /tmp/wl0_hapd.conf
  depends_on: step6_bss_disable_5g
  capture: cfg_disable_5g
- id: step8_enable_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.Enable=1'
  depends_on: step7_cfg_disable_5g
  capture: enable_5g
- id: step9_state_enable_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
