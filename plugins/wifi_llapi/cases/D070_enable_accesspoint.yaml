  target: DUT
  band: 5g
  command: "wl -i wl0 bss | sed -n 's/^/DriverBssState5g=/p'"
  depends_on: step9_state_enable_5g
  capture: bss_enable_5g
- id: step11_cfg_enable_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    awk -F= '/^start_disabled=/{print "StartDisabled5g=" $2; if ($2 == 1) ones++; if ($2 == 0) zeros++; total++} END {print "StartDisabled5gOneCount=" ones+0; print "StartDisabled5gZeroCount=" zeros+0; print "StartDisabled5gTotalCount=" total+0}' /tmp/wl0_hapd.conf
  depends_on: step10_bss_enable_5g
  capture: cfg_enable_5g
- id: step12_disable_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli WiFi.AccessPoint.3.Enable=0'
  depends_on: step11_cfg_enable_5g
  capture: disable_6g
- id: step13_state_disable_6g
  action: exec
  target: DUT
  band: 6g
  command: >-
