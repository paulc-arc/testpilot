id: wifi-llapi-r019-htcapabilities-accesspoint-associateddevice
name: HtCapabilities — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 19
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: HtCapabilities
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.HtCapabilities=40MHz,SGI20,SGI40
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '##Connect WiFi Station and check Station HtCapabilities WiFi.AccessPoint.1.AssociatedDevice.1.HtCapabilities="40MHz,SGI20,SGI40"
    WiFi.AccessPoint.3.AssociatedDevice.1.HtCapabilities="" WiFi.AccessPoint.5.AssociatedDevice.1.HtCapabilities="SGI20"'
  capture: result
pass_criteria:
- field: result.HtCapabilities
  operator: contains
  value: 40MHz,SGI20,SGI40
  description: HtCapabilities 應回傳包含 HtCapabilities=40MHz,SGI20,SGI40
verification_command: 'wl -i wl0 sta_info ${STA_MAC}

  HT caps 0x2d: LDPC SGI20'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Not Supported
    2.4g: Pass
    comment: 'ARC : 6G radio support only 11ax(HE) and 11be(EHT)'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Brcm chip supports it.
