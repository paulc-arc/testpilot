id: wifi-llapi-r224-stopscan
name: stopScan() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 301
  object: "WiFi.Radio.{i}."
  api: "stopScan()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.stopScan():void
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.stopScan():void
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.stopScan()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Start startScan() function once, record the result: ubus-cli "WiFi.Radio.1.startScan()" ubus-cli "WiFi.Radio.1.startScan()"
    > WiFi.Radio.1.startScan() WiFi.Radio.1.startScan() returned [ "" ]  ubus-cli "WiFi.Radio.2.startScan()" > WiFi.Radio.2.startScan()
    WiFi.Radio.2.startScan() returned [ "" ] ubus-cli "WiFi.Radio.3.startScan()" > WiFi.Radio.3.startScan() WiFi.Radio.3.startScan()
    returned [ "" ]'
- id: step2
  action: exec
  target: DUT
  command: 'Check with getScanResult(): ubus-cli "WiFi.Radio.*.getScanResults()" ....'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Use startScan() and stopScan() at the same time ubus-cli - ubus: - [ubus-cli] (0) > WiFi.Radio.1.startScan() WiFi.Radio.1.startScan()
    returned [ "" ] - ubus: - [ubus-cli] (0) > WiFi.Radio.1.stopScan() WiFi.Radio.1.stopScan() returned [ "" ] - ubus: - [ubus-cli]
    (0) > WiFi.Radio.2.startScan() WiFi.Radio.2.startScan() returned [ "" ] - ubus: - [ubus-cli] (0) > WiFi.Radio.2.stopScan()
    WiFi.Radio.2.stopScan() returned [ "" ] - ubus: - [ubus-cli] (0) > WiFi.Radio.3.startScan() WiFi.Radio.3.startScan() returned
    [ "" ] - ubus: - [ubus-cli] (0) > WiFi.Radio.3.stopScan() WiFi.Radio.3.stopScan() returned [ "" ]'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Check getScanResult() again, the list should not change.
  depends_on: step3
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: stopScan() 執行不應回傳 error

verification_command: |
  ubus-cli "WiFi.Radio.*.getScanResults()" | sed -n "1,200p"
  wl -i wl0 scanresults 2>/dev/null | sed -n "1,80p"
  wl -i wl1 scanresults 2>/dev/null | sed -n "1,80p"
  wl -i wl2 scanresults 2>/dev/null | sed -n "1,80p"

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
