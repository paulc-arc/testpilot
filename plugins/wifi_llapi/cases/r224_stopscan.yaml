id: wifi-llapi-r224-stopscan
name: stopScan() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 224
  object: WiFi.Radio.{i}.
  api: stopScan()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.stopScan():void
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Start startScan() function once, record the result: ubus-cli "WiFi.Radio.1.startScan()" ubus-cli "WiFi.Radio.1.startScan()"
    > WiFi.Radio.1.startScan() WiFi.Radio.1.startScan() returned [ "" ]  ubus-cli "WiFi.Radio.2.startScan()" > WiFi.Radio.2.startScan()
    WiFi.Radio.2.startScan() returned [ "" ] ubus-cli "WiFi.Radio.3.startScan()" > WiFi.Radio.3.startScan() WiFi.Radio.3.startScan()
    returned [ "" ]'
- id: step2
  action: exec
  target: DUT
  command: 'Check with getScanResult(): ubus-cli "WiFi.Radio.*.getScanResults()" ....'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Use startScan() and stopScan() at the same time ubus-cli - ubus: - [ubus-cli] (0) > WiFi.Radio.1.startScan() WiFi.Radio.1.startScan()
    returned [ "" ] - ubus: - [ubus-cli] (0) > WiFi.Radio.1.stopScan() WiFi.Radio.1.stopScan() returned [ "" ] - ubus: - [ubus-cli]
    (0) > WiFi.Radio.2.startScan() WiFi.Radio.2.startScan() returned [ "" ] - ubus: - [ubus-cli] (0) > WiFi.Radio.2.stopScan()
    WiFi.Radio.2.stopScan() returned [ "" ] - ubus: - [ubus-cli] (0) > WiFi.Radio.3.startScan() WiFi.Radio.3.startScan() returned
    [ "" ] - ubus: - [ubus-cli] (0) > WiFi.Radio.3.stopScan() WiFi.Radio.3.stopScan() returned [ "" ]'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Check getScanResult() again, the list should not change.
  depends_on: step3
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: stopScan() 執行不應回傳 error
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
