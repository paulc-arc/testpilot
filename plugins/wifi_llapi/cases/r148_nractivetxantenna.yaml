id: wifi-llapi-r148-nractivetxantenna
name: NrActiveTxAntenna — WiFi.Radio.{i}.DriverStatus.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 187
  object: "WiFi.Radio.{i}.DriverStatus."
  api: "NrActiveTxAntenna"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.DriverStatus.NrActiveTxAntenna=4
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.DriverStatus.NrActiveTxAntenna=4
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.DriverStatus.NrActiveTxAntenna=4
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.DriverStatus.NrActiveTxAntenna?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Check GW Radio DriverStatus.NrActiveTxAntenna ubus-cli WiFi.Radio.*.DriverStatus.NrActiveTxAntenna? > WiFi.Radio.*.DriverStatus.NrActiveTxAntenna?
    WiFi.Radio.1.DriverStatus.NrActiveTxAntenna=-1 WiFi.Radio.2.DriverStatus.NrActiveTxAntenna=-1 WiFi.Radio.3.DriverStatus.NrActiveTxAntenna=-1
  capture: result
pass_criteria:
- field: result.NrActiveTxAntenna
  operator: contains
  value: '4'
  description: NrActiveTxAntenna 應回傳包含 NrActiveTxAntenna=4
verification_command: 'wl -i wl0 txchain


  root@prplOS:/# wl -i wl0 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl1 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl2 txchain

  15 (0xf)

  Value _x0001_Hex_x0001_Meaning

  1 0x1_x0001_1×1 (chain 0 only)

  3 0x3_x0001_2×2 (chains 0–1)

  7 0x7_x0001_3×3 (chains 0–2)

  15 0xF_x0001_4×4 (chains 0–3)'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API should return 4'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: need to check(Leon)
