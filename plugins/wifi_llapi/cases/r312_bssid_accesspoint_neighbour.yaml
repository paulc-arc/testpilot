id: wifi-llapi-r312-bssid-accesspoint-neighbour
name: BSSID — WiFi.AccessPoint.{i}.Neighbour.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 429
  object: "WiFi.AccessPoint.{i}.Neighbour.{i}."
  api: "BSSID"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Neighbour.{i}.BSSID="02:aa:bb:01:25:45"
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Neighbour.{i}.BSSID="02:aa:bb:01:25:45"
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Neighbour.{i}.BSSID="02:aa:bb:01:25:45"
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.Neighbour.*.BSSID?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Reset GW to Default then check Neighbour entry ubus-cli WiFi.AccessPoint.1.? | grep Neighbour '
- id: step2
  action: exec
  target: DUT
  command: Add Neighbour entry ubus-cli "WiFi.AccessPoint.1.setNeighbourAP(BSSID="AA:BB:CC:DD:EE :01",Channel=36,ColocatedAP=1,Information=0x00000000,NASIdentifier="ap2.example.
    net",OperatingClass=128,PhyType=9,R0KHKey="0123456789abcdef0123456789abcdef",SSI D="MyMeshWiFi")" > WiFi.AccessPoint.1.setNeighbourAP(BSSID=AA:BB:CC:DD:EE:01,Channel=36,ColocatedAP=1,Information=0x00000000,NASIdentifier=ap2.example.net,OperatingClass=128,PhyType=9,R0KHKey=0123456789abcdef0123456789abcdef,SSID=MyMeshWiFi)
    WiFi.AccessPoint.1.setNeighbourAP() returned [ "", { ColocatedAP = 1 } ]
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Verify the added Neighbour entry ubus-cli WiFi.AccessPoint.1.? | grep Neighbour WiFi.AccessPoint.1.Neighbour.1.
    WiFi.AccessPoint.1.Neighbour.1.BSSID="AA:BB:CC:DD:EE:01" WiFi.AccessPoint.1.Neighbour.1.Channel=36 WiFi.AccessPoint.1.Neighbour.1.ColocatedAP=1
    WiFi.AccessPoint.1.Neighbour.1.Information=0 WiFi.AccessPoint.1.Neighbour.1.NASIdentifier="ap2.example.net" WiFi.AccessPoint.1.Neighbour.1.OperatingClass=128
    WiFi.AccessPoint.1.Neighbour.1.PhyType=9 WiFi.AccessPoint.1.Neighbour.1.R0KHKey="0123456789abcdef0123456789abcdef" WiFi.AccessPoint.1.Neighbour.1.SSID="MyMeshWiFi" '
  depends_on: step2
  capture: result
pass_criteria:
- field: result.BSSID
  operator: contains
  value: '"02:aa:bb:01:25:45"'
  description: BSSID 應回傳包含 BSSID="02:aa:bb:01:25:45"

verification_command: |
  ubus-cli "WiFi.AccessPoint.*.Neighbour.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.AccessPoint.*.Neighbour.*.BSSID?" 2>/dev/null || true
  hostapd_cli -i wl0 raw GET_NEIGHBOR 2>/dev/null || true
  wl -i wl0 rrm_nbr_list 2>/dev/null || true

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
