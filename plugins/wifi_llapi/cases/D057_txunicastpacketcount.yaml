id: wifi-llapi-D057-txunicastpacketcount
name: "TxUnicastPacketCount — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 57
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: TxUnicastPacketCount
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.TxUnicastPacketCount?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
      - iface: wl0
        mode: sta
        band: 5g
        ssid: testpilot5G
        security: WPA2-Personal
        key: '00000000'
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (STA role)
  Transport:
  - serialwrap attach COM0 / COM1
  Baseline:
  - 5G = AP1 / wl0 / testpilot5G / WPA2-Personal
  Preconditions:
  - keep only one associated station on AP1 so AssociatedDevice.1 stays deterministic
  - use the validated generic 5G WPA2 baseline for this case
  - workbook row 57 is TxUnicastPacketCount; stale row 59 is UplinkBandwidth
  - clean-start replay of the old TestPilot_BTM / SAE custom env left COM0 wpa_supplicant at `wpaie set error (-7)` with `wpa_state=DISCONNECTED` even though COM1 wl0 was beaconing the SSID, so this case now relies on the stable auto-baseline path instead of the non-reproducible custom WPA3 setup
  - current 5G retest resolves the same live STA on AP1 while TxPacketCount is positive but TxUnicastPacketCount stays 0
setup_steps: |
  1) Let the runner apply the deterministic 5G auto-baseline from band-baselines.yaml.
  2) Verify COM0 wl0 is connected to testpilot5G and COM1 wl0 assoclist resolves the same STA MAC.
  3) Read AP1 AssociatedDevice.1.TxUnicastPacketCount directly, then compare it with the same entry's TxPacketCount and COM1 wl0 sta_info counters.
test_procedure: |
  1) Resolve COM1 wl0's live STA MAC and require AP1 AssociatedDevice.1 to point to that same station.
  2) Read WiFi.AccessPoint.1.AssociatedDevice.1.TxUnicastPacketCount directly on DUT, then cross-check the same AssociatedDevice snapshot for both TxUnicastPacketCount and sibling TxPacketCount.
  3) Cross-check wl0 sta_info for the same STA and capture both `tx total pkts` and `tx ucast pkts`.
  4) The current 5G retest is fail-shaped: TxUnicastPacketCount stays 0 while the same entry's TxPacketCount and wl0 sta_info tx ucast pkts remain positive.
steps:
- id: step1
  action: exec
  target: STA
  command: cat /sys/class/net/wl0/address | tr 'A-F' 'a-f' | sed 's/^/StaMac=/'
  capture: sta_identity
- id: step2
  action: exec
  target: DUT
  command: >-
    ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n 's/.*MACAddress="\([^"]*\)".*/\1/p' | tr 'A-F' 'a-f' | sed 's/^/MACAddress=/'
  depends_on: step1
  capture: assoc_entry
- id: step3
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.TxUnicastPacketCount?"'
  depends_on: step2
  capture: result
- id: step4
  action: exec
  target: DUT
  command: >-
    ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | awk -F= '/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress=/ {gsub(/"/, "", $2); print "AssocMAC=" tolower($2)} /^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxUnicastPacketCount=/ {print "AssocTxUnicastPacketCount=" $2} /^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxPacketCount=/ {print "AssocTxPacketCount=" $2}'
  depends_on: step3
  capture: assoc_snapshot
- id: step5
  action: exec
  target: DUT
  command: >-
    STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n 's/.*MACAddress="\([^"]*\)".*/\1/p' | tr 'A-F' 'a-f'); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC | sed -n 's/^[[:space:]]*tx total pkts: \([0-9][0-9]*\).*/DriverTxPacketCount=\1/p; s/^[[:space:]]*tx ucast pkts: \([0-9][0-9]*\).*/DriverTxUnicastPacketCount=\1/p; s/^[[:space:]]*tx total bytes: \([0-9][0-9]*\).*/DriverTxBytes=\1/p; s/^[[:space:]]*tx ucast bytes: \([0-9][0-9]*\).*/DriverTxUnicastBytes=\1/p'
  depends_on: step4
  capture: driver_capture
pass_criteria:
- field: sta_identity.StaMac
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: COM1 wl0 must resolve to a concrete live STA MAC before DUT-side validation.
- field: assoc_entry.MACAddress
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: AP1 AssociatedDevice.1 must first resolve to the live 5G STA MAC.
- field: assoc_entry.MACAddress
  operator: equals
  reference: sta_identity.StaMac
  description: AP1 AssociatedDevice.1 must correspond to the same COM1 wl0 station used for this manual checkpoint.
- field: result.TxUnicastPacketCount
  operator: regex
  value: ^[0-9]+$
  description: TxUnicastPacketCount direct getter must produce a numeric counter for the live AssociatedDevice entry.
- field: result.TxUnicastPacketCount
  operator: equals
  value: '0'
  description: The current 5G live retest shows TxUnicastPacketCount still reads 0 for the same AssociatedDevice entry.
- field: assoc_snapshot.AssocMAC
  operator: equals
  reference: assoc_entry.MACAddress
  description: AssociatedDevice snapshot evidence must come from the same AP1 station entry.
- field: result.TxUnicastPacketCount
  operator: equals
  reference: assoc_snapshot.AssocTxUnicastPacketCount
  description: Direct getter TxUnicastPacketCount must match the same AssociatedDevice snapshot value.
- field: assoc_snapshot.AssocTxPacketCount
  operator: '>'
  value: '0'
  description: The sibling TxPacketCount on the same AssociatedDevice entry must remain positive during this checkpoint.
- field: driver_capture.DriverAssocMac
  operator: equals
  reference: assoc_entry.MACAddress
  description: Driver evidence must target the same AssociatedDevice MAC resolved in step2.
- field: driver_capture.DriverTxPacketCount
  operator: '>'
  value: '0'
  description: wl0 sta_info must report a positive tx total packet count for the same STA.
- field: assoc_snapshot.AssocTxPacketCount
  operator: equals
  reference: driver_capture.DriverTxPacketCount
  description: The sibling TxPacketCount on the same AssociatedDevice entry must match wl0 sta_info tx total pkts.
- field: driver_capture.DriverTxUnicastPacketCount
  operator: '>'
  value: '0'
  description: wl0 sta_info must report a positive tx ucast packet count for the same STA.
- field: driver_capture.DriverTxBytes
  operator: regex
  value: ^[0-9]+$
  description: wl0 sta_info must still expose tx total bytes as supporting context for the same STA.
- field: driver_capture.DriverTxUnicastBytes
  operator: regex
  value: ^[0-9]+$
  description: wl0 sta_info must still expose tx ucast bytes as supporting context for the same STA.
verification_command:
  - 'cat /sys/class/net/wl0/address | tr ''A-F'' ''a-f'' | sed ''s/^/StaMac=/'''
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.TxUnicastPacketCount?"'
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | awk -F= ''/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress=/ {gsub(/"/, "", $2); print "AssocMAC=" tolower($2)} /^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxUnicastPacketCount=/ {print "AssocTxUnicastPacketCount=" $2} /^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxPacketCount=/ {print "AssocTxPacketCount=" $2}'''
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p'' | tr ''A-F'' ''a-f''); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC | sed -n ''s/^[[:space:]]*tx total pkts: \([0-9][0-9]*\).*/DriverTxPacketCount=\1/p; s/^[[:space:]]*tx ucast pkts: \([0-9][0-9]*\).*/DriverTxUnicastPacketCount=\1/p; s/^[[:space:]]*tx total bytes: \([0-9][0-9]*\).*/DriverTxBytes=\1/p; s/^[[:space:]]*tx ucast bytes: \([0-9][0-9]*\).*/DriverTxUnicastBytes=\1/p'''
results_reference:
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
