id: wifi-llapi-D028-maxbandwidthsupported
name: "MaxBandwidthSupported — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 25
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: MaxBandwidthSupported
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: STA
    to: DUT
    band: 2.4g
test_environment: |
  Topology: DUT=COM0(AP) / STA=COM1(station)
  Live band mapping:
  - 5G : DUT wl0 / AP1 / BSSID 2c:59:17:00:19:95 / STA MAC 2C:59:17:00:04:85
  - 6G : DUT wl1 / AP3 -- BCME_NOTREADY (STA cannot associate; skip all 6G steps)
  - 2.4G: DUT wl2 / AP5 / BSSID 2C:59:17:00:19:A7 / STA MAC 2C:59:17:00:04:97
  Precondition: STA associated on the target band so AssociatedDevice.1 is deterministic.
test_procedure: |
  Read-only string telemetry. MaxBandwidthSupported returns the maximum channel bandwidth
  the associated STA can support (e.g. "160MHz", "80MHz", "Unknown").
  Steps:
  1) Confirm 5G STA is associated; read AP1 AssociatedDevice.1.MaxBandwidthSupported.
  2) Confirm 2.4G STA is associated; read AP5 AssociatedDevice.1.MaxBandwidthSupported.
  6G is skipped (BCME_NOTREADY).
  Pass (5G): value should remain "160MHz" for the current wl0 STA.
  Pass (2.4G): value must be a recognized bandwidth token; current lab STA returns "Unknown"
               due to OMI=0x3203 and is recorded as STA-Discrepancy in results_reference.
steps:
- id: step1_5g_assoc
  action: exec
  target: DUT
  band: 5g
  command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
  capture: assoc_5g
- id: step2_5g
  action: exec
  target: DUT
  band: 5g
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MaxBandwidthSupported?"
  depends_on: step1_5g_assoc
  capture: result_5g
- id: step3_6g
  action: skip
  target: DUT
  band: 6g
  reason: 6G BCME_NOTREADY -- STA cannot associate on wl1/AP3 in current lab.
- id: step4_24g_assoc
  action: exec
  target: DUT
  band: 2.4g
  command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
  capture: assoc_24g
- id: step5_24g
  action: exec
  target: DUT
  band: 2.4g
  command: ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.MaxBandwidthSupported?"
  depends_on: step4_24g_assoc
  capture: result_24g
pass_criteria:
- field: assoc_5g.AssocMac5g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: "5G -- MaxBandwidthSupported 讀取前必須先確認 wl0 STA 已關聯"
- field: result_5g.MaxBandwidthSupported
  operator: equals
  value: 160MHz
  description: "5G -- live MaxBandwidthSupported should remain 160MHz"
- field: assoc_24g.AssocMac24g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: "2.4G -- MaxBandwidthSupported 讀取前必須先確認 wl2 STA 已關聯"
- field: result_24g.MaxBandwidthSupported
  operator: not_contains
  value: 'ERROR'
  description: "2.4G -- must not return ERROR; live value = \"Unknown\" (STA OMI=0x3203 forces 20MHz; BW unresolvable -- STA device difference vs workbook expectation)."
- field: result_24g.MaxBandwidthSupported
  operator: regex
  value: '^(20MHz|40MHz|80MHz|160MHz|Unknown)$'
  description: "2.4G -- must remain a recognized bandwidth token or \"Unknown\""
verification_command:
  - 'DUT# ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MaxBandwidthSupported?"'
  - 'DUT# ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.MaxBandwidthSupported?"'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Skip
    2.4g: STA-Discrepancy
    comment: |
      Live evidence (BCM v4.0.3):
      5G: WiFi.AccessPoint.1.AssociatedDevice.1.MaxBandwidthSupported=160MHz
      2.4G: WiFi.AccessPoint.5.AssociatedDevice.1.MaxBandwidthSupported=Unknown
          Root cause: 2.4G STA OMI=0x3203 forces 20MHz operation;
          wld_util_getMaxBwCap() returns BCME_NOTFOUND -> value reported as "Unknown".
          This is a STA device difference from the workbook reference STA, not a LLAPI bug.
