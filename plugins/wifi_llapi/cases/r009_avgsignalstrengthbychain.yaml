id: wifi-llapi-r009-avgsignalstrengthbychain
name: AvgSignalStrengthByChain — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 9
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: AvgSignalStrengthByChain
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.AvgSignalStrengthByChain=-41
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW
- id: step2
  action: exec
  target: DUT
  command: Verify Associated station AvgSignalStrengthByChain ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.AvgSignalStrengthByChain?
    WiFi.AccessPoint.1.AssociatedDevice.1.AvgSignalStrengthByChain=-41 WiFi.AccessPoint.3.AssociatedDevice.1.AvgSignalStrengthByChain=-57
    WiFi.AccessPoint.5.AssociatedDevice.1.AvgSignalStrengthByChain=-48
  depends_on: step1
  capture: result
pass_criteria:
- field: result.AvgSignalStrengthByChain
  operator: contains
  value: '-41'
  description: AvgSignalStrengthByChain 應回傳包含 AvgSignalStrengthByChain=-41
verification_command: 'root@prplOS:/# wl -i wl0 sta_info 4A:0A:A5:80:23:7B | grep rssi

  per antenna rssi of last rx data frame: -44 -48 -48 -47

  per antenna average rssi of rx data frames: -44 -48 -47 -47

  smoothed rssi: -44'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
