id: wifi-llapi-r024-macaddress-accesspoint-associateddevice
name: MACAddress — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 24
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: MACAddress
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.MACAddress=AA:6B:30:4E:8E:5C
llapi_support: Support
implemented_by: pWHM
topology:
