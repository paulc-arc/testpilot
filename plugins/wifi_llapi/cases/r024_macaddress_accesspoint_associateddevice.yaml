      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '##Connect WiFi Station and check Station MAC Address WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress="12:59:1B:BC:C7:7C"
    WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress="82:25:85:F8:33:D1" WiFi.AccessPoint.5.AssociatedDevice.1.MACAddress="02:0F:42:EB:A5:26"'
  capture: result
pass_criteria:
- field: result.MACAddress
  operator: contains
  value: AA:6B:30:4E:8E:5C
  description: MACAddress 應回傳包含 MACAddress=AA:6B:30:4E:8E:5C
verification_command: 'wl -i wl0 sta_info ${STA_MAC}

  STA 02:0F:42:EB:A5:26:'
