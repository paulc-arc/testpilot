id: wifi-llapi-r052-txmulticastpacketcount
name: TxMulticastPacketCount — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 52
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: TxMulticastPacketCount
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.TxMulticastPacketCount=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW
- id: step2
  action: exec
  target: DUT
  command: Use IPerf to send Multicast packet between Station Server = iperf -s -u -B 239.1.2.3%br0 -i 1 Joiner = iperf -c
    239.1.2.3 -u -t 10 -b 20M -i 1 -t 100
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Check TxMulticastPacketCount ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.? | grep TxMultica stPacketCount WiFi.AccessPoint.1.AssociatedDevice.1.TxMulticastPacketCount=0
    WiFi.AccessPoint.3.AssociatedDevice.1.TxMulticastPacketCount=0 WiFi.AccessPoint.5.AssociatedDevice.1.TxMulticastPacketCount=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result.TxMulticastPacketCount
  operator: contains
  value: '0'
  description: TxMulticastPacketCount 應回傳包含 TxMulticastPacketCount=0
