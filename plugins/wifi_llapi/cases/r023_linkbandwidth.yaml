id: wifi-llapi-r023-linkbandwidth
name: LinkBandwidth — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 23
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: LinkBandwidth
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.LinkBandwidth=160MHz
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '##Connect WiFi Station and check Station LinkBandwidth WiFi.AccessPoint.1.AssociatedDevice.1.LinkBandwidth="20MHz"
    WiFi.AccessPoint.3.AssociatedDevice.1.LinkBandwidth="20MHz" WiFi.AccessPoint.5.AssociatedDevice.1.LinkBandwidth="20MHz"'
  capture: result
pass_criteria:
- field: result.LinkBandwidth
  operator: contains
  value: 160MHz
  description: LinkBandwidth 應回傳包含 LinkBandwidth=160MHz
verification_command: 'wl -i wl0 sta_info ${STA_MAC}

  link bandwidth = 20 MHZ'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
