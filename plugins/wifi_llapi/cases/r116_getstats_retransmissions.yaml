id: wifi-llapi-r116-getstats-retransmissions
name: getStats() — WiFi.EndPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 130
  object: "WiFi.EndPoint.{i}."
  api: "getStats()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.EndPoint.{i}.getStats() Retransmissions : 33,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.EndPoint.{i}.getStats() Retransmissions : 33,
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.EndPoint.{i}.getStats() Retransmissions : 33,
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.EndPoint.*.getStats()"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: query
  action: exec
  target: DUT
  command: 'ubus-cli WiFi.EndPoint.{i}.getStats() Retransmissions : 33,'
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getStats() 執行不應回傳 error

verification_command: |
  ubus-cli "WiFi.EndPoint.*.getStats()" | sed -n "1,200p"
  ubus-cli "WiFi.EndPoint.*.getStats?" 2>/dev/null || true
  iw dev 2>/dev/null
  iw dev wl0 link 2>/dev/null || true
  iw dev wl0 station dump 2>/dev/null | sed -n "1,120p"

results_reference:
  v4.0.1:
    5g: Skip
    6g: Skip
    2.4g: Skip
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
