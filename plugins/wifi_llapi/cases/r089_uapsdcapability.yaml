id: wifi-llapi-r089-uapsdcapability
name: UAPSDCapability — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 97
  object: "WiFi.AccessPoint.{i}."
  api: "UAPSDCapability"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.UAPSDCapability=1
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.UAPSDCapability=1
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.UAPSDCapability=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.UAPSDCapability?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Get GW UAPSDCapability ubus-cli WiFi.AccessPoint.? | grep .UAPSDCapability WiFi.AccessPoint.1.UAPSDCapability=1
    WiFi.AccessPoint.3.UAPSDCapability=1 WiFi.AccessPoint.5.UAPSDCapability=1
- id: step2
  action: exec
  target: DUT
  command: Check Beacon packet if it include U-APSD WMM/WME - Beacon packet include U-APSD
  depends_on: step1
  capture: result
pass_criteria:
- field: result.UAPSDCapability
  operator: contains
  value: '1'
  description: UAPSDCapability 應回傳包含 UAPSDCapability=1
