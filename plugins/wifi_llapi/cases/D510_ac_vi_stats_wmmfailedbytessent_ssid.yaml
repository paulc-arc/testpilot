id: d510-ssid-wmm-ac_vi_stats_wmmfailedbytessent_ssid
name: D510 WmmFailedbytesSent.AC_VI
source:
  row: 510
  object: WiFi.SSID.{i}.Stats.WmmFailedbytesSent.
  api: AC_VI
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_refresh
  target: dut
  action: exec
  capture: refresh_5g
  command: ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n '/WmmFailedbytesSent = {/,/}/s/^[[:space:]]*AC_VI = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedbytesSent5g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedbytesSent.AC_VI
  description: SSID.4 (5g) getSSIDStats() WmmFailedbytesSent.AC_VI refresh
- id: step_5g_direct
  target: dut
  action: exec
  capture: direct_5g
  command: 'ubus-cli "WiFi.SSID.4.Stats.WmmFailedbytesSent.AC_VI?"'
  expected: Stats.WmmFailedbytesSent.AC_VI getter 回傳有效值
  description: SSID.4 (5g) direct Stats.WmmFailedbytesSent.AC_VI
- id: step_5g_driver
  target: dut
  action: exec
  capture: driver_5g
  command: wl -i wl0 wme_counters | grep '^AC_VI:' | awk '{print "DriverWmmFailedbytesSent5g="$12}'
  expected: wl0 wme_counters 匯出 AC_VI tx failed bytes
  description: SSID.4 (5g) driver AC_VI tx failed bytes
- id: step_6g_refresh
  target: dut
  action: exec
  capture: refresh_6g
  command: ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n '/WmmFailedbytesSent = {/,/}/s/^[[:space:]]*AC_VI = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedbytesSent6g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedbytesSent.AC_VI
  description: SSID.6 (6g) getSSIDStats() WmmFailedbytesSent.AC_VI refresh
- id: step_6g_direct
  target: dut
  action: exec
  capture: direct_6g
  command: 'ubus-cli "WiFi.SSID.6.Stats.WmmFailedbytesSent.AC_VI?"'
  expected: Stats.WmmFailedbytesSent.AC_VI getter 回傳有效值
  description: SSID.6 (6g) direct Stats.WmmFailedbytesSent.AC_VI
- id: step_6g_driver
  target: dut
  action: exec
  capture: driver_6g
  command: wl -i wl1 wme_counters | grep '^AC_VI:' | awk '{print "DriverWmmFailedbytesSent6g="$12}'
  expected: wl1 wme_counters 匯出 AC_VI tx failed bytes
  description: SSID.6 (6g) driver AC_VI tx failed bytes
- id: step_24g_refresh
  target: dut
  action: exec
  capture: refresh_24g
  command: ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n '/WmmFailedbytesSent = {/,/}/s/^[[:space:]]*AC_VI = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedbytesSent24g=\1/p'
  expected: getSSIDStats() 匯出 WmmFailedbytesSent.AC_VI
  description: SSID.8 (2.4g) getSSIDStats() WmmFailedbytesSent.AC_VI refresh
- id: step_24g_direct
  target: dut
  action: exec
  capture: direct_24g
  command: 'ubus-cli "WiFi.SSID.8.Stats.WmmFailedbytesSent.AC_VI?"'
  expected: Stats.WmmFailedbytesSent.AC_VI getter 回傳有效值
  description: SSID.8 (2.4g) direct Stats.WmmFailedbytesSent.AC_VI
- id: step_24g_driver
  target: dut
  action: exec
  capture: driver_24g
  command: wl -i wl2 wme_counters | grep '^AC_VI:' | awk '{print "DriverWmmFailedbytesSent24g="$12}'
  expected: wl2 wme_counters 匯出 AC_VI tx failed bytes
  description: SSID.8 (2.4g) driver AC_VI tx failed bytes
pass_criteria:
- field: direct_5g.AC_VI
  operator: equals
  reference: refresh_5g.GetSSIDStatsWmmFailedbytesSent5g
  description: 5g direct Stats.WmmFailedbytesSent.AC_VI must match getSSIDStats().WmmFailedbytesSent.AC_VI after refresh.
- field: direct_5g.AC_VI
  operator: equals
  reference: driver_5g.DriverWmmFailedbytesSent5g
  description: 5g direct Stats.WmmFailedbytesSent.AC_VI must match wl0 wme_counters AC_VI tx failed bytes.
- field: direct_6g.AC_VI
  operator: equals
  reference: refresh_6g.GetSSIDStatsWmmFailedbytesSent6g
  description: 6g direct Stats.WmmFailedbytesSent.AC_VI must match getSSIDStats().WmmFailedbytesSent.AC_VI after refresh.
- field: direct_6g.AC_VI
  operator: equals
  reference: driver_6g.DriverWmmFailedbytesSent6g
  description: 6g direct Stats.WmmFailedbytesSent.AC_VI must match wl1 wme_counters AC_VI tx failed bytes.
- field: direct_24g.AC_VI
  operator: equals
  reference: refresh_24g.GetSSIDStatsWmmFailedbytesSent24g
  description: 2.4g direct Stats.WmmFailedbytesSent.AC_VI must match getSSIDStats().WmmFailedbytesSent.AC_VI after refresh.
- field: direct_24g.AC_VI
  operator: equals
  reference: driver_24g.DriverWmmFailedbytesSent24g
  description: 2.4g direct Stats.WmmFailedbytesSent.AC_VI must match wl2 wme_counters AC_VI tx failed bytes.
verification_command:
  - 'ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n ''/WmmFailedbytesSent = {/,/}/s/^[[:space:]]*AC_VI = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedbytesSent5g=\1/p'''
  - 'ubus-cli "WiFi.SSID.4.Stats.WmmFailedbytesSent.AC_VI?"'
  - 'wl -i wl0 wme_counters | grep ''^AC_VI:'' | awk ''{print "DriverWmmFailedbytesSent5g="$12}'''
  - 'ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n ''/WmmFailedbytesSent = {/,/}/s/^[[:space:]]*AC_VI = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedbytesSent6g=\1/p'''
  - 'ubus-cli "WiFi.SSID.6.Stats.WmmFailedbytesSent.AC_VI?"'
  - 'wl -i wl1 wme_counters | grep ''^AC_VI:'' | awk ''{print "DriverWmmFailedbytesSent6g="$12}'''
  - 'ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n ''/WmmFailedbytesSent = {/,/}/s/^[[:space:]]*AC_VI = \([0-9][0-9]*\).*/GetSSIDStatsWmmFailedbytesSent24g=\1/p'''
  - 'ubus-cli "WiFi.SSID.8.Stats.WmmFailedbytesSent.AC_VI?"'
  - 'wl -i wl2 wme_counters | grep ''^AC_VI:'' | awk ''{print "DriverWmmFailedbytesSent24g="$12}'''
