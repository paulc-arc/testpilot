id: wifi-llapi-r375-ac-be-stats-wmmfailedbytessent-ssid
name: AC_BE — WiFi.SSID.{i}.Stats.WmmFailedbytesSent.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 510
  object: "WiFi.SSID.{i}.Stats.WmmFailedbytesSent."
  api: "AC_BE"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.SSID.{i}.Stats.WmmFailedbytesSent.AC_BE=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.SSID.{i}.Stats.WmmFailedbytesSent.AC_BE=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.SSID.*.Stats.WmmFailedbytesSent.AC_BE?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: query
  action: exec
  target: DUT
  command: ubus-cli WiFi.SSID.{i}.Stats.WmmFailedbytesSent.AC_BE=0
  capture: result
pass_criteria:
- field: result.AC_BE
  operator: contains
  value: '0'
  description: AC_BE 應回傳包含 AC_BE=0

verification_command: |
  # Generate traffic first when validating SSID stats counters.
  ubus-cli "WiFi.SSID.*.Stats.?" | sed -n "1,200p"
  ubus-cli "WiFi.SSID.*.Stats.AC_BE?" 2>/dev/null || true
  cat /proc/net/dev | grep -E "Inter-|wl0|wl1|wl2"

results_reference:
  v4.0.1:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
  v4.0.3:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: ''
