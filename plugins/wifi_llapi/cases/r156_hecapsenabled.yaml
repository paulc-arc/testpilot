id: wifi-llapi-r156-hecapsenabled
name: HeCapsEnabled — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 195
  object: "WiFi.Radio.{i}."
  api: "HeCapsEnabled"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.HeCapsEnabled=DL_OFDMA,UL_OFDMA,DL_MUMIMO
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.HeCapsEnabled=DL_OFDMA,UL_OFDMA,DL_MUMIMO
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.HeCapsEnabled=DL_OFDMA,UL_OFDMA,DL_MUMIMO
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.HeCapsEnabled?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Try enabled all supporting HE capablitities for all readios: ubus-cli WiFi.Radio.*.HeCapsEnabled="DL_OFDMA,UL_OFDMA,DL_MUMIMO,
    UL_MUMIMO"'
- id: step2
  action: exec
  target: DUT
  command: 'Check the settings: ubus-cli WiFi.Radio.*.HeCapsEnabled? > WiFi.Radio.*.HeCapsEnabled? WiFi.Radio.1.HeCapsEnabled="UL_MUMIMO"
    WiFi.Radio.2.HeCapsEnabled="UL_MUMIMO" WiFi.Radio.3.HeCapsEnabled="UL_MUMIMO"'
  depends_on: step1
  capture: result
pass_criteria:
- field: result.HeCapsEnabled
  operator: contains
  value: DL_OFDMA,UL_OFDMA,DL_MUMIMO
  description: HeCapsEnabled 應回傳包含 HeCapsEnabled=DL_OFDMA,UL_OFDMA,DL_MUMIMO
verification_command: 'wl -i wl[x] he features


  root@prplOS:/# wl -i wl0 he features

  0 (0x0)

  root@prplOS:/# wl -i wl1 he features

  0 (0x0)

  root@prplOS:/# wl -i wl2 he features

  63 (0x3f)'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Committed
