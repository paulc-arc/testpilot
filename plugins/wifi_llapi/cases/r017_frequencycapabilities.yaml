id: wifi-llapi-r017-frequencycapabilities
name: FrequencyCapabilities — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 17
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: FrequencyCapabilities
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.FrequencyCapabilities=
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW.
- id: step2
  action: exec
  target: DUT
  command: 'Verify Associated Station FrequencyCapabilities: root@prplOS:~# ubus-cli WiFi.? | grep FrequencyCapabilities=
    WiFi.AccessPoint.1.AssociatedDevice.1.FrequencyCapabilities="2.4GHz,5GHz,6GHz" WiFi.AccessPoint.3.AssociatedDevice.1.FrequencyCapabilities="2.4GHz,5GHz,6GHz"
    WiFi.AccessPoint.5.AssociatedDevice.1.FrequencyCapabilities="2.4GHz,5GHz,6GHz"'
  depends_on: step1
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: FrequencyCapabilities 應回傳非空結果
verification_command: 'wl -i wl0 sta_info ${STA_MAC}

  Frequency Bands Supported: 2.4G 5G 6G'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
