id: wifi-llapi-D095-uapsdcapability
name: "UAPSDCapability — WiFi.AccessPoint.{i}."
version: '1.0'
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 95
  object: "WiFi.AccessPoint.{i}."
  api: "UAPSDCapability"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.UAPSDCapability?"
llapi_support: Support
implemented_by: Vendor Module
bands:
  - 5g
  - 6g
  - 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (B0, AP role)
  Transport:
  - DUT via serialwrap COM1
  Baseline:
  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal
  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE
  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal
  Notes:
  - UAPSDCapability is read-only (setter returns error 15)
  - Reports hardware/firmware capability, not operational state
  - hostapd uapsd_advertisement_enabled=0 and driver wme_apsd=0 mean
    capability exists but is not currently active — not a contradiction
steps:
  # ---------- 5G ----------
  - id: step1_uapsd_5g
    action: exec
    target: DUT
    command:
      - echo "UAPSDCapability5g=$(ubus-cli 'WiFi.AccessPoint.1.UAPSDCapability?' 2>/dev/null | grep -o 'UAPSDCapability=[0-9]*' | cut -d= -f2)"
      - echo "HapdUapsd5g=$(grep 'uapsd_advertisement_enabled=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
      - echo "DriverWmeApsd5g=$(wl -i wl0 wme_apsd 2>/dev/null)"
    capture: uapsd_5g

  # ---------- 6G ----------
  - id: step2_uapsd_6g
    action: exec
    target: DUT
    depends_on: step1_uapsd_5g
    command:
      - echo "UAPSDCapability6g=$(ubus-cli 'WiFi.AccessPoint.3.UAPSDCapability?' 2>/dev/null | grep -o 'UAPSDCapability=[0-9]*' | cut -d= -f2)"
      - echo "HapdUapsd6g=$(grep 'uapsd_advertisement_enabled=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
      - echo "DriverWmeApsd6g=$(wl -i wl1 wme_apsd 2>/dev/null)"
    capture: uapsd_6g

  # ---------- 2.4G ----------
  - id: step3_uapsd_24g
    action: exec
    target: DUT
    depends_on: step2_uapsd_6g
    command:
      - echo "UAPSDCapability24g=$(ubus-cli 'WiFi.AccessPoint.5.UAPSDCapability?' 2>/dev/null | grep -o 'UAPSDCapability=[0-9]*' | cut -d= -f2)"
      - echo "HapdUapsd24g=$(grep 'uapsd_advertisement_enabled=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
      - echo "DriverWmeApsd24g=$(wl -i wl2 wme_apsd 2>/dev/null)"
    capture: uapsd_24g

pass_criteria:
  - field: uapsd_5g.UAPSDCapability5g
    operator: equals
    value: '1'
    description: '5G UAPSDCapability should be 1 (capable)'
  - field: uapsd_6g.UAPSDCapability6g
    operator: equals
    value: '1'
    description: '6G UAPSDCapability should be 1 (capable)'
  - field: uapsd_24g.UAPSDCapability24g
    operator: equals
    value: '1'
    description: '2.4G UAPSDCapability should be 1 (capable)'

verification_command:
  - 'wl -i wl0 wme_apsd'
  - 'wl -i wl1 wme_apsd'
  - 'wl -i wl2 wme_apsd'
  - 'grep uapsd_advertisement_enabled /tmp/wl0_hapd.conf'
  - 'grep uapsd_advertisement_enabled /tmp/wl1_hapd.conf'
  - 'grep uapsd_advertisement_enabled /tmp/wl2_hapd.conf'

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: >-
      Active reruns show AP1/AP3/AP5 all return read-only `UAPSDCapability=1`
      while hostapd `uapsd_advertisement_enabled=0` and driver `wme_apsd=0`
      simply indicate the feature is not currently active. The LLAPI getter
      still correctly reports tri-band hardware capability.
