results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'Multiband source-backed retest: active 0403 `getSpectrumInfo()` returns its RPC payload through `_getSpectrumInfo()` -> `s_prepareSpectrumOutput()` -> `amxc_var_add_key(cstring_t, "bandwidth", swl_bandwidth_str[llEntry->bandwidth])`, and the sync refresh path `wifiGen_rad_getSpectrumInfo(..., update=false)` currently seeds each survey-derived spectrum entry with `SWL_BW_20MHZ` in `wld_rad_nl80211_updateUsageStatsFromSurveyInfo()`. Real runner replay therefore locks the public 5g/6g/2.4g shape to `bandwidth="20MHz"` rather than the stale workbook-era numeric-only regex.'
