id: wifi-llapi-r411-strsupport-capabilities-wifi7aprole
name: STRSupport — WiFi.Radio.{i}.Capabilities.WiFi7APRole.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 598
  object: "WiFi.Radio.{i}.Capabilities.WiFi7APRole."
  api: "STRSupport"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Capabilities.WiFi7APRole.STRSupport
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.Capabilities.WiFi7APRole.STRSupport
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.Capabilities.WiFi7APRole.STRSupport
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.Capabilities.WiFi7APRole.STRSupport?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Verify STRSupport set 1 = supported ubus-cli WiFi.Radio.*.Capabilities.WiFi7APRole.STRSupport? > WiFi.Radio.*.Capabilities.WiFi7APRole.STRSupport?
    WiFi.Radio.1.Capabilities.WiFi7APRole.STRSupport=1 WiFi.Radio.2.Capabilities.WiFi7APRole.STRSupport=1 WiFi.Radio.3.Capabilities.WiFi7APRole.STRSupport=1
- id: step2
  action: exec
  target: DUT
  command: Check Beacon Packet
  depends_on: step1
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: STRSupport 應回傳非空結果

verification_command: |
  ubus-cli "WiFi.Radio.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.Radio.*.STRSupport?" 2>/dev/null || true
  wl -i wl0 status; wl -i wl1 status; wl -i wl2 status
  wl -i wl0 channel 2>/dev/null || true; wl -i wl1 channel 2>/dev/null || true; wl -i wl2 channel 2>/dev/null || true

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
