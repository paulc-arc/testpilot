id: wifi-llapi-r196-getradiostats-discardpacketssent
name: getRadioStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 196
  object: WiFi.Radio.{i}.
  api: getRadioStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.{i}.getRadioStats()DiscardPacketsSent : 1,'
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Record DiscardPacketsSent: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep DiscardPacketsSent DiscardPacketsSent
    = 14, DiscardPacketsSent = 0, DiscardPacketsSent = 6,'
- id: step2
  action: exec
  target: DUT
  command: 'Use iperf3 to tansmit large pkgs from individual radios: iperf3 -u -b 500M -t 30 -c <server_ip> -R'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Read DiscardPacketsReceived again: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep DiscardPacketsSent DiscardPacketsSent
    = 64, DiscardPacketsSent = 9, DiscardPacketsSent = 72,'
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioStats() 執行不應回傳 error
verification_command: 'cat /proc/net/dev | grep wl*

  awk ''

  $1 ~ /^wl[0-2]:$/ {

  printf "%s TX_drop-pkg=%s\n", $1, $13

  }

  '' /proc/net/dev'
