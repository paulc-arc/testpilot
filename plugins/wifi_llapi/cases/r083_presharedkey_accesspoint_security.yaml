id: wifi-llapi-r083-presharedkey-accesspoint-security
name: PreSharedKey — WiFi.AccessPoint.{i}.Security
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 83
  object: WiFi.AccessPoint.{i}.Security
  api: PreSharedKey
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Security.PreSharedKey=
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 'Test Procedure: 1.set the security mode to WPA-Personal 2.Set/Get PreSharedkey Set Command: ubus-cli WiFi.AccessPoint.{i}.Security.PreSharedKey=""
    (64 character) Get Command: ubus-cli WiFi.AccessPoint.{i}.Security.PreSharedKey? 3.Set WiFi.AccessPoint.{i}.Security.KeyPassPhrase=""
    4.check hostapd config cat /tmp/wlx_hapd.conf |grep wpa_psk 5.STA connect to AP with PreSharedKey'
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: PreSharedKey 應回傳非空結果
verification_command: cat /tmp/wl0_hapd.conf |grep wpa_psk
results_reference:
  v4.0.1:
    5g: Fail
    6g: Not Supported
    2.4g: Fail
    comment: 'ARC : failed in WPA2-Personal & WPA-WPA2-Personal'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
