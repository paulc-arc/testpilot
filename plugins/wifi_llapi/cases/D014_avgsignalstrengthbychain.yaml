id: wifi-llapi-D014-avgsignalstrengthbychain
name: AvgSignalStrengthByChain — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 9
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: AvgSignalStrengthByChain
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology: DUT=COM0(AP) / STA=COM1(station)
  Live band mapping:
  - 5G : DUT wl0 / AP1 / BSSID 2c:59:17:00:19:95 / STA MAC 2C:59:17:00:04:85
  - 6G : DUT wl1 / AP3 — BCME_NOTREADY (STA cannot associate; skip all 6G steps)
  - 2.4G: DUT wl2 / AP5 / BSSID 2C:59:17:00:19:A7 / STA MAC 2C:59:17:00:04:97
  Precondition: one STA associated on the target band so AssociatedDevice.1 is deterministic.
test_procedure: |
  Read-only telemetry. AvgSignalStrengthByChain 回報每條天線鏈的平均 RSSI（整數 dBm）。
  驗證步驟：
  1) 確認 5G STA 已關聯至 AP1 (AssociatedDevice.1 = STA MAC 2C:59:17:00:04:85)。
  2) 讀取 AP1 AssociatedDevice.1 的 AvgSignalStrengthByChain。
  3) 讀取 AP5 AssociatedDevice.1 的 AvgSignalStrengthByChain (2.4G)。
  6G 因 BCME_NOTREADY，跳過不測。
  Pass 條件：回傳非零整數（負 dBm 值）。
steps:
- id: step1_5g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.AvgSignalStrengthByChain?"
  capture: result_5g
- id: step2_6g
  action: skip
  target: DUT
  reason: 6G BCME_NOTREADY — STA cannot associate on wl1/AP3 in current lab.
- id: step3_24g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.AvgSignalStrengthByChain?"
  capture: result_24g
pass_criteria:
- field: result_5g.AvgSignalStrengthByChain
  operator: regex
  value: '^-?[0-9]+'
  description: "5G — must return a non-empty integer dBm value (live evidence: -34)."
- field: result_24g.AvgSignalStrengthByChain
  operator: regex
  value: '^-?[0-9]+'
  description: "2.4G — must return a non-empty integer dBm value (live evidence: -16)."
verification_command: |
  ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.AvgSignalStrengthByChain?"
  ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.AvgSignalStrengthByChain?"
results_reference:
  v4.0.3:
    5g: Pass
    6g: Skip
    2.4g: Pass
    comment: |
      Live evidence (BCM v4.0.3):
      5G: WiFi.AccessPoint.1.AssociatedDevice.1.AvgSignalStrengthByChain=-34
      2.4G: WiFi.AccessPoint.5.AssociatedDevice.1.AvgSignalStrengthByChain=-16
      Value is STA-dependent; LLAPI correctly reports live RSSI per antenna chain.
