id: wifi-llapi-r078-encryptionmode-accesspoint-security
name: EncryptionMode — WiFi.AccessPoint.{i}.Security
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 86
  object: "WiFi.AccessPoint.{i}.Security"
  api: "EncryptionMode"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Security.EncryptionMode=Default
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Security.EncryptionMode=Default
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Security.EncryptionMode=Default
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.Security.EncryptionMode?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: \\Set security mode to WPA3 ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled="WPA3-Personal" > WiFi.AccessPoint.1.Security.ModeEnabled=WPA3-Personal
    WiFi.AccessPoint.1.Security. WiFi.AccessPoint.1.Security.ModeEnabled="WPA3-Personal"
- id: step2
  action: exec
  target: DUT
  command: Get AccessPoint.1.Security.EncryptionMode ubus-cli WiFi.AccessPoint.? | grep .Security.EncryptionMode WiFi.AccessPoint.1.Security.EncryptionMode="Default"
    WiFi.AccessPoint.3.Security.EncryptionMode="Default" WiFi.AccessPoint.5.Security.EncryptionMode="Default"
  depends_on: step1
  capture: result
pass_criteria:
- field: result.EncryptionMode
  operator: contains
  value: Default
  description: EncryptionMode 應回傳包含 EncryptionMode=Default
verification_command: 'cat /tmp/wl0_hapd.conf


  root@prplOS:/# grep -Ei "ccmp|tkip|wep|sae" /tmp/wl0_hapd.conf

  wpa_key_mgmt=SAE FT-SAE

  wpa_pairwise=CCMP

  rsn_pairwise=CCMP

  sae_password=12345678

  sae_require_mfp=1

  sae_anti_clogging_threshold=5

  sae_sync=5

  sae_groups=19 20 21

  sae_pwe=2

  wpa_pairwise=CCMP

  rsn_pairwise=CCMP'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API return "Default"'
  v4.0.3:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: hardcode in pwhm
