id: wifi-llapi-r226-getssidstats-broadcastpacketssent
name: getSSIDStats() — WiFi.SSID.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 226
  object: WiFi.SSID.{i}.
  api: getSSIDStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.SSID.{i}.getSSIDStats() BroadcastPacketsSent : 0,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to SSID4, SSID6 and SSID8
- id: step2
  action: exec
  target: DUT
  command: Run Ping between Station and check BroadcastPacketsSent.
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Disconnect WiFi Station and clear ARP then run Ping again. ubus-cli "WiFi.SSID.?" | grep BroadcastPacketsSent
    WiFi.SSID.4.Stats.BroadcastPacketsSent=0 WiFi.SSID.6.Stats.BroadcastPacketsSent=0 WiFi.SSID.8.Stats.BroadcastPacketsSent=0
    Note: Station send Broadcast ARP packet first before when running ping.'
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getSSIDStats() 執行不應回傳 error
verification_command: 'cat /proc/net/dev | grep wl0


  cInter-| Receive | Transmit

  face |bytes packets errs drop fifo frame compressed multicast|bytes packets errs drop fifo colls carrier compressed

  wl0: 1647695 6411 0 14 0 0 0 196 13183521 23890 0 24 0 0 0 0

  wl1: 14846 78 0 17 0 0 0 32 5169961 15592 0 8 0 0 0 0

  wl2: 10098313 76126 0 26 0 0 0 58 227046209 173516 0 5 0 0 0 0'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API always return "0"'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
