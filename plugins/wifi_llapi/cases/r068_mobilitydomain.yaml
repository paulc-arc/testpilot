id: wifi-llapi-r068-mobilitydomain
name: MobilityDomain — WiFi.AccessPoint.{i}.IEEE80211r.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 74
  object: "WiFi.AccessPoint.{i}.IEEE80211r."
  api: "MobilityDomain"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.IEEE80211r.MobilityDomain=27476
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.IEEE80211r.MobilityDomain=27476
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.IEEE80211r.MobilityDomain=27476
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.IEEE80211r.MobilityDomain?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: \\Set MobilityDomain ubus-cli WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=1 > WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=1
    WiFi.AccessPoint.1.IEEE80211r. WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=1
  capture: result
pass_criteria:
- field: result.MobilityDomain
  operator: contains
  value: '27476'
  description: MobilityDomain 應回傳包含 MobilityDomain=27476
verification_command: '802.11r requires a non-zero Mobility Domain ID (MDID).

  If MDID = 0 → 802.11r will NOT activate, even if Enabled=1.


  must set .MobilityDomain to a 16-bit number (1–65535).

  Example:

  ubus-cli WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=4660'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
