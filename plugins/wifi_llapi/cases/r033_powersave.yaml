id: wifi-llapi-r033-powersave
name: PowerSave — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 33
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: PowerSave
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.PowerSave=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: \\Enable U-APSD in station
- id: step2
  action: exec
  target: DUT
  command: Connect WiFi Station to GW
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Check Station info "PowerSave" ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.PowerSave? > WiFi.AccessPoint.*.AssociatedDevice.*.PowerSave?
    WiFi.AccessPoint.1.AssociatedDevice.1.PowerSave=0 WiFi.AccessPoint.1.AssociatedDevice.2.PowerSave=0 WiFi.AccessPoint.3.AssociatedDevice.1.PowerSave=0
    WiFi.AccessPoint.5.AssociatedDevice.1.PowerSave=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result.PowerSave
  operator: contains
  value: '0'
  description: PowerSave 應回傳包含 PowerSave=0
verification_command: 'root@prplOS:/# wl -i wl0 sta_info E6:60:17:EB:A9:86 | grep flags

  flags 0x40d1fe3a: WME APSD_BE APSD_BK APSD_VI APSD_VO N_CAP VHT_CAP HE_CAP AMP'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API return "0" while in wl command station info it shows APSD'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: defintion in pwhm only
