id: wifi-llapi-r155-guardinterval
name: GuardInterval — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 194
  object: "WiFi.Radio.{i}."
  api: "GuardInterval"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.GuardInterval=Auto
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.GuardInterval=Auto
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.GuardInterval=Auto
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.GuardInterval?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 'Setting value: ["400nsec''","800nsec","1xLTF_0.8us","1xLTF_1.6us","2xLTF_0.8us","2xLTF_1.6us","4xLTF_0.8us","4xLTF_1.6us","Auto"]'
- id: step2
  action: exec
  target: DUT
  command: Get GI Default value ubus-cli WiFi.Radio.*.GuardInterval? > WiFi.Radio.*.GuardInterval? WiFi.Radio.1.GuardInterval="Auto"
    WiFi.Radio.2.GuardInterval="Auto" WiFi.Radio.3.GuardInterval="Auto"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Try Set GI to "1xLTF_1.6us" ubus-cli WiFi.Radio.*.GuardInterval="1xLTF_1.6us" > WiFi.Radio.*.GuardInterval=1xLTF_1.6us
    WiFi.Radio.1. WiFi.Radio.1.GuardInterval="1xLTF_1.6us" WiFi.Radio.2. WiFi.Radio.2.GuardInterval="1xLTF_1.6us" WiFi.Radio.3.
    WiFi.Radio.3.GuardInterval="1xLTF_1.6us"
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Verify GI settings ubus-cli WiFi.Radio.*.GuardInterval? > WiFi.Radio.*.GuardInterval? WiFi.Radio.1.GuardInterval="1xLTF_1.6us"
    WiFi.Radio.2.GuardInterval="1xLTF_1.6us" WiFi.Radio.3.GuardInterval="1xLTF_1.6us"
  depends_on: step3
  capture: result
pass_criteria:
- field: result.GuardInterval
  operator: contains
  value: Auto
  description: GuardInterval 應回傳包含 GuardInterval=Auto
verification_command: 'BRCM: CSP CS00012439197


  --

  root@prplOS:/# wl -i wl0 nrate

  eht mcs 13 Nss 4 Tx Exp 0 bw160 2xLTF GI 0.8us auto

  root@prplOS:/# wl -i wl0 sgi_tx

  -1'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'support

      pwhm only supports const char* Rad_SupGI[] = {"Auto", "400nsec", "800nsec", 0}; that means index 0/1/2 and sgi_tx -1/1/0.
      Basically this Property doesn''t support EHT guardInterval, just keep the code. And use "Auto" for HE/EHT mode'
