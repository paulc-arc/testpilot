id: wifi-llapi-r077-neighbour
name: Neighbour — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 85
  object: "WiFi.AccessPoint.{i}."
  api: "Neighbour"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Neighbour
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Neighbour
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Neighbour
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.Neighbour?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '\\Add Neighbour AP ubus-cli "WiFi.AccessPoint.1.setNeighbourAP(BSSID=11:22:33:44:55: 66,Channel=36)" > WiFi.AccessPoint.1.setNeighbourAP(BSSID=11:22:33:44:55:66,Channel=36)
    WiFi.AccessPoint.1.setNeighbourAP() returned [ "" ] ubus-cli "WiFi.AccessPoint.3.setNeighbourAP(BSSID=11:22:33:44:55:
    77,Channel=1)" > WiFi.AccessPoint.3.setNeighbourAP(BSSID=11:22:33:44:55:77,Channel=1) WiFi.AccessPoint.3.setNeighbourAP()
    returned [ "" ] ubus-cli "WiFi.AccessPoint.5.setNeighbourAP(BSSID=11:22:33:44:55: 88,Channel=11)" > WiFi.AccessPoint.5.setNeighbourAP(BSSID=11:22:33:44:55:88,Channel=11)
    WiFi.AccessPoint.5.setNeighbourAP() returned [ "" ]'
- id: step2
  action: exec
  target: DUT
  command: Get or Check Neigbour AP ubus-cli WiFi.AccessPoint.*.? | grep -E 'BSSID|Channel' WiFi.AccessPoint.1.Neighbour.1.BSSID="11:22:33:44:55:66"
    WiFi.AccessPoint.1.Neighbour.1.Channel=36 WiFi.AccessPoint.3.Neighbour.2.BSSID="11:22:33:44:55:77" WiFi.AccessPoint.3.Neighbour.1.Channel=1
    WiFi.AccessPoint.5.Neighbour.2.BSSID="11:22:33:44:55:88" WiFi.AccessPoint.5.Neighbour.2.Channel=11
  depends_on: step1
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: Neighbour 應回傳非空結果

verification_command: |
  ubus-cli "WiFi.AccessPoint.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.AccessPoint.*.Neighbour?" 2>/dev/null || true
  wl -i wl0 bss 2>/dev/null || true; wl -i wl1 bss 2>/dev/null || true; wl -i wl2 bss 2>/dev/null || true
  wl -i wl0 assoclist; wl -i wl1 assoclist; wl -i wl2 assoclist

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
