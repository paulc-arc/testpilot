id: wifi-llapi-r172-operatingstandards
name: OperatingStandards — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 213
  object: "WiFi.Radio.{i}."
  api: "OperatingStandards"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.OperatingStandards=ax
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

sta_env_setup: |
  STA env setup baseline (COM1 / A0, serialwrap):
  1) Enable STA radios:
     ubus-cli WiFi.Radio.1.Enable=1
     ubus-cli WiFi.Radio.2.Enable=1
     ubus-cli WiFi.Radio.3.Enable=1
  2) 5G connect verify (wl0 -> B0_5G_AP):
     ubus-cli WiFi.AccessPoint.1.Enable=0
     ubus-cli WiFi.AccessPoint.2.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl0.1 del 2>/dev/null || true
     iw dev wl0 set type managed
     ifconfig wl0 up
     iw dev wl0 connect B0_5G_AP
     sleep 3
     iw dev wl0 link
  3) 6G connect verify (wl1 -> B0_6G_AP, SAE):
     wpa_cli terminate 2>/dev/null || true
     sleep 1
     iw dev wl1.1 del 2>/dev/null || true
     iw dev wl1 disconnect 2>/dev/null || true
     iw dev wl1 set type managed
     ifconfig wl1 up
     printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\n' > /tmp/wpa_wl1.conf
     wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf
     sleep 2
     wpa_cli -i wl1 remove_network all
     wpa_cli -i wl1 add_network
     wpa_cli -i wl1 set_network 0 ssid '"B0_6G_AP"'
     wpa_cli -i wl1 set_network 0 key_mgmt SAE
     wpa_cli -i wl1 set_network 0 sae_password '"B0StaTest1234"'
     wpa_cli -i wl1 set_network 0 ieee80211w 2
     wpa_cli -i wl1 set_network 0 scan_ssid 1
     wpa_cli -i wl1 enable_network 0
     wpa_cli -i wl1 reconnect
     sleep 15
     iw dev wl1 link
     wpa_cli -i wl1 status
  4) 2.4G connect verify (wl2 -> B0_24G_AP):
     ubus-cli WiFi.AccessPoint.5.Enable=0
     ubus-cli WiFi.AccessPoint.6.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl2.1 del 2>/dev/null || true
     iw dev wl2 set type managed
     ifconfig wl2 up
     iw dev wl2 connect B0_24G_AP
     sleep 3
     iw dev wl2 link
  5) DUT association evidence (COM0):
     wl -i wl0 assoclist
     wl -i wl1 assoclist
     wl -i wl2 assoclist

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.OperatingStandards=ax
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.OperatingStandards?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 'Try change 6G radio to BE standard: ubus-cli WiFi.Radio.2.OperatingStandards=be'
- id: step2
  action: exec
  target: DUT
  command: 'Check BE readback: ubus-cli WiFi.Radio.2.OperatingStandards?'
  depends_on: step1
  capture: result_be
- id: step3
  action: exec
  target: DUT
  command: Run wl -i wl1 beacon_info and confirm the 6 GHz beacon includes EHT Capabilities / EHT Operation IE when WiFi.Radio.2.OperatingStandards=be.
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: 'Change 6G radio to AX standard: ubus-cli WiFi.Radio.2.OperatingStandards=ax'
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: 'Check AX readback: ubus-cli WiFi.Radio.2.OperatingStandards?'
  depends_on: step4
  capture: result_ax
- id: step6
  action: exec
  target: DUT
  command: Run wl -i wl1 beacon_info and confirm the 6 GHz beacon drops EHT Capabilities / EHT Operation IE while keeping HE Operation when WiFi.Radio.2.OperatingStandards=ax.
  depends_on: step5
- id: step7
  action: exec
  target: DUT
  command: Verify SupportedStandards per radio individually - WiFi.Radio.1.SupportedStandards="a,n,an,ac,ax" WiFi.Radio.2.SupportedStandards="ax,be" WiFi.Radio.3.SupportedStandards="b,g,n,bg,gn,bgn,ax"
  depends_on: step6
pass_criteria:
- field: result_be.OperatingStandards
  operator: equals
  value: be
  description: 6G radio 設為 be 後應能穩定回讀 be。
- field: result_ax.OperatingStandards
  operator: equals
  value: ax
  description: 6G radio 從 be 切回 ax 後應能穩定回讀 ax。
verification_command: |
  wl -i wl1 eht enab
  wl -i wl1 he enab
  wl -i wl1 nmode
  wl -i wl1 vhtmode
  wl -i wl1 beacon_info
  # Use beacon_info as the beacon-IE proof.
  # BE: beacon_info should show EHT Capabilities / EHT Operation together with HE Operation.
  # AX: beacon_info should keep HE Operation but no longer show EHT Capabilities / EHT Operation.
  # eht enab / he enab remain supporting backend evidence only.
results_reference:
  v4.0.1:
    5g: Fail
    6g: Pass
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Fail
    6g: Pass
    2.4g: Fail
    comment: Limitation in current period. Need to spend time to rework
