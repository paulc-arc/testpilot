id: wifi-llapi-D083-neighbour
name: "Neighbour — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 83
  object: WiFi.AccessPoint.{i}.
  api: Neighbour
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.1.Neighbour
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; Neighbour is calibrated as an AP-only object workflow with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing Neighbour
  - live 0320 probe showed AP1/AP3/AP5 all start with an empty `Neighbour` tree
  - `setNeighbourAP(BSSID=...,Channel=...)` accepted the workbook-style add on all three bands
  - `delNeighbourAP(BSSID=...)` removed the same entry and returned the tree to the empty baseline on all three bands
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - capture the current `Neighbour` tree baseline on all three bands
  2) Per-band Neighbour probe:
     - add one neighbour entry with the workbook-style `BSSID` + `Channel` pair
     - re-read the `Neighbour` tree and confirm the entry appears
     - delete the same neighbour entry by `BSSID`
     - re-read the `Neighbour` tree and confirm it returns to empty
  3) Verdict model:
     - this is a pass-path AP-only object lifecycle case
     - the case passes only when add and delete together produce `empty -> single entry -> empty` on all three bands
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Capture the baseline `Neighbour` tree on AP1 / AP3 / AP5.
  2) Add one neighbour entry with `setNeighbourAP(BSSID=...,Channel=...)` on the same AP.
  3) Re-read the `Neighbour` tree and confirm the expected `BSSID` / `Channel` pair appears.
  4) Delete the same neighbour entry with `delNeighbourAP(BSSID=...)`.
  5) Re-read the `Neighbour` tree and confirm it returns to the empty baseline.
  Verdict: Pass. The current DUT accepts the workbook-style add and delete flow on all three bands and the `Neighbour` tree converges `empty -> one entry -> empty`.

steps:
- id: step1_neighbour_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    TREE=$(ubus-cli WiFi.AccessPoint.1.? | grep -E 'Neighbour\.[0-9]+\.(BSSID|Channel)' || true); BSSID=$(printf '%s\n' "$TREE" | sed -n 's/.*Neighbour\.[0-9][0-9]*\.BSSID="\([^"]*\)".*/\1/p' | tail -n 1); CH=$(printf '%s\n' "$TREE" | sed -n 's/.*Neighbour\.[0-9][0-9]*\.Channel=\([0-9][0-9]*\).*/\1/p' | tail -n 1); BC=$(printf '%s\n' "$TREE" | grep -c 'Neighbour\.[0-9][0-9]*\.BSSID='); CC=$(printf '%s\n' "$TREE" | grep -c 'Neighbour\.[0-9][0-9]*\.Channel='); printf 'BaselineBssidCount5g=%s\n' "$BC"; printf 'BaselineChannelCount5g=%s\n' "$CC"; if [ -n "$BSSID" ]; then printf 'BaselineBssid5g=%s\n' "$BSSID"; else echo 'BaselineBssid5g=ABSENT'; fi; if [ -n "$CH" ]; then printf 'BaselineChannel5g=%s\n' "$CH"; else echo 'BaselineChannel5g=ABSENT'; fi
  capture: neighbour_baseline_5g
- id: step2_neighbour_add_5g
