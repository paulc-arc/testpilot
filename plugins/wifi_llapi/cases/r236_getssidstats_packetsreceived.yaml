hlapi_command: 'ubus-cli WiFi.SSID.{i}.getSSIDStats() PacketsReceived : 793238,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW SSID4, SSID6 and SSID8
- id: step2
  action: exec
  target: DUT
  command: Run Ping from station to GW
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Get stats PacketsReceived ubus-cli "WiFi.SSID.6.getSSIDStats()" | grep \.PacketsReceived PacketsReceived = 4951,
    ubus-cli "WiFi.SSID.4.getSSIDStats()" | grep \.PacketsReceived PacketsReceived = 10370, ubus-cli "WiFi.SSID.8.getSSIDStats()"
    | grep \.PacketsReceived PacketsReceived = 145409,
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getSSIDStats() 執行不應回傳 error
