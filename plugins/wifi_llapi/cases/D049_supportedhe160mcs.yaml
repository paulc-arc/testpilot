id: wifi-llapi-r044-supportedhe160mcs
name: SupportedHe160MCS — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 49
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "SupportedHe160MCS"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SupportedHe160MCS=
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SupportedHe160MCS=
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

sta_env_setup: |
  STA env setup baseline (COM1 / A0, serialwrap):
  1) Enable STA radios:
     ubus-cli WiFi.Radio.1.Enable=1
     ubus-cli WiFi.Radio.2.Enable=1
     ubus-cli WiFi.Radio.3.Enable=1
  2) 5G connect verify (wl0 -> B0_5G_AP):
     ubus-cli WiFi.AccessPoint.1.Enable=0
     ubus-cli WiFi.AccessPoint.2.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl0.1 del 2>/dev/null || true
     iw dev wl0 set type managed
     ifconfig wl0 up
     iw dev wl0 connect B0_5G_AP
     sleep 3
     iw dev wl0 link
  3) 6G connect verify (wl1 -> B0_6G_AP, SAE):
     wpa_cli terminate 2>/dev/null || true
     sleep 1
     iw dev wl1.1 del 2>/dev/null || true
     iw dev wl1 disconnect 2>/dev/null || true
     iw dev wl1 set type managed
     ifconfig wl1 up
     printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\n' > /tmp/wpa_wl1.conf
     wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf
     sleep 2
     wpa_cli -i wl1 remove_network all
     wpa_cli -i wl1 add_network
     wpa_cli -i wl1 set_network 0 ssid '"B0_6G_AP"'
     wpa_cli -i wl1 set_network 0 key_mgmt SAE
     wpa_cli -i wl1 set_network 0 sae_password '"B0StaTest1234"'
     wpa_cli -i wl1 set_network 0 ieee80211w 2
     wpa_cli -i wl1 set_network 0 scan_ssid 1
     wpa_cli -i wl1 enable_network 0
     wpa_cli -i wl1 reconnect
     sleep 15
     iw dev wl1 link
     wpa_cli -i wl1 status
  4) 2.4G connect verify (wl2 -> B0_24G_AP):
     ubus-cli WiFi.AccessPoint.5.Enable=0
     ubus-cli WiFi.AccessPoint.6.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl2.1 del 2>/dev/null || true
     iw dev wl2 set type managed
     ifconfig wl2 up
     iw dev wl2 connect B0_24G_AP
     sleep 3
     iw dev wl2 link
  5) DUT association evidence (COM0):
     wl -i wl0 assoclist
     wl -i wl1 assoclist
     wl -i wl2 assoclist

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SupportedHe160MCS=
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.SupportedHe160MCS?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: query
  action: exec
  target: DUT
  command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SupportedHe160MCS=
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: SupportedHe160MCS 應回傳非空結果

verification_command: |
  # Generate traffic before readback for stats-like AssociatedDevice fields.
  STA_MAC="$(wl -i wl0 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  [ -z "$STA_MAC" ] && STA_MAC="$(wl -i wl1 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  [ -z "$STA_MAC" ] && STA_MAC="$(wl -i wl2 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  wl -i wl0 assoclist; wl -i wl1 assoclist; wl -i wl2 assoclist
  ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.?" | sed -n "1,120p"
  ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.SupportedHe160MCS?" 2>/dev/null || true
  [ -n "$STA_MAC" ] && wl -i wl0 sta_info "$STA_MAC" | sed -n "1,120p"
  iw dev wl0 station dump 2>/dev/null | sed -n "1,120p"

results_reference:
  v4.0.1:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: 'Does SupportedHe160MCS equal to rx/txSupportedHe160MCS as shown below


      root@prplOS:/# ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.? | grep Supported

      He160MCS.

      WiFi.AccessPoint.1.AssociatedDevice.1.RxSupportedHe160MCS="11,11,11,11"

      WiFi.AccessPoint.1.AssociatedDevice.1.TxSupportedHe160MCS="11,11,11,11"

      WiFi.AccessPoint.3.AssociatedDevice.1.RxSupportedHe160MCS="11,11,11,11"

      WiFi.AccessPoint.3.AssociatedDevice.1.TxSupportedHe160MCS="11,11,11,11"

      WiFi.AccessPoint.5.AssociatedDevice.1.RxSupportedHe160MCS=""

      WiFi.AccessPoint.5.AssociatedDevice.1.TxSupportedHe160MCS=""

      2.4G not supported 160MHz WiFi.Radio.3.SupportedOperatingChannelBandwidth="Auto,20MHz,40MHz"'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: wld_assocDev_copyAssocDevInfoFromIEs, IE is from hostapd
