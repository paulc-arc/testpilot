  sheet: Wifi_LLAPI
  row: 77
  object: WiFi.AccessPoint.{i}.IEEE80211u
  api: InterworkingEnable
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211u.InterworkingEnable=1'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; InterworkingEnable is validated as an AP-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before the IEEE80211u probe
  - live 0319 probe showed each hostapd file exposes two `interworking=` lines; toggling the target AP flips one line while the sibling BSS line stays at `0`
  - the northbound getter converges as a plain boolean `0 -> 1 -> 0`, while hostapd count convergence becomes `one/zero/total = 0/2/2 -> 1/1/2 -> 0/2/2`
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - confirm wl0 / wl1 / wl2 BSS instances are reachable before changing IEEE80211u settings
  2) Per-band InterworkingEnable toggle:
     - confirm the northbound getter starts at `InterworkingEnable=0`
     - confirm the hostapd file exposes exactly two `interworking=0` lines before the setter write
     - set InterworkingEnable=1 and confirm the northbound getter reads back `1`
     - confirm the hostapd file flips to `interworking=1` exactly once while keeping one `interworking=0` line
     - restore InterworkingEnable=0 and confirm both the getter and hostapd counts return to baseline
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Keep AP1, AP3, and AP5 enabled on the documented non-open baseline.
  2) For each band, confirm the northbound getter starts at `InterworkingEnable=0`.
  3) Cross-check hostapd before the setter write: the band-specific hapd file should expose `interworking=1` zero times, `interworking=0` twice, and exactly two total `interworking` lines.
  4) Set InterworkingEnable=1 on the same AP and confirm the northbound getter reads back `1`.
  5) Cross-check hostapd after the setter write: the target band should now expose `interworking=1` once, `interworking=0` once, and still exactly two total `interworking` lines.
  6) Restore InterworkingEnable=0 and confirm both the getter and hostapd counts return to baseline `0/2/2`.
  7) Verdict: To be tested. The current DUT converges cleanly on 5G, 6G, and 2.4G for this AP-only InterworkingEnable path, but the workbook baseline for all three bands remains `To be tested`.
