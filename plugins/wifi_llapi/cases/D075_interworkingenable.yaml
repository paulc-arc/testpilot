- id: step1_state_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    ubus-cli "WiFi.AccessPoint.1.IEEE80211u.InterworkingEnable?" | sed -n 's/^WiFi\.AccessPoint\.1\.IEEE80211u\.InterworkingEnable=/Interworking5g=/p'
  capture: state_baseline_5g
- id: step2_cfg_baseline_5g
