    - grep -c '^interworking=0$' /tmp/wl0_hapd.conf | sed 's/^/Interworking5gZeroCount=/'
    - grep -c '^interworking=' /tmp/wl0_hapd.conf | sed 's/^/Interworking5gTotalCount=/'
