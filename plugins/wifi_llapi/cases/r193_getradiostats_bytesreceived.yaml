id: wifi-llapi-r193-getradiostats-bytesreceived
name: getRadioStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 193
  object: WiFi.Radio.{i}.
  api: getRadioStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.{i}.getRadioStats()BytesReceived : 943690,'
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect 2.4/5/6G STA to DUT, try ping or setup iperf3 data flow. The counter should accumulate. Compared the
    counters between the API returned and inside "/proc/net/dev". There should be minimal discrepancy between the two values.
    ubus-cli "WiFi.Radio.*.getRadioStats()" | grep "BytesReceived" BytesReceived = 162032, BytesReceived = 0, BytesReceived
    = 54131408
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioStats() 執行不應回傳 error
verification_command: 'cat /proc/net/dev

  awk ''

  $1 ~ /^wl[0-2]:$/ {

  printf "%s RX_byte=%s\n", $1, $2

  }

  '' /proc/net/dev


  wl0: RX_byte=157536

  wl1: RX_byte=0

  wl2: RX_byte=54054823'
