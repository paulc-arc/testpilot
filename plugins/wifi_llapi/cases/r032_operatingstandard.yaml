id: wifi-llapi-r032-operatingstandard
name: OperatingStandard — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 32
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: OperatingStandard
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.OperatingStandard=ac
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '##Connect WiFi Station and check Station OperatingStandard ubus-cli WiFi.AccessPoint.? | grep \.OperatingStandard=
    WiFi.AccessPoint.1.AssociatedDevice.{i}.OperatingStandard="a" WiFi.AccessPoint.2.AssociatedDevice.{i}.OperatingStandard="Unknown"
    WiFi.AccessPoint.3.AssociatedDevice.{i}.OperatingStandard="be" WiFi.AccessPoint.4.AssociatedDevice.{i}.OperatingStandard="be"
    WiFi.AccessPoint.5.AssociatedDevice.{i}.OperatingStandard="ax" WiFi.AccessPoint.6.AssociatedDevice.{i}.OperatingStandard="ax"'
  capture: result
pass_criteria:
- field: result.OperatingStandard
  operator: contains
  value: ac
  description: OperatingStandard 應回傳包含 OperatingStandard=ac
verification_command: wl -i wl0 sta_info ${STA_MAC}
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
