id: wifi-llapi-r191-getradiostats-broadcastpacketsreceived
name: getRadioStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 191
  object: WiFi.Radio.{i}.
  api: getRadioStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.{i}.getRadioStats()BroadcastPacketsReceived : 0,'
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Record counters at start: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep BroadcastPacketsReceived BroadcastPacketsReceived
    = 0, BroadcastPacketsReceived = 0, BroadcastPacketsReceived = 0,'
- id: step2
  action: exec
  target: DUT
  command: Connect 2.4/5/6G STA to DUT, use "arping -I [STA WiFi interface] -c 200 [DUT IP or any other STAs' IP]" or "nmap
    -sn 192.168.1.0/24"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check counters again: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep BroadcastPackets BroadcastPacketsReceived
    = 0, BroadcastPacketsReceived = 0, BroadcastPacketsReceived = 0,'
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioStats() 執行不應回傳 error
verification_command: cat /proc/net/dev | grep wl0
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Committed
