id: d412-assocdev-maxuplinkratesupported
name: D412 AssociatedDevice MaxUplinkRateSupported
source:
  row: 414
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: MaxUplinkRateSupported
  baseline: 0310-BGW720-300
bands:
- 5g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
steps:
- id: step_5g_assoc_check
  target: dut
  action: read
  capture: assoc_check
  command: wl -i wl0 assoclist | head -1
  expected: 至少一個 STA MAC
  description: 確認 AP1 有 associated STA
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MaxUplinkRateSupported?"
  expected: MaxUplinkRateSupported 回傳有效值
  description: AP1 AssociatedDevice.1 MaxUplinkRateSupported getter
  depends_on: step_5g_assoc_check
pass_criteria:
- field: assoc_check
  operator: regex
  value: "assoclist [0-9A-Fa-f:]+"
- field: getter_5g.MaxUplinkRateSupported
  operator: regex
  value: '^\d+$'
