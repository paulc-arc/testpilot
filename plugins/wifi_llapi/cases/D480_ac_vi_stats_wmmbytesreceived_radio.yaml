id: d480-radio-stats-wmmbytesreceived-ac_vi
name: D480 Radio Stats WmmBytesReceived AC_VI
source:
  row: 480
  object: WiFi.Radio.{i}.Stats.WmmBytesReceived.
  api: AC_VI
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: workbook row 480 keeps this radio-level counter on Pass; workbook H480 uses wl wme_counters AC_VI rx bytes as the driver oracle.
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_direct
  target: dut
  action: exec
  capture: direct_5g
  command: 'ubus-cli "WiFi.Radio.1.Stats.WmmBytesReceived.AC_VI?"'
  expected: Stats.WmmBytesReceived.AC_VI getter 回傳有效值
  description: Radio.1 (5g) direct Stats.WmmBytesReceived.AC_VI
- id: step_5g_driver
  target: dut
  action: exec
  capture: driver_5g
  command: wl -i wl0 wme_counters | grep -A2 '^AC_VI:' | awk '/rx frames:/ {print "DriverWmmBytesReceived5g="$5}'
  expected: wl0 wme_counters 匯出 AC_VI rx bytes
  description: Radio.1 (5g) driver AC_VI rx bytes
- id: step_6g_direct
  target: dut
  action: exec
  capture: direct_6g
  command: 'ubus-cli "WiFi.Radio.2.Stats.WmmBytesReceived.AC_VI?"'
  expected: Stats.WmmBytesReceived.AC_VI getter 回傳有效值
  description: Radio.2 (6g) direct Stats.WmmBytesReceived.AC_VI
- id: step_6g_driver
  target: dut
  action: exec
  capture: driver_6g
  command: wl -i wl1 wme_counters | grep -A2 '^AC_VI:' | awk '/rx frames:/ {print "DriverWmmBytesReceived6g="$5}'
  expected: wl1 wme_counters 匯出 AC_VI rx bytes
  description: Radio.2 (6g) driver AC_VI rx bytes
- id: step_24g_direct
  target: dut
  action: exec
  capture: direct_24g
  command: 'ubus-cli "WiFi.Radio.3.Stats.WmmBytesReceived.AC_VI?"'
  expected: Stats.WmmBytesReceived.AC_VI getter 回傳有效值
  description: Radio.3 (2.4g) direct Stats.WmmBytesReceived.AC_VI
- id: step_24g_driver
  target: dut
  action: exec
  capture: driver_24g
  command: wl -i wl2 wme_counters | grep -A2 '^AC_VI:' | awk '/rx frames:/ {print "DriverWmmBytesReceived24g="$5}'
  expected: wl2 wme_counters 匯出 AC_VI rx bytes
  description: Radio.3 (2.4g) driver AC_VI rx bytes
pass_criteria:
- field: direct_5g.AC_VI
  operator: equals
  reference: driver_5g.DriverWmmBytesReceived5g
  description: 5g direct Stats.WmmBytesReceived.AC_VI must match wl0 wme_counters AC_VI rx bytes.
- field: direct_6g.AC_VI
  operator: equals
  reference: driver_6g.DriverWmmBytesReceived6g
  description: 6g direct Stats.WmmBytesReceived.AC_VI must match wl1 wme_counters AC_VI rx bytes.
- field: direct_24g.AC_VI
  operator: equals
  reference: driver_24g.DriverWmmBytesReceived24g
  description: 2.4g direct Stats.WmmBytesReceived.AC_VI must match wl2 wme_counters AC_VI rx bytes.
verification_command:
  - 'ubus-cli "WiFi.Radio.1.Stats.WmmBytesReceived.AC_VI?"'
  - 'wl -i wl0 wme_counters | grep -A2 ''^AC_VI:'' | awk ''/rx frames:/ {print "DriverWmmBytesReceived5g="$5}'''
  - 'ubus-cli "WiFi.Radio.2.Stats.WmmBytesReceived.AC_VI?"'
  - 'wl -i wl1 wme_counters | grep -A2 ''^AC_VI:'' | awk ''/rx frames:/ {print "DriverWmmBytesReceived6g="$5}'''
  - 'ubus-cli "WiFi.Radio.3.Stats.WmmBytesReceived.AC_VI?"'
  - 'wl -i wl2 wme_counters | grep -A2 ''^AC_VI:'' | awk ''/rx frames:/ {print "DriverWmmBytesReceived24g="$5}'''
