id: wifi-llapi-r008-avgsignalstrength
name: AvgSignalStrength — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 8
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: AvgSignalStrength
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.AvgSignalStrength=-37
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Enable RssiEventing ubus-cli WiFi.AccessPoint.*.RssiEventing.Enable=1 > WiFi.AccessPoint.*.RssiEventing.Enable=1
    WiFi.AccessPoint.1.RssiEventing.Enable=1 WiFi.AccessPoint.3.RssiEventing.Enable=1 WiFi.AccessPoint.5.RssiEventing.Enable=1
    ubus-cli WiFi.AccessPoint.*.RssiEventing.Enable? > WiFi.AccessPoint.*.RssiEventing.Enable? WiFi.AccessPoint.1.RssiEventing.Enable=1
    WiFi.AccessPoint.3.RssiEventing.Enable=1 WiFi.AccessPoint.5.RssiEventing.Enable=1
- id: step2
  action: exec
  target: DUT
  command: Connect WiFi Station to GW
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify Associated station AvgSignalStrength ubus-cli WiFi.AccessPoint.*.AssociatedDevice.? | grep AvgSignalSt rength
    WiFi.AccessPoint.1.AssociatedDevice.1.AvgSignalStrength=0 WiFi.AccessPoint.3.AssociatedDevice.1.AvgSignalStrength=0 WiFi.AccessPoint.5.AssociatedDevice.1.AvgSignalStrength=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result.AvgSignalStrength
  operator: contains
  value: '-37'
  description: AvgSignalStrength 應回傳包含 AvgSignalStrength=-37
verification_command: 'root@prplOS:/# wl -i wl0 sta_info 4A:0A:A5:80:23:7B | grep rssi

  per antenna rssi of last rx data frame: -44 -48 -48 -47

  per antenna average rssi of rx data frames: -44 -48 -47 -47

  smoothed rssi: -44'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : prpl doesn''t implement `mfn_wvap_update_assoc_dev` for avg'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: pAP->pFA->mfn_wvap_update_rssi_stats(pAP); This function is not implementied by PWHM. Don't know what would be
      collected.
