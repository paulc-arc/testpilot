  action: exec
  target: DUT
  band: 5g
  command: >-
    VALUE=$(ubus-cli "WiFi.AccessPoint.1.IEEE80211u.QoSMapSet?" | sed -n 's/^WiFi\.AccessPoint\.1\.IEEE80211u\.QoSMapSet="\([^"]*\)".*/\1/p'); if [ -n "$VALUE" ]; then printf 'QoSMapSet5g=%s\n' "$VALUE"; else echo 'QoSMapSet5g=EMPTY'; fi
  capture: state_baseline_5g
- id: step2_cfg_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    grep -c '^qos_map_set=' /tmp/wl0_hapd.conf | sed 's/^/QoSMapSetCfg5gCount=/'; VALUE=$(sed -n 's/^qos_map_set=\(.*\)$/\1/p' /tmp/wl0_hapd.conf | head -n 1); if [ -n "$VALUE" ]; then printf 'QoSMapSetCfg5g=%s\n' "$VALUE"; else echo 'QoSMapSetCfg5g=ABSENT'; fi
