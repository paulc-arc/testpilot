id: wifi-llapi-D076-qosmapset-accesspoint
name: "QoSMapSet — WiFi.AccessPoint.{i}.IEEE80211u"
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 70
  object: WiFi.AccessPoint.{i}.IEEE80211u
  api: QoSMapSet
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet="0,7,8,15,255,25 5,255,255,255,255,16,23,24,31,255,255"'
llapi_support: Not Supported
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; QoSMapSet is calibrated as an AP-only IEEE80211u case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before the IEEE80211u probe
  - live 0319 probe showed the requested DSCP map `0,7,8,15,255,25 5,255,255,255,255,16,23,24,31,255,255` is not preserved on any band
  - baseline getter/config stay empty, the setter collapses to scalar `255` in both northbound getter and hostapd `qos_map_set=255`, and the clear path restores the empty baseline
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - clear QoSMapSet on AP1 / AP3 / AP5 before the live probe
     - confirm wl0 / wl1 / wl2 BSS instances are reachable before changing IEEE80211u settings
  2) Per-band QoSMapSet mismatch capture:
     - confirm the northbound getter starts empty and the hostapd file exposes no `qos_map_set=` line
     - write the full DSCP map `0,7,8,15,255,25 5,255,255,255,255,16,23,24,31,255,255` to the target AP
     - capture the fail-shaped convergence: the setter/getter collapse to `255` and hostapd persists `qos_map_set=255` instead of the requested map
     - clear QoSMapSet and confirm both the getter and hostapd file return to the empty baseline
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.3.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.5.IEEE80211u.QoSMapSet=
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Keep AP1, AP3, and AP5 enabled on the documented non-open baseline.
  2) For each band, confirm the northbound getter starts at an empty string and the band-specific hapd file exposes no `qos_map_set=` line.
  3) Set QoSMapSet to `0,7,8,15,255,25 5,255,255,255,255,16,23,24,31,255,255` on the same AP and capture the returned mismatch.
  4) Cross-check the same band-specific hapd file after the setter write: instead of the requested DSCP map, the current DUT collapses the config to `qos_map_set=255`.
  5) Clear QoSMapSet and confirm both the getter and the hostapd file return to the empty baseline.
  6) Verdict: Not Supported. The workbook already marks 5G/6G/2.4G as `Not Supported`, and the live DUT matches that shape because it never preserves the requested DSCP map; it only collapses to scalar `255` before clearing back to empty.
