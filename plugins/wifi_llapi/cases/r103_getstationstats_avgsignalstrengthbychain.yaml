id: wifi-llapi-r103-getstationstats-avgsignalstrengthbychain
name: getStationStats() — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 116
  object: "WiFi.AccessPoint.{i}."
  api: "getStationStats()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.{i}.getStationStats() AvgSignalStrengthByChain : -69,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.getStationStats() AvgSignalStrengthByChain : -69,
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.getStationStats()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW and make sure the Station is Active ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.?
    | grep -E 'Active|MAC' WiFi.AccessPoint.1.AssociatedDevice.1.Active=1 WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress="E6:D7:D3:EA:CF:15"
    WiFi.AccessPoint.3.AssociatedDevice.1.Active=1 WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress="38:06:E6:92:B0:4A" WiFi.AccessPoint.5.AssociatedDevice.1.Active=1
    WiFi.AccessPoint.5.AssociatedDevice.1.MACAddress="7E:04:60:D8:FC:6E"
- id: step2
  action: exec
  target: DUT
  command: Check Station AvgSignalStrengthByChain ubus-cli "WiFi.AccessPoint.*.getStationStats() AvgSignalStrengthByChain"?
    | grep AvgSignalStrengthByChain > WiFi.AccessPoint.*.getStationStats() AvgSignalStrengthByChain? AvgSignalStrengthByChain
    = -35, AvgSignalStrengthByChain = -33, AvgSignalStrengthByChain = -46, AvgSignalStrengthByChain = -46,
  depends_on: step1
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getStationStats() 執行不應回傳 error
verification_command: 'root@prplOS:/# wl -i wl0 sta_info E6:D7:D3:EA:CF:15 | grep average

  per antenna average rssi of rx data frames: -43 -53 -46 -49

  root@prplOS:/# wl -i wl1 sta_info 38:06:E6:92:B0:4A | grep average

  per antenna average rssi of rx data frames: -33 -36 -33 -39

  root@prplOS:/# wl -i wl2 sta_info 7E:04:60:D8:FC:6E | grep average

  per antenna average rssi of rx data frames: -38 -45 -33 -40'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API return only one value. note: the Station support 4×4, so the AverageSignalStrengthByChain MUST contain
      4 values.'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
