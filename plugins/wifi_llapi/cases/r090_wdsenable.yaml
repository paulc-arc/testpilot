id: wifi-llapi-r090-wdsenable
name: WDSEnable — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 100
  object: "WiFi.AccessPoint.{i}."
  api: "WDSEnable"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.WDSEnable=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.WDSEnable=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.WDSEnable?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Enable WDS ubus-cli WiFi.AccessPoint.*.WDSEnable=1 > WiFi.AccessPoint.*.WDSEnable=1 WiFi.AccessPoint.1.WDSEnable=1
    WiFi.AccessPoint.3.WDSEnable=1 WiFi.AccessPoint.5.WDSEnable=1 ubus-cli WiFi.AccessPoint.? | grep .WDSEnable WiFi.AccessPoint.1.WDSEnable=1
    WiFi.AccessPoint.3.WDSEnable=1 WiFi.AccessPoint.5.WDSEnable=1
- id: step2
  action: exec
  target: DUT
  command: Connect WiFi Station to GW
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Station try to send traffic or access internet --> As Per RD "the behavior seems the same as BRCM DWDS, sta could
    connect, but cannot tranmit data." --> verified and found the behavior is the same as BRCM DWDS mentioned by RD
  depends_on: step2
  capture: result
pass_criteria:
- field: result.WDSEnable
  operator: contains
  value: '0'
  description: WDSEnable 應回傳包含 WDSEnable=0
verification_command: 'wl -i wl0 dwds


  root@prplOS:/# wl -i wl0 dwds

  1

  root@prplOS:/# wl -i wl1 dwds

  1

  root@prplOS:/# wl -i wl2 dwds

  1'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'ARC: BRCM DWDS behavior is not match pure WDS

      ---


      It support WDS? I try to set Access Point to WDS mode and the regular WiFi station can still connect


      A radio set to pure WDS mode is intended to link only with another WDS peer (another AP), not with regular Wi-Fi clients.


      A normal Wi-Fi client (STA) does not understand the 4-address frames used in WDS.'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
