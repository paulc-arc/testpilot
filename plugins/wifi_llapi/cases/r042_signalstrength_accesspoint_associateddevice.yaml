id: wifi-llapi-r042-signalstrength-accesspoint-associateddevice
name: SignalStrength — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 42
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: SignalStrength
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SignalStrength=-37
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '##Connect WiFi Station and check Station SignalStrength WiFi.AccessPoint.1.AssociatedDevice.1.SignalStrength=-48
    WiFi.AccessPoint.3.AssociatedDevice.1.SignalStrength=-57 WiFi.AccessPoint.5.AssociatedDevice.1.SignalStrength=-48'
  capture: result
pass_criteria:
- field: result.SignalStrength
  operator: contains
  value: '-37'
  description: SignalStrength 應回傳包含 SignalStrength=-37
verification_command: 'wl -i wl0 sta_info ${STA_MAC}

  per antenna rssi of last rx data frame: -38 0 0 0

  per antenna average rssi of rx data frames: -39 0 0 0

  smoothed rssi: -39'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
