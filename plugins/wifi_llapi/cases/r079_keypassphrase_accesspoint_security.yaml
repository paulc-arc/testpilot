id: wifi-llapi-r079-keypassphrase-accesspoint-security
name: KeyPassPhrase — WiFi.AccessPoint.{i}.Security
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 87
  object: "WiFi.AccessPoint.{i}.Security"
  api: "KeyPassPhrase"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Security.KeyPassPhrase=0689388783
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Security.KeyPassPhrase=0689388783
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Security.KeyPassPhrase=0689388783
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.Security.KeyPassPhrase?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli WiFi.AccessPoint.? | grep .Security.KeyPassPhrase WiFi.AccessPoint.1.Security.KeyPassPhrase="87654321"
    WiFi.AccessPoint.3.Security.KeyPassPhrase="87654321" WiFi.AccessPoint.5.Security.KeyPassPhrase="87654321"
  capture: result
pass_criteria:
- field: result.KeyPassPhrase
  operator: contains
  value: 0689388783
  description: KeyPassPhrase 應回傳包含 KeyPassPhrase=0689388783
verification_command: 'cat /tmp/wl0_hapd.conf |grep wpa_pairwise

  cat /tmp/wl0_hapd.conf |grep wpa_passphrase



  root@prplOS:/# cat /tmp/wl0_hapd.conf |grep wpa_passphrase

  wpa_passphrase=87654321

  root@prplOS:/# cat /tmp/wl1_hapd.conf |grep wpa_passphrase

  wpa_passphrase=87654321

  root@prplOS:/# cat /tmp/wl2_hapd.conf |grep wpa_passphrase

  wpa_passphrase=87654321

  root@prplOS:/#

  root@prplOS:/# cat /tmp/wl0_hapd.conf |grep wpa_pairwise

  wpa_pairwise=CCMP

  root@prplOS:/# cat /tmp/wl1_hapd.conf |grep wpa_pairwise

  wpa_pairwise=CCMP

  root@prplOS:/# cat /tmp/wl2_hapd.conf |grep wpa_pairwise

  wpa_pairwise=CCMP'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
