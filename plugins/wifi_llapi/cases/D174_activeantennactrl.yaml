  expected: ActiveAntennaCtrl 回傳整數值
  description: Radio.1 (5g) ActiveAntennaCtrl getter（workbook/live=-1）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.ActiveAntennaCtrl?"
  expected: ActiveAntennaCtrl 回傳整數值
  description: Radio.2 (6g) ActiveAntennaCtrl getter（workbook/live=-1）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.ActiveAntennaCtrl?"
  expected: ActiveAntennaCtrl 回傳整數值
  description: Radio.3 (2.4g) ActiveAntennaCtrl getter（workbook/live=-1）
pass_criteria:
- field: getter_5g.ActiveAntennaCtrl
  operator: regex
  value: ^-?\d+$
- field: getter_6g.ActiveAntennaCtrl
  operator: regex
  value: ^-?\d+$
- field: getter_24g.ActiveAntennaCtrl
  operator: regex
  value: ^-?\d+$
