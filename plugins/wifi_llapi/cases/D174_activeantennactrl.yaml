id: d174-radio-activeantennactrl
name: D174 Radio ActiveAntennaCtrl
source:
  row: 174
  object: WiFi.Radio.{i}.
  api: ActiveAntennaCtrl
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ActiveAntennaCtrl 預設維持 -1 sentinel；實際 tx/rx chain mask 由 driver default 或 Tx/RxChainCtrl override 落地
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_getter
