id: wifi-llapi-D366-srgbsscolorbitmap
name: "SRGBSSColorBitmap — WiFi.Radio.{i}.IEEE80211ax."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 273
  object: WiFi.Radio.{i}.IEEE80211ax.
  api: SRGBSSColorBitmap
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.1.IEEE80211ax.SRGBSSColorBitmap="1"'
llapi_support: Support
implemented_by: Vendor Module
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; SRGBSSColorBitmap is validated as a Radio-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / Radio.1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / Radio.2 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / Radio.3 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep Radio.1 / Radio.2 / Radio.3 on the documented non-open baseline
  - the default getter on all three bands is `SRGBSSColorBitmap=""`
  - 0319 serialwrap probe showed Radio.1 / Radio.2 / Radio.3 all accepted `SRGBSSColorBitmap="1"` and read it back as `"1"`, but `/tmp/wl[0-2]_hapd.conf` never gained any `he_spr_srg_bss_colors=` line
setup_steps: |
  1) DUT baseline:
     - keep wl0 / wl1 / wl2 BSS instances up on the default non-open baseline
     - confirm `/tmp/wl0_hapd.conf`, `/tmp/wl1_hapd.conf`, and `/tmp/wl2_hapd.conf` exist before the bitmap probe
  2) Setter / getter probe:
     - read the default SRGBSSColorBitmap getter on Radio.1 / Radio.2 / Radio.3
     - write `SRGBSSColorBitmap="1"` on each band and confirm northbound readback changes to `"1"`
  3) hostapd cross-check:
     - inspect `/tmp/wl[0-2]_hapd.conf` for `he_spr_srg_bss_colors=`
     - every band should keep the line count at `0`, proving the accepted getter value never reaches Broadcom hostapd/runtime config
  4) Cleanup:
     - restore Radio.1 / Radio.2 / Radio.3 back to `SRGBSSColorBitmap=""`
sta_env_setup: |
  DUT:
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Read WiFi.Radio.1/2/3.IEEE80211ax.SRGBSSColorBitmap and confirm the default is empty.
  2) Set `SRGBSSColorBitmap="1"` on Radio.1 / Radio.2 / Radio.3 and confirm each getter reads back `"1"`.
  3) Cross-check `/tmp/wl0_hapd.conf`, `/tmp/wl1_hapd.conf`, and `/tmp/wl2_hapd.conf`: no band should expose `he_spr_srg_bss_colors=`.
  4) Restore all three bands back to `SRGBSSColorBitmap=""`.
  Verdict: Fail. The ODL setter is accepted and the getter stores `"1"` on every band, but Broadcom hostapd/runtime config never projects `he_spr_srg_bss_colors=`.
steps:
- id: step1_default_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.Radio.1.IEEE80211ax.SRGBSSColorBitmap?"'
  capture: default_5g
- id: step2_default_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.Radio.2.IEEE80211ax.SRGBSSColorBitmap?"'
  depends_on: step1_default_5g
  capture: default_6g
- id: step3_default_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.Radio.3.IEEE80211ax.SRGBSSColorBitmap?"'
  depends_on: step2_default_6g
  capture: default_24g
- id: step4_set_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.Radio.1.IEEE80211ax.SRGBSSColorBitmap="1"'
  depends_on: step3_default_24g
