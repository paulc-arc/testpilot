- id: step5_set_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli WiFi.Radio.2.IEEE80211ax.SRGBSSColorBitmap="1"'
  depends_on: step4_set_5g
  capture: set_6g
- id: step6_set_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli WiFi.Radio.3.IEEE80211ax.SRGBSSColorBitmap="1"'
  depends_on: step5_set_6g
  capture: set_24g
- id: step7_after_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.Radio.1.IEEE80211ax.SRGBSSColorBitmap?"'
  depends_on: step6_set_24g
  capture: after_5g
- id: step8_after_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.Radio.2.IEEE80211ax.SRGBSSColorBitmap?"'
  depends_on: step7_after_5g
  capture: after_6g
- id: step9_after_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.Radio.3.IEEE80211ax.SRGBSSColorBitmap?"'
  depends_on: step8_after_6g
  capture: after_24g
- id: step10_cfg_5g_after
  action: exec
  target: DUT
  band: 5g
  command: grep -c '^he_spr_srg_bss_colors=' /tmp/wl0_hapd.conf | sed 's/^/HostapdSrgBssColorLines=/'
  depends_on: step9_after_24g
  capture: cfg_5g_after
- id: step11_cfg_6g_after
  action: exec
  target: DUT
  band: 6g
  command: grep -c '^he_spr_srg_bss_colors=' /tmp/wl1_hapd.conf | sed 's/^/HostapdSrgBssColorLines=/'
  depends_on: step10_cfg_5g_after
  capture: cfg_6g_after
- id: step12_cfg_24g_after
  action: exec
  target: DUT
  band: 2.4g
  command: grep -c '^he_spr_srg_bss_colors=' /tmp/wl2_hapd.conf | sed 's/^/HostapdSrgBssColorLines=/'
  depends_on: step11_cfg_6g_after
  capture: cfg_24g_after
- id: step13_restore_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.Radio.1.IEEE80211ax.SRGBSSColorBitmap=""'
  depends_on: step12_cfg_24g_after
  capture: restore_5g
- id: step14_restore_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli WiFi.Radio.2.IEEE80211ax.SRGBSSColorBitmap=""'
  depends_on: step13_restore_5g
  capture: restore_6g
- id: step15_restore_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli WiFi.Radio.3.IEEE80211ax.SRGBSSColorBitmap=""'
  depends_on: step14_restore_6g
  capture: restore_24g
