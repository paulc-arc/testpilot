  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi station (use another WiFi7 GW as station with built-in IPERF3)
- id: step2
  action: exec
  target: DUT
  command: Run IPERF "iperf3 -c <server> -u -b 20M --tos 0xB8"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify Radio Stats.WmmBytesReceived.AC_VO ubus-cli WiFi.Radio.*.? | grep WmmBytesReceived.AC_VO WiFi.Radio.1.Stats.WmmBytesReceived.AC_VO=26447565
    WiFi.Radio.2.Stats.WmmBytesReceived.AC_VO=26552447 WiFi.Radio.3.Stats.WmmBytesReceived.AC_VO=24337505
  depends_on: step2
  capture: result
pass_criteria:
- field: result.AC_VO
