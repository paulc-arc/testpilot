id: wifi-llapi-r056-uplinkbandwidth
name: UplinkBandwidth — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 56
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: UplinkBandwidth
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.UplinkBandwidth=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '##Connect WiFi Station and check Station UplinkBandwidth WiFi.AccessPoint.1.AssociatedDevice.1.UplinkBandwidth=20
    WiFi.AccessPoint.3.AssociatedDevice.1.UplinkBandwidth=20 WiFi.AccessPoint.5.AssociatedDevice.1.UplinkBandwidth=20'
  capture: result
pass_criteria:
- field: result.UplinkBandwidth
  operator: contains
  value: '0'
  description: UplinkBandwidth 應回傳包含 UplinkBandwidth=0
verification_command: 'wl -i wl0 sta_info ${STA_MAC}

  link bandwidth = 20 MHZ

  tx nrate

  eht mcs 7 Nss 2 Tx Exp 2 bw20 ldpc 2xLTF GI 1.6us auto

  rx nrate

  eht mcs 4 Nss 1 Tx Exp 0 bw20 ldpc 2xLTF GI 0.8us auto

  tx nrate = last packet transmitted to the STA (downlink)


  rx nrate = last packet received from the STA (uplink)


  From the rx nrate line:

  rx nrate

  eht mcs 4 Nss 1 Tx Exp 0 bw20 ldpc 2xLTF GI 0.8us auto

  bw20 → UplinkBandwidth = 20 MHz

  NSS = 1 → 1 spatial stream for uplink'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
