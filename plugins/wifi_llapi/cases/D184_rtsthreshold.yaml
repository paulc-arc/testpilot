  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.DriverConfig.RtsThreshold?"
  expected: RtsThreshold 回傳有效值
  description: Radio.2 (6g) 整數 RTS threshold
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.DriverConfig.RtsThreshold?"
  expected: RtsThreshold 回傳有效值
  description: Radio.3 (2.4g) 整數 RTS threshold
pass_criteria:
- field: getter_5g.RtsThreshold
  operator: regex
  value: ^-?\d+$
- field: getter_6g.RtsThreshold
  operator: regex
  value: ^-?\d+$
- field: getter_24g.RtsThreshold
  operator: regex
