id: d184-radio-rtsthreshold
name: D184 Radio RtsThreshold
source:
  row: 145
  object: WiFi.Radio.{i}.DriverConfig.
  api: RtsThreshold
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
