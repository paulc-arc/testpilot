id: wifi-llapi-r331-getradiostats-failedretranscount
name: getRadioStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 331
  object: WiFi.Radio.{i}.
  api: getRadioStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.getRadioStats()FailedRetransCount
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Record counters at start: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep MultipleRetryCount MultipleRetryCount
    = 0, MultipleRetryCount = 0, MultipleRetryCount = 0, ubus-cli "WiFi.Radio.*.getRadioStats()" | grep FailedRetransCount
    FailedRetransCount = 0, FailedRetransCount = 0, FailedRetransCount = 0,'
- id: step2
  action: exec
  target: DUT
  command: '(Not 100% reliable)Connect STAs to individual radios, try high loading data flow by iperf3 while adding attenuation
    to signal(Adding distance between STAs and DUT.) iperf3 command: iperf3 -c [iperf3 server IP] -u -b 200M -P 6 -t 600'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check counters again: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep MultipleRetryCount MultipleRetryCount = 0,
    MultipleRetryCount = 0, MultipleRetryCount = 0, ubus-cli "WiFi.Radio.*.getRadioStats()" | grep FailedRetransCount FailedRetransCount
    = 0, FailedRetransCount = 0, FailedRetransCount = 0,'
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioStats() 執行不應回傳 error
results_reference:
  v4.0.1:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: 'These counters increment only when Wi-Fi frames experience transmission error.

      In our test environment, no Wi-Fi station capable of generating manipulated 802.11e error frame, and Scapy could not
      be used to generate such frames due to WiFi station limitations.'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
