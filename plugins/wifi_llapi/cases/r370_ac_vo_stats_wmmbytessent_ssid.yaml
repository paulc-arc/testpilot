id: wifi-llapi-r370-ac-vo-stats-wmmbytessent-ssid
name: AC_VO — WiFi.SSID.{i}.Stats.WmmBytesSent
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 370
  object: WiFi.SSID.{i}.Stats.WmmBytesSent
  api: AC_VO
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.SSID.{i}.Stats.WmmBytesSent.AC_VO=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect two WiFi station (use another WiFi7 GW as station with built-in IPERF3)
- id: step2
  action: exec
  target: DUT
  command: Run IPERF "iperf3 -c <server> -u -b 20M --tos 0xB8"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify SSID stats WmmBytesSent.AC_VO ubus-cli WiFi.SSID.6.Stats.WmmBytesSent.AC_VO? > WiFi.SSID.6.Stats.WmmBytesSent.AC_VO?
    WiFi.SSID.6.Stats.WmmBytesSent.AC_VO=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result.AC_VO
  operator: contains
  value: '0'
  description: AC_VO 應回傳包含 AC_VO=0
verification_command: 'AC_VO: tx frames: 17284 bytes: 25887433 failed frames: 0 failed bytes: 0

  rx frames: 34616 bytes: 53178487 failed frames: 0 failed bytes: 0'
results_reference:
