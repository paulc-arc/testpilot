id: wifi-llapi-r334-getradiostats-retranscount
name: getRadioStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 459
  object: "WiFi.Radio.{i}."
  api: "getRadioStats()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.getRadioStats()RetransCount
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.getRadioStats()RetransCount
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.getRadioStats()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Record counters at start: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep RetransCount RetransCount = 0, RetransCount
    = 0, RetransCount = 0, ubus-cli "WiFi.Radio.*.getRadioStats()" | grep RetryCount RetryCount = 0, RetryCount = 0, RetryCount
    = 0,'
- id: step2
  action: exec
  target: DUT
  command: 'Connect STAs to individual radios, try high loading data flow by iperf3 while adding attenuation to signal(Adding
    distance between STAs and DUT.) iperf3 command: iperf3 -c [iperf3 server IP] -u -b 200M -P 6 -t 600'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check counters again: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep RetransCount RetransCount = 0, RetransCount
    = 0, RetransCount = 0, ubus-cli "WiFi.Radio.*.getRadioStats()" | grep RetryCount RetryCount = 0, RetryCount = 0, RetryCount
    = 0,'
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioStats() 執行不應回傳 error

verification_command: |
  ubus-cli "WiFi.Radio.*.getRadioStats()" 2>/dev/null | sed -n "1,200p" || true
  ubus-cli "WiFi.Radio.*.getRadioAirStats()" 2>/dev/null | sed -n "1,200p" || true
  ubus-cli "WiFi.Radio.*.getRadioStats?" 2>/dev/null || true
  cat /proc/net/dev | grep -E "Inter-|wl0|wl1|wl2"
  wl -i wl0 counters 2>/dev/null | sed -n "1,40p" || true

results_reference:
  v4.0.1:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: 'These counters increment only when Wi-Fi frames experience transmission error.

      In our test environment, no Wi-Fi station capable of generating manipulated 802.11e error frame, and Scapy could not
      be used to generate such frames due to WiFi station limitations.'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Committed
