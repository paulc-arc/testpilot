id: wifi-llapi-r288-radcapabilitiesvhtstr
name: RadCapabilitiesVHTStr — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 387
  object: "WiFi.Radio.{i}."
  api: "RadCapabilitiesVHTStr"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.RadCapabilitiesVHTStr=""
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.RadCapabilitiesVHTStr=""
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.RadCapabilitiesVHTStr=""
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.RadCapabilitiesVHTStr?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. get RadCapabilitiesVHTStr ubus-cli WiFi.Radio.*.RadCapabilitiesVHTStr? > WiFi.Radio.*.RadCapabilitiesVHTStr?
    WiFi.Radio.1.RadCapabilitiesVHTStr="RX_LDPC,SGI_80,SGI_160,SU_BFR,SU_BFE,LINK_ADAPT_CAP" WiFi.Radio.2.RadCapabilitiesVHTStr=""
    WiFi.Radio.3.RadCapabilitiesVHTStr=""
- id: step2
  action: exec
  target: DUT
  command: Verify beacon packet supprt VHT.
  depends_on: step1
  capture: result
pass_criteria:
- field: result.RadCapabilitiesVHTStr
  operator: contains
  value: '""'
  description: RadCapabilitiesVHTStr 應回傳包含 RadCapabilitiesVHTStr=""

verification_command: |
  ubus-cli "WiFi.Radio.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.Radio.*.RadCapabilitiesVHTStr?" 2>/dev/null || true
  wl -i wl0 status; wl -i wl1 status; wl -i wl2 status
  wl -i wl0 channel 2>/dev/null || true; wl -i wl1 channel 2>/dev/null || true; wl -i wl2 channel 2>/dev/null || true

results_reference:
  v4.0.1:
    5g: Pass
    6g: Not Supported
    2.4g: Not Supported
    comment: 6 GHz (radio2) and 2.4GHz (Radio3) does not support VHT (802.11ac),
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: Not a issue, vhtCap is from nl80211 to pwhm
