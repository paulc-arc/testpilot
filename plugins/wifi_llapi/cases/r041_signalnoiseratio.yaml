id: wifi-llapi-r041-signalnoiseratio
name: SignalNoiseRatio — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 46
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "SignalNoiseRatio"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SignalNoiseRatio=53
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SignalNoiseRatio=53
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SignalNoiseRatio=53
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.SignalNoiseRatio?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.SignalNoiseRatio? > WiFi.AccessPoint.*.AssociatedDevice.*.SignalNoiseRatio?
    WiFi.AccessPoint.1.AssociatedDevice.1.SignalNoiseRatio=0 WiFi.AccessPoint.3.AssociatedDevice.1.SignalNoiseRatio=0 WiFi.AccessPoint.5.AssociatedDevice.1.SignalNoiseRatio=0
  capture: result
pass_criteria:
- field: result.SignalNoiseRatio
  operator: contains
  value: '53'
  description: SignalNoiseRatio 應回傳包含 SignalNoiseRatio=53

verification_command: |
  # Generate traffic before readback for stats-like AssociatedDevice fields.
  STA_MAC="$(wl -i wl0 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  [ -z "$STA_MAC" ] && STA_MAC="$(wl -i wl1 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  [ -z "$STA_MAC" ] && STA_MAC="$(wl -i wl2 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  wl -i wl0 assoclist; wl -i wl1 assoclist; wl -i wl2 assoclist
  ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.?" | sed -n "1,120p"
  ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.SignalNoiseRatio?" 2>/dev/null || true
  [ -n "$STA_MAC" ] && wl -i wl0 sta_info "$STA_MAC" | sed -n "1,120p"
  iw dev wl0 station dump 2>/dev/null | sed -n "1,120p"

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API return "0"'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: Commit
