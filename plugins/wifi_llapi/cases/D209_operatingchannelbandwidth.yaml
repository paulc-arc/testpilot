id: d209-radio-operatingchannelbandwidth
name: D209 Radio OperatingChannelBandwidth
source:
  row: 209
  object: WiFi.Radio.{i}.
  api: OperatingChannelBandwidth
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: read-only getter exact-closes the active 0403 tri-band OperatingChannelBandwidth values
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.OperatingChannelBandwidth?"
  expected: OperatingChannelBandwidth 回傳有效值
  description: Radio.1 (5g) OperatingChannelBandwidth getter（live=20MHz）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.OperatingChannelBandwidth?"
  expected: OperatingChannelBandwidth 回傳有效值
  description: Radio.2 (6g) OperatingChannelBandwidth getter（live=20MHz）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.OperatingChannelBandwidth?"
  expected: OperatingChannelBandwidth 回傳有效值
  description: Radio.3 (2.4g) OperatingChannelBandwidth getter（live=20MHz）
pass_criteria:
- field: getter_5g.OperatingChannelBandwidth
  operator: regex
  value: ".+"
- field: getter_6g.OperatingChannelBandwidth
  operator: regex
  value: ".+"
- field: getter_24g.OperatingChannelBandwidth
  operator: regex
  value: ".+"
