id: d486-radio-stats-wmmfailedbytesreceived-ac_be
name: D486 Radio Stats WmmFailedBytesReceived AC_BE
source:
  row: 486
  object: WiFi.Radio.{i}.Stats.WmmFailedBytesReceived.
  api: AC_BE
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: workbook row 486 keeps this radio-level counter on Pass; workbook H486 uses wl wme_counters AC_BE rx failed bytes as the driver oracle.
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_direct
  target: dut
  action: exec
  capture: direct_5g
  command: 'ubus-cli "WiFi.Radio.1.Stats.WmmFailedBytesReceived.AC_BE?"'
  expected: Stats.WmmFailedBytesReceived.AC_BE getter 回傳有效值
  description: Radio.1 (5g) direct Stats.WmmFailedBytesReceived.AC_BE
- id: step_5g_driver
  target: dut
  action: exec
  capture: driver_5g
  command: wl -i wl0 wme_counters | grep -A2 '^AC_BE:' | awk '/rx frames:/ {print "DriverWmmFailedBytesReceived5g="$11}'
  expected: wl0 wme_counters 匯出 AC_BE rx failed bytes
  description: Radio.1 (5g) driver AC_BE rx failed bytes
- id: step_6g_direct
  target: dut
  action: exec
  capture: direct_6g
  command: 'ubus-cli "WiFi.Radio.2.Stats.WmmFailedBytesReceived.AC_BE?"'
  expected: Stats.WmmFailedBytesReceived.AC_BE getter 回傳有效值
  description: Radio.2 (6g) direct Stats.WmmFailedBytesReceived.AC_BE
- id: step_6g_driver
  target: dut
  action: exec
  capture: driver_6g
  command: wl -i wl1 wme_counters | grep -A2 '^AC_BE:' | awk '/rx frames:/ {print "DriverWmmFailedBytesReceived6g="$11}'
  expected: wl1 wme_counters 匯出 AC_BE rx failed bytes
  description: Radio.2 (6g) driver AC_BE rx failed bytes
- id: step_24g_direct
  target: dut
  action: exec
  capture: direct_24g
  command: 'ubus-cli "WiFi.Radio.3.Stats.WmmFailedBytesReceived.AC_BE?"'
  expected: Stats.WmmFailedBytesReceived.AC_BE getter 回傳有效值
  description: Radio.3 (2.4g) direct Stats.WmmFailedBytesReceived.AC_BE
- id: step_24g_driver
  target: dut
  action: exec
  capture: driver_24g
  command: wl -i wl2 wme_counters | grep -A2 '^AC_BE:' | awk '/rx frames:/ {print "DriverWmmFailedBytesReceived24g="$11}'
  expected: wl2 wme_counters 匯出 AC_BE rx failed bytes
  description: Radio.3 (2.4g) driver AC_BE rx failed bytes
pass_criteria:
- field: direct_5g.AC_BE
  operator: equals
  reference: driver_5g.DriverWmmFailedBytesReceived5g
  description: 5g direct Stats.WmmFailedBytesReceived.AC_BE must match wl0 wme_counters AC_BE rx failed bytes.
- field: direct_6g.AC_BE
  operator: equals
  reference: driver_6g.DriverWmmFailedBytesReceived6g
  description: 6g direct Stats.WmmFailedBytesReceived.AC_BE must match wl1 wme_counters AC_BE rx failed bytes.
- field: direct_24g.AC_BE
  operator: equals
  reference: driver_24g.DriverWmmFailedBytesReceived24g
  description: 2.4g direct Stats.WmmFailedBytesReceived.AC_BE must match wl2 wme_counters AC_BE rx failed bytes.
verification_command:
  - 'ubus-cli "WiFi.Radio.1.Stats.WmmFailedBytesReceived.AC_BE?"'
  - 'wl -i wl0 wme_counters | grep -A2 ''^AC_BE:'' | awk ''/rx frames:/ {print "DriverWmmFailedBytesReceived5g="$11}'''
  - 'ubus-cli "WiFi.Radio.2.Stats.WmmFailedBytesReceived.AC_BE?"'
  - 'wl -i wl1 wme_counters | grep -A2 ''^AC_BE:'' | awk ''/rx frames:/ {print "DriverWmmFailedBytesReceived6g="$11}'''
  - 'ubus-cli "WiFi.Radio.3.Stats.WmmFailedBytesReceived.AC_BE?"'
  - 'wl -i wl2 wme_counters | grep -A2 ''^AC_BE:'' | awk ''/rx frames:/ {print "DriverWmmFailedBytesReceived24g="$11}'''
