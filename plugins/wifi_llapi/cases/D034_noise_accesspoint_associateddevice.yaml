id: wifi-llapi-D034-noise-accesspoint-associateddevice
name: "Noise — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 34
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: Noise
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.Noise?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
      - iface: 5g
        mode: sta
        ssid: testpilot5G
        key: '00000000'
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (station role for this case; do not rely on the old A0/B0 heuristic)
  Transport:
  - serialwrap attach COM0 / COM1
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G
  Preconditions:
  - keep only one associated station on AP1 so AssociatedDevice.1 stays deterministic
  - use the validated generic 5G single-band baseline for this case
setup_steps: |
  1) DUT 5G baseline:
     - let the plugin auto-prepare Radio.1 / SSID.4 / AP1 with the validated generic 5G profile
     - keep the live SSID/credential pair at testpilot5G / 00000000
  2) STA 5G preparation:
     - let the plugin baseline workflow reset COM0 wl0 and connect it to testpilot5G with WPA2-PSK
     - keep only one associated station on AP1 before AssociatedDevice.1 sampling
  3) Association evidence:
     - COM0: iw dev wl0 link ; wpa_cli -p /var/run/wpa_supplicant -i wl0 status
     - COM1: wl -i wl0 assoclist
test_procedure: |
  1) Confirm the 5G STA is associated to AP1 and resolve its live MAC address.
  2) Read WiFi.AccessPoint.1.AssociatedDevice.1.Noise on DUT.
  3) Cross-check the same STA against wl0 sta_info so the LLAPI noise is tied to live driver noise-floor evidence for the same station.
  4) Pass when Noise is a live negative integer and stays within 2 dB of the driver noise-floor value for the same STA.
steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"
  capture: assoc_entry
- id: step2
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.Noise?"
  depends_on: step1
  capture: result
- id: step3
  action: exec
  target: DUT
  command: 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); STA_MAC_LOWER=$(echo "$STA_MAC" | tr ''A-F'' ''a-f''); NOISE=$(wl -i wl0 sta_info $STA_MAC_LOWER | awk ''/per antenna noise floor:/ {print $5; exit}''); [ -n "$STA_MAC" ]; echo DriverAssocMac=$STA_MAC; [ -n "$NOISE" ]; echo DriverNoise=$NOISE; [ -n "$NOISE" ]; echo DriverNoiseMin=$((NOISE - 2)); [ -n "$NOISE" ]; echo DriverNoiseMax=$((NOISE + 2))'
  depends_on: step2
  capture: driver_noise
pass_criteria:
- field: assoc_entry.MACAddress
  operator: regex
  value: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
  description: AP1 AssociatedDevice.1 must first resolve to the live 5G STA MAC.
- field: result.Noise
  operator: regex
  value: ^-[0-9]+$
  description: Noise should be a live negative noise-floor integer in dBm.
- field: result.Noise
  operator: <
  value: '0'
  description: Noise must remain below 0 dBm for a live associated-station reading.
- field: driver_noise.DriverAssocMac
  operator: equals
  reference: assoc_entry.MACAddress
  description: Driver cross-check must use the same live AssociatedDevice MAC resolved in step1.
- field: driver_noise.DriverNoise
  operator: regex
  value: ^-[0-9]+$
  description: wl0 sta_info must emit a concrete negative noise-floor value for the same STA.
- field: driver_noise.DriverNoise
  operator: <
  value: '0'
  description: Driver evidence must still show a real negative noise floor for the same STA.
- field: result.Noise
  operator: '>='
  reference: driver_noise.DriverNoiseMin
  description: LLAPI Noise should stay within 2 dB below the driver noise-floor value for the same STA.
- field: result.Noise
  operator: '<='
  reference: driver_noise.DriverNoiseMax
  description: LLAPI Noise should stay within 2 dB above the driver noise-floor value for the same STA.
verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.Noise?"'
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); STA_MAC_LOWER=$(echo "$STA_MAC" | tr ''A-F'' ''a-f''); NOISE=$(wl -i wl0 sta_info $STA_MAC_LOWER | awk ''/per antenna noise floor:/ {print $5; exit}''); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && [ -n "$NOISE" ] && echo DriverNoise=$NOISE && [ -n "$NOISE" ] && echo DriverNoiseMin=$((NOISE - 2)) && [ -n "$NOISE" ] && echo DriverNoiseMax=$((NOISE + 2))'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'Authoritative full-run trace 20260412T113008433351 exact-closed 5G AssociatedDevice.Noise=-100 with the same STA wl0 sta_info noise floor=-100; active 0403 source still exposes AssociatedDevice.Noise and fills it from radio stats noise.'
