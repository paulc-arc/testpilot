  description: SSID.4 (5g) MLDUnit getter
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.SSID.6.MLDUnit?"
  expected: MLDUnit 回傳有效值
  description: SSID.6 (6g) MLDUnit getter
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.SSID.8.MLDUnit?"
  expected: MLDUnit 回傳有效值
  description: SSID.8 (2.4g) MLDUnit getter
pass_criteria:
- field: getter_5g.MLDUnit
  operator: regex
  value: ^-?\d+$
- field: getter_6g.MLDUnit
  operator: regex
  value: ^-?\d+$
- field: getter_24g.MLDUnit
  operator: regex
  value: ^-?\d+$
