id: d591-ssid-mldunit
name: D591 SSID MLDUnit
source:
  row: 591
  object: WiFi.SSID.{i}.
  api: MLDUnit
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
