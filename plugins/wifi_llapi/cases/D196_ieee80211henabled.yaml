id: d196-radio-ieee80211henabled
name: D196 Radio IEEE80211hEnabled
source:
  row: 196
  object: WiFi.Radio.{i}.
  api: IEEE80211hEnabled
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: read-only getter exact-closes the active 0403 tri-band IEEE80211hEnabled values
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.IEEE80211hEnabled?"
  expected: IEEE80211hEnabled 回傳有效值
  description: Radio.1 (5g) IEEE80211hEnabled getter（live=1）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.IEEE80211hEnabled?"
  expected: IEEE80211hEnabled 回傳有效值
  description: Radio.2 (6g) IEEE80211hEnabled getter（live=0）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.IEEE80211hEnabled?"
  expected: IEEE80211hEnabled 回傳有效值
  description: Radio.3 (2.4g) IEEE80211hEnabled getter（live=0）
pass_criteria:
- field: getter_5g.IEEE80211hEnabled
  operator: regex
  value: "^[01]$"
- field: getter_6g.IEEE80211hEnabled
  operator: regex
  value: "^[01]$"
- field: getter_24g.IEEE80211hEnabled
  operator: regex
  value: "^[01]$"
