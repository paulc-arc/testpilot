- id: step3
  action: exec
  target: DUT
  command: Verify Radio Stats.WmmBytesReceived.AC_BE ubus-cli WiFi.Radio.*.? | grep WmmBytesReceived.AC_BE WiFi.Radio.1.Stats.WmmBytesReceived.AC_BE=26181676
    WiFi.Radio.2.Stats.WmmBytesReceived.AC_BE=29353141 WiFi.Radio.3.Stats.WmmBytesReceived.AC_BE=12964238
  depends_on: step2
  capture: result
