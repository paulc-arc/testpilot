id: wifi-llapi-D015-capabilities
name: "Capabilities — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 10
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: Capabilities
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: STA
    to: DUT
    band: 2.4g
test_environment: |
  Topology: DUT=COM0(AP) / STA=COM1(station)
  Live band mapping:
  - 5G : DUT wl0 / AP1 / BSSID 2c:59:17:00:19:95 / STA MAC 2C:59:17:00:04:85
  - 6G : DUT wl1 / AP3 -- BCME_NOTREADY (STA cannot associate; skip all 6G steps)
  - 2.4G: DUT wl2 / AP5 / BSSID 2C:59:17:00:19:A7 / STA MAC 2C:59:17:00:04:97
  Precondition: STA associated on the target band so AssociatedDevice.1 is deterministic.
test_procedure: |
  Read-only telemetry. Capabilities returns the STA's advertised capability string (comma-separated).
  Steps:
  1) Confirm 5G STA is associated; read AP1 AssociatedDevice.1.Capabilities.
  2) 5G live value should advertise BTM/QOS_MAP/PMF and should not advertise RRM.
  3) Confirm 2.4G STA is associated; read AP5 AssociatedDevice.1.Capabilities.
  4) 2.4G live value should remain empty string.
  6G is skipped (BCME_NOTREADY).
  Pass: 5G value matches the live-advertised capability bits; 2.4G empty string is valid.
  Note: 5G STA wl0 has RRM capability=0x0 (no RRM), but has BTM via Extended Caps.
        2.4G STA wl2 shows no BTM/QOS_MAP/PMF bits -> empty string is correct.
steps:
- id: step1_5g_assoc
  action: exec
  target: DUT
  band: 5g
  command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
  capture: assoc_5g
- id: step2_5g
  action: exec
  target: DUT
  band: 5g
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.Capabilities?"
  depends_on: step1_5g_assoc
  capture: result_5g
- id: step3_6g
  action: skip
  target: DUT
  band: 6g
  reason: 6G BCME_NOTREADY -- STA cannot associate on wl1/AP3 in current lab.
- id: step4_24g_assoc
  action: exec
  target: DUT
  band: 2.4g
  command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
  capture: assoc_24g
- id: step5_24g
  action: exec
  target: DUT
  band: 2.4g
  command: ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.Capabilities?"
  depends_on: step4_24g_assoc
  capture: result_24g
pass_criteria:
- field: assoc_5g.AssocMac5g
  operator: equals
  value: 2c:59:17:00:04:85
  description: "5G -- Capabilities 讀取前必須先確認 wl0 STA 已關聯"
- field: result_5g.Capabilities
  operator: contains
  value: BTM
  description: "5G -- live Capabilities must advertise BTM"
- field: result_5g.Capabilities
  operator: contains
  value: QOS_MAP
  description: "5G -- live Capabilities must advertise QOS_MAP"
- field: result_5g.Capabilities
  operator: contains
  value: PMF
  description: "5G -- live Capabilities must advertise PMF"
- field: result_5g.Capabilities
  operator: not_contains
  value: RRM
  description: "5G -- wl0 RRM capability=0x0, so Capabilities must not claim RRM"
- field: assoc_24g.AssocMac24g
  operator: equals
  value: 2c:59:17:00:04:97
  description: "2.4G -- Capabilities 讀取前必須先確認 wl2 STA 已關聯"
- field: result_24g.Capabilities
  operator: empty
  description: "2.4G -- live Capabilities should remain empty string for wl2 STA"
verification_command: |
  DUT# ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.Capabilities?"
  DUT# ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.Capabilities?"
results_reference:
  v4.0.3:
    5g: Pass
    6g: Skip
    2.4g: Pass
    comment: |
      Live evidence (BCM v4.0.3):
      5G: WiFi.AccessPoint.1.AssociatedDevice.1.Capabilities=BTM,QOS_MAP,PMF
          (5G STA wl0 RRM capability=0x0 -- no RRM; BTM present via Extended Caps)
      2.4G: WiFi.AccessPoint.5.AssociatedDevice.1.Capabilities=
          (2.4G STA wl2 flags show no BTM/QOS_MAP/PMF bits -- empty string is correct)
      Value is STA-dependent; LLAPI correctly reflects what each STA advertises.
