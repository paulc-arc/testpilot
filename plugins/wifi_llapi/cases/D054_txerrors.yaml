id: wifi-llapi-D054-txerrors
name: "TxErrors — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 56
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: TxErrors
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.TxErrors?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
      - iface: 5g
        mode: sta
        ssid: TestPilot_BTM
        key: testpilot6g
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (station role for this case; do not rely on the old A0/B0 heuristic)
  Transport:
  - serialwrap attach COM0 / COM1
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / TestPilot_BTM
  - 6G: DUT wl1 / AP3 / SSID.6 / TestPilot_BTM
  - 2.4G: DUT wl2 / AP5 / SSID.8 / TestPilot_24G
  Preconditions:
  - keep only one associated station on AP1 so AssociatedDevice.1 stays deterministic
  - use the validated 5G single-band WPA3 baseline for this case
  - keep the workbook verdict open until a deterministic AP-side Tx error workload exists
setup_steps: |
  1) DUT 5G baseline:
     - enable Radio.1 / SSID.4 / AP1
     - configure AP1 as WPA3-Personal with MFP required
     - keep the validated live SSID/credential pair as TestPilot_BTM / testpilot6g
  2) STA 5G preparation:
     - disable local AP1/AP2 on COM1
     - move COM1 br-lan off 192.168.1.0/24 to avoid bridge self-hit side effects
     - reset wl0 and its wpa_supplicant control socket
     - connect wl0 to TestPilot_BTM with SAE
  3) Association evidence:
     - COM1: iw dev wl0 link ; wpa_cli -p /var/run/wpa_supplicant -i wl0 status
     - COM0: wl -i wl0 assoclist
sta_env_setup: |
  DUT 5G AP baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.1.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.1.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.OfdmaEnable=1
    ubus-cli WiFi.Radio.1.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.1.OperatingStandards=ax
    ubus-cli WiFi.Radio.1.RxChainCtrl=-1
    ubus-cli WiFi.Radio.1.TxChainCtrl=-1
    ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.1.Sensing.Enable=1
    ubus-cli WiFi.Radio.1.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.1.LongRetryLimit=6
    ubus-cli WiFi.Radio.1.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.1.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.4.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.2.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.1.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.1.Enable=1
  STA 5G preparation:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    ubus-cli WiFi.AccessPoint.1.Enable=0
    ubus-cli WiFi.AccessPoint.2.Enable=0
    wpa_cli terminate 2>/dev/null || true
    rm -f /var/run/wpa_supplicant/wl0 2>/dev/null || true
    iw dev wl0.1 del 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    iw dev wl0 set type managed
    ifconfig wl0 up
    mkdir -p /var/run/wpa_supplicant
    printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\nnetwork={\nssid="TestPilot_BTM"\nkey_mgmt=SAE\nsae_password="testpilot6g"\nieee80211w=2\nscan_ssid=1\n}\n' > /tmp/wpa_wl0.conf
    wpa_supplicant -B -D nl80211 -i wl0 -c /tmp/wpa_wl0.conf -C /var/run/wpa_supplicant
    sleep 3
  STA 5G connect verify:
    wpa_cli -p /var/run/wpa_supplicant -i wl0 reconnect
    sleep 10
    iw dev wl0 link
    wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  DUT association evidence:
    wl -i wl0 assoclist
test_procedure: |
  1) Resolve COM1 wl0's live STA MAC and require AP1 AssociatedDevice.1 to point to that same station.
  2) Query WiFi.AccessPoint.1.AssociatedDevice.1.TxErrors directly on DUT, then cross-check the same AssociatedDevice entry via WiFi.AccessPoint.1.AssociatedDevice.1.?.
  3) Confirm wl0 sta_info for the same STA still exposes tx failures / retry counters for the same driver station entry.
  4) Keep the manual verdict workbook-gated open: the current 5G live retest only proves direct AssociatedDevice and driver equality under a zero-error checkpoint, not deterministic Tx error injection.
steps:
- id: step1
  action: exec
  target: STA
  command: cat /sys/class/net/wl0/address | tr 'a-f' 'A-F' | sed 's/^/StaMac=/'
  capture: sta_identity
- id: step2
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"
  depends_on: step1
  capture: assoc_entry
- id: step3
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.TxErrors?"'
  depends_on: step2
  capture: result
- id: step4
  action: exec
  target: DUT
  command: >-
    ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | sed -n 's/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress="\([^"]*\)".*/AssocMAC=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxErrors=\([0-9][0-9]*\).*/AssocTxErrors=\1/p'
  depends_on: step3
  capture: assoc_snapshot
- id: step5
  action: exec
  target: DUT
  command: >-
    STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n 's/.*MACAddress="\([^"]*\)".*/\1/p'); STA_MAC_LOWER=$(echo "$STA_MAC" | tr 'A-F' 'a-f'); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC_LOWER | sed -n 's/^[[:space:]]*tx total pkts: \([0-9][0-9]*\).*/DriverTxPkts=\1/p; s/^[[:space:]]*tx failures: \([0-9][0-9]*\).*/DriverTxErrors=\1/p; s/^[[:space:]]*tx pkts retries: \([0-9][0-9]*\).*/DriverRetries=\1/p; s/^[[:space:]]*tx pkts retry exhausted: \([0-9][0-9]*\).*/DriverRetryExhausted=\1/p'
  depends_on: step4
  capture: driver_capture
pass_criteria:
- field: sta_identity.StaMac
  operator: regex
  value: ^([0-9A-F]{2}:){5}[0-9A-F]{2}$
  description: COM1 wl0 must resolve to a concrete live STA MAC before DUT-side validation.
- field: assoc_entry.MACAddress
  operator: regex
  value: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
  description: AP1 AssociatedDevice.1 must first resolve to the live 5G STA MAC.
- field: assoc_entry.MACAddress
  operator: equals
  reference: sta_identity.StaMac
  description: AP1 AssociatedDevice.1 must correspond to the same COM1 wl0 station used for this manual checkpoint.
- field: result.TxErrors
  operator: regex
  value: ^[0-9]+$
  description: TxErrors direct getter must produce a numeric counter for the live AssociatedDevice entry.
- field: assoc_snapshot.AssocMAC
  operator: equals
  reference: assoc_entry.MACAddress
  description: AssociatedDevice snapshot evidence must come from the same AP1 station entry.
- field: result.TxErrors
  operator: equals
  reference: assoc_snapshot.AssocTxErrors
  description: Direct getter TxErrors must match the same AssociatedDevice snapshot value.
- field: driver_capture.DriverAssocMac
  operator: equals
  reference: assoc_entry.MACAddress
  description: Driver evidence must target the same AssociatedDevice MAC resolved in step2.
- field: driver_capture.DriverTxPkts
  operator: regex
  value: ^[0-9]+$
  description: wl0 sta_info must expose a concrete tx total packet counter for the same STA.
- field: driver_capture.DriverTxErrors
  operator: regex
  value: ^[0-9]+$
  description: wl0 sta_info must expose a concrete tx failures counter for the same STA.
- field: result.TxErrors
  operator: equals
  reference: driver_capture.DriverTxErrors
  description: TxErrors must match wl0 sta_info tx failures for the same AssociatedDevice entry.
- field: driver_capture.DriverRetries
  operator: regex
  value: ^[0-9]+$
  description: wl0 sta_info must still expose tx pkts retries for the same STA as supporting context.
- field: driver_capture.DriverRetryExhausted
  operator: regex
  value: ^[0-9]+$
  description: wl0 sta_info must still expose tx pkts retry exhausted for the same STA as supporting context.
verification_command:
  - 'cat /sys/class/net/wl0/address | tr ''a-f'' ''A-F'' | sed ''s/^/StaMac=/'''
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.TxErrors?"'
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | sed -n ''s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress="\([^"]*\)".*/AssocMAC=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxErrors=\([0-9][0-9]*\).*/AssocTxErrors=\1/p'''
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); STA_MAC_LOWER=$(echo "$STA_MAC" | tr ''A-F'' ''a-f''); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC_LOWER | sed -n ''s/^[[:space:]]*tx total pkts: \([0-9][0-9]*\).*/DriverTxPkts=\1/p; s/^[[:space:]]*tx failures: \([0-9][0-9]*\).*/DriverTxErrors=\1/p; s/^[[:space:]]*tx pkts retries: \([0-9][0-9]*\).*/DriverRetries=\1/p; s/^[[:space:]]*tx pkts retry exhausted: \([0-9][0-9]*\).*/DriverRetryExhausted=\1/p'''
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass