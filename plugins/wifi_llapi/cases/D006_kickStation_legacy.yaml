id: "wifi-llapi-kickStation"
name: "kickStation() disconnect and verify AuthenticationState"
version: "1.0"

source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: "Wifi_LLAPI"
  row: 6
  object: "WiFi.AccessPoint.{i}."
  api: "kickStation()"

platform:
  prplos: "4.0.3"
  bdk: "6.3.1"

topology:
  links:
    - from: STA
      to: DUT
      band: "5g"

  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
      config:
        - iface: "5g"
          mode: ap
          ssid: "{{SSID_5G}}"
          key: "{{KEY_5G}}"

    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
        - iface: "5g"
          mode: sta
          ssid: "{{SSID_5G}}"
          key: "{{KEY_5G}}"

env_verify:
  - action: ping
    from: STA
    to: DUT
    expect: pass

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

sta_env_setup: |
  STA env setup baseline (COM1 / A0, serialwrap):
  1) Enable STA radios:
     ubus-cli WiFi.Radio.1.Enable=1
     ubus-cli WiFi.Radio.2.Enable=1
     ubus-cli WiFi.Radio.3.Enable=1
  2) 5G connect verify (wl0 -> B0_5G_AP):
     ubus-cli WiFi.AccessPoint.1.Enable=0
     ubus-cli WiFi.AccessPoint.2.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl0.1 del 2>/dev/null || true
     iw dev wl0 set type managed
     ifconfig wl0 up
     iw dev wl0 connect B0_5G_AP
     sleep 3
     iw dev wl0 link
  3) 6G connect verify (wl1 -> B0_6G_AP, SAE):
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl1.1 del 2>/dev/null || true
     iw dev wl1 set type managed
     ifconfig wl1 up
     printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\n' > /tmp/wpa_wl1.conf
     wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf
     wpa_cli -i wl1 remove_network all
     wpa_cli -i wl1 add_network
     wpa_cli -i wl1 set_network 0 ssid '"B0_6G_AP"'
     wpa_cli -i wl1 set_network 0 key_mgmt SAE
     wpa_cli -i wl1 set_network 0 sae_password '"B0StaTest1234"'
     wpa_cli -i wl1 set_network 0 ieee80211w 2
     wpa_cli -i wl1 set_network 0 scan_ssid 1
     wpa_cli -i wl1 enable_network 0
     wpa_cli -i wl1 reconnect
     sleep 10
     iw dev wl1 link
  4) 2.4G connect verify (wl2 -> B0_24G_AP):
     ubus-cli WiFi.AccessPoint.5.Enable=0
     ubus-cli WiFi.AccessPoint.6.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl2.1 del 2>/dev/null || true
     iw dev wl2 set type managed
     ifconfig wl2 up
     iw dev wl2 connect B0_24G_AP
     sleep 3
     iw dev wl2 link
  5) DUT association evidence (COM0):
     wl -i wl0 assoclist
     wl -i wl1 assoclist
     wl -i wl2 assoclist

test_procedure: |
  1) Execute case command on DUT:
     <fill hlapi_command>
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.kickStation()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
  - id: verify_connected
    action: exec
    target: DUT
    command: |
      ubus-cli WiFi.AccessPoint.1.? | grep -E 'Associated.1.MACAddress|AuthenticationState'
    capture: pre_kick_state

  - id: kick_station
    action: exec
    target: DUT
    command: |
      ubus-cli "WiFi.AccessPoint.1.kickStation(macaddress={{STA_MAC}})"
    depends_on: verify_connected

  - id: wait_disconnect
    action: wait
    target: DUT
    duration: 3
    depends_on: kick_station

  - id: verify_disconnected
    action: exec
    target: DUT
    command: |
      ubus-cli WiFi.AccessPoint.1.? | grep -E 'Associated.1.MACAddress|AuthenticationState'
    capture: post_kick_state
    depends_on: wait_disconnect

pass_criteria:
  - field: pre_kick_state.AuthenticationState
    operator: "=="
    value: "1"
    description: "kick 前 STA 應為已認證狀態"
  - field: post_kick_state.AuthenticationState
    operator: "=="
    value: "0"
    description: "kick 後 STA 應為未認證狀態"

verification_command: |
  ubus-cli "WiFi.AccessPoint.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.AccessPoint.*.kickStation?" 2>/dev/null || true
  wl -i wl0 bss 2>/dev/null || true; wl -i wl1 bss 2>/dev/null || true; wl -i wl2 bss 2>/dev/null || true
  wl -i wl0 assoclist; wl -i wl1 assoclist; wl -i wl2 assoclist

bands: ["5g", "6g", "2.4g"]
