id: d192-radio-explicitbeamformingenabled
name: D192 Radio ExplicitBeamFormingEnabled
source:
  row: 153
  object: WiFi.Radio.{i}.
  api: ExplicitBeamFormingEnabled
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: setter 接受 0 並 readback，但 driver txbf 不隨之改變
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.ExplicitBeamFormingEnabled?"
  expected: ExplicitBeamFormingEnabled 回傳 0 或 1
  description: Radio.1 (5g) ExplicitBeamFormingEnabled getter（live=1）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.ExplicitBeamFormingEnabled?"
  expected: ExplicitBeamFormingEnabled 回傳 0 或 1
  description: Radio.2 (6g) ExplicitBeamFormingEnabled getter（live=1）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.ExplicitBeamFormingEnabled?"
  expected: ExplicitBeamFormingEnabled 回傳 0 或 1
  description: Radio.3 (2.4g) ExplicitBeamFormingEnabled getter（live=1）
pass_criteria:
- field: getter_5g.ExplicitBeamFormingEnabled
  operator: regex
  value: ^[01]$
- field: getter_6g.ExplicitBeamFormingEnabled
  operator: regex
  value: ^[01]$
- field: getter_24g.ExplicitBeamFormingEnabled
  operator: regex
  value: ^[01]$
