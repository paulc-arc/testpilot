id: wifi-llapi-r169-obsscoexistenceenable
name: ObssCoexistenceEnable — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 169
  object: WiFi.Radio.{i}.
  api: ObssCoexistenceEnable
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.ObssCoexistenceEnable=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1.ubus-cli WiFi.Radio.3.ObssCoexistenceEnable=1 2.ubus-cli WiFi.Radio.3.OperatingChannelBandwidth="40MHz” 3.wl
    -i wl2 status shows 20MHz 4.ubus-cli WiFi.Radio.3.ObssCoexistenceEnable=0 5.wl -i wl2 status shows 40MHz
  capture: result
pass_criteria:
- field: result.ObssCoexistenceEnable
  operator: contains
  value: '0'
  description: ObssCoexistenceEnable 應回傳包含 ObssCoexistenceEnable=0
verification_command: 'root@prplOS:/# wl -i wl0 obss_coex

  0

  root@prplOS:/# wl -i wl1 obss_coex

  0

  root@prplOS:/# wl -i wl2 obss_coex

  1'
results_reference:
  v4.0.1:
    5g: Not Supported
    6g: Not Supported
    2.4g: Pass
    comment: '*OBSS Coexistence is supported only on 2.4 GHz, and is not supported on 5 GHz or 6 GHz'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
