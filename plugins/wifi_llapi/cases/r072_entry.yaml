id: wifi-llapi-r072-entry
name: Entry — WiFi.AccessPoint.{i}.MACFiltering.Entry
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 80
  object: "WiFi.AccessPoint.{i}.MACFiltering.Entry"
  api: "Entry"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.MACFiltering.Entry
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.MACFiltering.Entry
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.MACFiltering.Entry
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.MACFiltering.Entry.Entry?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli WiFi.AccessPoint.? | grep MACFiltering.Entry WiFi.AccessPoint.1.MACFiltering.Entry.1. WiFi.AccessPoint.1.MACFiltering.Entry.1.Alias="cpe-Entry-1"
    WiFi.AccessPoint.1.MACFiltering.Entry.1.MACAddress="62:2F:B8:66:BB:82" WiFi.AccessPoint.1.MACFiltering.Entry.2. WiFi.AccessPoint.1.MACFiltering.Entry.2.Alias="cpe-Entry-2"
    WiFi.AccessPoint.1.MACFiltering.Entry.2.MACAddress="FA:DD:AC:24:5A:B4" WiFi.AccessPoint.1.MACFiltering.Entry.3. WiFi.AccessPoint.1.MACFiltering.Entry.3.Alias="cpe-Entry-3"
    WiFi.AccessPoint.1.MACFiltering.Entry.3.MACAddress="FA:A0:DF:91:47:7C" WiFi.AccessPoint.3.MACFiltering.Entry.1. WiFi.AccessPoint.3.MACFiltering.Entry.1.Alias="cpe-Entry-1"
    WiFi.AccessPoint.3.MACFiltering.Entry.1.MACAddress="FA:A0:DF:91:47:7C" WiFi.AccessPoint.5.MACFiltering.Entry.1. WiFi.AccessPoint.5.MACFiltering.Entry.1.Alias="cpe-Entry-1"
    WiFi.AccessPoint.5.MACFiltering.Entry.1.MACAddress="62:2F:B8:66:BB:82"
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: Entry 應回傳非空結果
verification_command: 'cat /tmp/wl0_hapd.conf

  accept_mac_file=/tmp/hostap_wl0.acl

  or

  deny_mac_file=/tmp/hostap_wl0.acl


  cat /tmp/hostap_wl0.acl

  62:2F:B8:66:BB:82'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
