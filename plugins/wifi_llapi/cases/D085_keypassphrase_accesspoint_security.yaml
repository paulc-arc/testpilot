  row: 85
  object: WiFi.AccessPoint.{i}.Security
  api: KeyPassPhrase
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: "ubus-cli 'WiFi.AccessPoint.1.Security.KeyPassPhrase=\"0689388783\"'"
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; KeyPassPhrase is calibrated as an AP-only Security setter/getter case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing `Security.KeyPassPhrase`
  - live 0403 reruns showed AP1/AP3/AP5 all preserve the quoted leading-zero setter/readback path against hostapd `wpa_passphrase=`
  - the workbook's bare leading-zero setter `ubus-cli WiFi.AccessPoint.{i}.Security.KeyPassPhrase=0689388783` is misparsed on the current firmware into `689388783.000000`; the value must be quoted as `"...=\"0689388783\""` to preserve the workbook passphrase literally
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - capture the current getter plus hostapd `wpa_passphrase=` baseline on all three bands
   2) Per-band KeyPassPhrase probe:
      - set `KeyPassPhrase="0689388783"` on the same AP with the leading-zero value quoted
      - allow hostapd reload to settle, then re-read the getter and hostapd `wpa_passphrase=` state
      - restore the same AP back to `KeyPassPhrase="00000000"` with quoted syntax
      - allow hostapd reload to settle, then re-read the getter and hostapd state again
  3) Verdict model:
     - this is a workbook-preserving `Pass` checkpoint
     - the case passes only when the quoted setter/readback and hostapd `wpa_passphrase=` converge to `0689388783` on all three bands and then cleanly restore to `00000000`
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Capture baseline getter + hostapd `wpa_passphrase=` on AP1 / AP3 / AP5.
  2) Set `KeyPassPhrase="0689388783"` on the same AP with quoted syntax and re-read the getter / hostapd state after settle.
   3) Restore `KeyPassPhrase="00000000"` with quoted syntax and re-read the getter / hostapd state again after settle.
   Verdict: Pass. The current DUT preserves the workbook value only when the leading-zero passphrase is quoted, and with that quoting the northbound getter plus hostapd `wpa_passphrase=` converge `00000000 -> 0689388783 -> 00000000` on all three bands.

steps:
- id: step1_keypassphrase_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.Security.KeyPassPhrase?" 2>&1); VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.Security\.KeyPassPhrase="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$VALUE" ]; then printf 'BaselineGetterKeyPassPhrase5g=%s\n' "$VALUE"; else echo 'BaselineGetterKeyPassPhrase5g=EMPTY'; fi; HAPD=$(grep -m1 '^wpa_passphrase=' /tmp/wl0_hapd.conf 2>/dev/null | cut -d= -f2- || true); if [ -n "$HAPD" ]; then printf 'BaselineHostapdKeyPassPhrase5g=%s\n' "$HAPD"; else echo 'BaselineHostapdKeyPassPhrase5g=ABSENT'; fi
  capture: keypassphrase_baseline_5g
- id: step2_keypassphrase_set_5g
