id: wifi-llapi-r152-enable-radio
name: Enable — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 191
  object: "WiFi.Radio.{i}."
  api: "Enable"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Enable=1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.Enable=1
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

sta_env_setup: |
  STA env setup baseline (COM1 / A0, serialwrap):
  1) Enable STA radios:
     ubus-cli WiFi.Radio.1.Enable=1
     ubus-cli WiFi.Radio.2.Enable=1
     ubus-cli WiFi.Radio.3.Enable=1
  2) 5G connect verify (wl0 -> B0_5G_AP):
     ubus-cli WiFi.AccessPoint.1.Enable=0
     ubus-cli WiFi.AccessPoint.2.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl0.1 del 2>/dev/null || true
     iw dev wl0 set type managed
     ifconfig wl0 up
     iw dev wl0 connect B0_5G_AP
     sleep 3
     iw dev wl0 link
  3) 6G connect verify (wl1 -> B0_6G_AP, SAE):
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl1.1 del 2>/dev/null || true
     iw dev wl1 set type managed
     ifconfig wl1 up
     printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\n' > /tmp/wpa_wl1.conf
     wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf
     wpa_cli -i wl1 remove_network all
     wpa_cli -i wl1 add_network
     wpa_cli -i wl1 set_network 0 ssid '"B0_6G_AP"'
     wpa_cli -i wl1 set_network 0 key_mgmt SAE
     wpa_cli -i wl1 set_network 0 sae_password '"B0StaTest1234"'
     wpa_cli -i wl1 set_network 0 ieee80211w 2
     wpa_cli -i wl1 set_network 0 scan_ssid 1
     wpa_cli -i wl1 enable_network 0
     wpa_cli -i wl1 reconnect
     sleep 10
     iw dev wl1 link
  4) 2.4G connect verify (wl2 -> B0_24G_AP):
     ubus-cli WiFi.AccessPoint.5.Enable=0
     ubus-cli WiFi.AccessPoint.6.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl2.1 del 2>/dev/null || true
     iw dev wl2 set type managed
     ifconfig wl2 up
     iw dev wl2 connect B0_24G_AP
     sleep 3
     iw dev wl2 link
  5) DUT association evidence (COM0):
     wl -i wl0 assoclist
     wl -i wl1 assoclist
     wl -i wl2 assoclist

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.Enable=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.Enable?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Check API default value: ubus-cli WiFi.Radio.*.Enable? > WiFi.Radio.*.Enable? WiFi.Radio.1.Enable=1 WiFi.Radio.2.Enable=1
    WiFi.Radio.3.Enable=1'
- id: step2
  action: exec
  target: DUT
  command: Make sure all radios(SSID) can be scanned from air.
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Set this API to 0 to disable radio: ubus-cli WiFi.Radio.*.Enable=0'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Make sure all radios(SSID) do not exit in air anymore.
  depends_on: step3
  capture: result
pass_criteria:
- field: result.Enable
  operator: contains
  value: '1'
  description: Enable 應回傳包含 Enable=1
verification_command: '(API Enable= 1):

  wl -i wl0 bss

  up

  wl -i wl1 bss

  up

  wl -i wl2 bss

  up


  (API Enable= 0):

  wl -i wl0 bss

  down

  wl -i wl1 bss

  down

  wl -i wl2 bss

  down'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
