id: wifi-llapi-r174-regulatorydomain-radio
name: RegulatoryDomain — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 215
  object: "WiFi.Radio.{i}."
  api: "RegulatoryDomain"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.RegulatoryDomain=FR
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.RegulatoryDomain=FR
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.RegulatoryDomain=FR
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.RegulatoryDomain?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Check default value: ubus-cli WiFi.Radio.*.RegulatoryDomain? > WiFi.Radio.*.RegulatoryDomain? WiFi.Radio.1.RegulatoryDomain="#a"
    WiFi.Radio.2.RegulatoryDomain="#a" WiFi.Radio.3.RegulatoryDomain="#a"'
- id: step2
  action: exec
  target: DUT
  command: Try change all redio to "FR" ubus-cli WiFi.Radio.*.RegulatoryDomain="FR"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check API again: ubus-cli WiFi.Radio.*.RegulatoryDomain? > WiFi.Radio.*.RegulatoryDomain? WiFi.Radio.1.RegulatoryDomain="FR"
    WiFi.Radio.2.RegulatoryDomain="FR" WiFi.Radio.3.RegulatoryDomain="FR"'
  depends_on: step2
  capture: result
pass_criteria:
- field: result.RegulatoryDomain
  operator: contains
  value: FR
  description: RegulatoryDomain 應回傳包含 RegulatoryDomain=FR
verification_command: 'root@prplOS:/# wl -i wl0 country

  #a (#a/0) <unknown>

  root@prplOS:/# wl -i wl1 country

  #a (#a/0) <unknown>

  root@prplOS:/# wl -i wl2 country

  #a (#a/0) <unknown>'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: "supported; \nwl -i wl0 country list\nwl -i wl0 contry_rev xx\nubus-cli WiFi.Radio.1.RegulatoryDomain=CA; ubus-cli\
      \ WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=170"
