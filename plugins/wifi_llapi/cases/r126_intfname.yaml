  target: DUT
  command: ubus-cli WiFi.EndPoint.{i}.IntfName=wl0
  capture: result
pass_criteria:
- field: result.IntfName
  operator: contains
  value: wl0
  description: IntfName 應回傳包含 IntfName=wl0
