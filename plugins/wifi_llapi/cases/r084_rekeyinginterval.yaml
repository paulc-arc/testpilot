id: wifi-llapi-r084-rekeyinginterval
name: RekeyingInterval — WiFi.AccessPoint.{i}.Security
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 84
  object: WiFi.AccessPoint.{i}.Security
  api: RekeyingInterval
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Security.RekeyingInterval=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 'Test Procedure: 1.Set/Get RekeyingInterval Set Command: ubus-cli WiFi.AccessPoint.{i}.Security.RekeyingInterval=
    Get Command: ubus-cli WiFi.AccessPoint.{i}.Security.RekeyingInterval? 2.check hostapd config&webGUI cat /tmp/wlx_hapd.conf
    |grep wpa_group_rekey 3.STA connect to AP 4.use wireshark to capture rekey packet'
  capture: result
pass_criteria:
- field: result.RekeyingInterval
  operator: contains
  value: '0'
  description: RekeyingInterval 應回傳包含 RekeyingInterval=0
verification_command: cat /tmp/wl0_hapd.conf |grep wpa_group_rekey
results_reference:
  v4.0.1:
    5g: Fail
    6g: Not Supported
    2.4g: Fail
    comment: 'ARC : Cannot capture EAPOL packets on Wireshark'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
