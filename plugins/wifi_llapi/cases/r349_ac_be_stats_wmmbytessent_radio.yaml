id: wifi-llapi-r349-ac-be-stats-wmmbytessent-radio
name: AC_BE — WiFi.Radio.{i}.Stats.WmmBytesSent.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 349
  object: WiFi.Radio.{i}.Stats.WmmBytesSent.
  api: AC_BE
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Stats.WmmBytesSent.AC_BE=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect two WiFi station (use another WiFi7 GW as station with built-in IPERF3)
- id: step2
  action: exec
  target: DUT
  command: Run IPERF between Station "iperf3 -c 192.168.1.1 -u -b 20M "
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Execute command ubus-cli "WiFi.Radio.*.getRadioStats()"
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Verify Radio Stats.WmmBytesReceived.AC_BE ubus-cli WiFi.Radio.*.Stats.WmmBytesSent.AC_BE? ubus-cli WiFi.Radio.*.Stats.WmmBytesSent.AC_BE?
    > WiFi.Radio.*.Stats.WmmBytesSent.AC_BE? WiFi.Radio.1.Stats.WmmBytesSent.AC_BE=39520168 WiFi.Radio.2.Stats.WmmBytesSent.AC_BE=14024785
    WiFi.Radio.3.Stats.WmmBytesSent.AC_BE=16518869
  depends_on: step3
  capture: result
pass_criteria:
- field: result.AC_BE
  operator: contains
  value: '0'
  description: AC_BE 應回傳包含 AC_BE=0
verification_command: 'root@prplOS:/# wl -i wl0 wme_counters

  AC_BE: tx frames: 36796 bytes: 39571906 failed frames: 341 failed bytes: 79808


  root@prplOS:/# wl -i wl1 wme_counters

