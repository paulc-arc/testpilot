id: wifi-llapi-D107-selfpin
name: SelfPIN — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  baseline: 0310-BGW720-300
  row: 109
  object: WiFi.AccessPoint.{i}.WPS.
  api: SelfPIN
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WPS.SelfPIN=12345678"
llapi_support: Support
implemented_by: Vendor Module
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: "Topology:\n  - DUT: COM0 (B0, AP role)\n  Transport:\n  - DUT via serialwrap COM0\n  Baseline:\n  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal\n  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE\n  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal\n  Notes:\n  - Setter round-trip on all 3 bands\n  - All bands: baseline=90455865, set=12345678→getter converges, restore=90455865\n  - No hostapd ap_pin persistence observed"
steps:
- id: step_5g_setter
  action: exec
  target: DUT
  command:
  - echo "Baseline5g=$(ubus-cli 'WiFi.AccessPoint.1.WPS.SelfPIN?' 2>/dev/null | grep -o 'SelfPIN=[0-9]*' | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.1.WPS.SelfPIN=12345678" 2>/dev/null
  - sleep 2
  - echo "AfterSet5g=$(ubus-cli 'WiFi.AccessPoint.1.WPS.SelfPIN?' 2>/dev/null | grep -o 'SelfPIN=[0-9]*' | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.1.WPS.SelfPIN=90455865" 2>/dev/null
  - sleep 2
  - echo "Restore5g=$(ubus-cli 'WiFi.AccessPoint.1.WPS.SelfPIN?' 2>/dev/null | grep -o 'SelfPIN=[0-9]*' | cut -d= -f2)"
  capture: pin_5g
- id: step_6g_setter
  action: exec
  target: DUT
  depends_on: step_5g_setter
  command:
  - echo "Baseline6g=$(ubus-cli 'WiFi.AccessPoint.3.WPS.SelfPIN?' 2>/dev/null | grep -o 'SelfPIN=[0-9]*' | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.3.WPS.SelfPIN=12345678" 2>/dev/null
  - sleep 2
  - echo "AfterSet6g=$(ubus-cli 'WiFi.AccessPoint.3.WPS.SelfPIN?' 2>/dev/null | grep -o 'SelfPIN=[0-9]*' | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.3.WPS.SelfPIN=90455865" 2>/dev/null
  - sleep 2
  - echo "Restore6g=$(ubus-cli 'WiFi.AccessPoint.3.WPS.SelfPIN?' 2>/dev/null | grep -o 'SelfPIN=[0-9]*' | cut -d= -f2)"
  capture: pin_6g
- id: step_24g_setter
  action: exec
  target: DUT
  depends_on: step_6g_setter
  command:
  - echo "Baseline24g=$(ubus-cli 'WiFi.AccessPoint.5.WPS.SelfPIN?' 2>/dev/null | grep -o 'SelfPIN=[0-9]*' | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.5.WPS.SelfPIN=12345678" 2>/dev/null
  - sleep 2
  - echo "AfterSet24g=$(ubus-cli 'WiFi.AccessPoint.5.WPS.SelfPIN?' 2>/dev/null | grep -o 'SelfPIN=[0-9]*' | cut -d= -f2)"
  - ubus-cli "WiFi.AccessPoint.5.WPS.SelfPIN=90455865" 2>/dev/null
  - sleep 2
  - echo "Restore24g=$(ubus-cli 'WiFi.AccessPoint.5.WPS.SelfPIN?' 2>/dev/null | grep -o 'SelfPIN=[0-9]*' | cut -d= -f2)"
  capture: pin_24g
pass_criteria:
- field: pin_5g.Baseline5g
  operator: equals
  value: '90455865'
  description: 5g baseline SelfPIN=90455865
- field: pin_5g.AfterSet5g
  operator: equals
  value: '12345678'
  description: 5g after setter SelfPIN=12345678
- field: pin_5g.Restore5g
  operator: equals
  value: '90455865'
  description: 5g after restore SelfPIN=90455865
- field: pin_6g.Baseline6g
  operator: equals
  value: '90455865'
  description: 6g baseline SelfPIN=90455865
- field: pin_6g.AfterSet6g
  operator: equals
  value: '12345678'
  description: 6g after setter SelfPIN=12345678
- field: pin_6g.Restore6g
  operator: equals
  value: '90455865'
  description: 6g after restore SelfPIN=90455865
- field: pin_24g.Baseline24g
  operator: equals
