id: wifi-llapi-r040-securitymodeenabled
name: SecurityModeEnabled — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 40
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: SecurityModeEnabled
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SecurityModeEnabled=WPA2-Personal
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Set GW security mode to WPA#-Personal
- id: step2
  action: exec
  target: DUT
  command: Connect WiFi Station
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify Station SecurityModeEnabled WiFi.AccessPoint.1.AssociatedDevice.1.SecurityModeEnabled="WPA3-Personal" WiFi.AccessPoint.3.AssociatedDevice.1.SecurityModeEnabled="WPA3-Personal"
    WiFi.AccessPoint.5.AssociatedDevice.1.SecurityModeEnabled="WPA3-Personal"
  depends_on: step2
  capture: result
pass_criteria:
- field: result.SecurityModeEnabled
  operator: contains
  value: WPA2-Personal
  description: SecurityModeEnabled 應回傳包含 SecurityModeEnabled=WPA2-Personal
