id: wifi-llapi-r035-rx-retransmissions
name: Rx_Retransmissions — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 35
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: Rx_Retransmissions
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.Rx_Retransmissions=10
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi station to GW
- id: step2
  action: exec
  target: DUT
  command: Run IPerf3 between Stations and GW
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Get stats of Rx_Retransmissions using ubus command ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.Rx_Retransmissions
    ? > WiFi.AccessPoint.*.AssociatedDevice.*.Rx_Retransmissions? WiFi.AccessPoint.1.AssociatedDevice.1.Rx_Retransmissions=0
    WiFi.AccessPoint.3.AssociatedDevice.1.Rx_Retransmissions=0 WiFi.AccessPoint.5.AssociatedDevice.1.Rx_Retransmissions=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result.Rx_Retransmissions
  operator: contains
  value: '10'
  description: Rx_Retransmissions 應回傳包含 Rx_Retransmissions=10
