id: wifi-llapi-r043-signalstrengthbychain
name: SignalStrengthByChain — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 48
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "SignalStrengthByChain"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SignalStrengthByChain=-44.0,-37.0,-44.0,-48.0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SignalStrengthByChain=-44.0,-37.0,-44.0,-48.0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.SignalStrengthByChain?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '##Connect 4x4 WiFi Station and check Station SignalStrengthByChain WiFi.AccessPoint.1.AssociatedDevice.1.SignalStrengthByChain="-41.0"
    WiFi.AccessPoint.3.AssociatedDevice.1.SignalStrengthByChain="-57.0" WiFi.AccessPoint.5.AssociatedDevice.1.SignalStrengthByChain="-48.0"'
  capture: result
pass_criteria:
- field: result.SignalStrengthByChain
  operator: contains
  value: -44.0,-37.0,-44.0,-48.0
  description: SignalStrengthByChain 應回傳包含 SignalStrengthByChain=-44.0,-37.0,-44.0,-48.0
verification_command: 'wl -i wl0 sta_info ${STA_MAC}


  root@prplOS:/# wl -i wl0 sta_info e6:60:17:eb:a9:86 | grep antenna

  per antenna rssi of last rx data frame: -40 -47 -40 -39

  per antenna average rssi of rx data frames: -40 -46 -39 -39

  per antenna noise floor: -87 -88 -87 -87

  root@prplOS:/#

  root@prplOS:/# wl -i wl1 sta_info 38:06:e6:92:b0:4a | grep antenna

  per antenna rssi of last rx data frame: -37 -37 -35 -36

  per antenna average rssi of rx data frames: -36 -37 -35 -36

  per antenna noise floor: -87 -87 -88 -88'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : station support 4x4 but the API only show one RSSI in SignalStrengthByChain'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: Commit
