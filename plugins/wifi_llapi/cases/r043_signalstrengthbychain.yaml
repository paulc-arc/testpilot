id: wifi-llapi-r043-signalstrengthbychain
name: SignalStrengthByChain — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 43
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: SignalStrengthByChain
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.SignalStrengthByChain=-44.0,-37.0,-44.0,-48.0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '##Connect 4x4 WiFi Station and check Station SignalStrengthByChain WiFi.AccessPoint.1.AssociatedDevice.1.SignalStrengthByChain="-41.0"
    WiFi.AccessPoint.3.AssociatedDevice.1.SignalStrengthByChain="-57.0" WiFi.AccessPoint.5.AssociatedDevice.1.SignalStrengthByChain="-48.0"'
  capture: result
pass_criteria:
- field: result.SignalStrengthByChain
  operator: contains
  value: -44.0,-37.0,-44.0,-48.0
  description: SignalStrengthByChain 應回傳包含 SignalStrengthByChain=-44.0,-37.0,-44.0,-48.0
verification_command: 'wl -i wl0 sta_info ${STA_MAC}


  root@prplOS:/# wl -i wl0 sta_info e6:60:17:eb:a9:86 | grep antenna

  per antenna rssi of last rx data frame: -40 -47 -40 -39

  per antenna average rssi of rx data frames: -40 -46 -39 -39

  per antenna noise floor: -87 -88 -87 -87

  root@prplOS:/#

  root@prplOS:/# wl -i wl1 sta_info 38:06:e6:92:b0:4a | grep antenna

  per antenna rssi of last rx data frame: -37 -37 -35 -36

  per antenna average rssi of rx data frames: -36 -37 -35 -36

  per antenna noise floor: -87 -87 -88 -88'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : station support 4x4 but the API only show one RSSI in SignalStrengthByChain'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: Commit
