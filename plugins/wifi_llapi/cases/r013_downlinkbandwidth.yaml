id: wifi-llapi-r013-downlinkbandwidth
name: DownlinkBandwidth — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 13
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: DownlinkBandwidth
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.DownlinkBandwidth=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW
- id: step2
  action: exec
  target: DUT
  command: Verify Associated Station DownlinkBandwidth ubus-cli WiFi.AccessPoint.*.AssociatedDevice.? | grep DownlinkB andwidth
    WiFi.AccessPoint.1.AssociatedDevice.1.DownlinkBandwidth=80 WiFi.AccessPoint.3.AssociatedDevice.1.DownlinkBandwidth=160
    WiFi.AccessPoint.3.AssociatedDevice.1.DownlinkBandwidth=40
  depends_on: step1
  capture: result
pass_criteria:
- field: result.DownlinkBandwidth
  operator: contains
  value: '0'
  description: DownlinkBandwidth 應回傳包含 DownlinkBandwidth=0
verification_command: 'root@prplOS:/# wl -i wl0 sta_info 4A:0A:A5:80:23:7B | grep bandwidth

  link bandwidth = 80 MHZ'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
