id: wifi-llapi-r034-retransmissions
name: Retransmissions — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 39
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "Retransmissions"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.Retransmissions=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.Retransmissions=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.Retransmissions?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '"1. Connect one WiFi station to SSID4, SSID6 and SSID8 of the GW (DUT)'
- id: step2
  action: exec
  target: DUT
  command: Run Iperf from Station to GW and between Station
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Setup neighbour GW near the GW (DUT)
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Place Neighbor GW nearby
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: Set same channel + bandwidth
  depends_on: step4
- id: step6
  action: exec
  target: DUT
  command: Connect STA(s) to Neighbor GW
  depends_on: step5
- id: step7
  action: exec
  target: DUT
  command: Run Iperf simultaneously
  depends_on: step6
- id: step8
  action: exec
  target: DUT
  command: 'Check AssociatedDevice Stats.Retransmission ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.Retransmissions? >
    WiFi.AccessPoint.*.AssociatedDevice.*.Retransmissions? WiFi.AccessPoint.1.AssociatedDevice.1.Retransmissions=0 WiFi.AccessPoint.3.AssociatedDevice.1.Retransmissions=0
    WiFi.AccessPoint.5.AssociatedDevice.1.Retransmissions=0 Note: run the test overnight"_x0001_'
  depends_on: step7
  capture: result
pass_criteria:
- field: result.Retransmissions
  operator: contains
  value: '0'
  description: Retransmissions 應回傳包含 Retransmissions=0
