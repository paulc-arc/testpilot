id: wifi-llapi-r055-uniibandscapabilities
name: UNIIBandsCapabilities — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 60
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "UNIIBandsCapabilities"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.UNIIBandsCapabilities=U-NII-1,U-NII-2A,U-NII-2C,U-NII-3
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.UNIIBandsCapabilities=U-NII-1,U-NII-2A,U-NII-2C,U-NII-3
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.UNIIBandsCapabilities?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '##Connect WiFi Station and check Station UNIIBandsCapabilities ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.?
    | grep UNIIBands Capabilities WiFi.AccessPoint.1.AssociatedDevice.1.UNIIBandsCapabilities="U-NII-1,U-NII-2A,U-NII-2C,U-NII-3,U-NII-4"
    WiFi.AccessPoint.3.AssociatedDevice.1.UNIIBandsCapabilities="U-NII-5,U-NII-6,U-NII-7,U-NII-8" WiFi.AccessPoint.5.AssociatedDevice.1.UNIIBandsCapabilities="U-NII-1,U-NII-2A,U-NII-2C,U-NII-3,U-NII-4,U-NII-5,U-NII-6,U-NII-7,U-NII-8"'
  capture: result
pass_criteria:
- field: result.UNIIBandsCapabilities
  operator: contains
  value: U-NII-1,U-NII-2A,U-NII-2C,U-NII-3
  description: UNIIBandsCapabilities 應回傳包含 UNIIBandsCapabilities=U-NII-1,U-NII-2A,U-NII-2C,U-NII-3

verification_command: |
  # Generate traffic before readback for stats-like AssociatedDevice fields.
  STA_MAC="$(wl -i wl0 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  [ -z "$STA_MAC" ] && STA_MAC="$(wl -i wl1 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  [ -z "$STA_MAC" ] && STA_MAC="$(wl -i wl2 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  wl -i wl0 assoclist; wl -i wl1 assoclist; wl -i wl2 assoclist
  ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.?" | sed -n "1,120p"
  ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.UNIIBandsCapabilities?" 2>/dev/null || true
  [ -n "$STA_MAC" ] && wl -i wl0 sta_info "$STA_MAC" | sed -n "1,120p"
  iw dev wl0 station dump 2>/dev/null | sed -n "1,120p"

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'Capability string_x0001_--- Meaning (client-supported U-NII bands)

      5G: U-NII-1,U-NII-2A,U-NII-2C,U-NII-3,U-NII-4_x0001_-- Client supports all 5 GHz UNII bands (UNII-1, 2A, 2C, 3, 4)


      6G: U-NII-5,U-NII-6,U-NII-7,U-NII-8_x0001_-- Client supports all 6 GHz UNII bands (U-NII-5/6/7/8 → Wi-Fi 6E/7)


      2.4G: U-NII-1,...,U-NII-8 (all of them) --_x0001_Client supports 5 GHz + 6 GHz (multi-band capable)'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
