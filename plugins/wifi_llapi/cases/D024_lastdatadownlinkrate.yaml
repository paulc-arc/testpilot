id: wifi-llapi-D024-lastdatadownlinkrate
name: "LastDataDownlinkRate \u2014 WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 24
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: LastDataDownlinkRate
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.LastDataDownlinkRate?"
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
      - iface: 5g
        mode: sta
        ssid: TestPilot_BTM
        key: testpilot6g
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (station role for this case; do not rely on the old A0/B0 heuristic)
  Transport:
  - serialwrap attach COM0 / COM1
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / TestPilot_BTM
  - 6G: DUT wl1 / AP3 / SSID.6 / TestPilot_BTM
  - 2.4G: DUT wl2 / AP5 / SSID.8 / TestPilot_24G
  Preconditions:
  - keep only one associated station on AP1 so AssociatedDevice.1 stays deterministic
  - use the validated 5G single-band WPA3 baseline for this case
  - do not depend on the old workbook sample values for read-only AssociatedDevice fields
setup_steps: |
  1) DUT 5G baseline:
     - enable Radio.1 / SSID.4 / AP1
     - configure AP1 as WPA3-Personal with MFP required
     - keep the validated live SSID/credential pair as TestPilot_BTM / testpilot6g
  2) STA 5G preparation:
     - disable local AP1/AP2 on COM1
     - move COM1 br-lan off 192.168.1.0/24 to avoid bridge self-hit side effects
     - reset wl0 and its wpa_supplicant control socket
     - connect wl0 to TestPilot_BTM with SAE
  3) Association evidence:
     - COM1: iw dev wl0 link ; wpa_cli -p /var/run/wpa_supplicant -i wl0 status
     - COM0: wl -i wl0 assoclist
sta_env_setup: |
  DUT 5G AP baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.1.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.1.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.OfdmaEnable=1
    ubus-cli WiFi.Radio.1.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.1.OperatingStandards=ax
    ubus-cli WiFi.Radio.1.RxChainCtrl=-1
    ubus-cli WiFi.Radio.1.TxChainCtrl=-1
    ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.1.Sensing.Enable=1
    ubus-cli WiFi.Radio.1.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.1.LongRetryLimit=6
    ubus-cli WiFi.Radio.1.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.1.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.4.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.2.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.1.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.1.Enable=1
  STA 5G preparation:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    ubus-cli WiFi.AccessPoint.1.Enable=0
    ubus-cli WiFi.AccessPoint.2.Enable=0
    wpa_cli terminate 2>/dev/null || true
    rm -f /var/run/wpa_supplicant/wl0 2>/dev/null || true
    iw dev wl0.1 del 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    iw dev wl0 set type managed
    ifconfig wl0 up
    mkdir -p /var/run/wpa_supplicant
    printf 'ctrl_interface=/var/run/wpa_supplicant
  update_config=1
  sae_pwe=2
  network={
  ssid="TestPilot_BTM"
  key_mgmt=SAE
  sae_password="testpilot6g"
  ieee80211w=2
  scan_ssid=1
  }
  ' > /tmp/wpa_wl0.conf
    wpa_supplicant -B -D nl80211 -i wl0 -c /tmp/wpa_wl0.conf -C /var/run/wpa_supplicant
    sleep 3
  STA 5G connect verify:
    wpa_cli -p /var/run/wpa_supplicant -i wl0 reconnect
    sleep 10
    iw dev wl0 link
    wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  DUT association evidence:
    wl -i wl0 assoclist
test_procedure: |
  1) Confirm the 5G STA is associated to AP1 and resolve its live MAC address.
  2) Read the current AP1 BSSID so AP identity does not get confused with the STA MAC.
  3) Read WiFi.AccessPoint.1.AssociatedDevice.1.LastDataDownlinkRate on DUT.
  4) Cross-check the same STA against the driver 'rate of last tx pkt' value from wl0 sta_info. Current 0403 runtime still tracks the AP -> STA transmit direction, but live replay shows LLAPI may land on either the same 100-kbps bucket or the immediately lower bucket.
  5) Normalize the driver value to a 100-kbps bucket and accept the observed [bucket-100, bucket] window.
steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"
  capture: assoc_entry
- id: step2
  action: exec
  target: DUT
  command: ubus-cli "WiFi.SSID.4.BSSID?"
  depends_on: step1
  capture: ap_bssid
- id: step3
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.LastDataDownlinkRate?"
  depends_on: step2
  capture: result
- id: step4
  action: exec
  target: DUT
  command: 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); RATE=$(wl -i wl0 sta_info $STA_MAC | sed -n ''s/.*rate of last tx pkt: \([0-9][0-9]*\) kbps.*/\1/p'' | head -n1); if [ -n "$RATE" ]; then UPPER=$((RATE/100*100)); LOWER=$UPPER; [ "$LOWER" -ge 100 ] && LOWER=$((LOWER-100)); printf "DriverLastDownlinkRateLower=%s\nDriverLastDownlinkRateUpper=%s\n" "$LOWER" "$UPPER"; fi'
  depends_on: step3
  capture: driver_rate
pass_criteria:
- field: assoc_entry.MACAddress
  operator: regex
  value: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
  description: AP1 AssociatedDevice.1 must first resolve to the live 5G STA MAC.
- field: ap_bssid.BSSID
  operator: not_equals
  reference: assoc_entry.MACAddress
  description: AP BSSID and STA MAC must stay distinct for rate validation.
- field: result.LastDataDownlinkRate
  operator: regex
  value: ^[0-9]+$
  description: LastDataDownlinkRate must be a positive integer string.
- field: result.LastDataDownlinkRate
  operator: '>='
  reference: driver_rate.DriverLastDownlinkRateLower
  description: LLAPI downlink rate must not fall below the observed driver last-tx bucket floor minus 100 kbps.
- field: result.LastDataDownlinkRate
  operator: <=
  reference: driver_rate.DriverLastDownlinkRateUpper
  description: LLAPI downlink rate must not exceed the observed driver last-tx 100-kbps bucket.
verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.LastDataDownlinkRate?"'
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p'')'
  - 'wl -i wl0 sta_info $STA_MAC | grep "rate of last tx pkt"'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: '5G official rerun 20260412T172957084134: LastDataDownlinkRate=487400 while the driver last-tx bucket window was [487400,487500]; workbook Pass is therefore confirmed with the source-backed [bucket-100,bucket] validator.'
