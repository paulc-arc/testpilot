id: wifi-llapi-r388-ac-bk-stats-wmmpacketsreceived
name: AC_BK — WiFi.SSID.{i}.Stats.WmmPacketsReceived.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 388
  object: WiFi.SSID.{i}.Stats.WmmPacketsReceived.
  api: AC_BK
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.SSID.{i}.Stats.WmmPacketsReceived.AC_BK=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect two WiFi station (use another WiFi7 GW as station with built-in IPERF3)
- id: step2
  action: exec
  target: DUT
  command: Run IPERF iperf3 -c 192.168.1.1 -u -b 20M --tos 0x20
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify SSID stats WmmPacketsReceived.AC_BK ubus-cli WiFi.SSID.*.Stats.WmmPacketsReceived.AC_BK? > WiFi.SSID.*.Stats.WmmPacketsReceived.AC_BK?
    WiFi.SSID.4.Stats.WmmPacketsReceived.AC_BK=0 WiFi.SSID.6.Stats.WmmPacketsReceived.AC_BK=0 WiFi.SSID.8.Stats.WmmPacketsReceived.AC_BK=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result.AC_BK
  operator: contains
  value: '0'
  description: AC_BK 應回傳包含 AC_BK=0
