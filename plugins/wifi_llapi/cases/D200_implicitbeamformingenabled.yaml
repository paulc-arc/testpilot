id: d200-radio-implicitbeamformingenabled
name: D200 Radio ImplicitBeamFormingEnabled
source:
  row: 200
  object: WiFi.Radio.{i}.
  api: ImplicitBeamFormingEnabled
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: read-only getter exact-closes the active 0403 tri-band ImplicitBeamFormingEnabled values
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.ImplicitBeamFormingEnabled?"
  expected: ImplicitBeamFormingEnabled 回傳有效值
  description: Radio.1 (5g) ImplicitBeamFormingEnabled getter（live=1）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.ImplicitBeamFormingEnabled?"
  expected: ImplicitBeamFormingEnabled 回傳有效值
  description: Radio.2 (6g) ImplicitBeamFormingEnabled getter（live=1）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.ImplicitBeamFormingEnabled?"
  expected: ImplicitBeamFormingEnabled 回傳有效值
  description: Radio.3 (2.4g) ImplicitBeamFormingEnabled getter（live=1）
pass_criteria:
- field: getter_5g.ImplicitBeamFormingEnabled
  operator: regex
  value: "^[01]$"
- field: getter_6g.ImplicitBeamFormingEnabled
  operator: regex
  value: "^[01]$"
- field: getter_24g.ImplicitBeamFormingEnabled
  operator: regex
  value: "^[01]$"
