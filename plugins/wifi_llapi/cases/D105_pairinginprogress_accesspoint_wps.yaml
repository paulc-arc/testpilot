id: wifi-llapi-D105-pairinginprogress-accesspoint-wps
name: PairingInProgress — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  baseline: 0310-BGW720-300
  row: 107
  object: WiFi.AccessPoint.{i}.WPS.
  api: PairingInProgress
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WPS.PairingInProgress?"
llapi_support: Support
implemented_by: Vendor Module
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: "Topology:\n  - DUT: COM0 (B0, AP role)\n  Transport:\n  - DUT via serialwrap COM0\n  Baseline:\n  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal\n  - 6G  = AP3 / wl1 / testpilot6G /\
  \ WPA3-Personal / SAE\n  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal\n  Notes:\n  - Read-only getter, all 3 bands return PairingInProgress=0\n  - No WPS pairing active during baseline measurement"
steps:
- id: step_5g_getter
  action: exec
  target: DUT
  command:
    - 'echo "PairingInProgress5g=$(ubus-cli ''WiFi.AccessPoint.1.WPS.PairingInProgress?'' 2>/dev/null | grep -o ''PairingInProgress=[0-9]*'' | cut -d= -f2)"'
  capture: pair_5g
- id: step_6g_getter
  action: exec
  target: DUT
  depends_on: step_5g_getter
  command:
    - 'echo "PairingInProgress6g=$(ubus-cli ''WiFi.AccessPoint.3.WPS.PairingInProgress?'' 2>/dev/null | grep -o ''PairingInProgress=[0-9]*'' | cut -d= -f2)"'
  capture: pair_6g
- id: step_24g_getter
  action: exec
  target: DUT
  depends_on: step_6g_getter
  command:
    - 'echo "PairingInProgress24g=$(ubus-cli ''WiFi.AccessPoint.5.WPS.PairingInProgress?'' 2>/dev/null | grep -o ''PairingInProgress=[0-9]*'' | cut -d= -f2)"'
  capture: pair_24g
pass_criteria:
- field: pair_5g.PairingInProgress5g
  operator: equals
  value: '0'
  description: 5g PairingInProgress=0
- field: pair_6g.PairingInProgress6g
  operator: equals
  value: '0'
  description: 6g PairingInProgress=0
- field: pair_24g.PairingInProgress24g
  operator: equals
  value: '0'
  description: 2.4g PairingInProgress=0
verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.WPS.PairingInProgress?"'
  - 'ubus-cli "WiFi.AccessPoint.3.WPS.PairingInProgress?"'
  - 'ubus-cli "WiFi.AccessPoint.5.WPS.PairingInProgress?"'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'All 3 bands: PairingInProgress=0 (no active WPS pairing).'
