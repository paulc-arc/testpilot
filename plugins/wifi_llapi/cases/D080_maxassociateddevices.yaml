- id: step1_max_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.MaxAssociatedDevices?" 2>&1); VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MaxAssociatedDevices=\([0-9][0-9]*\).*/\1/p' | head -n 1); if [ -n "$VALUE" ]; then printf 'BaselineGetterMax5g=%s\n' "$VALUE"; else echo 'BaselineGetterMax5g=EMPTY'; fi; CFG=$(grep -n 'max_num_sta=' /tmp/wl0_hapd.conf 2>/dev/null || true); HAPD=$(printf '%s\n' "$CFG" | sed -n 's/^[0-9][0-9]*:max_num_sta=\([0-9][0-9]*\).*/\1/p' | head -n 1); if [ -n "$HAPD" ]; then printf 'BaselineHostapdMax5g=%s\n' "$HAPD"; else echo 'BaselineHostapdMax5g=ABSENT'; fi; COUNT=$(printf '%s\n' "$CFG" | grep -c 'max_num_sta='); printf 'BaselineHostapdCount5g=%s\n' "$COUNT"
  capture: max_baseline_5g
- id: step2_set_temp_5g
