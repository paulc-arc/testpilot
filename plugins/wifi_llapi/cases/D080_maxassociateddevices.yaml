id: wifi-llapi-D080-maxassociateddevices
name: "MaxAssociatedDevices — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 80
  object: WiFi.AccessPoint.{i}.
  api: MaxAssociatedDevices
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.1.MaxAssociatedDevices=32
llapi_support: Support
implemented_by: Vendor Module
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; MaxAssociatedDevices is calibrated as an AP-only setter/getter case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing MaxAssociatedDevices
  - authoritative full-run evidence showed AP1/AP3/AP5 all start from `MaxAssociatedDevices=32`
  - `/tmp/wl0_hapd.conf`, `/tmp/wl1_hapd.conf`, and `/tmp/wl2_hapd.conf` each expose two `max_num_sta=32` lines at baseline
  - active 0403 source keeps `MaxAssociatedDevices` writable and maps `pAP->MaxStations` back into hostapd `max_num_sta`, so the workbook pass path is getter + hostapd convergence `32 -> 31 -> 32` on all three bands
setup_steps: |
  1) DUT baseline:
      - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
      - capture the current getter and hostapd `max_num_sta` baseline on all three bands
  2) Per-band MaxAssociatedDevices probe:
      - set a temporary value `31` on the same AP
      - re-read the getter and hostapd `max_num_sta`
      - restore the same AP back to `32`
      - re-read the getter and hostapd `max_num_sta`
  3) Verdict model:
      - this is a workbook-pass config convergence case
      - the case passes only when both the northbound getter and hostapd `max_num_sta` converge `32 -> 31 -> 32` on AP1 / AP3 / AP5
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Capture baseline getter + hostapd `max_num_sta` on AP1 / AP3 / AP5.
  2) Set `MaxAssociatedDevices=31` on the same AP and re-read the getter / hostapd state.
  3) Restore `MaxAssociatedDevices=32` and re-read the getter / hostapd state again.
  4) Confirm the northbound setter/readback and hostapd `max_num_sta` both converge `32 -> 31 -> 32` on all three bands.
  Verdict: Pass. The current DUT pushes `MaxAssociatedDevices` all the way into hostapd `max_num_sta`, matching the workbook v4.0.3 pass intent.

