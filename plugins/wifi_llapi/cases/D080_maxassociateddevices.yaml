  command: >-
    TEMP='31'; OUT=$(ubus-cli WiFi.AccessPoint.1.MaxAssociatedDevices=$TEMP 2>&1); printf 'RequestedTempMax5g=%s\n' "$TEMP"; VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MaxAssociatedDevices=\([0-9][0-9]*\).*/\1/p' | head -n 1); if [ -n "$VALUE" ]; then printf 'SetterEchoMax5g=%s\n' "$VALUE"; else echo 'SetterEchoMax5g=EMPTY'; fi
