id: wifi-llapi-r005-sendremotemeasumentrequest
name: sendRemoteMeasumentRequest() — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 9
  object: "WiFi.AccessPoint.{i}."
  api: "sendRemoteMeasumentRequest()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.sendRemoteMeasumentRequest(mac:string, bssid:string, class:uint32, channel:uint32,
  timeout:uint32):bool
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.sendRemoteMeasumentRequest(mac:string, bssid:string, class:uint32, channel:uint32, timeout:uint32):bool
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.sendRemoteMeasumentRequest()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Configure all radios (2.4G/5G/6G) to use the same SSID and Security mode.
- id: step2
  action: exec
  target: DUT
  command: Configure AP1, AP3 and AP5 IEEE80211r.MobilityDomain to use the same value ubus-cli WiFi.AccessPoint.{i}.IEEE80211r.MobilityDomain=25
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Connect Wifi station to GW
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Verify that the Station support BTM/11v /802.11k = Radio Resource Management (RRM) WiFi.AccessPoint.3.AssociatedDevice.1.Capabilities="RRM,BTM,QOS_MAP,PMF"
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: 'Trigger the station to sendRemoteMeasumentRequest ubus-cli "WiFi.AccessPoint.3.sendRemoteMeasumentRequest(mac=6A:8C
    :E6:7A:18:91,bssid=TEST-11r,class=uint32,channel=36,timeout=5)" > WiFi.AccessPoint.3.sendRemoteMeasumentRequest(mac=6A:8C:E6:7A:18:91,bssid=TEST-11r,class=0,channel=36,timeout=5)
    WiFi.AccessPoint.3.sendRemoteMeasumentRequest() returned [ [ ] ] root@prplOS:~# ubus-cli "WiFi.AccessPoint.3.sendRemoteMeasurementRequest(macaddress=6A:8C:E6:7A:18:91,bssid=64:75:da:4e:51:75,class=0,channel=36,time
    out=5)" > WiFi.AccessPoint.3.sendRemoteMeasurementRequest(macaddress=6A:8C:E6:7A:18:91,bssid=64:75:da:4e:51:75,class=0,channel=36,timeout=5)
    ERROR: call (null) failed with status 3 - function not found WiFi.AccessPoint.3.sendRemoteMeasurementRequest() returned
    [ "", { args = { bssid = "64:75:da:4e:51:75", channel = 36, class = 0, macaddress = "6A:8C:E6:7A:18:91", timeout = 5 }
    } ] root@prplOS:~# ubus list WiFi.AccessPoint.*.? | grep sendRemoteMeasurementRequest Command failed: Not found'
  depends_on: step4
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: sendRemoteMeasumentRequest() 應回傳非空結果

verification_command: |
  ubus-cli "WiFi.AccessPoint.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.AccessPoint.*.sendRemoteMeasumentRequest?" 2>/dev/null || true
  wl -i wl0 bss 2>/dev/null || true; wl -i wl1 bss 2>/dev/null || true; wl -i wl2 bss 2>/dev/null || true
  wl -i wl0 assoclist; wl -i wl1 assoclist; wl -i wl2 assoclist

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : GW does not send sendRemoteMeasumentRequest by using the command.'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: need to check(Leon)
