id: wifi-llapi-r176-rxchainctrl
name: RxChainCtrl — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 176
  object: WiFi.Radio.{i}.
  api: RxChainCtrl
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.RxChainCtrl=-1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Get API default value: ubus-cli WiFi.Radio.1.RxChainCtrl? > WiFi.Radio.1.RxChainCtrl? WiFi.Radio.1.RxChainCtrl=-1
    WiFi.Radio.2.RxChainCtrl=-1 WiFi.Radio.3.RxChainCtrl=-1'
- id: step2
  action: exec
  target: DUT
  command: 'Modify the API to any other value: ubus-cli WiFi.Radio.*.RxChainCtrl=3'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check the API again and compare with driver return value: ubus-cli WiFi.Radio.*.RxChainCtrl? > WiFi.Radio.*.RxChainCtrl?
    WiFi.Radio.1.RxChainCtrl=3 WiFi.Radio.2.RxChainCtrl=3 WiFi.Radio.3.RxChainCtrl=3'
  depends_on: step2
  capture: result
pass_criteria:
- field: result.RxChainCtrl
  operator: contains
  value: '-1'
  description: RxChainCtrl 應回傳包含 RxChainCtrl=-1
verification_command: 'wl -i wl0 rxchain

