id: wifi-llapi-r176-rxchainctrl
name: RxChainCtrl — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 217
  object: "WiFi.Radio.{i}."
  api: "RxChainCtrl"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.RxChainCtrl=-1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.RxChainCtrl=-1
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.RxChainCtrl=-1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.RxChainCtrl?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Get API default value: ubus-cli WiFi.Radio.1.RxChainCtrl? > WiFi.Radio.1.RxChainCtrl? WiFi.Radio.1.RxChainCtrl=-1
    WiFi.Radio.2.RxChainCtrl=-1 WiFi.Radio.3.RxChainCtrl=-1'
- id: step2
  action: exec
  target: DUT
  command: 'Modify the API to any other value: ubus-cli WiFi.Radio.*.RxChainCtrl=3'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check the API again and compare with driver return value: ubus-cli WiFi.Radio.*.RxChainCtrl? > WiFi.Radio.*.RxChainCtrl?
    WiFi.Radio.1.RxChainCtrl=3 WiFi.Radio.2.RxChainCtrl=3 WiFi.Radio.3.RxChainCtrl=3'
  depends_on: step2
  capture: result
pass_criteria:
- field: result.RxChainCtrl
  operator: contains
  value: '-1'
  description: RxChainCtrl 應回傳包含 RxChainCtrl=-1
verification_command: 'wl -i wl0 rxchain

  wl -i wl1 rxchain

  wl -i wl2 rxchain


  (default)

  root@prplOS:/# wl -i wl0 rxchain

  15 (0xf)

  root@prplOS:/# wl -i wl1 rxchain

  1

  root@prplOS:/# wl -i wl2 rxchain

  1


  (RxChainCtrl = any others)

  root@prplOS:/# wl -i wl0 rxchain

  15 (0xf)

  root@prplOS:/# wl -i wl1 rxchain

  15 (0xf)

  root@prplOS:/# wl -i wl2 rxchain

  15 (0xf)'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API and embedded command value mismatch.'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: Need to check(Leon)
