id: wifi-llapi-D012-avgsignalstrengthbychain
name: "AvgSignalStrengthByChain — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: "1.2"
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 12
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "AvgSignalStrengthByChain"
  baseline: "BCM v4.0.3"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.{i}.AssociatedDevice.1.AvgSignalStrengthByChain?"'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
    - from: STA
      to: DUT
      band: 5g
    - from: STA
      to: DUT
      band: 6g
    - from: STA
      to: DUT
      band: 2.4g
test_environment: |
  Topology:
  - DUT: COM0 (BGW720-300, AP role)
  - STA: COM1 (BCM board, STA role)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping (live baseline 2026-04-02):
  - 5G:   DUT AP.1 / wl0 / SSID=testpilot5G    ↔ STA wl0 / WPA2-Personal
  - 6G:   DUT AP.3 / wl1 / SSID=testpilot6G    ↔ STA wl1 / WPA3-Personal + SAE
  - 2.4G: DUT AP.5 / wl2 / SSID=testpilot2G    ↔ STA wl2 / WPA2-Personal

setup_steps: |
  Sequential per-band (5G → 6G → 2.4G); no simultaneous multi-band connections.
  [5G]
  1) STA wl0 verify DUT AP.1 association on the deterministic WPA2-Personal baseline:
     iw dev wl0 link
     wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  2) DUT AP.1 verify the associated STA:
     wl -i wl0 assoclist
     ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.AvgSignalStrengthByChain?"
  [6G]
  1) STA wl1 verify DUT AP.3 association on the validated WPA3/SAE baseline:
     iw dev wl1 link
     wpa_cli -p /var/run/wpa_supplicant -i wl1 status
     wl -i wl1 status
  2) DUT AP.3 verify the associated STA:
     wl -i wl1 assoclist
     ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.AvgSignalStrengthByChain?"
  [2.4G]
  1) STA wl2 verify DUT AP.5 association on the deterministic WPA2-Personal baseline:
     iw dev wl2 link
     wpa_cli -p /var/run/wpa_supplicant -i wl2 status
  2) DUT AP.5 verify the associated STA:
     wl -i wl2 assoclist
     ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.AvgSignalStrengthByChain?"

test_procedure: |
  For each active band (5G, 6G, then 2.4G):
  1) STA verifies target AP association on the deterministic baseline prepared by verify_env
     (5G=testpilot5G WPA2-Personal, 6G=testpilot6G WPA3/SAE, 2.4G=testpilot2G WPA2-Personal).
  2) Record the live associated STA MAC from DUT driver evidence.
  3) Read WiFi.AccessPoint.{i}.AssociatedDevice.1.AvgSignalStrengthByChain on DUT.
  4) Manual audit cross-check may additionally inspect `wl sta_info` per-antenna RSSI output, but
     the runtime gate only requires a valid negative integer dBm getter value for the live STA.
  Pass:
  - DUT exposes one live STA MAC for the band under test.
  - AvgSignalStrengthByChain returns a parseable negative integer dBm value.

steps:
  - id: step1_5g_sta_join
    action: exec
    target: STA
    band: 5g
    command:
      - iw dev wl0 link
      - wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  - id: step2_5g_assoc
    action: exec
    target: DUT
    band: 5g
    command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
    depends_on: step1_5g_sta_join
    capture: assoc_5g
  - id: step3_5g_get
    action: exec
    target: DUT
    band: 5g
    command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.AvgSignalStrengthByChain?"'
    depends_on: step2_5g_assoc
    capture: result_5g
  - id: step4_6g_sta_join
    action: exec
    target: STA
    band: 6g
    command:
      - iw dev wl1 link
      - wpa_cli -p /var/run/wpa_supplicant -i wl1 status
      - wl -i wl1 status
  - id: step5_6g_assoc
    action: exec
    target: DUT
    band: 6g
    command: wl -i wl1 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac6g=\1/p'
    depends_on: step4_6g_sta_join
    capture: assoc_6g
  - id: step6_6g_get
    action: exec
    target: DUT
    band: 6g
    command: 'ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.AvgSignalStrengthByChain?"'
    depends_on: step5_6g_assoc
    capture: result_6g
  - id: step7_24g_sta_join
    action: exec
    target: STA
    band: 2.4g
    command:
      - iw dev wl2 link
      - wpa_cli -p /var/run/wpa_supplicant -i wl2 status
  - id: step8_24g_assoc
    action: exec
    target: DUT
    band: 2.4g
    command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
    depends_on: step7_24g_sta_join
    capture: assoc_24g
  - id: step9_24g_get
    action: exec
    target: DUT
    band: 2.4g
    command: 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.AvgSignalStrengthByChain?"'
    depends_on: step8_24g_assoc
    capture: result_24g

pass_criteria:
  - field: assoc_5g.AssocMac5g
    operator: regex
    value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
    description: "5G: AP1 must expose one live STA MAC from wl0 assoclist before AvgSignalStrengthByChain is read."
  - field: result_5g.AvgSignalStrengthByChain
    operator: regex
    value: "^-?[0-9]+$"
    description: "5G: AvgSignalStrengthByChain must be a parseable integer dBm value."
  - field: result_5g.AvgSignalStrengthByChain
    operator: <
    value: "0"
    description: "5G: AvgSignalStrengthByChain should remain a negative dBm value."
  - field: assoc_6g.AssocMac6g
    operator: regex
    value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
    description: "6G: AP3 must expose one live STA MAC from wl1 assoclist before AvgSignalStrengthByChain is read."
  - field: result_6g.AvgSignalStrengthByChain
    operator: regex
    value: "^-?[0-9]+$"
    description: "6G: AvgSignalStrengthByChain must be a parseable integer dBm value."
  - field: result_6g.AvgSignalStrengthByChain
    operator: <
    value: "0"
    description: "6G: AvgSignalStrengthByChain should remain a negative dBm value."
  - field: assoc_24g.AssocMac24g
    operator: regex
    value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
    description: "2.4G: AP5 must expose one live STA MAC from wl2 assoclist before AvgSignalStrengthByChain is read."
  - field: result_24g.AvgSignalStrengthByChain
    operator: regex
    value: "^-?[0-9]+$"
    description: "2.4G: AvgSignalStrengthByChain must be a parseable integer dBm value."
  - field: result_24g.AvgSignalStrengthByChain
    operator: <
    value: "0"
    description: "2.4G: AvgSignalStrengthByChain should remain a negative dBm value."

verification_command:
  - 'wl -i wl0 assoclist'
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.AvgSignalStrengthByChain?"'
  - 'STA_MAC=$(wl -i wl0 assoclist | awk ''NR==1{print $2}'')'
  - 'wl -i wl0 sta_info $STA_MAC | grep -E "average rssi|smoothed rssi"'
  - 'wl -i wl1 assoclist'
  - 'ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.AvgSignalStrengthByChain?"'
  - 'STA_MAC=$(wl -i wl1 assoclist | awk ''NR==1{print $2}'')'
  - 'wl -i wl1 sta_info $STA_MAC | grep -E "average rssi|smoothed rssi"'
  - 'wl -i wl2 assoclist'
  - 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.AvgSignalStrengthByChain?"'
  - 'STA_MAC=$(wl -i wl2 assoclist | awk ''NR==1{print $2}'')'
  - 'wl -i wl2 sta_info $STA_MAC | grep -E "average rssi|smoothed rssi"'

results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: >
      0401 workbook row 12 expects Pass/Pass/Pass. AvgSignalStrengthByChain is implemented by pWHM
      and sourced from AssociatedDevice signal-strength-by-chain data. Current live baseline should
      validate AP1/AP3/AP5 with negative integer dBm readback on all three bands.
