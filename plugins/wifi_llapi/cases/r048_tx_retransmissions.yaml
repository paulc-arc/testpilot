id: wifi-llapi-r048-tx-retransmissions
name: Tx_Retransmissions — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 48
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: Tx_Retransmissions
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.Tx_Retransmissions=5893
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi station to GW SSID4, SSID6 and SSID8
- id: step2
  action: exec
  target: DUT
  command: Run Ping between Station
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify Tx_Retransmissions ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.Tx_Retransmissions? > WiFi.AccessPoint.*.AssociatedDevice.*.Tx_Retransmissions?
    WiFi.AccessPoint.1.AssociatedDevice.1.Tx_Retransmissions=0 WiFi.AccessPoint.1.AssociatedDevice.2.Tx_Retransmissions=0
    WiFi.AccessPoint.3.AssociatedDevice.1.Tx_Retransmissions=0 WiFi.AccessPoint.5.AssociatedDevice.1.Tx_Retransmissions=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result.Tx_Retransmissions
  operator: contains
  value: '5893'
  description: Tx_Retransmissions 應回傳包含 Tx_Retransmissions=5893
