topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.IEEE80211ax.NonSRGOBSSPDMaxOffset?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: query
  action: exec
  target: DUT
  command: ubus-cli WiFi.Radio.{i}.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
  capture: result
pass_criteria:
- field: result.NonSRGOBSSPDMaxOffset
  operator: contains
  value: '0'
  description: NonSRGOBSSPDMaxOffset 應回傳包含 NonSRGOBSSPDMaxOffset=0
verification_command: wl -i wl0 he nsrg_pdmax
