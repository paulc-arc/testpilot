  object: "WiFi.Radio.{i}.IEEE80211ax."
  api: "NonSRGOBSSPDMaxOffset"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
llapi_support: Support
