id: wifi-llapi-r162-ieee80211rsupported
name: IEEE80211rSupported — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 201
  object: "WiFi.Radio.{i}."
  api: "IEEE80211rSupported"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.IEEE80211rSupported=1
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.IEEE80211rSupported=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.IEEE80211rSupported?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Read-only API, defines whether each radio supported 802.11r standard. Check the API value and compare them
    with driver capability and packets'' tag from radio beacons: ubus-cli WiFi.Radio.*.IEEE80211rSupported? > WiFi.Radio.*.IEEE80211rSupported?
    WiFi.Radio.1.IEEE80211rSupported=1 WiFi.Radio.2.IEEE80211rSupported=1 WiFi.Radio.3.IEEE80211rSupported=1 Radio2 (6GHz)
    support=1, but representing IE not seen in beacon.'
  capture: result
pass_criteria:
- field: result.IEEE80211rSupported
  operator: contains
  value: '1'
  description: IEEE80211rSupported 應回傳包含 IEEE80211rSupported=1
verification_command: '(Fast Transition / Mabolity Domain included in beacon packet, IE: 54)'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: "this parameter is a prpl-specific extension (custom parameter)  and enable by default(hardcoding in pwhm). \n\
      If you want beacon including MDE IE, you need to set parameters in WiFi.AccessPoint.{i}.IEEE80211r. object"
