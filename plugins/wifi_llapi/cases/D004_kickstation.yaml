id: wifi-llapi-D004-kickstation
name: kickStation() — WiFi.AccessPoint.{i}.
version: '1.1'
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 4
  object: "WiFi.AccessPoint.{i}."
  api: "kickStation()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.{i}.kickStation(MACAddress=<STA_MAC>)"'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: STA
    to: DUT
    band: 6g
  - from: STA
    to: DUT
    band: 2.4g
test_environment: |
  Topology:
  - DUT: COM0 (BGW720-300, AP role)
  - STA: COM1 (BCM board, STA role)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping (live verified 2026-04-02):
  - 5G:   DUT AP.1 / wl0 / SSID=testpilot5G    ↔ STA wl0 / WPA2-Personal
  - 6G:   DUT AP.3 / wl1 / SSID=testpilot6G    ↔ STA wl1 / WPA3-Personal + SAE
  - 2.4G: DUT AP.5 / wl2 / SSID=testpilot2G    ↔ STA wl2 / WPA2-Personal

setup_steps: |
  Sequential per-band (5G → 6G → 2.4G); no simultaneous multi-band connections.
  [5G]
  1) STA wl0 verify DUT AP.1 association on the deterministic WPA2-Personal baseline:
     iw dev wl0 link
     wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  2) DUT AP.1 verify STA associated:
     ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.*.MACAddress?"
     ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DisassociationTime?"
  [6G]
  1) STA wl1 verify DUT AP.3 association on the validated WPA3/SAE baseline:
     iw dev wl1 link
     wpa_cli -p /var/run/wpa_supplicant -i wl1 status
     wl -i wl1 status
  2) DUT AP.3 verify STA associated:
     ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.*.MACAddress?"
     ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.DisassociationTime?"
  [2.4G]
  1) STA wl2 verify DUT AP.5 association on the deterministic WPA2-Personal baseline:
     iw dev wl2 link
     wpa_cli -p /var/run/wpa_supplicant -i wl2 status
  2) DUT AP.5 verify STA associated:
     ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.*.MACAddress?"
     ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DisassociationTime?"

test_procedure: |
  For each active band (5G, 6G, then 2.4G):
  1) STA verifies target AP association on the deterministic baseline prepared by verify_env
     (5G=testpilot5G WPA2-Personal, 6G=testpilot6G WPA3/SAE, 2.4G=testpilot2G WPA2-Personal).
  2) Record DisassociationTime before kick.
  3) DUT execute: ubus-cli "WiFi.AccessPoint.{i}.kickStation(MACAddress=<STA_MAC>)"
     - {i}=1 for 5G, {i}=3 for 6G, {i}=5 for 2.4G
  4) Verify DisassociationTime has changed (new timestamp written by wld).
  5) Check DUT log for hostapd/wld disassociation events.
  Pass: DisassociationTime changes AND hostapd logs 'IEEE 802.11: disassociated' for the STA MAC.
  Notes:
  - Fast reconnect on 2.4G after deauthentication is expected and does NOT invalidate the kick.
  - WLC_SCB_DEAUTHENTICATE_FOR_REASON err -30 is driver-internal; the LLAPI call still
    succeeds and returns MACAddress in the response.

steps:
- id: step1_5g_sta_join
  action: exec
  target: STA
  band: 5g
  command:
    - iw dev wl0 link
    - wpa_cli -p /var/run/wpa_supplicant -i wl0 status
- id: step2_5g_record_time
  action: exec
  target: DUT
  band: 5g
  command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
  depends_on: step1_5g_sta_join
  capture: assoc_5g
- id: step3_5g_record_time
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step2_5g_record_time
  capture: before_5g
- id: step4_5g_kick
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.kickStation(MACAddress={{assoc_5g.AssocMac5g}})"'
  depends_on: step3_5g_record_time
- id: step5_5g_verify
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step4_5g_kick
  capture: after_5g
- id: step6_6g_sta_join
  action: exec
  target: STA
  band: 6g
  command:
    - iw dev wl1 link
    - wpa_cli -p /var/run/wpa_supplicant -i wl1 status
    - wl -i wl1 status
- id: step7_6g_assoc
  action: exec
  target: DUT
  band: 6g
  command: wl -i wl1 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac6g=\1/p'
  depends_on: step6_6g_sta_join
  capture: assoc_6g
- id: step8_6g_record_time
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step7_6g_assoc
  capture: before_6g
- id: step9_6g_kick
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.AccessPoint.3.kickStation(MACAddress={{assoc_6g.AssocMac6g}})"'
  depends_on: step8_6g_record_time
- id: step10_6g_verify
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step9_6g_kick
  capture: after_6g
- id: step11_24g_sta_join
  action: exec
  target: STA
  band: 2.4g
  command:
    - iw dev wl2 link
    - wpa_cli -p /var/run/wpa_supplicant -i wl2 status
- id: step12_24g_assoc
  action: exec
  target: DUT
  band: 2.4g
  command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
  depends_on: step11_24g_sta_join
  capture: assoc_24g
- id: step13_24g_record_time
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step12_24g_assoc
  capture: before_24g
- id: step14_24g_kick
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.kickStation(MACAddress={{assoc_24g.AssocMac24g}})"'
  depends_on: step13_24g_record_time
- id: step15_24g_verify
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DisassociationTime?"'
  depends_on: step14_24g_kick
  capture: after_24g

pass_criteria:
- field: assoc_5g.AssocMac5g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: "5G: kickStation() 前必須先確認 wl0 STA 已關聯"
- field: after_5g.DisassociationTime
  operator: not_equals
  reference: before_5g.DisassociationTime
  description: "5G: DisassociationTime must change after kickStation — STA was deauthenticated"
- field: assoc_6g.AssocMac6g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: "6G: kickStation() 前必須先確認 wl1 STA 已關聯"
- field: after_6g.DisassociationTime
  operator: not_equals
  reference: before_6g.DisassociationTime
  description: "6G: DisassociationTime must change after kickStation — STA was deauthenticated"
- field: assoc_24g.AssocMac24g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: "2.4G: kickStation() 前必須先確認 wl2 STA 已關聯"
- field: after_24g.DisassociationTime
  operator: not_equals
  reference: before_24g.DisassociationTime
  description: "2.4G: DisassociationTime must change after kickStation — STA was deauthenticated"

verification_command:
  - '# DUT log after kick (check for hostapd/wld disassociation events):'
  - 'logread | grep -E "wl0|wl1|wl2|kickStation|disassociated|Disassoc" | tail -30'
  - '# DUT object readback:'
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DisassociationTime?"'
  - 'ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.DisassociationTime?"'
  - 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DisassociationTime?"'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: >
      5G/6G/2.4G should all be validated live against the workbook Pass/Pass/Pass baseline.
      5G/2.4G verify deterministic WPA2-Personal baseline associations
      (testpilot5G/testpilot2G), while 6G uses the validated WPA3/SAE single-band baseline.
