id: wifi-llapi-r197-getradiostats-errorsreceive
name: getRadioStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 271
  object: "WiFi.Radio.{i}."
  api: "getRadioStats()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.{i}.getRadioStats()ErrorsReceive : 3,'
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.getRadioStats()ErrorsReceive : 3,
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.getRadioStats()ErrorsReceive : 3,
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.getRadioStats()"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Get and record ErrorsReceive: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep ErrorsReceive ErrorsReceived =
    0, ErrorsReceived = 0, ErrorsReceived = 0,'
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioStats() 執行不應回傳 error
verification_command: 'cat /proc/net/dev | grep wl*

  awk ''

  $1 ~ /^wl[0-2]:$/ {

  printf "%s TX_drop-pkg=%s\n", $1, $4

  }

  '' /proc/net/dev'
results_reference:
  v4.0.1:
    5g: Skip
    6g: Skip
    2.4g: Skip
    comment: 'These counters increment only when Wi-Fi frames experience transmission error.

      In our test environment, no Wi-Fi station capable of generating manipulated 802.11e error frame, and Scapy could not
      be used to generate such frames due to WiFi station limitations.'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Committed
