id: wifi-llapi-r197-getradiostats-errorsreceive
name: getRadioStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 197
  object: WiFi.Radio.{i}.
  api: getRadioStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.{i}.getRadioStats()ErrorsReceive : 3,'
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Get and record ErrorsReceive: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep ErrorsReceive ErrorsReceived =
    0, ErrorsReceived = 0, ErrorsReceived = 0,'
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioStats() 執行不應回傳 error
verification_command: 'cat /proc/net/dev | grep wl*

  awk ''

  $1 ~ /^wl[0-2]:$/ {

  printf "%s TX_drop-pkg=%s\n", $1, $4

  }

  '' /proc/net/dev'
results_reference:
  v4.0.1:
    5g: Skip
    6g: Skip
    2.4g: Skip
    comment: 'These counters increment only when Wi-Fi frames experience transmission error.

      In our test environment, no Wi-Fi station capable of generating manipulated 802.11e error frame, and Scapy could not
      be used to generate such frames due to WiFi station limitations.'
  v4.0.3:
