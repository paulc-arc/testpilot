- id: step3
  action: exec
  target: DUT
  command: Get stats
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getSSIDStats() 執行不應回傳 error
verification_command: cat /proc/net/dev | grep wl0
