id: wifi-llapi-r101-getstationstats-authenticationstate
name: getStationStats() — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 101
  object: WiFi.AccessPoint.{i}.
  api: getStationStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.{i}.getStationStats() AuthenticationState : 0,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW.
- id: step2
  action: exec
  target: DUT
  command: Verify connected Station AuthenticationState ubus-cli "WiFi.AccessPoint.*.getStationStats()" | grep -E 'Auth enticationState|MACAddress'
    AuthenticationState = 1, MACAddress = "E6:60:17:EB:A9:86", AuthenticationState = 1, MACAddress = "38:06:E6:92:B0:4A",
    AuthenticationState = 1, MACAddress = "34:19:4D:A4:B4:33",
  depends_on: step1
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getStationStats() 執行不應回傳 error
verification_command: 'root@prplOS:/# wl -i wl0 sta_info e6:60:17:eb:a9:86 | grep state

  state: AUTHENTICATED ASSOCIATED AUTHORIZED


  root@prplOS:/# wl -i wl1 sta_info 38:06:e6:92:b0:4a | grep state

  state: AUTHENTICATED ASSOCIATED AUTHORIZED


  root@prplOS:/# wl -i wl2 sta_info 34:19:4d:a4:b4:33 |grep state

  state: AUTHENTICATED ASSOCIATED AUTHORIZED'
results_reference:
