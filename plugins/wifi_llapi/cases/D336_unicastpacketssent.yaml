id: wifi-llapi-d336-unicastpacketssent
name: "UnicastPacketsSent — WiFi.SSID.{i}.Stats."
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 336
  object: WiFi.SSID.{i}.Stats.
  api: UnicastPacketsSent
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.SSID.{i}.Stats.UnicastPacketsSent?"'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
        - iface: 5g
          mode: sta
          ssid: TestPilot_BTM
          key: testpilot6g
        - iface: 6g
          mode: sta
          ssid: TestPilot_BTM
          key: testpilot6g
        - iface: 2.4g
          mode: sta
          ssid: TestPilot_24G
          key: ''
  links:
    - from: STA
      to: DUT
      band: 5g
    - from: STA
      to: DUT
      band: 6g
    - from: STA
      to: DUT
      band: 2.4g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (single active STA link only; validate 5G -> 6G -> 2.4G sequentially)
  Mapping:
  - 5G = wl0 / SSID.4 / STA MAC 2c:59:17:00:04:85
  - 6G = wl1 / SSID.6 / STA MAC 2c:59:17:00:04:86
  - 2.4G = wl2 / SSID.8 / STA MAC 2c:59:17:00:04:97
  Rules:
  - move COM1 br-lan off 192.168.1.0/24 before any ping attempt
  - attempt STA-generated traffic before the final readback for each band
  - on 2.4G, keep the traffic attempt even if ping still drops; judge by direct/getSSIDStats/driver consistency
setup_steps: |
  DUT baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.SSID.4.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.1.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.Radio.2.Enable=1
    ubus-cli WiFi.SSID.6.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.3.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.Radio.3.Enable=1
    ubus-cli WiFi.SSID.8.SSID=TestPilot_24G
    ubus-cli WiFi.AccessPoint.5.Security.ModeEnabled=None
    ubus-cli WiFi.AccessPoint.5.Security.MFPConfig=Disabled
    ubus-cli WiFi.AccessPoint.5.Enable=1
  STA reset before each band:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    wpa_cli terminate 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    ip addr flush dev wl0 2>/dev/null || true
    ip addr flush dev wl1 2>/dev/null || true
    ip addr flush dev wl2 2>/dev/null || true
sta_env_setup: |
  5G example:
    iw dev wl0 set type managed
    ifconfig wl0 up
    wpa_supplicant -B -D nl80211 -i wl0 -c /tmp/wpa_wl0.conf -C /var/run/wpa_supplicant
    wpa_cli -p /var/run/wpa_supplicant -i wl0 reconnect
  6G example:
    iw dev wl1 disconnect 2>/dev/null || true
    ifconfig wl1 down
    wl -i wl1 down
    wl -i wl1 ap 0
    iw dev wl1 set type managed
    wl -i wl1 up
    ifconfig wl1 up
    wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf -C /var/run/wpa_supplicant
    wpa_cli -p /var/run/wpa_supplicant -i wl1 enable_network 0
    wpa_cli -p /var/run/wpa_supplicant -i wl1 select_network 0
    wpa_cli -p /var/run/wpa_supplicant -i wl1 reconnect
  2.4G example:
    iw dev wl2 set type managed
    ifconfig wl2 up
    iw dev wl2 connect TestPilot_24G
  Traffic attempt:
    ifconfig wlX 192.168.1.X netmask 255.255.255.0 up
    ip route replace 192.168.1.0/24 dev wlX src 192.168.1.X
    ip neigh flush dev wlX
    ping -I wlX -c 5 -W 1 192.168.1.1
    sleep 2
    ping -I wlX -c 5 -W 1 192.168.1.1
test_procedure: |
  1) Validate this counter sequentially on 5G, then 6G, then 2.4G; keep only one associated STA link active.
  2) After verify_env, allow a short settle, then capture one per-band DUT-side snapshot that emits assoclist, direct Stats, getSSIDStats(), and the matching source-backed driver formula from the same replay window.
  3) Attempt STA-generated ping traffic with a static IP on the active STA interface, wait 2 seconds, then reread the same counter.
  4) Use the final reread for the manual judgment.
  5) Pass when the per-band snapshot proves direct Stats.UnicastPacketsSent equals getSSIDStats().UnicastPacketsSent on 5G/6G/2.4G and also equals the active 0403 source-backed unsigned formula `((txframe + matching wds txframe) - (d11_txmulti + matching wds d11_txmulti)) & 0xffffffff`.
steps:
- id: stabilize_after_env
  action: exec
  target: DUT
  command: sleep 2
  capture: stabilize_after_env
- id: snapshot_5g
  action: exec
  target: DUT
  depends_on: stabilize_after_env
  command: 'ap=wl0; a=$(wl -i "$ap" assoclist | tr ''A-F'' ''a-f'' | sed -n ''s/^assoclist \([^ ]*\).*$/\1/p''); wf=0; wm=0; set -- $(wl -i "$ap" if_counters | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); f=$1; m=$2; for i in $(ls /sys/class/net | grep -E ''^wds0\.0\.[0-9]+$'' || true); do set -- $(wl -i "$i" if_counters 2>/dev/null | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); wf=$((wf+${1:-0})); wm=$((wm+${2:-0})); done; s=$(ubus-cli "WiFi.SSID.4.getSSIDStats()"); d=$(ubus-cli "WiFi.SSID.4.Stats.UnicastPacketsSent?" | sed -n ''s/.*=\([0-9][0-9]*\).*/\1/p''); g=$(printf ''%s\n'' "$s" | sed -n ''s/^[[:space:]]*UnicastPacketsSent = \([0-9][0-9]*\).*/\1/p''); r=$(( ((${f:-0}+wf)-(${m:-0}+wm)) & 0xffffffff )); printf ''AssocMac5g=%s\n'' "${a:-}"; printf ''DirectUnicastPacketsSent5g=%s\n'' "${d:-}"; printf ''GetSSIDStatsUnicastPacketsSent5g=%s\n'' "${g:-}"; printf ''DriverUnicastPacketsSent5g=%s\n'' "$r"'
  capture: snapshot_5g
- id: snapshot_6g
  action: exec
  target: DUT
  depends_on: snapshot_5g
  command: 'ap=wl1; a=$(wl -i "$ap" assoclist | tr ''A-F'' ''a-f'' | sed -n ''s/^assoclist \([^ ]*\).*$/\1/p''); wf=0; wm=0; set -- $(wl -i "$ap" if_counters | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); f=$1; m=$2; for i in $(ls /sys/class/net | grep -E ''^wds1\.0\.[0-9]+$'' || true); do set -- $(wl -i "$i" if_counters 2>/dev/null | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); wf=$((wf+${1:-0})); wm=$((wm+${2:-0})); done; s=$(ubus-cli "WiFi.SSID.6.getSSIDStats()"); d=$(ubus-cli "WiFi.SSID.6.Stats.UnicastPacketsSent?" | sed -n ''s/.*=\([0-9][0-9]*\).*/\1/p''); g=$(printf ''%s\n'' "$s" | sed -n ''s/^[[:space:]]*UnicastPacketsSent = \([0-9][0-9]*\).*/\1/p''); r=$(( ((${f:-0}+wf)-(${m:-0}+wm)) & 0xffffffff )); printf ''AssocMac6g=%s\n'' "${a:-}"; printf ''DirectUnicastPacketsSent6g=%s\n'' "${d:-}"; printf ''GetSSIDStatsUnicastPacketsSent6g=%s\n'' "${g:-}"; printf ''DriverUnicastPacketsSent6g=%s\n'' "$r"'
  capture: snapshot_6g
- id: snapshot_24g
  action: exec
  target: DUT
  depends_on: snapshot_6g
  command: 'ap=wl2; a=$(wl -i "$ap" assoclist | tr ''A-F'' ''a-f'' | sed -n ''s/^assoclist \([^ ]*\).*$/\1/p''); wf=0; wm=0; set -- $(wl -i "$ap" if_counters | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); f=$1; m=$2; for i in $(ls /sys/class/net | grep -E ''^wds2\.0\.[0-9]+$'' || true); do set -- $(wl -i "$i" if_counters 2>/dev/null | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); wf=$((wf+${1:-0})); wm=$((wm+${2:-0})); done; s=$(ubus-cli "WiFi.SSID.8.getSSIDStats()"); d=$(ubus-cli "WiFi.SSID.8.Stats.UnicastPacketsSent?" | sed -n ''s/.*=\([0-9][0-9]*\).*/\1/p''); g=$(printf ''%s\n'' "$s" | sed -n ''s/^[[:space:]]*UnicastPacketsSent = \([0-9][0-9]*\).*/\1/p''); r=$(( ((${f:-0}+wf)-(${m:-0}+wm)) & 0xffffffff )); printf ''AssocMac24g=%s\n'' "${a:-}"; printf ''DirectUnicastPacketsSent24g=%s\n'' "${d:-}"; printf ''GetSSIDStatsUnicastPacketsSent24g=%s\n'' "${g:-}"; printf ''DriverUnicastPacketsSent24g=%s\n'' "$r"'
  capture: snapshot_24g
pass_criteria:
- field: snapshot_5g.AssocMac5g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 5g DUT assoclist must resolve the expected STA MAC 2c:59:17:00:04:85.
- field: snapshot_5g.DirectUnicastPacketsSent5g
  operator: equals
  reference: snapshot_5g.GetSSIDStatsUnicastPacketsSent5g
  description: 5g direct Stats.UnicastPacketsSent must match getSSIDStats().UnicastPacketsSent.
- field: snapshot_5g.DirectUnicastPacketsSent5g
  operator: equals
  reference: snapshot_5g.DriverUnicastPacketsSent5g
  description: 5g direct Stats.UnicastPacketsSent must match the 0403 unsigned txframe/d11_txmulti formula on wl0.
- field: snapshot_6g.AssocMac6g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 6g DUT assoclist must resolve the expected STA MAC 2c:59:17:00:04:86.
- field: snapshot_6g.DirectUnicastPacketsSent6g
  operator: equals
  reference: snapshot_6g.GetSSIDStatsUnicastPacketsSent6g
  description: 6g direct Stats.UnicastPacketsSent must match getSSIDStats().UnicastPacketsSent.
- field: snapshot_6g.DirectUnicastPacketsSent6g
  operator: equals
  reference: snapshot_6g.DriverUnicastPacketsSent6g
  description: 6g direct Stats.UnicastPacketsSent must match the 0403 unsigned txframe/d11_txmulti formula on wl1.
- field: snapshot_24g.AssocMac24g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 2.4g DUT assoclist must resolve the expected STA MAC 2c:59:17:00:04:97.
- field: snapshot_24g.DirectUnicastPacketsSent24g
  operator: equals
  reference: snapshot_24g.GetSSIDStatsUnicastPacketsSent24g
  description: 2.4g direct Stats.UnicastPacketsSent must match getSSIDStats().UnicastPacketsSent.
- field: snapshot_24g.DirectUnicastPacketsSent24g
  operator: equals
  reference: snapshot_24g.DriverUnicastPacketsSent24g
  description: 2.4g direct Stats.UnicastPacketsSent must match the 0403 unsigned txframe/d11_txmulti formula on wl2.
verification_command:
  - sleep 2
  - '# 5g'
  - 'ap=wl0; a=$(wl -i "$ap" assoclist | tr ''A-F'' ''a-f'' | sed -n ''s/^assoclist \([^ ]*\).*$/\1/p''); wf=0; wm=0; set -- $(wl -i "$ap" if_counters | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); f=$1; m=$2; for i in $(ls /sys/class/net | grep -E ''^wds0\.0\.[0-9]+$'' || true); do set -- $(wl -i "$i" if_counters 2>/dev/null | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); wf=$((wf+${1:-0})); wm=$((wm+${2:-0})); done; s=$(ubus-cli "WiFi.SSID.4.getSSIDStats()"); d=$(ubus-cli "WiFi.SSID.4.Stats.UnicastPacketsSent?" | sed -n ''s/.*=\([0-9][0-9]*\).*/\1/p''); g=$(printf ''%s\n'' "$s" | sed -n ''s/^[[:space:]]*UnicastPacketsSent = \([0-9][0-9]*\).*/\1/p''); r=$(( ((${f:-0}+wf)-(${m:-0}+wm)) & 0xffffffff )); printf ''AssocMac5g=%s\n'' "${a:-}"; printf ''DirectUnicastPacketsSent5g=%s\n'' "${d:-}"; printf ''GetSSIDStatsUnicastPacketsSent5g=%s\n'' "${g:-}"; printf ''DriverUnicastPacketsSent5g=%s\n'' "$r"'
  - '# 6g'
  - 'ap=wl1; a=$(wl -i "$ap" assoclist | tr ''A-F'' ''a-f'' | sed -n ''s/^assoclist \([^ ]*\).*$/\1/p''); wf=0; wm=0; set -- $(wl -i "$ap" if_counters | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); f=$1; m=$2; for i in $(ls /sys/class/net | grep -E ''^wds1\.0\.[0-9]+$'' || true); do set -- $(wl -i "$i" if_counters 2>/dev/null | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); wf=$((wf+${1:-0})); wm=$((wm+${2:-0})); done; s=$(ubus-cli "WiFi.SSID.6.getSSIDStats()"); d=$(ubus-cli "WiFi.SSID.6.Stats.UnicastPacketsSent?" | sed -n ''s/.*=\([0-9][0-9]*\).*/\1/p''); g=$(printf ''%s\n'' "$s" | sed -n ''s/^[[:space:]]*UnicastPacketsSent = \([0-9][0-9]*\).*/\1/p''); r=$(( ((${f:-0}+wf)-(${m:-0}+wm)) & 0xffffffff )); printf ''AssocMac6g=%s\n'' "${a:-}"; printf ''DirectUnicastPacketsSent6g=%s\n'' "${d:-}"; printf ''GetSSIDStatsUnicastPacketsSent6g=%s\n'' "${g:-}"; printf ''DriverUnicastPacketsSent6g=%s\n'' "$r"'
  - '# 2.4g'
  - 'ap=wl2; a=$(wl -i "$ap" assoclist | tr ''A-F'' ''a-f'' | sed -n ''s/^assoclist \([^ ]*\).*$/\1/p''); wf=0; wm=0; set -- $(wl -i "$ap" if_counters | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); f=$1; m=$2; for i in $(ls /sys/class/net | grep -E ''^wds2\.0\.[0-9]+$'' || true); do set -- $(wl -i "$i" if_counters 2>/dev/null | awk ''/^txframe /{print $2} /^d11_txfrag /{print $4}''); wf=$((wf+${1:-0})); wm=$((wm+${2:-0})); done; s=$(ubus-cli "WiFi.SSID.8.getSSIDStats()"); d=$(ubus-cli "WiFi.SSID.8.Stats.UnicastPacketsSent?" | sed -n ''s/.*=\([0-9][0-9]*\).*/\1/p''); g=$(printf ''%s\n'' "$s" | sed -n ''s/^[[:space:]]*UnicastPacketsSent = \([0-9][0-9]*\).*/\1/p''); r=$(( ((${f:-0}+wf)-(${m:-0}+wm)) & 0xffffffff )); printf ''AssocMac24g=%s\n'' "${a:-}"; printf ''DirectUnicastPacketsSent24g=%s\n'' "${d:-}"; printf ''GetSSIDStatsUnicastPacketsSent24g=%s\n'' "${g:-}"; printf ''DriverUnicastPacketsSent24g=%s\n'' "$r"'
