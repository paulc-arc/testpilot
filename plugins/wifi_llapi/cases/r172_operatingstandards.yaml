id: wifi-llapi-r172-operatingstandards
name: OperatingStandards — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 213
  object: "WiFi.Radio.{i}."
  api: "OperatingStandards"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.OperatingStandards=ax
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.OperatingStandards=ax
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.OperatingStandards?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Try change all radio to BE standard: ubus-cli WiFi.Radio.1.OperatingStandards=be ubus-cli WiFi.Radio.2.OperatingStandards=be
    ubus-cli WiFi.Radio.3.OperatingStandards=be'
- id: step2
  action: exec
  target: DUT
  command: 'Check standard: ubus-cli WiFi.Radio.*.OperatingStandards? > WiFi.Radio.*.OperatingStandards? WiFi.Radio.1.OperatingStandards="be"
    WiFi.Radio.2.OperatingStandards="be" WiFi.Radio.3.OperatingStandards="be"'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Capture air beacon, the EHT IE should contained(Ext Tag: EHT Capabilities (802.11be D3.0) & Ext Tag: EHT Operation
    (802.11be D3.0)).'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: 'Change all radio to AX standard: ubus-cli WiFi.Radio.*.OperatingStandards=ax'
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: 'Check standard: ubus-cli WiFi.Radio.*.OperatingStandards? > WiFi.Radio.*.OperatingStandards? WiFi.Radio.1.OperatingStandards="ax"
    WiFi.Radio.2.OperatingStandards="ax" WiFi.Radio.3.OperatingStandards="ax"'
  depends_on: step4
- id: step6
  action: exec
  target: DUT
  command: 'Capture air beacon, the EHT IE should not contained(Ext Tag: EHT Capabilities (802.11be D3.0) & Ext Tag: EHT Operation
    (802.11be D3.0)) and should contained HE IE.'
  depends_on: step5
- id: step7
  action: exec
  target: DUT
  command: Switch according to the 802.11 standard supported by each radio and verify each one individually- WiFi.Radio.1.SupportedStandards="a,n,an,ac,ax,be"
    WiFi.Radio.2.SupportedStandards="ax,be" WiFi.Radio.3.SupportedStandards="b,g,n,bg,gn,bgn,ax,be"
  depends_on: step6
  capture: result
pass_criteria:
- field: result.OperatingStandards
  operator: contains
  value: ax
  description: OperatingStandards 應回傳包含 OperatingStandards=ax
