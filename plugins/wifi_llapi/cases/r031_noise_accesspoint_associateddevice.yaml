id: wifi-llapi-r031-noise-accesspoint-associateddevice
name: Noise — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 36
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "Noise"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.Noise=-90
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.Noise=-90
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.Noise?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: \\Connect WiFi Station to GW
- id: step2
  action: exec
  target: DUT
  command: 'Get Noise by wl command wl -i wl0 sta_info 34:19:4d:a4:b5:09 | grep noise per antenna noise floor: -85 -87 -86
    -86 wl -i wl1 sta_info 38:06:E6:92:B0:4A | grep noise per antenna noise floor: -87 -87 -87 -88 wl -i wl2 sta_info 34:19:4d:a4:b4:33
    | grep noise per antenna noise floor: -80 -78 -78 -75'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: get Noise via ubus-command ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.Noise? > WiFi.AccessPoint.*.AssociatedDevice.*.Noise?
    WiFi.AccessPoint.1.AssociatedDevice.1.Noise=0 WiFi.AccessPoint.3.AssociatedDevice.1.Noise=0 WiFi.AccessPoint.5.AssociatedDevice.1.Noise=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result.Noise
  operator: contains
  value: '-90'
  description: Noise 應回傳包含 Noise=-90
verification_command: 'wl -i wl0 sta_info ${STA_MAC}


  root@prplOS:/# wl -i wl0 sta_info 34:19:4d:a4:b5:09 | grep noise

  per antenna noise floor: -85 -87 -86 -86

  root@prplOS:/# wl -i wl1 sta_info 38:06:E6:92:B0:4A | grep noise

  per antenna noise floor: -87 -87 -87 -88

  root@prplOS:/# wl -i wl2 sta_info 34:19:4d:a4:b4:33 | grep noise

  per antenna noise floor: -80 -78 -78 -75'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API always return "0"'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: Commit
