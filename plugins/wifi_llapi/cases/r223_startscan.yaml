id: wifi-llapi-r223-startscan
name: startScan() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 223
  object: WiFi.Radio.{i}.
  api: startScan()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.startScan(SSID:string, channels:string):void
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Start startScan() function once, record the result: ubus-cli "WiFi.Radio.1.startScan()" ubus-cli "WiFi.Radio.1.startScan()"
    > WiFi.Radio.1.startScan() WiFi.Radio.1.startScan() returned [ "" ] ubus-cli "WiFi.Radio.2.startScan()" > WiFi.Radio.2.startScan()
    WiFi.Radio.2.startScan() returned [ "" ] ubus-cli "WiFi.Radio.3.startScan()" > WiFi.Radio.3.startScan() WiFi.Radio.3.startScan()
    returned [ "" ]'
- id: step2
  action: exec
  target: DUT
  command: 'Check with getScanResult(): ubus-cli "WiFi.Radio.*.getScanResults()" ....'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Try the function with parameters: - ubus: - [ubus-cli] (0) > WiFi.Radio.3.startScan("AAA_HOTSPOT", "") ERROR:
    Syntax error - ubus: - [ubus-cli] (4) > WiFi.Radio.3.startScan(AAA_HOTSPOT, "") ERROR: Syntax error - ubus: - [ubus-cli]
    (4) > WiFi.Radio.3.startScan(AAA_HOTSPOT, ) ERROR: Syntax error - ubus: - [ubus-cli] (4) > WiFi.Radio.3.startScan("AAA_HOTSPOT",
    ) ERROR: Syntax error'
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: startScan() 應回傳非空結果
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : any parameters in ".scan(SSID:string, channels:string, min_rssi:int)" will always return syntex error.'
  v4.0.3:
