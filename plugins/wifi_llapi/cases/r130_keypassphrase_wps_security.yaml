id: wifi-llapi-r130-keypassphrase-wps-security
name: KeyPassPhrase — WiFi.EndPoint.{i}.Profile.WPS.Security.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 144
  object: "WiFi.EndPoint.{i}.Profile.WPS.Security."
  api: "KeyPassPhrase"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.EndPoint.{i}.Profile.WPS.Security.KeyPassPhrase=0689388783
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.EndPoint.{i}.Profile.WPS.Security.KeyPassPhrase=0689388783
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.EndPoint.{i}.Profile.WPS.Security.KeyPassPhrase=0689388783
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.EndPoint.*.Profile.WPS.Security.KeyPassPhrase?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: query
  action: exec
  target: DUT
  command: ubus-cli WiFi.EndPoint.{i}.Profile.WPS.Security.KeyPassPhrase=0689388783
  capture: result
pass_criteria:
- field: result.KeyPassPhrase
  operator: contains
  value: 0689388783
  description: KeyPassPhrase 應回傳包含 KeyPassPhrase=0689388783

verification_command: |
  ubus-cli "WiFi.AccessPoint.*.WPS.?" 2>/dev/null | sed -n "1,120p" || true
  ubus-cli "WiFi.EndPoint.*.Profile.WPS.?" 2>/dev/null | sed -n "1,120p" || true
  ubus-cli "WiFi.EndPoint.*.Profile.WPS.Security.?" 2>/dev/null | sed -n "1,120p" || true
  cat /tmp/wl*_hapd.conf | grep -Ei "wps|config_methods|wps_state|uuid|device_name|ieee80211w|sae|fronthaul"

results_reference:
  v4.0.1:
    5g: Skip
    6g: Skip
    2.4g: Skip
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
