id: wifi-llapi-r347-ac-vi-stats-wmmbytesreceived-radio
name: AC_VI — WiFi.Radio.{i}.Stats.WmmBytesReceived.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 347
  object: WiFi.Radio.{i}.Stats.WmmBytesReceived.
  api: AC_VI
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Stats.WmmBytesReceived.AC_VI=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi station (use another WiFi7 GW as station with built-in IPERF3)
- id: step2
  action: exec
  target: DUT
  command: Run IPERF "iperf3 -c <server> -u -b 20M --tos 0x88"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify Radio Stats.WmmBytesReceived.AC_VI ubus-cli WiFi.Radio.*.? | grep WmmBytesReceived.AC_VI WiFi.Radio.1.Stats.WmmBytesReceived.AC_VI=26495350
    WiFi.Radio.2.Stats.WmmBytesReceived.AC_VI=26555510 WiFi.Radio.3.Stats.WmmBytesReceived.AC_VI=20441610
  depends_on: step2
  capture: result
pass_criteria:
- field: result.AC_VI
  operator: contains
  value: '0'
  description: AC_VI 應回傳包含 AC_VI=0
verification_command: 'wl -i wl0 wme_counters


  root@prplOS:/# wl -i wl0 wme_counters

  AC_VI: tx frames: 0 bytes: 0 failed frames: 0 failed bytes: 0

  rx frames: 17205 bytes: 26495350 failed frames: 0 failed bytes: 0


  root@prplOS:/# wl -i wl1 wme_counters

  AC_VI: tx frames: 0 bytes: 0 failed frames: 0 failed bytes: 0

  rx frames: 17244 bytes: 26555510 failed frames: 0 failed bytes: 0


  root@prplOS:/# wl -i wl2 wme_counters

  AC_VI: tx frames: 0 bytes: 0 failed frames: 0 failed bytes: 0

  rx frames: 13274 bytes: 20441610 failed frames: 0 failed bytes: 0'
