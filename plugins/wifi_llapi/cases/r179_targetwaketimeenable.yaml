id: wifi-llapi-r179-targetwaketimeenable
name: TargetWakeTimeEnable — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 179
  object: WiFi.Radio.{i}.
  api: TargetWakeTimeEnable
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.TargetWakeTimeEnable=1
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Check the API default value for all radio: ubus-cli WiFi.Radio.*.TargetWakeTimeEnable? > WiFi.Radio.*.TargetWakeTimeEnable?
    WiFi.Radio.1.TargetWakeTimeEnable=1 WiFi.Radio.2.TargetWakeTimeEnable=1 WiFi.Radio.3.TargetWakeTimeEnable=1'
- id: step2
  action: exec
  target: DUT
  command: Check the ""TWT Responder Supported"" in all radio beacon, the support status should match this API value.
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Try switch the ability of this API: ubus-cli WiFi.Radio.*.TargetWakeTimeEnable=0'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Check the "TWT Responder Supported" for all radio beacons again.
  depends_on: step3
  capture: result
pass_criteria:
- field: result.TargetWakeTimeEnable
  operator: contains
  value: '1'
  description: TargetWakeTimeEnable 應回傳包含 TargetWakeTimeEnable=1
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Committed
