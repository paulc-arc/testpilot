id: wifi-llapi-r179-targetwaketimeenable
name: TargetWakeTimeEnable — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 249
  object: "WiFi.Radio.{i}."
  api: "TargetWakeTimeEnable"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.TargetWakeTimeEnable=1
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.TargetWakeTimeEnable=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.TargetWakeTimeEnable?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Check the API default value for all radio: ubus-cli WiFi.Radio.*.TargetWakeTimeEnable? > WiFi.Radio.*.TargetWakeTimeEnable?
    WiFi.Radio.1.TargetWakeTimeEnable=1 WiFi.Radio.2.TargetWakeTimeEnable=1 WiFi.Radio.3.TargetWakeTimeEnable=1'
- id: step2
  action: exec
  target: DUT
  command: Check the ""TWT Responder Supported"" in all radio beacon, the support status should match this API value.
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Try switch the ability of this API: ubus-cli WiFi.Radio.*.TargetWakeTimeEnable=0'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Check the "TWT Responder Supported" for all radio beacons again.
  depends_on: step3
  capture: result
pass_criteria:
- field: result.TargetWakeTimeEnable
  operator: contains
  value: '1'
  description: TargetWakeTimeEnable 應回傳包含 TargetWakeTimeEnable=1

verification_command: |
  ubus-cli "WiFi.Radio.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.Radio.*.TargetWakeTimeEnable?" 2>/dev/null || true
  wl -i wl0 status; wl -i wl1 status; wl -i wl2 status
  wl -i wl0 channel 2>/dev/null || true; wl -i wl1 channel 2>/dev/null || true; wl -i wl2 channel 2>/dev/null || true

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Committed
