id: wifi-llapi-D068-discoverymethodenabled-accesspoint-rnr
name: "DiscoveryMethodEnabled — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 70
  object: WiFi.AccessPoint.{i}.
  api: DiscoveryMethodEnabled
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.1.DiscoveryMethodEnabled=RNR'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; DiscoveryMethodEnabled is validated as an AP-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline
  - DiscoveryMethodEnabled defaults to Default on AP1/AP3/AP5 before the RNR probe
  - live 0319 probe showed northbound RNR readback on all three bands, but hostapd `rnr=` changes only on wl1
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the default non-open baseline
     - confirm wl0 / wl1 / wl2 BSS instances are up before changing DiscoveryMethodEnabled
  2) RNR setter probe:
     - read DiscoveryMethodEnabled on AP1, AP3, and AP5
     - set RNR on AP1 / AP3 / AP5 and confirm getter readback changes to RNR on all three bands
  3) hostapd cross-check:
     - inspect `/tmp/wl[0-2]_hapd.conf` for `rnr=` after the setter writes
     - wl1 should flip one `rnr=` line from `0` to `1`, while wl0 and wl2 keep no `rnr=` lines at all
  4) Cleanup:
     - restore AP1 / AP3 / AP5 to Default
     - confirm wl1 `rnr=` lines return to baseline `0 / 0`
sta_env_setup: |
  DUT:
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Read WiFi.AccessPoint.1/3/5.DiscoveryMethodEnabled directly from the DUT.
  2) Set RNR on AP1, AP3, and AP5; each getter should then read back RNR.
  3) Cross-check hostapd config: wl1 should expose `rnr=1` on one line while wl0 and wl2 still expose no `rnr=` lines.
  4) Restore AP1, AP3, and AP5 to Default and confirm wl1 returns to `rnr=0` on both lines.
  Verdict: Mixed-band checkpoint. 5G and 2.4G are Fail-shaped mismatches because northbound readback changes to RNR without any `rnr=` config evidence, while 6G passes because getter and hostapd `rnr=` state converge.
steps:
- id: step1_default_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.DiscoveryMethodEnabled?"'
  capture: default_5g
- id: step2_default_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.AccessPoint.3.DiscoveryMethodEnabled?"'
  depends_on: step1_default_5g
  capture: default_6g
- id: step3_default_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.DiscoveryMethodEnabled?"'
  depends_on: step2_default_6g
  capture: default_24g
- id: step4_set_rnr_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.DiscoveryMethodEnabled=RNR'
  depends_on: step3_default_24g
  capture: set_rnr_5g
- id: step5_set_rnr_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli WiFi.AccessPoint.3.DiscoveryMethodEnabled=RNR'
  depends_on: step4_set_rnr_5g
  capture: set_rnr_6g
- id: step6_set_rnr_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli WiFi.AccessPoint.5.DiscoveryMethodEnabled=RNR'
  depends_on: step5_set_rnr_6g
  capture: set_rnr_24g
- id: step7_after_rnr_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.DiscoveryMethodEnabled?"'
  depends_on: step6_set_rnr_24g
  capture: after_rnr_5g
- id: step8_after_rnr_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.AccessPoint.3.DiscoveryMethodEnabled?"'
  depends_on: step7_after_rnr_5g
  capture: after_rnr_6g
- id: step9_after_rnr_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.DiscoveryMethodEnabled?"'
  depends_on: step8_after_rnr_6g
  capture: after_rnr_24g
- id: step10_cfg_5g_after
  action: exec
  target: DUT
  band: 5g
  command: >-
    awk '/^rnr=/{if ($0=="rnr=1") enabled++; if ($0=="rnr=0") disabled++; total++} END {print "RnrEnabled5gCount=" enabled+0; print "RnrDisabled5gCount=" disabled+0; print "RnrTotal5gCount=" total+0}' /tmp/wl0_hapd.conf
  depends_on: step9_after_rnr_24g
  capture: cfg_5g_after
- id: step11_cfg_6g_after
  action: exec
  target: DUT
  band: 6g
  command: >-
    awk '/^rnr=/{if ($0=="rnr=1") enabled++; if ($0=="rnr=0") disabled++; total++} END {print "RnrEnabled6gCount=" enabled+0; print "RnrDisabled6gCount=" disabled+0; print "RnrTotal6gCount=" total+0}' /tmp/wl1_hapd.conf
  depends_on: step10_cfg_5g_after
  capture: cfg_6g_after
- id: step12_cfg_24g_after
  action: exec
  target: DUT
  band: 2.4g
  command: >-
    awk '/^rnr=/{if ($0=="rnr=1") enabled++; if ($0=="rnr=0") disabled++; total++} END {print "RnrEnabled24gCount=" enabled+0; print "RnrDisabled24gCount=" disabled+0; print "RnrTotal24gCount=" total+0}' /tmp/wl2_hapd.conf
  depends_on: step11_cfg_6g_after
  capture: cfg_24g_after
- id: step13_restore_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.DiscoveryMethodEnabled=Default'
  depends_on: step12_cfg_24g_after
  capture: restore_5g
- id: step14_restore_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli WiFi.AccessPoint.3.DiscoveryMethodEnabled=Default'
  depends_on: step13_restore_5g
  capture: restore_6g
- id: step15_restore_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli WiFi.AccessPoint.5.DiscoveryMethodEnabled=Default'
  depends_on: step14_restore_6g
  capture: restore_24g
- id: step16_cfg_6g_restore
  action: exec
  target: DUT
  band: 6g
  command: >-
    awk '/^rnr=/{if ($0=="rnr=1") enabled++; if ($0=="rnr=0") disabled++; total++} END {print "RnrEnabled6gCount=" enabled+0; print "RnrDisabled6gCount=" disabled+0; print "RnrTotal6gCount=" total+0}' /tmp/wl1_hapd.conf
  depends_on: step15_restore_24g
  capture: cfg_6g_restore
pass_criteria:
- field: default_5g.DiscoveryMethodEnabled
  operator: equals
  value: Default
  description: 5G AP1 should start at the default DiscoveryMethodEnabled value.
- field: default_6g.DiscoveryMethodEnabled
  operator: equals
  value: Default
  description: 6G AP3 should start at the default DiscoveryMethodEnabled value.
- field: default_24g.DiscoveryMethodEnabled
  operator: equals
  value: Default
  description: 2.4G AP5 should start at the default DiscoveryMethodEnabled value.
- field: set_rnr_5g.DiscoveryMethodEnabled
  operator: equals
  value: RNR
  description: 5G AP1 should acknowledge the accepted RNR setter even though hostapd state does not follow.
- field: set_rnr_6g.DiscoveryMethodEnabled
  operator: equals
  value: RNR
  description: 6G AP3 should acknowledge the accepted RNR setter.
- field: set_rnr_24g.DiscoveryMethodEnabled
  operator: equals
  value: RNR
  description: 2.4G AP5 should acknowledge the accepted RNR setter even though hostapd state does not follow.
- field: after_rnr_5g.DiscoveryMethodEnabled
  operator: equals
  value: RNR
  description: 5G AP1 getter should read back RNR after the setter write.
- field: after_rnr_6g.DiscoveryMethodEnabled
  operator: equals
  value: RNR
  description: 6G AP3 getter should read back RNR after the setter write.
- field: after_rnr_24g.DiscoveryMethodEnabled
  operator: equals
  value: RNR
  description: 2.4G AP5 getter should read back RNR after the setter write.
- field: cfg_5g_after.RnrEnabled5gCount
  operator: equals
  value: '0'
  description: wl0 hostapd config should still expose no RNR-enabled lines after the 5G setter write.
- field: cfg_5g_after.RnrTotal5gCount
  operator: equals
  value: '0'
  description: wl0 hostapd config should still expose no `rnr=` lines after the 5G setter write.
- field: cfg_6g_after.RnrEnabled6gCount
  operator: equals
  value: '1'
  description: wl1 hostapd config should expose one `rnr=1` line after the 6G setter write.
- field: cfg_6g_after.RnrDisabled6gCount
  operator: equals
  value: '1'
  description: wl1 hostapd config should keep one `rnr=0` line for the sibling BSS.
- field: cfg_6g_after.RnrTotal6gCount
  operator: equals
  value: '2'
  description: wl1 hostapd config should expose two total `rnr=` lines in the dual-BSS file.
- field: cfg_24g_after.RnrEnabled24gCount
  operator: equals
  value: '0'
  description: wl2 hostapd config should still expose no RNR-enabled lines after the 2.4G setter write.
- field: cfg_24g_after.RnrTotal24gCount
  operator: equals
  value: '0'
  description: wl2 hostapd config should still expose no `rnr=` lines after the 2.4G setter write.
- field: restore_5g.DiscoveryMethodEnabled
  operator: equals
  value: Default
  description: 5G AP1 should be restored to Default before the case exits.
- field: restore_6g.DiscoveryMethodEnabled
  operator: equals
  value: Default
  description: 6G AP3 should be restored to Default before the case exits.
- field: restore_24g.DiscoveryMethodEnabled
  operator: equals
  value: Default
  description: 2.4G AP5 should be restored to Default before the case exits.
- field: cfg_6g_restore.RnrEnabled6gCount
  operator: equals
  value: '0'
  description: wl1 hostapd config should return to zero RNR-enabled lines after restore.
- field: cfg_6g_restore.RnrDisabled6gCount
  operator: equals
  value: '2'
  description: wl1 hostapd config should return both dual-BSS `rnr=` lines to `0` after restore.
- field: cfg_6g_restore.RnrTotal6gCount
  operator: equals
  value: '2'
  description: wl1 hostapd config should still expose two total `rnr=` lines after restore.
verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.DiscoveryMethodEnabled?"'
  - 'ubus-cli "WiFi.AccessPoint.3.DiscoveryMethodEnabled?"'
  - 'ubus-cli "WiFi.AccessPoint.5.DiscoveryMethodEnabled?"'
  - ubus-cli WiFi.AccessPoint.1.DiscoveryMethodEnabled=RNR
  - ubus-cli WiFi.AccessPoint.3.DiscoveryMethodEnabled=RNR
  - ubus-cli WiFi.AccessPoint.5.DiscoveryMethodEnabled=RNR
  - 'ubus-cli "WiFi.AccessPoint.*.DiscoveryMethodEnabled?"'
  - 'awk ''/^rnr=/{if ($0=="rnr=1") enabled++; if ($0=="rnr=0") disabled++; total++} END {print "RnrEnabled5gCount=" enabled+0; print "RnrDisabled5gCount=" disabled+0; print "RnrTotal5gCount=" total+0}'' /tmp/wl0_hapd.conf'
  - 'awk ''/^rnr=/{if ($0=="rnr=1") enabled++; if ($0=="rnr=0") disabled++; total++} END {print "RnrEnabled6gCount=" enabled+0; print "RnrDisabled6gCount=" disabled+0; print "RnrTotal6gCount=" total+0}'' /tmp/wl1_hapd.conf'
  - 'awk ''/^rnr=/{if ($0=="rnr=1") enabled++; if ($0=="rnr=0") disabled++; total++} END {print "RnrEnabled24gCount=" enabled+0; print "RnrDisabled24gCount=" disabled+0; print "RnrTotal24gCount=" total+0}'' /tmp/wl2_hapd.conf'
  - ubus-cli WiFi.AccessPoint.1.DiscoveryMethodEnabled=Default
  - ubus-cli WiFi.AccessPoint.3.DiscoveryMethodEnabled=Default
  - ubus-cli WiFi.AccessPoint.5.DiscoveryMethodEnabled=Default
  - 'ubus-cli "WiFi.AccessPoint.*.DiscoveryMethodEnabled?" | sed -n ''1,20p'''
  - 'awk ''/^rnr=/{if ($0=="rnr=1") enabled++; if ($0=="rnr=0") disabled++; total++} END {print "RnrEnabled6gCount=" enabled+0; print "RnrDisabled6gCount=" disabled+0; print "RnrTotal6gCount=" total+0}'' /tmp/wl1_hapd.conf | sed -n ''1,20p'''
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass