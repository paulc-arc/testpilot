- id: step1_entry_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.MACFiltering.Entry.?" 2>&1); if printf '%s\n' "$OUT" | grep -q '^WiFi\.AccessPoint\.1\.MACFiltering\.Entry\.'; then printf '%s\n' "$OUT" | grep -c '^WiFi\.AccessPoint\.1\.MACFiltering\.Entry\.[0-9][0-9]*\.MACAddress=' | sed 's/^/EntryCount5g=/'; ALIAS=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MACFiltering\.Entry\.[0-9][0-9]*\.Alias="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$ALIAS" ]; then printf 'EntryAlias5g=%s\n' "$ALIAS"; else echo 'EntryAlias5g=EMPTY'; fi; VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MACFiltering\.Entry\.[0-9][0-9]*\.MACAddress="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$VALUE" ]; then VALUE=$(printf '%s' "$VALUE" | tr '[:lower:]' '[:upper:]'); printf 'EntryMac5g=%s\n' "$VALUE"; else echo 'EntryMac5g=EMPTY'; fi; else echo 'EntryCount5g=0'; echo 'EntryAlias5g=EMPTY'; echo 'EntryMac5g=EMPTY'; fi
  capture: entry_baseline_5g
- id: step2_add_entry_5g
