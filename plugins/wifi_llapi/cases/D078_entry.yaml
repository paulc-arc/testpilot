id: wifi-llapi-D078-entry-accesspoint-macfiltering
name: "Entry — WiFi.AccessPoint.{i}.MACFiltering.Entry"
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 72
  object: WiFi.AccessPoint.{i}.MACFiltering.Entry
  api: Entry
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.MACFiltering.Entry.?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: |
  Topology:
  - DUT: COM0 (AP role; MACFiltering.Entry is calibrated as an AP-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing MACFiltering.Entry
  - live 0319 probe showed the current mode split is AP1=`BlackList`, AP3=`Off`, AP5=`Off`
  - despite that mode split, `MACFiltering.Entry.?` on AP1/AP3/AP5 consistently converged `No data found -> one Entry.Alias/MACAddress node after addEntry -> No data found after delEntry`
  - only AP1 simultaneously updated `/tmp/hostap_wl0.acl`; AP3/AP5 left the ACL file path/file absent while mode stayed `Off`, so D080 judges the Entry table object itself and leaves mode/hostapd ACL semantics to D081
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - remove the band-specific probe MAC from AP1 / AP3 / AP5 before starting the entry-tree check
     - confirm `MACFiltering.Entry.?` returns no data before adding a test MAC
  2) Per-band MACFiltering.Entry probe:
     - add one band-specific MAC with `MACFiltering.addEntry(mac=...)` on the same AP
     - re-read `MACFiltering.Entry.?` and capture the exposed `EntryCount`, `EntryAlias`, and `EntryMac`
     - delete the same MAC with `MACFiltering.delEntry(mac=...)`
     - confirm `MACFiltering.Entry.?` returns to the empty baseline on the same band
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    ubus-cli "WiFi.AccessPoint.1.MACFiltering.delEntry(mac=62:2F:B8:66:BB:82)" 2>/dev/null || true
    ubus-cli "WiFi.AccessPoint.3.MACFiltering.delEntry(mac=FA:DD:AC:24:5A:B4)" 2>/dev/null || true
    ubus-cli "WiFi.AccessPoint.5.MACFiltering.delEntry(mac=FA:A0:DF:91:47:7C)" 2>/dev/null || true
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Keep AP1, AP3, and AP5 enabled on the documented non-open baseline.
  2) For each band, clear the documented probe MAC and confirm `MACFiltering.Entry.?` returns no data.
  3) Add one band-specific MAC with `MACFiltering.addEntry(mac=...)` on the same AP.
  4) Re-read `MACFiltering.Entry.?` and confirm the same band now exposes exactly one `Entry.Alias` / `Entry.MACAddress` node for the same probe MAC.
  5) Delete the same MAC with `MACFiltering.delEntry(mac=...)` and confirm `MACFiltering.Entry.?` returns to the empty baseline.
  6) D080 judges the Entry table object itself; mode-dependent ACL / hostapd behavior is intentionally left to D081.

