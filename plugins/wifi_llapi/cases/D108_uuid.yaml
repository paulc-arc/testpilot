id: wifi-llapi-D108-uuid
name: UUID — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 110
  object: WiFi.AccessPoint.{i}.WPS.
  api: UUID
  baseline: 0310-BGW720-300
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WPS.UUID?"
llapi_support: Support
implemented_by: pWHM
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  Transport:
  - DUT via serialwrap COM0
  Baseline:
  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal
  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE
  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal
  Notes:
  - Read-only getter; all 3 bands return same UUID
  - Live evidence: AP1/AP3/AP5 all return 47584a4e-464c-f545-f64e-4e4547584a4e
  - hostapd uuid= on wl0/wl2 confirms convergence (wl1 has no uuid line)
steps:
- id: step1_5g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.WPS.UUID?"
  capture: llapi_5g
- id: step2_6g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.3.WPS.UUID?"
  capture: llapi_6g
- id: step3_24g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.5.WPS.UUID?"
  capture: llapi_24g
pass_criteria:
- field: llapi_5g.UUID
  operator: regex
  value: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  band: 5g
  description: 5G UUID should be valid UUID format
- field: llapi_6g.UUID
  operator: regex
  value: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  band: 6g
  description: 6G UUID should be valid UUID format
- field: llapi_24g.UUID
  operator: regex
  value: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
  band: 2.4g
  description: 2.4G UUID should be valid UUID format
verification_command:
  - 'cat /tmp/wl0_hapd.conf | grep uuid'
  - 'cat /tmp/wl1_hapd.conf | grep uuid'
  - 'cat /tmp/wl2_hapd.conf | grep uuid'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: All 3 bands return same valid UUID, confirmed by hostapd uuid= on wl0/wl2
