id: wifi-llapi-r159-ieee80211henabled
name: IEEE80211hEnabled — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 198
  object: "WiFi.Radio.{i}."
  api: "IEEE80211hEnabled"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.IEEE80211hEnabled=1
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.IEEE80211hEnabled=1
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.IEEE80211hEnabled=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.IEEE80211hEnabled?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Check API default value: ubus-cli WiFi.Radio.*.IEEE80211hEnabled? > WiFi.Radio.*.IEEE80211hEnabled? WiFi.Radio.1.IEEE80211hEnabled=1
    WiFi.Radio.2.IEEE80211hEnabled=0 WiFi.Radio.3.IEEE80211hEnabled=0'
- id: step2
  action: exec
  target: DUT
  command: Compare with driver settings, this API is not able to modify.
  depends_on: step1
  capture: result
pass_criteria:
- field: result.IEEE80211hEnabled
  operator: contains
  value: '1'
  description: IEEE80211hEnabled 應回傳包含 IEEE80211hEnabled=1
verification_command: 'root@prplOS:/# wl -i wl0 spect

  Loose interpretation of 11h spec - may join non 11h AP.

  root@prplOS:/# wl -i wl1 spect

  Off

  root@prplOS:/# wl -i wl2 spect

  Off


  root@prplOS:/# wl -i wl0 radar

  1

  root@prplOS:/# wl -i wl1 radar

  0

  root@prplOS:/# wl -i wl2 radar

  0


  root@prplOS:/# cat /tmp/wl0_hapd.conf |grep ieee80211h

  ieee80211h=1

  root@prplOS:/# cat /tmp/wl1_hapd.conf |grep ieee80211h

  ieee80211h=0

  root@prplOS:/# cat /tmp/wl2_hapd.conf |grep ieee80211h

  ieee80211h=0'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
