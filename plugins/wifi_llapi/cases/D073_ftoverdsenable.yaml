pass_criteria:
- field: state_prereq_5g.Enabled5g
  operator: equals
  value: '1'
  description: 5G AP1 should enable IEEE80211r before the FTOverDSEnable probe.
- field: state_prereq_5g.FtOverDs5g
  operator: equals
  value: '0'
  description: 5G AP1 should start with FTOverDSEnable=0 after the prerequisites are applied.
- field: state_prereq_5g.MobilityDomain5g
  operator: equals
  value: '4660'
  description: 5G AP1 should read back the configured MobilityDomain in decimal.
- field: cfg_prereq_5g.MobilityDomainCfg5g
  operator: equals
