id: wifi-llapi-D073-ftoverdsenable-accesspoint
name: "FTOverDSEnable — WiFi.AccessPoint.{i}.IEEE80211r."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 73
  object: WiFi.AccessPoint.{i}.IEEE80211r.
  api: FTOverDSEnable
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211r.FTOverDSEnable=1'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: |
  Topology:
  - DUT: COM0 (AP role; FTOverDSEnable is validated as an AP-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before the 11r probe
  - FTOverDSEnable requires `IEEE80211r.Enabled=1` and a non-zero `MobilityDomain`
  - live 0319 probe showed the northbound MobilityDomain getter stays decimal `4660`, while hostapd stores `mobility_domain=3412` (hex form)
  - after the prerequisites are applied, hostapd exposes one `ft_over_ds=0` line per band; toggling FTOverDSEnable flips that line between `0` and `1`
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - confirm wl0 / wl1 / wl2 BSS instances are reachable before changing 11r settings
  2) Per-band 11r prerequisite setup:
     - set IEEE80211r.Enabled=1
     - set MobilityDomain=4660
     - confirm the northbound getters read Enabled=1 / FTOverDSEnable=0 / MobilityDomain=4660
     - confirm hostapd exposes `mobility_domain=3412` and `ft_over_ds=0`
  3) Per-band FTOverDSEnable toggle:
     - set FTOverDSEnable=1 and confirm both getter and hostapd `ft_over_ds` flip to `1`
     - set FTOverDSEnable=0 and confirm both getter and hostapd `ft_over_ds` return to `0`
  4) Cleanup:
     - restore MobilityDomain=0 and IEEE80211r.Enabled=0 on AP1 / AP3 / AP5
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    ubus-cli WiFi.AccessPoint.1.IEEE80211r.Enabled=1
    ubus-cli WiFi.AccessPoint.3.IEEE80211r.Enabled=1
    ubus-cli WiFi.AccessPoint.5.IEEE80211r.Enabled=1
    ubus-cli WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=4660
    ubus-cli WiFi.AccessPoint.3.IEEE80211r.MobilityDomain=4660
    ubus-cli WiFi.AccessPoint.5.IEEE80211r.MobilityDomain=4660
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Keep AP1, AP3, and AP5 enabled on the documented non-open baseline.
  2) For each band, set IEEE80211r.Enabled=1 and MobilityDomain=4660, then confirm the northbound getters read Enabled=1 / FTOverDSEnable=0 / MobilityDomain=4660.
  3) Cross-check hostapd after the prerequisites: `mobility_domain=3412` must be present and `ft_over_ds=0` must be exposed exactly once.
  4) Set FTOverDSEnable=1 on the same AP and confirm the northbound getter plus hostapd `ft_over_ds` both change to `1`.
  5) Restore FTOverDSEnable=0 and confirm the northbound getter plus hostapd `ft_over_ds` both return to `0`.
  6) Cleanup by restoring MobilityDomain=0 and IEEE80211r.Enabled=0 on AP1 / AP3 / AP5.
  Verdict: To be tested. The current DUT converges cleanly on 5G, 6G, and 2.4G for this AP-only 11r prerequisite + FTOverDSEnable toggle path, but the workbook baseline for all three bands remains `To be tested`.
steps:
- id: step1_prereq_enabled_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211r.Enabled=1'
  capture: prereq_enabled_5g
- id: step2_prereq_mobilitydomain_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=4660'
  depends_on: step1_prereq_enabled_5g
  capture: prereq_mobilitydomain_5g
- id: step3_state_prereq_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    ubus-cli "WiFi.AccessPoint.1.IEEE80211r.Enabled?" | sed -n 's/^WiFi\.AccessPoint\.1\.IEEE80211r\.Enabled=/Enabled5g=/p'; ubus-cli "WiFi.AccessPoint.1.IEEE80211r.FTOverDSEnable?" | sed -n 's/^WiFi\.AccessPoint\.1\.IEEE80211r\.FTOverDSEnable=/FtOverDs5g=/p'; ubus-cli "WiFi.AccessPoint.1.IEEE80211r.MobilityDomain?" | sed -n 's/^WiFi\.AccessPoint\.1\.IEEE80211r\.MobilityDomain=/MobilityDomain5g=/p'
  depends_on: step2_prereq_mobilitydomain_5g
  capture: state_prereq_5g
- id: step4_cfg_prereq_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    grep -m1 '^mobility_domain=' /tmp/wl0_hapd.conf | sed 's/^mobility_domain=/MobilityDomainCfg5g=/'; grep -c '^ft_over_ds=1$' /tmp/wl0_hapd.conf | sed 's/^/FtOverDs5gOneCount=/'; grep -c '^ft_over_ds=0$' /tmp/wl0_hapd.conf | sed 's/^/FtOverDs5gZeroCount=/'; grep -c '^ft_over_ds=' /tmp/wl0_hapd.conf | sed 's/^/FtOverDs5gTotalCount=/'
  depends_on: step3_state_prereq_5g
  capture: cfg_prereq_5g
- id: step5_set_ft_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211r.FTOverDSEnable=1'
  depends_on: step4_cfg_prereq_5g
  capture: set_ft_5g
- id: step6_state_set_ft_5g
