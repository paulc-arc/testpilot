results_reference:
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: 'AP1/AP3/AP5 all required IEEE80211r.Enabled=1 plus MobilityDomain=4660 before FTOverDSEnable became meaningful. On all three bands, the FT getter started at 0 with hostapd `ft_over_ds=0`, changed to 1 with the setter, and returned to 0 on restore; hostapd stored `mobility_domain=3412` while the northbound getter returned decimal 4660. The workbook baseline remains `To be tested`, so this case is calibrated as an AP-only multiband To-be-tested checkpoint.'
