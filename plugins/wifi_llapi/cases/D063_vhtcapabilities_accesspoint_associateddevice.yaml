id: wifi-llapi-D063-vhtcapabilities-accesspoint-associateddevice
name: "VhtCapabilities — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 63
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: VhtCapabilities
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.VhtCapabilities?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
      - iface: 5g
        mode: sta
        ssid: testpilot5G
        key: "00000000"
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (station role for this case; do not rely on the old A0/B0 heuristic)
  Transport:
  - serialwrap attach COM0 / COM1
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G
  Preconditions:
  - keep only one associated station on AP1 so AssociatedDevice.1 stays deterministic
  - use the verified non-open 5G baseline for this case
setup_steps: |
  1) DUT 5G baseline:
     - enable Radio.1 / SSID.4 / AP1
     - configure AP1 as WPA2-Personal with password 00000000 and MFP disabled
     - keep the validated live 5G baseline as testpilot5G / 00000000
  2) STA 5G preparation:
     - disable local AP1/AP2 on COM1
     - move COM1 br-lan off 192.168.1.0/24 to avoid bridge self-hit side effects
     - reset wl0 and its wpa_supplicant control socket
     - connect wl0 to testpilot5G with WPA-PSK
  3) Association evidence:
     - COM1: iw dev wl0 link ; wpa_cli -p /var/run/wpa_supplicant -i wl0 status
     - COM0: wl -i wl0 assoclist
sta_env_setup: |
  DUT 5G AP baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.1.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.1.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.OfdmaEnable=1
    ubus-cli WiFi.Radio.1.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.1.OperatingStandards=ax
    ubus-cli WiFi.Radio.1.RxChainCtrl=-1
    ubus-cli WiFi.Radio.1.TxChainCtrl=-1
    ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.1.Sensing.Enable=1
    ubus-cli WiFi.Radio.1.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.1.LongRetryLimit=6
    ubus-cli WiFi.Radio.1.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.1.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.4.SSID=testpilot5G
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.2.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA2-Personal
    ubus-cli "WiFi.AccessPoint.1.Security.KeyPassPhrase=\"00000000\""
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Disabled
    ubus-cli WiFi.AccessPoint.1.Enable=1
  STA 5G preparation:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    ubus-cli WiFi.AccessPoint.1.Enable=0
    ubus-cli WiFi.AccessPoint.2.Enable=0
    wpa_cli terminate 2>/dev/null || true
    rm -f /var/run/wpa_supplicant/wl0 2>/dev/null || true
    iw dev wl0.1 del 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    iw dev wl0 set type managed
    ifconfig wl0 up
    mkdir -p /var/run/wpa_supplicant
    printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nnetwork={\nssid="testpilot5G"\npsk="00000000"\nkey_mgmt=WPA-PSK\nscan_ssid=1\n}\n' > /tmp/wpa_wl0.conf
    wpa_supplicant -B -D nl80211 -i wl0 -c /tmp/wpa_wl0.conf -C /var/run/wpa_supplicant
    sleep 3
  STA 5G connect verify:
    wpa_cli -p /var/run/wpa_supplicant -i wl0 reconnect
    sleep 10
    iw dev wl0 link
    wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  DUT association evidence:
    wl -i wl0 assoclist
test_procedure: |
  1) Resolve COM1 wl0's live STA MAC and require AP1 AssociatedDevice.1 to point to that same station.
  2) Read WiFi.AccessPoint.1.AssociatedDevice.1.VhtCapabilities directly on DUT, then cross-check a full AssociatedDevice snapshot for both MACAddress and VhtCapabilities.
  3) Parse wl0 sta_info for the same STA and normalize the driver-side `VHT caps` line into a compact comma-separated capability list.
  4) Pass when the direct getter and the same-entry snapshot exact-close on a concrete non-empty VHT capability list, while wl0 sta_info confirms the same STA still exposes the expected VHT subset tokens.
steps:
- id: step1
  action: exec
  target: STA
  command: cat /sys/class/net/wl0/address | tr 'A-F' 'a-f' | sed 's/^/StaMac=/'
  capture: sta_identity
- id: step2
  action: exec
  target: DUT
  command: >-
    ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n 's/.*MACAddress="\([^"]*\)".*/\1/p' | tr 'A-F' 'a-f' | sed 's/^/MACAddress=/'
  depends_on: step1
  capture: assoc_entry
- id: step3
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.VhtCapabilities?"'
  depends_on: step2
  capture: result
- id: step4
  action: exec
  target: DUT
  command: >-
    ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | awk -F= '/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress=/ {gsub(/"/, "", $2); print "AssocMAC=" tolower($2)} /^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.VhtCapabilities=/ {gsub(/"/, "", $2); print "AssocVhtCapabilities=" $2}'
  depends_on: step3
  capture: assoc_snapshot
- id: step5
  action: exec
  target: DUT
  command: >-
    STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n 's/.*MACAddress="\([^"]*\)".*/\1/p' | tr 'A-F' 'a-f'); [ -n "$STA_MAC" ] && echo DriverAssocMac="$STA_MAC" && wl -i wl0 sta_info "$STA_MAC" | awk '/^[[:space:]]*VHT caps / {line=substr($0, index($0, ":")+2); print "DriverVhtCapsLine=" line; for (i=1;i<=NF;i++) if ($i ~ /^(SGI80|SGI160|SU-BFR|SU-BFE|MU-BFR|MU-BFE)$/) caps[++n]=$i} END {if (n) {out=""; for (i=1;i<=n;i++) out = out (i>1 ? "," : "") caps[i]; print "DriverVhtCapabilities=" out}}'
  depends_on: step4
  capture: driver_capture
pass_criteria:
- field: sta_identity.StaMac
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: COM1 wl0 must resolve to a concrete live STA MAC before DUT-side validation.
- field: assoc_entry.MACAddress
  operator: regex
  value: ^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: AP1 AssociatedDevice.1 must first resolve to the live 5G STA MAC.
- field: assoc_entry.MACAddress
  operator: equals
  reference: sta_identity.StaMac
  description: AP1 AssociatedDevice.1 must correspond to the same COM1 wl0 station used for this manual checkpoint.
- field: result.VhtCapabilities
  operator: regex
  value: ^[A-Z0-9-]+(,[A-Z0-9-]+)*$
  description: The direct getter must expose a concrete comma-separated VHT capability list for the same STA.
- field: assoc_snapshot.AssocMAC
  operator: equals
  reference: assoc_entry.MACAddress
  description: AssociatedDevice snapshot evidence must come from the same AP1 station entry.
- field: result.VhtCapabilities
  operator: equals
  reference: assoc_snapshot.AssocVhtCapabilities
  description: Direct getter VhtCapabilities must match the same AssociatedDevice snapshot value.
- field: driver_capture.DriverAssocMac
  operator: equals
  reference: assoc_entry.MACAddress
  description: Driver evidence must target the same AssociatedDevice MAC resolved in step2.
- field: driver_capture.DriverVhtCapabilities
  operator: regex
  value: ^[A-Z0-9-]+(,[A-Z0-9-]+)*$
  description: The driver-side VHT capability evidence must stay a concrete comma-separated token list.
- field: driver_capture.DriverVhtCapabilities
  operator: contains
  value: SGI80
  description: wl0 sta_info must still expose SGI80 in the VHT capability line for the same STA.
- field: driver_capture.DriverVhtCapabilities
  operator: contains
  value: SGI160
  description: wl0 sta_info must still expose SGI160 in the VHT capability line for the same STA.
- field: driver_capture.DriverVhtCapabilities
  operator: contains
  value: SU-BFE
  description: wl0 sta_info must still expose SU-BFE in the VHT capability line for the same STA.
verification_command:
  - 'cat /sys/class/net/wl0/address | tr ''A-F'' ''a-f'' | sed ''s/^/StaMac=/'''
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.VhtCapabilities?"'
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | awk -F= ''/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress=/ {gsub(/"/, "", $2); print "AssocMAC=" tolower($2)} /^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.VhtCapabilities=/ {gsub(/"/, "", $2); print "AssocVhtCapabilities=" $2}'''
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p'' | tr ''A-F'' ''a-f''); [ -n "$STA_MAC" ] && echo DriverAssocMac="$STA_MAC" && wl -i wl0 sta_info "$STA_MAC" | awk ''/^[[:space:]]*VHT caps / {line=substr($0, index($0, ":")+2); print "DriverVhtCapsLine=" line; for (i=1;i<=NF;i++) if ($i ~ /^(SGI80|SGI160|SU-BFR|SU-BFE|MU-BFR|MU-BFE)$/) caps[++n]=$i} END {if (n) {out=""; for (i=1;i<=n;i++) out = out (i>1 ? "," : "") caps[i]; print "DriverVhtCapabilities=" out}}'''
results_reference:
  v4.0.3:
    5g: Pass
    6g: Not Supported
    2.4g: Not Supported
