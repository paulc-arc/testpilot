id: wifi-llapi-r281-maxsupportedssids
name: MaxSupportedSSIDs — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 380
  object: "WiFi.Radio.{i}."
  api: "MaxSupportedSSIDs"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.MaxSupportedSSIDs=16
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.MaxSupportedSSIDs=16
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.MaxSupportedSSIDs=16
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.MaxSupportedSSIDs?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Get SSID list ubus-cli WiFi.SSID.*.SSID? > WiFi.SSID.*.SSID? WiFi.SSID.1.SSID="OpenWrt_fake" WiFi.SSID.2.SSID="OpenWrt_fake"
    WiFi.SSID.3.SSID="OpenWrt_fake" WiFi.SSID.4.SSID="TEST-5G-123" WiFi.SSID.5.SSID="OpenWrt_2" WiFi.SSID.6.SSID="TEST-6G-123"
    WiFi.SSID.7.SSID="OpenWrt_2" WiFi.SSID.8.SSID="TEST-24G-123" WiFi.SSID.9.SSID="OpenWrt_2"
  capture: result
pass_criteria:
- field: result.MaxSupportedSSIDs
  operator: contains
  value: '16'
  description: MaxSupportedSSIDs 應回傳包含 MaxSupportedSSIDs=16

verification_command: |
  ubus-cli "WiFi.Radio.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.Radio.*.MaxSupportedSSIDs?" 2>/dev/null || true
  wl -i wl0 status; wl -i wl1 status; wl -i wl2 status
  wl -i wl0 channel 2>/dev/null || true; wl -i wl1 channel 2>/dev/null || true; wl -i wl2 channel 2>/dev/null || true

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'What is the Maximum SSID/BSSID for this Project?


      Test only Primary SSID4, 6 and 8.'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
