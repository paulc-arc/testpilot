pass_criteria:
- field: state_enabled_5g.Enabled5g
  operator: equals
  value: '1'
  description: 5G AP1 should enable IEEE80211r before setting MobilityDomain.
- field: state_enabled_5g.MobilityDomain5g
  operator: equals
  value: '0'
  description: 5G AP1 should still start with MobilityDomain=0 before the setter write.
- field: set_mobilitydomain_5g.MobilityDomain
  operator: equals
  value: '27476'
  description: 5G AP1 should acknowledge MobilityDomain=27476.
- field: state_set_mobilitydomain_5g.Enabled5g
  operator: equals
  value: '1'
  description: 5G AP1 should keep IEEE80211r.Enabled=1 while MobilityDomain is non-zero.
- field: state_set_mobilitydomain_5g.MobilityDomain5g
  operator: equals
  value: '27476'
  description: 5G AP1 getter should read back MobilityDomain=27476.
- field: cfg_set_mobilitydomain_5g.MobilityDomainCfg5g
  operator: equals
