    - ubus-cli "WiFi.AccessPoint.1.IEEE80211r.MobilityDomain?" | sed -n "/MobilityDomain=/s/.*=/MobilityDomain5g=/p"
  depends_on: step8_cleanup_5g
  capture: state_cleanup_5g
- id: step10_enable_6g
