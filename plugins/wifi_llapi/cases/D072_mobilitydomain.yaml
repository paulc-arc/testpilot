id: wifi-llapi-D072-mobilitydomain-accesspoint
name: "MobilityDomain — WiFi.AccessPoint.{i}.IEEE80211r."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 72
  object: WiFi.AccessPoint.{i}.IEEE80211r.
  api: MobilityDomain
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=27476'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; MobilityDomain is validated as an AP-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before the 11r probe
  - MobilityDomain only becomes meaningful after `IEEE80211r.Enabled=1`
  - live 0319 probe showed the northbound MobilityDomain getter stays decimal `27476`, while hostapd stores `mobility_domain=546B` (byte-swapped hex form of `0x6B54`)
  - setting a non-zero MobilityDomain also exposes one `ft_over_ds=0` line per band without enabling FT over DS
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - confirm wl0 / wl1 / wl2 BSS instances are reachable before changing 11r settings
  2) Per-band MobilityDomain probe:
     - set IEEE80211r.Enabled=1 and confirm the northbound getters read Enabled=1 / MobilityDomain=0
     - set MobilityDomain=27476 and confirm the northbound getter reads back 27476
     - confirm hostapd exposes `mobility_domain=546B` and one `ft_over_ds=0` line
     - restore MobilityDomain=0, then restore IEEE80211r.Enabled=0 before moving to the next band
  3) Cleanup:
     - confirm the final getters on AP1 / AP3 / AP5 all return Enabled=0 / MobilityDomain=0
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Keep AP1, AP3, and AP5 enabled on the documented non-open baseline.
  2) For each band, set IEEE80211r.Enabled=1 and confirm the northbound getters read Enabled=1 / MobilityDomain=0.
  3) Set MobilityDomain=27476 on the same AP and confirm the northbound getter reads back decimal `27476`.
  4) Cross-check hostapd after the setter: `mobility_domain=546B` must be present and `ft_over_ds=0` must still be exposed exactly once.
  5) Restore MobilityDomain=0 and confirm the northbound getter returns to `0` while IEEE80211r.Enabled remains `1`.
  6) Restore IEEE80211r.Enabled=0 before moving to the next band.
  7) Verdict: Pass / Pass / Pass. Official reruns `20260412T231545173827`
     and `20260412T231709014359` exact-closed the AP-only MobilityDomain
     path on 5G, 6G, and 2.4G with northbound readback plus hostapd
     `mobility_domain=546B` / `ft_over_ds=0` evidence.
steps:
- id: step1_enable_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211r.Enabled=1'
  capture: enable_5g
- id: step2_state_enabled_5g
  action: exec
  target: DUT
  band: 5g
  command:
    - ubus-cli "WiFi.AccessPoint.1.IEEE80211r.Enabled?" | sed -n "/Enabled=/s/.*=/Enabled5g=/p"
    - ubus-cli "WiFi.AccessPoint.1.IEEE80211r.MobilityDomain?" | sed -n "/MobilityDomain=/s/.*=/MobilityDomain5g=/p"
  depends_on: step1_enable_5g
  capture: state_enabled_5g
- id: step3_set_mobilitydomain_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=27476'
  depends_on: step2_state_enabled_5g
  capture: set_mobilitydomain_5g
- id: step4_state_set_mobilitydomain_5g
  action: exec
  target: DUT
  band: 5g
  command:
    - ubus-cli "WiFi.AccessPoint.1.IEEE80211r.Enabled?" | sed -n "/Enabled=/s/.*=/Enabled5g=/p"
    - ubus-cli "WiFi.AccessPoint.1.IEEE80211r.MobilityDomain?" | sed -n "/MobilityDomain=/s/.*=/MobilityDomain5g=/p"
  depends_on: step3_set_mobilitydomain_5g
  capture: state_set_mobilitydomain_5g
- id: step5_cfg_set_mobilitydomain_5g
  action: exec
  target: DUT
  band: 5g
  command:
    - grep -m1 '^mobility_domain=' /tmp/wl0_hapd.conf | sed 's/^mobility_domain=/MobilityDomainCfg5g=/'
    - grep -c '^ft_over_ds=0$' /tmp/wl0_hapd.conf | sed 's/^/FtOverDs5gZeroCount=/'
    - grep -c '^ft_over_ds=' /tmp/wl0_hapd.conf | sed 's/^/FtOverDs5gTotalCount=/'
  depends_on: step4_state_set_mobilitydomain_5g
  capture: cfg_set_mobilitydomain_5g
- id: step6_restore_mobilitydomain_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.AccessPoint.1.IEEE80211r.MobilityDomain=0'
  depends_on: step5_cfg_set_mobilitydomain_5g
  capture: restore_mobilitydomain_5g
- id: step7_state_restore_mobilitydomain_5g
  action: exec
  target: DUT
  band: 5g
