id: d322-ssid-ssid
name: D322 SSID SSID
source:
  row: 322
  object: WiFi.SSID.{i}.
  api: SSID
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.SSID.4.SSID?"
  expected: SSID 回傳有效值
  description: SSID.4 (5g) SSID getter
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.SSID.6.SSID?"
  expected: SSID 回傳有效值
  description: SSID.6 (6g) SSID getter
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.SSID.8.SSID?"
  expected: SSID 回傳有效值
  description: SSID.8 (2.4g) SSID getter
pass_criteria:
- field: getter_5g.SSID
  operator: regex
  value: .+
- field: getter_6g.SSID
  operator: regex
  value: .+
- field: getter_24g.SSID
  operator: regex
  value: .+
