    WiFi.AccessPoint.1.AssociatedDevice.13.DisassociationTime="0001-01-01T00:00:00Z" WiFi.AccessPoint.3.AssociatedDevice.1.DisassociationTime="2025-12-12T09:13:12Z"
    WiFi.AccessPoint.5.AssociatedDevice.3.DisassociationTime="2025-12-12T09:12:43Z" date Fri Dec 12 09:14:01 UTC 2025  ubus-cli
    WiFi.AccessPoint.*.AssociatedDevice.*.? | grep -E ''Activ e|MAC'' WiFi.AccessPoint.1.AssociatedDevice.11.Active=0 WiFi.AccessPoint.1.AssociatedDevice.11.ActiveNumberOfAffiliatedSta=0
    WiFi.AccessPoint.1.AssociatedDevice.11.MACAddress="34:19:4D:A4:B5:09" WiFi.AccessPoint.1.AssociatedDevice.11.AffiliatedSta.1.Active=0
    WiFi.AccessPoint.1.AssociatedDevice.11.AffiliatedSta.1.MACAddress="34:19:4D:A4:B5:09" WiFi.AccessPoint.1.AssociatedDevice.12.Active=1
    WiFi.AccessPoint.1.AssociatedDevice.12.ActiveNumberOfAffiliatedSta=0 WiFi.AccessPoint.1.AssociatedDevice.12.MACAddress="42:B7:35:6A:17:8E"
    WiFi.AccessPoint.1.AssociatedDevice.13.Active=1 WiFi.AccessPoint.1.AssociatedDevice.13.ActiveNumberOfAffiliatedSta=0 WiFi.AccessPoint.1.AssociatedDevice.13.MACAddress="12:E3:C4:78:7B:6F"
    WiFi.AccessPoint.3.AssociatedDevice.1.Active=0 WiFi.AccessPoint.3.AssociatedDevice.1.ActiveNumberOfAffiliatedSta=0 WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress="38:06:E6:92:B0:4A"
    WiFi.AccessPoint.3.AssociatedDevice.1.AffiliatedSta.1.Active=0 WiFi.AccessPoint.3.AssociatedDevice.1.AffiliatedSta.1.MACAddress="38:06:E6:92:B0:4A"
    WiFi.AccessPoint.5.AssociatedDevice.3.Active=0 WiFi.AccessPoint.5.AssociatedDevice.3.ActiveNumberOfAffiliatedSta=0 WiFi.AccessPoint.5.AssociatedDevice.3.MACAddress="E4:60:17:EB:A9:83" '
