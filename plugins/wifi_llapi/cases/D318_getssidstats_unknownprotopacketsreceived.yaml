id: wifi-llapi-d318-getssidstats-unknownprotopacketsreceived
name: "UnknownProtoPacketsReceived — WiFi.SSID.{i}.getSSIDStats()"
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 241
  object: WiFi.SSID.{i}.
  api: getSSIDStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.SSID.{i}.getSSIDStats()"'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
        - iface: 5g
          mode: sta
          ssid: TestPilot_BTM
          key: testpilot6g
        - iface: 6g
          mode: sta
          ssid: TestPilot_BTM
          key: testpilot6g
        - iface: 2.4g
          mode: sta
          ssid: TestPilot_24G
          key: ''
  links:
    - from: STA
      to: DUT
      band: 5g
    - from: STA
      to: DUT
      band: 6g
    - from: STA
      to: DUT
      band: 2.4g
test_environment: |
  Topology:
  - DUT: COM0 (AP role)
  - STA: COM1 (single active STA link only; validate 5G -> 6G -> 2.4G sequentially)
  Mapping:
  - 5G = wl0 / SSID.4 / STA MAC 2c:59:17:00:04:85
  - 6G = wl1 / SSID.6 / STA MAC 2c:59:17:00:04:86
  - 2.4G = wl2 / SSID.8 / STA MAC 2c:59:17:00:04:97
  Rules:
  - move COM1 br-lan off 192.168.1.0/24 before any ping attempt
  - attempt STA-generated traffic before the final readback for each band
  - on 2.4G, keep the traffic attempt even if ping still drops; judge by direct/getSSIDStats/driver consistency
setup_steps: |
  DUT baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.SSID.4.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.1.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.Radio.2.Enable=1
    ubus-cli WiFi.SSID.6.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.3.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.Radio.3.Enable=1
    ubus-cli WiFi.SSID.8.SSID=TestPilot_24G
    ubus-cli WiFi.AccessPoint.5.Security.ModeEnabled=None
    ubus-cli WiFi.AccessPoint.5.Security.MFPConfig=Disabled
    ubus-cli WiFi.AccessPoint.5.Enable=1
  STA reset before each band:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    wpa_cli terminate 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    ip addr flush dev wl0 2>/dev/null || true
    ip addr flush dev wl1 2>/dev/null || true
    ip addr flush dev wl2 2>/dev/null || true
sta_env_setup: |
  5G example:
    iw dev wl0 set type managed
    ifconfig wl0 up
    wpa_supplicant -B -D nl80211 -i wl0 -c /tmp/wpa_wl0.conf -C /var/run/wpa_supplicant
    wpa_cli -p /var/run/wpa_supplicant -i wl0 reconnect
  6G example:
    iw dev wl1 set type managed
    ifconfig wl1 up
    wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf -C /var/run/wpa_supplicant
    wpa_cli -p /var/run/wpa_supplicant -i wl1 reconnect
  2.4G example:
    iw dev wl2 set type managed
    ifconfig wl2 up
    iw dev wl2 connect TestPilot_24G
  Traffic attempt:
    ifconfig wlX 192.168.1.X netmask 255.255.255.0 up
    ip route replace 192.168.1.0/24 dev wlX src 192.168.1.X
    ip neigh flush dev wlX
    ping -I wlX -c 5 -W 1 192.168.1.1
    sleep 2
    ping -I wlX -c 5 -W 1 192.168.1.1
test_procedure: |
  1) Validate this getSSIDStats() field sequentially on 5G, then 6G, then 2.4G.
  2) For each band, capture getSSIDStats(), the matching direct Stats field, and the matching driver view before and after the STA traffic attempt.
  3) Use the final reread for the manual judgment.
  4) Confirm the getSSIDStats() field stays in the workbook Not Supported shape on all three bands.
steps:
- id: assoc_5g
  action: exec
  target: DUT
  command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
  capture: assoc_5g
- id: method_5g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n 's/.*UnknownProtoPacketsReceived = \([0-9][0-9]*\).*/GetSSIDStatsUnknownProtoPacketsReceived5g=\1/p'
  depends_on: assoc_5g
  capture: method_5g
- id: direct_5g
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.SSID.4.Stats.UnknownProtoPacketsReceived?"'
  depends_on: method_5g
  capture: direct_5g
- id: assoc_6g
  action: exec
  target: DUT
  command: wl -i wl1 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac6g=\1/p'
  capture: assoc_6g
- id: method_6g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n 's/.*UnknownProtoPacketsReceived = \([0-9][0-9]*\).*/GetSSIDStatsUnknownProtoPacketsReceived6g=\1/p'
  depends_on: assoc_6g
  capture: method_6g
- id: direct_6g
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.SSID.6.Stats.UnknownProtoPacketsReceived?"'
  depends_on: method_6g
  capture: direct_6g
- id: assoc_24g
  action: exec
  target: DUT
  command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
  capture: assoc_24g
- id: method_24g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n 's/.*UnknownProtoPacketsReceived = \([0-9][0-9]*\).*/GetSSIDStatsUnknownProtoPacketsReceived24g=\1/p'
  depends_on: assoc_24g
  capture: method_24g
- id: direct_24g
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.SSID.8.Stats.UnknownProtoPacketsReceived?"'
  depends_on: method_24g
  capture: direct_24g
pass_criteria:
- field: assoc_5g.AssocMac5g
  operator: equals
  value: 2c:59:17:00:04:85
  description: 5g DUT assoclist must resolve the expected STA MAC 2c:59:17:00:04:85.
- field: method_5g.GetSSIDStatsUnknownProtoPacketsReceived5g
  operator: equals
  reference: direct_5g.UnknownProtoPacketsReceived
  description: 5g getSSIDStats().UnknownProtoPacketsReceived must match direct Stats.UnknownProtoPacketsReceived.
- field: method_5g.GetSSIDStatsUnknownProtoPacketsReceived5g
  operator: equals
  value: 0
  description: 5g getSSIDStats().UnknownProtoPacketsReceived stays 0 for this workbook Not Supported case.
- field: assoc_6g.AssocMac6g
  operator: equals
  value: 2c:59:17:00:04:86
  description: 6g DUT assoclist must resolve the expected STA MAC 2c:59:17:00:04:86.
- field: method_6g.GetSSIDStatsUnknownProtoPacketsReceived6g
  operator: equals
  reference: direct_6g.UnknownProtoPacketsReceived
  description: 6g getSSIDStats().UnknownProtoPacketsReceived must match direct Stats.UnknownProtoPacketsReceived.
- field: method_6g.GetSSIDStatsUnknownProtoPacketsReceived6g
  operator: equals
  value: 0
  description: 6g getSSIDStats().UnknownProtoPacketsReceived stays 0 for this workbook Not Supported case.
- field: assoc_24g.AssocMac24g
  operator: equals
  value: 2c:59:17:00:04:97
  description: 2.4g DUT assoclist must resolve the expected STA MAC 2c:59:17:00:04:97.
- field: method_24g.GetSSIDStatsUnknownProtoPacketsReceived24g
  operator: equals
  reference: direct_24g.UnknownProtoPacketsReceived
  description: 2.4g getSSIDStats().UnknownProtoPacketsReceived must match direct Stats.UnknownProtoPacketsReceived.
- field: method_24g.GetSSIDStatsUnknownProtoPacketsReceived24g
  operator: equals
  value: 0
  description: 2.4g getSSIDStats().UnknownProtoPacketsReceived stays 0 for this workbook Not Supported case.
verification_command: |
  # 5g
  wl -i wl0 assoclist
  ubus-cli "WiFi.SSID.4.getSSIDStats()" | grep "UnknownProtoPacketsReceived"
  ubus-cli "WiFi.SSID.4.Stats.UnknownProtoPacketsReceived?"

  # 6g
  wl -i wl1 assoclist
  ubus-cli "WiFi.SSID.6.getSSIDStats()" | grep "UnknownProtoPacketsReceived"
  ubus-cli "WiFi.SSID.6.Stats.UnknownProtoPacketsReceived?"

  # 2.4g
  wl -i wl2 assoclist
  ubus-cli "WiFi.SSID.8.getSSIDStats()" | grep "UnknownProtoPacketsReceived"
  ubus-cli "WiFi.SSID.8.Stats.UnknownProtoPacketsReceived?"
