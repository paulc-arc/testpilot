id: wifi-llapi-r199-getradiostats-multicastpacketsreceived
name: getRadioStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 199
  object: WiFi.Radio.{i}.
  api: getRadioStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.{i}.getRadioStats()MulticastPacketsReceived : 80,'
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Get and record MulticastPacketsReceived: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep MulticastPacketsReceived
    MulticastPacketsReceived = 415, MulticastPacketsReceived = 0, MulticastPacketsReceived = 1811,'
- id: step2
  action: exec
  target: DUT
  command: Connect STA for every radio, ping "224.0.0.251" from every STAs.
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Read MulticastPacketsReceived again: ubus-cli "WiFi.Radio.*.getRadioStats()" | grep MulticastPacketsReceived MulticastPacketsReceived
    = 436, MulticastPacketsReceived = 0, MulticastPacketsReceived = 2549,'
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioStats() 執行不應回傳 error
verification_command: 'cat /proc/net/dev

  awk ''

  $1 ~ /^wl[0-2]:$/ {

  printf "%s RX_multipkg=%s\n", $1, $9

  }

  '' /proc/net/dev'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Committed
