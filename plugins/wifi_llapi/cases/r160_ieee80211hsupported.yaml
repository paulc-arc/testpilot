    with driver capability and packets'' tag from radio beacons: ubus-cli WiFi.Radio.*.IEEE80211hSupported? > WiFi.Radio.*.IEEE80211hSupported?
    WiFi.Radio.1.IEEE80211hSupported=1 WiFi.Radio.2.IEEE80211hSupported=0 WiFi.Radio.3.IEEE80211hSupported=0'
