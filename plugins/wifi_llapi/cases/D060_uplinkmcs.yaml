id: wifi-llapi-D060-uplinkmcs
name: "UplinkMCS — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 60
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: UplinkMCS
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.UplinkMCS?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
      - iface: 5g
        mode: sta
        ssid: testpilot5G
        key: "00000000"
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (station role for this case; do not rely on the old A0/B0 heuristic)
  Transport:
  - serialwrap attach COM0 / COM1
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G
  Preconditions:
  - keep only one associated station on AP1 so AssociatedDevice.1 stays deterministic
  - use the verified non-open 5G baseline for this case
setup_steps: |
  1) DUT 5G baseline:
     - enable Radio.1 / SSID.4 / AP1
     - configure AP1 as WPA2-Personal with password 00000000 and MFP disabled
     - keep the validated live 5G baseline as testpilot5G / 00000000
  2) STA 5G preparation:
     - disable local AP1/AP2 on COM1
     - move COM1 br-lan off 192.168.1.0/24 to avoid bridge self-hit side effects
     - reset wl0 and its wpa_supplicant control socket
     - connect wl0 to testpilot5G with WPA-PSK
  3) Association evidence:
     - COM1: iw dev wl0 link ; wpa_cli -p /var/run/wpa_supplicant -i wl0 status
     - COM0: wl -i wl0 assoclist
  4) Uplink trigger:
     - assign wl0 a temporary 192.168.1.x address
     - ping DUT 192.168.1.1 through wl0 before the DUT reread so rx nrate reflects uplink data traffic
sta_env_setup: |
  DUT 5G AP baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.1.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.1.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.OfdmaEnable=1
    ubus-cli WiFi.Radio.1.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.1.OperatingStandards=ax
    ubus-cli WiFi.Radio.1.RxChainCtrl=-1
    ubus-cli WiFi.Radio.1.TxChainCtrl=-1
    ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.1.Sensing.Enable=1
    ubus-cli WiFi.Radio.1.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.1.LongRetryLimit=6
    ubus-cli WiFi.Radio.1.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.1.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.4.SSID=testpilot5G
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.2.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA2-Personal
    ubus-cli "WiFi.AccessPoint.1.Security.KeyPassPhrase=\"00000000\""
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Disabled
    ubus-cli WiFi.AccessPoint.1.Enable=1
  STA 5G preparation:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    ubus-cli WiFi.AccessPoint.1.Enable=0
    ubus-cli WiFi.AccessPoint.2.Enable=0
    wpa_cli terminate 2>/dev/null || true
    rm -f /var/run/wpa_supplicant/wl0 2>/dev/null || true
    iw dev wl0.1 del 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    iw dev wl0 set type managed
    ifconfig wl0 up
    mkdir -p /var/run/wpa_supplicant
    printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nnetwork={\nssid="testpilot5G"\npsk="00000000"\nkey_mgmt=WPA-PSK\nscan_ssid=1\n}\n' > /tmp/wpa_wl0.conf
    wpa_supplicant -B -D nl80211 -i wl0 -c /tmp/wpa_wl0.conf -C /var/run/wpa_supplicant
    sleep 3
  STA 5G connect verify:
    wpa_cli -p /var/run/wpa_supplicant -i wl0 reconnect
    sleep 10
    iw dev wl0 link
    wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  DUT association evidence:
    wl -i wl0 assoclist
test_procedure: |
  1) Confirm the 5G STA is associated to AP1 and resolve its live MAC address.
  2) Move COM1 br-lan away from 192.168.1.0/24, assign wl0 a temporary 192.168.1.x address, and drive uplink traffic with ping so the DUT rx nrate reflects STA -> AP data traffic instead of control frames.
  3) After the uplink trigger, capture a fresh AssociatedDevice.1 snapshot that includes both the post-trigger MAC slot and UplinkMCS, then cross-check the same STA against wl0 sta_info rx nrate.
  4) Pass when the AP1 slot stays pinned to the same STA, UplinkMCS is a non-negative integer, and it matches the driver rx nrate MCS for that same station.
steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"
  capture: assoc_entry
- id: step2
  action: exec
  target: STA
  command: ifconfig wl0 192.168.1.3 netmask 255.255.255.0 up && ip route get 192.168.1.1
  depends_on: step1
  capture: sta_route
- id: step3
  action: exec
  target: STA
  command: ping -I wl0 -c 8 -W 1 192.168.1.1
  depends_on: step2
  capture: sta_probe
- id: step4
  action: exec
  target: DUT
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?"); STA_MAC=$(printf '%s\n' "$OUT" | sed -n 's/.*MACAddress="\([^"]*\)".*/\1/p' | head -n 1); STA_MAC_LOWER=$(echo "$STA_MAC" | tr 'A-F' 'a-f'); printf '%s\n' "$OUT" | sed -n 's/.*UplinkMCS=\([^[:space:]]*\).*/UplinkMCS=\1/p'; [ -n "$STA_MAC" ] && echo AssocMacAfterTrigger=$STA_MAC && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC_LOWER | sed -n '/rx nrate/,$p' | sed -n '1,2p' && wl -i wl0 sta_info $STA_MAC_LOWER | sed -n '/rx nrate/{n;s/.*mcs \([0-9][0-9]*\).*/DriverUplinkMCS=\1/p;}'
  depends_on: step3
  capture: result
pass_criteria:
- field: assoc_entry.MACAddress
  operator: regex
  value: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
  description: AP1 AssociatedDevice.1 must first resolve to the live 5G STA MAC.
- field: result.AssocMacAfterTrigger
  operator: regex
  value: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
  description: The post-trigger AssociatedDevice.1 snapshot must still expose a concrete STA MAC.
- field: result.AssocMacAfterTrigger
  operator: equals
  reference: assoc_entry.MACAddress
  description: The AP1 AssociatedDevice.1 slot must remain pinned to the same STA across the uplink trigger.
- field: result.UplinkMCS
  operator: regex
  value: ^[0-9]+$
  description: UplinkMCS should be a live non-negative integer after the STA uplink trigger.
- field: result.DriverAssocMac
  operator: equals
  reference: result.AssocMacAfterTrigger
  description: Driver uplink sampling must target the same post-trigger AssociatedDevice MAC snapshot.
- field: result.DriverUplinkMCS
  operator: regex
  value: ^[0-9]+$
  description: wl0 sta_info rx nrate must emit a concrete uplink MCS value for the same STA after the ping trigger.
- field: result.UplinkMCS
  operator: equals
  reference: result.DriverUplinkMCS
  description: LLAPI UplinkMCS must match the driver rx nrate MCS parsed from wl0 sta_info for the same station.
verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?"'
  - 'OUT=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?"); STA_MAC=$(printf ''%s\n'' "$OUT" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p'' | head -n 1); STA_MAC_LOWER=$(echo "$STA_MAC" | tr ''A-F'' ''a-f''); printf ''%s\n'' "$OUT" | sed -n ''s/.*UplinkMCS=\([^[:space:]]*\).*/UplinkMCS=\1/p''; [ -n "$STA_MAC" ] && echo AssocMacAfterTrigger=$STA_MAC && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC_LOWER | sed -n ''/rx nrate/,$p'' | sed -n ''1,2p'' && wl -i wl0 sta_info $STA_MAC_LOWER | sed -n ''/rx nrate/{n;s/.*mcs \([0-9][0-9]*\).*/DriverUplinkMCS=\1/p;}'''
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
