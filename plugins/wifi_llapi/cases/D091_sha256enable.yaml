id: wifi-llapi-D091-sha256enable
name: "SHA256Enable \u2014 WiFi.AccessPoint.{i}.Security"
version: '1.0'
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 93
  object: "WiFi.AccessPoint.{i}.Security"
  api: "SHA256Enable"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Security.SHA256Enable=1
llapi_support: Support
implemented_by: pWHM
bands:
  - 5g
  - 6g
  - 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (B0, AP role)
  Transport:
  - serialwrap attach COM0
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / WPA2-Personal / 00000000
test_procedure: |
  Per band (5G=AP1/wl0, 6G=AP3/wl1, 2.4G=AP5/wl2):
  1) Capture baseline: LLAPI getter + hostapd wpa_key_mgmt
  2) Set SHA256Enable=1
  3) Readback: LLAPI getter + hostapd wpa_key_mgmt cross-check
  4) Restore SHA256Enable=0 and verify
  Expected: all 3 bands accept setter and readback 1, but hostapd
  wpa_key_mgmt does NOT gain -SHA256 suffix -> Fail-shaped mismatch.

steps:
  - id: step1_baseline_5g
    action: exec
    target: DUT
    command:
      - echo "BaselineSHA256Enable5g=$(ubus-cli 'WiFi.AccessPoint.1.Security.SHA256Enable?' 2>/dev/null | grep -o 'SHA256Enable=[0-9]*' | cut -d= -f2)"
      - echo "BaselineWpaKeyMgmt5g=$(grep '^wpa_key_mgmt=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: baseline_5g

  - id: step2_set_5g
    action: exec
    target: DUT
    depends_on: step1_baseline_5g
    command: 'ubus-cli WiFi.AccessPoint.1.Security.SHA256Enable=1'
    capture: set_5g

  - id: step3_readback_5g
    action: exec
    target: DUT
    depends_on: step2_set_5g
    command:
      - sleep 3
      - echo "GetterSHA256Enable5g=$(ubus-cli 'WiFi.AccessPoint.1.Security.SHA256Enable?' 2>/dev/null | grep -o 'SHA256Enable=[0-9]*' | cut -d= -f2)"
      - echo "HostapdWpaKeyMgmt5g=$(grep '^wpa_key_mgmt=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: readback_5g

  - id: step4_restore_5g
    action: exec
    target: DUT
    depends_on: step3_readback_5g
    command:
      - ubus-cli WiFi.AccessPoint.1.Security.SHA256Enable=0
      - sleep 2
      - echo "RestoredSHA256Enable5g=$(ubus-cli 'WiFi.AccessPoint.1.Security.SHA256Enable?' 2>/dev/null | grep -o 'SHA256Enable=[0-9]*' | cut -d= -f2)"
    capture: restore_5g

  - id: step5_baseline_6g
    action: exec
    target: DUT
    depends_on: step4_restore_5g
    command:
      - echo "BaselineSHA256Enable6g=$(ubus-cli 'WiFi.AccessPoint.3.Security.SHA256Enable?' 2>/dev/null | grep -o 'SHA256Enable=[0-9]*' | cut -d= -f2)"
      - echo "BaselineWpaKeyMgmt6g=$(grep '^wpa_key_mgmt=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: baseline_6g

  - id: step6_set_6g
    action: exec
    target: DUT
    depends_on: step5_baseline_6g
    command: 'ubus-cli WiFi.AccessPoint.3.Security.SHA256Enable=1'
    capture: set_6g

  - id: step7_readback_6g
    action: exec
    target: DUT
    depends_on: step6_set_6g
    command:
      - sleep 3
      - echo "GetterSHA256Enable6g=$(ubus-cli 'WiFi.AccessPoint.3.Security.SHA256Enable?' 2>/dev/null | grep -o 'SHA256Enable=[0-9]*' | cut -d= -f2)"
      - echo "HostapdWpaKeyMgmt6g=$(grep '^wpa_key_mgmt=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: readback_6g

  - id: step8_restore_6g
    action: exec
    target: DUT
    depends_on: step7_readback_6g
    command:
      - ubus-cli WiFi.AccessPoint.3.Security.SHA256Enable=0
      - sleep 2
      - echo "RestoredSHA256Enable6g=$(ubus-cli 'WiFi.AccessPoint.3.Security.SHA256Enable?' 2>/dev/null | grep -o 'SHA256Enable=[0-9]*' | cut -d= -f2)"
    capture: restore_6g

  - id: step9_baseline_24g
    action: exec
    target: DUT
    depends_on: step8_restore_6g
    command:
      - echo "BaselineSHA256Enable24g=$(ubus-cli 'WiFi.AccessPoint.5.Security.SHA256Enable?' 2>/dev/null | grep -o 'SHA256Enable=[0-9]*' | cut -d= -f2)"
      - echo "BaselineWpaKeyMgmt24g=$(grep '^wpa_key_mgmt=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: baseline_24g

  - id: step10_set_24g
    action: exec
    target: DUT
    depends_on: step9_baseline_24g
    command: 'ubus-cli WiFi.AccessPoint.5.Security.SHA256Enable=1'
    capture: set_24g

  - id: step11_readback_24g
    action: exec
    target: DUT
    depends_on: step10_set_24g
    command:
      - sleep 3
      - echo "GetterSHA256Enable24g=$(ubus-cli 'WiFi.AccessPoint.5.Security.SHA256Enable?' 2>/dev/null | grep -o 'SHA256Enable=[0-9]*' | cut -d= -f2)"
      - echo "HostapdWpaKeyMgmt24g=$(grep '^wpa_key_mgmt=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: readback_24g

  - id: step12_restore_24g
    action: exec
    target: DUT
    depends_on: step11_readback_24g
    command:
      - ubus-cli WiFi.AccessPoint.5.Security.SHA256Enable=0
      - sleep 2
      - echo "RestoredSHA256Enable24g=$(ubus-cli 'WiFi.AccessPoint.5.Security.SHA256Enable?' 2>/dev/null | grep -o 'SHA256Enable=[0-9]*' | cut -d= -f2)"
    capture: restore_24g

pass_criteria:
  - field: baseline_5g.BaselineSHA256Enable5g
    operator: equals
    value: '0'
    description: '5G baseline SHA256Enable should be 0'
  - field: readback_5g.GetterSHA256Enable5g
    operator: equals
    value: '1'
    description: '5G getter reads back 1 after setter'
  - field: restore_5g.RestoredSHA256Enable5g
    operator: equals
    value: '0'
    description: '5G SHA256Enable restored to 0'
  - field: baseline_6g.BaselineSHA256Enable6g
    operator: equals
    value: '0'
    description: '6G baseline SHA256Enable should be 0'
  - field: readback_6g.GetterSHA256Enable6g
    operator: equals
    value: '1'
    description: '6G getter reads back 1 after setter'
  - field: restore_6g.RestoredSHA256Enable6g
    operator: equals
    value: '0'
    description: '6G SHA256Enable restored to 0'
  - field: baseline_24g.BaselineSHA256Enable24g
    operator: equals
    value: '0'
    description: '2.4G baseline SHA256Enable should be 0'
  - field: readback_24g.GetterSHA256Enable24g
    operator: equals
    value: '1'
    description: '2.4G getter reads back 1 after setter'
  - field: restore_24g.RestoredSHA256Enable24g
    operator: equals
    value: '0'
    description: '2.4G SHA256Enable restored to 0'

verification_command:
  - 'grep ''^wpa_key_mgmt='' /tmp/wl0_hapd.conf'
  - 'grep ''^wpa_key_mgmt='' /tmp/wl1_hapd.conf'
  - 'grep ''^wpa_key_mgmt='' /tmp/wl2_hapd.conf'

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC: wl[i]_hapd.conf always return 0'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'LLAPI setter accepted and getter reads back 1 on all 3 bands, but hostapd wpa_key_mgmt stays WPA-PSK (5G/2.4G) or SAE (6G) without gaining SHA256 suffix. Fail-shaped no-op on all bands.'
