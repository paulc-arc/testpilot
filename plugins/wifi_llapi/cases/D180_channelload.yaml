  expected: ChannelLoad 回傳 0-100 的百分比整數
  description: Radio.2 (6g) ChannelLoad getter（live=61）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.ChannelLoad?"
  expected: ChannelLoad 回傳 0-100 的百分比整數
  description: Radio.3 (2.4g) ChannelLoad getter（live=100）
pass_criteria:
- field: getter_5g.ChannelLoad
  operator: regex
  value: ^\d+$
- field: getter_6g.ChannelLoad
