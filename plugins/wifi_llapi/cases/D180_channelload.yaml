id: d180-radio-channelload
name: D180 Radio ChannelLoad
source:
  row: 141
  object: WiFi.Radio.{i}.
  api: ChannelLoad
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: read-only 百分比指標；setter 回 error 15 (is read only)
topology:
