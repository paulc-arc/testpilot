id: wifi-llapi-r167-multiusermimoenabled
name: MultiUserMIMOEnabled — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 206
  object: "WiFi.Radio.{i}."
  api: "MultiUserMIMOEnabled"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.MultiUserMIMOEnabled=1
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.MultiUserMIMOEnabled=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.MultiUserMIMOEnabled?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Check MIMO enabled or not ubus-cli WiFi.Radio.*.MultiUserMIMOEnabled? > WiFi.Radio.*.MultiUserMIMOEnabled? WiFi.Radio.1.MultiUserMIMOEnabled=1
    WiFi.Radio.2.MultiUserMIMOEnabled=1 WiFi.Radio.3.MultiUserMIMOEnabled=1
- id: step2
  action: exec
  target: DUT
  command: Connect WiFi Station then rune IPERF3 iperf3 -c 192.168.1.1 -P 10 -t 60
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: '. Check Actual Spatial Streams (NSS) in Use Command: iw dev wl1 station dump | grep -E "Station|tx bitrate|rx
    bitrate" Output: Station 38:06:e6:92:b0:4a (on wl1) tx bitrate: 4322.6 MBit/s 160MHz rx bitrate: 3890.3 MBit/s 160MHz
    Analysis: The reported TX/RX PHY rates are multi-Gbps. Such rates cannot be achieved using 1×1 or 2×2 at 6 GHz/160 MHz.
    This indicates multiple spatial streams are actively being used.'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: 'Confirm MIMO Capabilities from sta_info Command: wl -i wl1 sta_info 38:06:e6:92:b0:4a | grep -E "OMI|Nss|eht mcs|per
    antenna rssi|txchain|rxchain" Key output: OMI 0x32e3: 160Mhz rx=4ss tx=4ss ER_SU_DISABLE UL_MU_DISABLE per antenna rssi
    of last rx data frame: -36 -36 -35 -36 eht mcs 10 Nss 4 Tx Exp 0 bw160 ldpc 2xLTF GI 0.8us auto eht mcs 12 Nss 3 Tx Exp
    0 bw160 ldpc 2xLTF GI 1.6us auto 2.1 OMI — Advertised Spatial Streams rx = 4ss tx = 4ss The STA advertises support for
    4 spatial streams in both TX and RX. 2.2 Per-Antenna RSSI — Active Chain Confirmation -36 -36 -35 -36 Four separate RSSI
    values confirm four active receive chains. This validates 4×4 MIMO operation at the RF chain level.'
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: 'AP RF Chain Capability (txchain / rxchain) Commands: wl -i wl1 txchain / wl -i wl1 rxchain Output: txchain: 15
    (0xf) rxchain: 15 (0xf) Analysis: 0xf (binary 1111) means 4 TX chains and 4 RX chains are enabled. Confirms the AP is
    configured as 4×4 MIMO capable. Based on: Multi-Gbps PHY rates from iw: OMI advertisement confirming 4ss TX/RX Per-antenna
    RSSI showing 4 active RF chains AP reporting 4 TX + 4 RX chains enabled MIMO is enabled and working correctly on 6 GHz
    (4×4 MIMO).'
  depends_on: step4
  capture: result
pass_criteria:
- field: result.MultiUserMIMOEnabled
  operator: contains
  value: '1'
  description: MultiUserMIMOEnabled 應回傳包含 MultiUserMIMOEnabled=1
verification_command: 'root@prplOS:/# wl -i wl0 mu_features

  1

  root@prplOS:/# wl -i wl1 mu_features

  1

  root@prplOS:/# wl -i wl1 mu_features

  1'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'Note: 2.4GHz mu features are disable by default "need clarification why it is disabled by default because 5G
      and 6G are enabled."'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
