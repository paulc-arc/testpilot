id: d035-assocdev-operatingstandard
name: D035 AssociatedDevice OperatingStandard
source:
  row: 35
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: OperatingStandard
  baseline: 0310-BGW720-300
bands:
- 5g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: |
      OperatingStandard — workbook row 35 remains Pass / Pass / Pass.
      Current 0403 source still exposes a read-only AccessPoint AssociatedDevice OperatingStandard
      getter, and the live associated STA path exact-closes a valid standard string
      (`OperatingStandard="ax"`) on the current lab baseline.
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
steps:
- id: step_5g_assoc_check
  target: dut
  action: read
  capture: assoc_check
  command: wl -i wl0 assoclist | head -1
  expected: 至少一個 STA MAC
  description: 確認 AP1 有 associated STA
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.OperatingStandard?"
  expected: OperatingStandard 回傳有效值
  description: AP1 AssociatedDevice.1 OperatingStandard getter
  depends_on: step_5g_assoc_check
pass_criteria:
- field: assoc_check
  operator: regex
  value: "assoclist [0-9A-Fa-f:]+"
- field: getter_5g.OperatingStandard
  operator: regex
  value: "^[a-z]+$"
