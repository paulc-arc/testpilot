id: wifi-llapi-r308-rrmcapabilities
name: RrmCapabilities — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 415
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "RrmCapabilities"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.RrmCapabilities="LINK,NEIGHBOR,BEACON_ACTIVE,BEACON_PASSIVE,BEACON_TABLE,LCI,AP_CHANNEL,FTM"
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.RrmCapabilities="LINK,NEIGHBOR,BEACON_ACTIVE,BEACON_PASSIVE,BEACON_TABLE,LCI,AP_CHANNEL,FTM"
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.RrmCapabilities?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW
- id: step2
  action: exec
  target: DUT
  command: Verify Station RrmCapabilities ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.RrmCapabilities? > WiFi.AccessPoint.*.AssociatedDevice.*.RrmCapabilities?
    WiFi.AccessPoint.1.AssociatedDevice.5.RrmCapabilities="LINK,NEIGHBOR,BEACON_ACTIVE,BEACON_PASSIVE,BEACON_TABLE,STATS,AP_CHANNEL"
    WiFi.AccessPoint.3.AssociatedDevice.2.RrmCapabilities="LINK,NEIGHBOR,BEACON_ACTIVE,BEACON_PASSIVE,BEACON_TABLE,STATS,AP_CHANNEL"
    WiFi.AccessPoint.5.AssociatedDevice.3.RrmCapabilities="LINK,NEIGHBOR,BEACON_ACTIVE,BEACON_PASSIVE,BEACON_TABLE,STATS,AP_CHANNEL"
  depends_on: step1
  capture: result
pass_criteria:
- field: result.RrmCapabilities
  operator: contains
  value: '"LINK,NEIGHBOR,BEACON_ACTIVE,BEACON_PASSIVE,BEACON_TABLE,LCI,AP_CHANNEL,FTM"'
  description: RrmCapabilities 應回傳包含 RrmCapabilities="LINK,NEIGHBOR,BEACON_ACTIVE,BEACON_PASSIVE,BEACON_TABLE,LCI,AP_CHANNEL,FTM"
verification_command: 'root@prplOS:/# wl -i wl0 sta_info 56:50:99:6B:A0:89 | grep RRM

  RRM capability = 0x10873 Link_Measurement Neighbor_Report Beacon_Passive Beacon_Active Beacon_Table Statistics_Measurement
  AP_Channel_Report


  root@prplOS:/# wl -i wl1 sta_info 56:50:99:6B:A0:89 | grep RRM

  RRM capability = 0x10873 Link_Measurement Neighbor_Report Beacon_Passive Beacon_Active Beacon_Table Statistics_Measurement
  AP_Channel_Report


  root@prplOS:/# wl -i wl2 sta_info 56:50:99:6B:A0:89 | grep RRM

  RRM capability = 0x10873 Link_Measurement Neighbor_Report Beacon_Passive Beacon_Active Beacon_Table Statistics_Measurement
  AP_Channel_Report'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
