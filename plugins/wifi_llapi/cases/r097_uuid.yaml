id: wifi-llapi-r097-uuid
name: UUID — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 110
  object: "WiFi.AccessPoint.{i}.WPS."
  api: "UUID"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.WPS.UUID=39383432-3635-f244-f046-453039383432
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.WPS.UUID=39383432-3635-f244-f046-453039383432
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.WPS.UUID?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Get GW WPS UUID ubus-cli WiFi.AccessPoint.? | grep .WPS.UUID WiFi.AccessPoint.1.WPS.UUID="4b58464a-5957-fc49-f845-57454b58464a"
    WiFi.AccessPoint.3.WPS.UUID="4b58464a-5957-fc49-f845-57454b58464a" WiFi.AccessPoint.5.WPS.UUID="4b58464a-5957-fc49-f845-57454b58464a"
- id: step2
  action: exec
  target: DUT
  command: Pair Station to GW via WPS.
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify UUID in EAP message - check in EAP -> Expanded Type (WSC) -> UUID
  depends_on: step2
  capture: result
pass_criteria:
- field: result.UUID
  operator: contains
  value: 39383432-3635-f244-f046-453039383432
  description: UUID 應回傳包含 UUID=39383432-3635-f244-f046-453039383432
verification_command: 'cat /tmp/wl0_hapd.conf |grep uuid

  root@prplOS:/# cat /tmp/wl0_hapd.conf |grep uuid

  uuid=4b58464a-5957-fc49-f845-57454b58464a

  root@prplOS:/# cat /tmp/wl1_hapd.conf |grep uuid

  root@prplOS:/# cat /tmp/wl2_hapd.conf |grep uuid

  uuid=4b58464a-5957-fc49-f845-57454b58464a'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Not Supported
    2.4g: Pass
    comment: 6G don't support WPS
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
