id: wifi-llapi-D098-wdsenable
name: WDSEnable — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 98
  object: WiFi.AccessPoint.{i}.
  api: WDSEnable
  baseline: 0310-BGW720-300
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WDSEnable?"
llapi_support: Support
implemented_by: Vendor Module
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: 'Topology:

  - DUT: COM1 (B0, AP role)

  Transport:

  - DUT via serialwrap COM1

  Baseline:

  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal

  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE

  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal

  Notes:

  - WDSEnable setter triggers BSS restart (10-15s) with WDS driver noise

  - Setter round-trip: baseline=0/dwds=0, set=1/dwds=1, restore=0/dwds=0

  - All 3 bands converge: getter + driver dwds fully align

  '
steps:
- id: step_5g_setter_roundtrip
  action: exec
  target: DUT
  command:
    - echo "Baseline5g=$(ubus-cli 'WiFi.AccessPoint.1.WDSEnable?' 2>/dev/null | grep -o 'WDSEnable=[0-9]*' | cut -d= -f2)"
    - echo "DriverBaseline5g=$(wl -i wl0 dwds 2>/dev/null)"
    - ubus-cli WiFi.AccessPoint.1.WDSEnable=1
    - sleep 15
    - echo "AfterSet5g=$(ubus-cli 'WiFi.AccessPoint.1.WDSEnable?' 2>/dev/null | grep -o 'WDSEnable=[0-9]*' | cut -d= -f2)"
    - echo "DriverAfterSet5g=$(wl -i wl0 dwds 2>/dev/null)"
    - ubus-cli WiFi.AccessPoint.1.WDSEnable=0
    - sleep 15
    - echo "AfterRestore5g=$(ubus-cli 'WiFi.AccessPoint.1.WDSEnable?' 2>/dev/null | grep -o 'WDSEnable=[0-9]*' | cut -d= -f2)"
    - echo "DriverAfterRestore5g=$(wl -i wl0 dwds 2>/dev/null)"
  capture: wds_5g
- id: step_6g_setter_roundtrip
  action: exec
  target: DUT
  command:
    - echo "Baseline6g=$(ubus-cli 'WiFi.AccessPoint.3.WDSEnable?' 2>/dev/null | grep -o 'WDSEnable=[0-9]*' | cut -d= -f2)"
    - echo "DriverBaseline6g=$(wl -i wl1 dwds 2>/dev/null)"
    - ubus-cli WiFi.AccessPoint.3.WDSEnable=1
    - sleep 15
    - echo "AfterSet6g=$(ubus-cli 'WiFi.AccessPoint.3.WDSEnable?' 2>/dev/null | grep -o 'WDSEnable=[0-9]*' | cut -d= -f2)"
    - echo "DriverAfterSet6g=$(wl -i wl1 dwds 2>/dev/null)"
    - ubus-cli WiFi.AccessPoint.3.WDSEnable=0
    - sleep 15
    - echo "AfterRestore6g=$(ubus-cli 'WiFi.AccessPoint.3.WDSEnable?' 2>/dev/null | grep -o 'WDSEnable=[0-9]*' | cut -d= -f2)"
    - echo "DriverAfterRestore6g=$(wl -i wl1 dwds 2>/dev/null)"
  capture: wds_6g
  depends_on: step_5g_setter_roundtrip
- id: step_24g_setter_roundtrip
  action: exec
  target: DUT
  command:
    - echo "Baseline24g=$(ubus-cli 'WiFi.AccessPoint.5.WDSEnable?' 2>/dev/null | grep -o 'WDSEnable=[0-9]*' | cut -d= -f2)"
    - echo "DriverBaseline24g=$(wl -i wl2 dwds 2>/dev/null)"
    - ubus-cli WiFi.AccessPoint.5.WDSEnable=1
    - sleep 15
    - echo "AfterSet24g=$(ubus-cli 'WiFi.AccessPoint.5.WDSEnable?' 2>/dev/null | grep -o 'WDSEnable=[0-9]*' | cut -d= -f2)"
    - echo "DriverAfterSet24g=$(wl -i wl2 dwds 2>/dev/null)"
    - ubus-cli WiFi.AccessPoint.5.WDSEnable=0
    - sleep 15
    - echo "AfterRestore24g=$(ubus-cli 'WiFi.AccessPoint.5.WDSEnable?' 2>/dev/null | grep -o 'WDSEnable=[0-9]*' | cut -d= -f2)"
    - echo "DriverAfterRestore24g=$(wl -i wl2 dwds 2>/dev/null)"
  capture: wds_24g
  depends_on: step_6g_setter_roundtrip
pass_criteria:
- field: wds_5g.Baseline5g
  operator: equals
  value: '0'
  description: 5G baseline WDSEnable=0
- field: wds_5g.DriverBaseline5g
  operator: equals
  value: '0'
  description: 5G baseline driver dwds=0
- field: wds_5g.AfterSet5g
  operator: equals
  value: '1'
  description: 5G setter round-trip WDSEnable=1
- field: wds_5g.DriverAfterSet5g
  operator: equals
  value: '1'
  description: 5G driver dwds=1 after set
- field: wds_5g.AfterRestore5g
  operator: equals
  value: '0'
  description: 5G restore WDSEnable=0
- field: wds_5g.DriverAfterRestore5g
  operator: equals
  value: '0'
  description: 5G driver dwds=0 after restore
- field: wds_6g.Baseline6g
  operator: equals
  value: '0'
  description: 6G baseline WDSEnable=0
- field: wds_6g.DriverBaseline6g
  operator: equals
  value: '0'
  description: 6G baseline driver dwds=0
- field: wds_6g.AfterSet6g
  operator: equals
  value: '1'
  description: 6G setter round-trip WDSEnable=1
- field: wds_6g.DriverAfterSet6g
  operator: equals
  value: '1'
  description: 6G driver dwds=1 after set
- field: wds_6g.AfterRestore6g
  operator: equals
  value: '0'
  description: 6G restore WDSEnable=0
- field: wds_6g.DriverAfterRestore6g
  operator: equals
  value: '0'
  description: 6G driver dwds=0 after restore
- field: wds_24g.Baseline24g
  operator: equals
  value: '0'
  description: 2.4G baseline WDSEnable=0
- field: wds_24g.DriverBaseline24g
  operator: equals
  value: '0'
  description: 2.4G baseline driver dwds=0
- field: wds_24g.AfterSet24g
  operator: equals
  value: '1'
  description: 2.4G setter round-trip WDSEnable=1
- field: wds_24g.DriverAfterSet24g
  operator: equals
  value: '1'
  description: 2.4G driver dwds=1 after set
- field: wds_24g.AfterRestore24g
  operator: equals
  value: '0'
  description: 2.4G restore WDSEnable=0
- field: wds_24g.DriverAfterRestore24g
  operator: equals
  value: '0'
  description: 2.4G driver dwds=0 after restore
verification_command:
  - 'wl -i wl0 dwds   # 5G driver WDS flag'
  - 'wl -i wl1 dwds   # 6G driver WDS flag'
  - 'wl -i wl2 dwds   # 2.4G driver WDS flag'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'All 3 bands: setter WDSEnable=1 accepted, getter reads 1, driver dwds=1; restore WDSEnable=0 returns to baseline
      0/dwds=0. BSS restart noise (wds0.x.1, dhd_flow_rings) is expected during toggle.'
