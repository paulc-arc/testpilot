id: wifi-llapi-r350-ac-bk-stats-wmmbytessent-radio
name: AC_BK — WiFi.Radio.{i}.Stats.WmmBytesSent.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 350
  object: WiFi.Radio.{i}.Stats.WmmBytesSent.
  api: AC_BK
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Stats.WmmBytesSent.AC_BK=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect two WiFi station (use another WiFi7 GW as station with built-in IPERF3)
- id: step2
  action: exec
  target: DUT
  command: Run IPERF iperf3 -c 192.168.1.1 -u -b 20M --tos 0x20
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Execute command ubus-cli "WiFi.Radio.*.getRadioStats()"
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Verify Radio Stats.WmmBytesSent.AC_BK ubus-cli WiFi.Radio.*.Stats.WmmBytesSent.AC_BK? ubus-cli WiFi.Radio.*.Stats.WmmBytesSent.AC_BK?
    > WiFi.Radio.*.Stats.WmmBytesSent.AC_BK? WiFi.Radio.1.Stats.WmmBytesSent.AC_BK=25882414 WiFi.Radio.2.Stats.WmmBytesSent.AC_BK=22243076
    WiFi.Radio.3.Stats.WmmBytesSent.AC_BK=25877810
  depends_on: step3
  capture: result
pass_criteria:
- field: result.AC_BK
  operator: contains
  value: '0'
  description: AC_BK 應回傳包含 AC_BK=0
verification_command: 'root@prplOS:/# wl -i wl0 wme_counters

  AC_BK: tx frames: 6824 bytes: 25882414 failed frames: 0 failed bytes: 0


  root@prplOS:/# wl -i wl1 wme_counters

  AC_BK: tx frames: 6243 bytes: 22243076 failed frames: 0 failed bytes: 0


  root@prplOS:/# wl -i wl2 wme_counters

  AC_BK: tx frames: 9126 bytes: 25877810 failed frames: 0 failed bytes: 0'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
