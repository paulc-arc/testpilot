id: wifi-llapi-r170-ofdmaenable
name: OfdmaEnable — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 210
  object: "WiFi.Radio.{i}."
  api: "OfdmaEnable"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.OfdmaEnable=1
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.OfdmaEnable=1
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.OfdmaEnable=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.OfdmaEnable?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Check OfdmaEnable root@prplOS:/tmp# ubus-cli WiFi.Radio.*.OfdmaEnable? > WiFi.Radio.*.OfdmaEnable? WiFi.Radio.1.OfdmaEnable=1
    WiFi.Radio.2.OfdmaEnable=1 WiFi.Radio.3.OfdmaEnable=1
- id: step2
  action: exec
  target: DUT
  command: 'Capture Beacon and make sure the following bits map are present: HE Capabilities IE HE Operation IE'
  depends_on: step1
  capture: result
pass_criteria:
- field: result.OfdmaEnable
  operator: contains
  value: '1'
  description: OfdmaEnable 應回傳包含 OfdmaEnable=1
verification_command: 'root@prplOS:~# wl -i wl0 he features

  63 (0x3f)

  root@prplOS:~# wl -i wl1 he features

  63 (0x3f)

  root@prplOS:~# wl -i wl2 he features

  63 (0x3f)


  63 (decimal) = 0x3f (hex)

  0x3f in binary = 0011 1111

  That means bits 0–5 are set, and higher bits are clear.


  Bit_x0001_Value_x0001_Meaning (high-level)

  0_x0001_0x01_x0001_HE support enabled

  1_x0001_0x02_x0001_HE SU (Single-User)

  2_x0001_0x04_x0001_HE MU (Multi-User)

  3_x0001_0x08_x0001_OFDMA support

  4_x0001_0x10_x0001_UL OFDMA / Trigger-based features

  5_x0001_0x20_x0001_HE MIMO / related HE enhancements

  6+_x0001_0x40+_x0001_Not enabled


  So 0x3f means all basic HE features supported by this firmware are enable'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
