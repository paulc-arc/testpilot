id: d203-radio-maxchannelbandwidth
name: D203 Radio MaxChannelBandwidth
source:
  row: 203
  object: WiFi.Radio.{i}.
  api: MaxChannelBandwidth
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: read-only getter exact-closes the active 0403 tri-band MaxChannelBandwidth values
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.MaxChannelBandwidth?"
  expected: MaxChannelBandwidth 回傳有效值
  description: Radio.1 (5g) MaxChannelBandwidth getter（live=160MHz）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.MaxChannelBandwidth?"
  expected: MaxChannelBandwidth 回傳有效值
  description: Radio.2 (6g) MaxChannelBandwidth getter（live=320MHz）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.MaxChannelBandwidth?"
  expected: MaxChannelBandwidth 回傳有效值
  description: Radio.3 (2.4g) MaxChannelBandwidth getter（live=40MHz）
pass_criteria:
- field: getter_5g.MaxChannelBandwidth
  operator: regex
  value: ".+"
- field: getter_6g.MaxChannelBandwidth
  operator: regex
  value: ".+"
- field: getter_24g.MaxChannelBandwidth
  operator: regex
  value: ".+"
