id: wifi-llapi-D205-maxchannelbandwidth
aliases:
  - wifi-llapi-r166-maxchannelbandwidth
name: MaxChannelBandwidth — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 205
  object: "WiFi.Radio.{i}."
  api: "MaxChannelBandwidth"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.MaxChannelBandwidth=80MHz
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.MaxChannelBandwidth=80MHz
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

sta_env_setup: |
  STA env setup baseline (COM1 / A0, serialwrap):
  1) Enable STA radios:
     ubus-cli WiFi.Radio.1.Enable=1
     ubus-cli WiFi.Radio.2.Enable=1
     ubus-cli WiFi.Radio.3.Enable=1
  2) 5G connect verify (wl0 -> B0_5G_AP):
     ubus-cli WiFi.AccessPoint.1.Enable=0
     ubus-cli WiFi.AccessPoint.2.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl0.1 del 2>/dev/null || true
     iw dev wl0 set type managed
     ifconfig wl0 up
     iw dev wl0 connect B0_5G_AP
     sleep 3
     iw dev wl0 link
  3) 6G connect verify (wl1 -> B0_6G_AP, SAE):
     wpa_cli terminate 2>/dev/null || true
     sleep 1
     iw dev wl1.1 del 2>/dev/null || true
     iw dev wl1 disconnect 2>/dev/null || true
     iw dev wl1 set type managed
     ifconfig wl1 up
     printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\n' > /tmp/wpa_wl1.conf
     wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf
     sleep 2
     wpa_cli -i wl1 remove_network all
     wpa_cli -i wl1 add_network
     wpa_cli -i wl1 set_network 0 ssid '"B0_6G_AP"'
     wpa_cli -i wl1 set_network 0 key_mgmt SAE
     wpa_cli -i wl1 set_network 0 sae_password '"B0StaTest1234"'
     wpa_cli -i wl1 set_network 0 ieee80211w 2
     wpa_cli -i wl1 set_network 0 scan_ssid 1
     wpa_cli -i wl1 enable_network 0
     wpa_cli -i wl1 reconnect
     sleep 15
     iw dev wl1 link
     wpa_cli -i wl1 status
  4) 2.4G connect verify (wl2 -> B0_24G_AP):
     ubus-cli WiFi.AccessPoint.5.Enable=0
     ubus-cli WiFi.AccessPoint.6.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl2.1 del 2>/dev/null || true
     iw dev wl2 set type managed
     ifconfig wl2 up
     iw dev wl2 connect B0_24G_AP
     sleep 3
     iw dev wl2 link
  5) DUT association evidence (COM0):
     wl -i wl0 assoclist
     wl -i wl1 assoclist
     wl -i wl2 assoclist

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.MaxChannelBandwidth=80MHz
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.MaxChannelBandwidth?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Read-only API, defines max bandwidth for each radio: ubus-cli WiFi.Radio.*.MaxChannelBandwidth? > WiFi.Radio.*.MaxChannelBandwidth?
    WiFi.Radio.1.MaxChannelBandwidth="160MHz" WiFi.Radio.2.MaxChannelBandwidth="320MHz" WiFi.Radio.3.MaxChannelBandwidth="40MHz"'
  capture: result
pass_criteria:
- field: result.MaxChannelBandwidth
  operator: contains
  value: 80MHz
  description: MaxChannelBandwidth 應回傳包含 MaxChannelBandwidth=80MHz
verification_command: 'wl -i wl0 bw_cap

  Usage: wl bw_cap <2g|5g|6g> [<cap>]

  2g|5g|6g - Requested band

  cap:

  0x1 - 20MHz

  0x3 - 20/40MHz

  0x7 - 20/40/80MHz

  0xf - 20/40/80/160MHz

  0x1f - 20/40/80/160/320MHz

  0xff - Unrestricted


  root@prplOS:/# wl bw_cap 5g

  0xf

  root@prplOS:/# wl bw_cap 6g

  0x0

  root@prplOS:/# wl bw_cap 2g

  0x0'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'MaxChB is readonly. bw_cap keeps auto. Set chanspec can tune the bandwidth


      Please see the logs, capture from BDK version. It''s ok

      # wl -i wl0 bw_cap 6g; wl -i wl0 bw_cap 5g; wl -i wl0 bw_cap 2g

      0x1f   0x0  0x0

      # wl -i wl1 bw_cap 6g; wl -i wl1 bw_cap 5g; wl -i wl1 bw_cap 2g

      0x0  0xf   0x0

      # wl -i wl2 bw_cap 6g; wl -i wl2 bw_cap 5g; wl -i wl2 bw_cap 2g

      0x0 0x0  0x3

      #'
