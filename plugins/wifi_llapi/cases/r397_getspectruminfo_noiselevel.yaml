id: wifi-llapi-r397-getspectruminfo-noiselevel
name: getSpectrumInfo() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 532
  object: "WiFi.Radio.{i}."
  api: "getSpectrumInfo()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.getSpectrumInfo() noiselevel
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.getSpectrumInfo() noiselevel
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.getSpectrumInfo() noiselevel
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.getSpectrumInfo()"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Power On the GW
- id: step2
  action: exec
  target: DUT
  command: Verify "SpectrumInfo() noiselevel" ubus-cli "WiFi.Radio.*.getSpectrumInfo() noiselevel" > WiFi.Radio.*.getSpectrumInfo()
    noiselevel WiFi.Radio.1.getSpectrumInfo() returned [ [ ] ] WiFi.Radio.2.getSpectrumInfo() returned [ [ ] ] WiFi.Radio.3.getSpectrumInfo()
    returned [ [ ] ]
  depends_on: step1
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getSpectrumInfo() 執行不應回傳 error
verification_command: 'root@prplOS:/# wl -i wl0 noise

  -99

  root@prplOS:/# wl -i wl1 noise

  -96

  root@prplOS:/# wl -i wl2 noise

  -79

  root@prplOS:/#'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API return "empty"'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: wifi driver need to support survey feature
