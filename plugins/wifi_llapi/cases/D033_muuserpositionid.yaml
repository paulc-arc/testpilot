id: wifi-llapi-D033-muuserpositionid
name: "MUUserPositionId — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 35
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: MUUserPositionId
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
llapi_support: Not Supported
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: STA
    to: DUT
    band: 2.4g
test_environment: |
  Topology: DUT=COM0(AP) / STA=COM1(station)
  Live band mapping:
  - 5G : DUT wl0 / AP1 / BSSID 2c:59:17:00:19:95 / STA MAC 2C:59:17:00:04:85
  - 6G : DUT wl1 / AP3 -- BCME_NOTREADY (STA cannot associate; skip all 6G steps)
  - 2.4G: DUT wl2 / AP5 / BSSID 2C:59:17:00:19:A7 / STA MAC 2C:59:17:00:04:97
  Precondition: STA associated on the target band so AssociatedDevice.1 is deterministic.
test_procedure: |
  Read-only integer telemetry. MUUserPositionId is expected to expose the MU-MIMO user
  position assigned to the associated STA. On this platform the field is defined in pWHM
  only as a stub and returns 0 rather than a live hardware-backed MU scheduling value.
  Steps:
  1) Confirm 5G STA is associated so AssociatedDevice.1 is deterministic, then read AP1 MUUserPositionId.
  2) Confirm 2.4G STA is associated so AssociatedDevice.1 is deterministic, then read AP5 MUUserPositionId.
  3) 6G stays skipped because wl1 association is blocked by BCME_NOTREADY.
  Verdict: Not Supported (stub implementation).
steps:
- id: step1_5g_assoc
  action: exec
  target: DUT
  band: 5g
  command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
  capture: assoc_5g
- id: step2_5g
  action: exec
  target: DUT
  band: 5g
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MUUserPositionId?"
  depends_on: step1_5g_assoc
  capture: result_5g
- id: step3_6g
  action: skip
  target: DUT
  band: 6g
  reason: 6G BCME_NOTREADY -- STA cannot associate on wl1/AP3 in current lab.
- id: step4_24g_assoc
  action: exec
  target: DUT
  band: 2.4g
  command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
  capture: assoc_24g
- id: step5_24g
  action: exec
  target: DUT
  band: 2.4g
  command: ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.MUUserPositionId?"
  depends_on: step4_24g_assoc
  capture: result_24g
pass_criteria:
- field: assoc_5g.AssocMac5g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: "5G -- MUUserPositionId readback 前必須先確認 wl0 STA 已關聯"
- field: result_5g.MUUserPositionId
  operator: equals
  value: 0
  description: "5G -- stub returns 0; MU user position is not hardware-backed on this platform"
- field: assoc_24g.AssocMac24g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: "2.4G -- MUUserPositionId readback 前必須先確認 wl2 STA 已關聯"
- field: result_24g.MUUserPositionId
  operator: equals
  value: 0
  description: "2.4G -- stub returns 0; MU user position is not hardware-backed on this platform"
verification_command:
  - DUT# wl -i wl0 assoclist
  - 'DUT# ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MUUserPositionId?"'
  - DUT# wl -i wl2 assoclist
  - 'DUT# ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.MUUserPositionId?"'
results_reference:
  v4.0.3:
    5g: Not Supported
    6g: Skip
    2.4g: Not Supported
    comment: |
      MUUserPositionId — definition in pWHM only; MU-MIMO feature not implemented on this platform.
      Source-cross-check family evidence aligns with D032/D033 stub semantics:
      5G: WiFi.AccessPoint.1.AssociatedDevice.1.MUUserPositionId=0 (stub)
      2.4G: WiFi.AccessPoint.5.AssociatedDevice.1.MUUserPositionId=0 (stub)
