id: wifi-llapi-r071-macfilteraddresslist
name: MACFilterAddressList — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 71
  object: WiFi.AccessPoint.{i}.
  api: MACFilterAddressList
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.MACFilterAddressList=
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: \\Add Station MAC to the table ubus-cli "WiFi.AccessPoint.{i}.MACFiltering.addEntry(mac=62:2F:B8:66:BB:82)"
- id: step2
  action: exec
  target: DUT
  command: Check Station MAC added to the table ubus-cli WiFi.AccessPoint.? | grep MACFiltering.Entry WiFi.AccessPoint.1.MACFiltering.Entry.1.
    WiFi.AccessPoint.1.MACFiltering.Entry.1.Alias="cpe-Entry-1" WiFi.AccessPoint.1.MACFiltering.Entry.1.MACAddress="62:2F:B8:66:BB:82"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Set MAC Filtering Mode from Off to "WhiteList or Blacklist" ubus-cli WiFi.AccessPoint.{i}.MACFiltering.Mode="BlackList"
    Whitelist (allow list) and Blacklist (deny list)
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: MACFilterAddressList 應回傳非空結果
verification_command: 'cat /tmp/wl0_hapd.conf

  accept_mac_file=/tmp/hostap_wl0.acl

  or

  deny_mac_file=/tmp/hostap_wl0.acl


  cat /tmp/hostap_wl0.acl

  62:2F:B8:66:BB:82



  root@prplOS:/# cat /tmp/wl0_hapd.conf | grep mac

  macaddr_acl=0

  deny_mac_file=/tmp/hostap_wl0.acl

  root@prplOS:/# cat /tmp/hostap_wl0.acl

  62:2F:B8:66:BB:82'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
