id: wifi-llapi-r189-getradioairstats-txtime
name: getRadioAirStats() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 263
  object: "WiFi.Radio.{i}."
  api: "getRadioAirStats()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.{i}.getRadioAirStats() TxTime : 4,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.getRadioAirStats() TxTime : 4,
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.getRadioAirStats() TxTime : 4,
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.getRadioAirStats()"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: query
  action: exec
  target: DUT
  command: 'ubus-cli WiFi.Radio.{i}.getRadioAirStats() TxTime : 4,'
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getRadioAirStats() 執行不應回傳 error

verification_command: |
  ubus-cli "WiFi.Radio.*.getRadioStats()" 2>/dev/null | sed -n "1,200p" || true
  ubus-cli "WiFi.Radio.*.getRadioAirStats()" 2>/dev/null | sed -n "1,200p" || true
  ubus-cli "WiFi.Radio.*.getRadioAirStats?" 2>/dev/null || true
  cat /proc/net/dev | grep -E "Inter-|wl0|wl1|wl2"
  wl -i wl0 counters 2>/dev/null | sed -n "1,40p" || true

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : The value is always 0.'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: need to support survey in driver level(not only in  wl_cfg80211)
