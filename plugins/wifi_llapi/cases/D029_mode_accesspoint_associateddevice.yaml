id: wifi-llapi-D029-mode-accesspoint-associateddevice
name: "Mode — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 26
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: Mode
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
llapi_support: Not Supported
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: STA
    to: DUT
    band: 2.4g
test_environment: |
  Topology: DUT=COM0(AP) / STA=COM1(station)
  Live band mapping:
  - 5G : DUT wl0 / AP1 / BSSID 2c:59:17:00:19:95 / STA MAC 2C:59:17:00:04:85
  - 6G : DUT wl1 / AP3 -- BCME_NOTREADY (STA cannot associate; skip all 6G steps)
  - 2.4G: DUT wl2 / AP5 / BSSID 2C:59:17:00:19:A7 / STA MAC 2C:59:17:00:04:97
  Precondition: STA associated on the target band so AssociatedDevice.1 is deterministic.
test_procedure: |
  Read-only string telemetry. Mode is expected to return the IEEE 802.11 PHY mode
  the STA is operating in (e.g. "ax", "ac", "n"). However, this parameter is
  absent from the pWHM ODL entirely (not just unsupported -- parameter not found in ODL).
  Steps:
  1) Confirm 5G STA is associated so AssociatedDevice.1 is deterministic, then read AP1 Mode.
  2) Confirm 2.4G STA is associated so AssociatedDevice.1 is deterministic, then read AP5 Mode.
  3) 6G stays skipped because wl1 association is blocked by BCME_NOTREADY.
  Result: ERROR code 4 with the ODL-missing message on all queried bands.
  Verdict: Not Supported.
steps:
- id: step1_5g_assoc
  action: exec
  target: DUT
  band: 5g
  command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
  capture: assoc_5g
- id: step2_5g
  action: exec
  target: DUT
  band: 5g
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.Mode?"
  depends_on: step1_5g_assoc
  capture: result_5g
- id: step3_6g
  action: skip
  target: DUT
  band: 6g
  reason: 6G BCME_NOTREADY -- STA cannot associate on wl1/AP3 in current lab.
- id: step4_24g_assoc
  action: exec
  target: DUT
  band: 2.4g
  command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
  capture: assoc_24g
- id: step5_24g
  action: exec
  target: DUT
  band: 2.4g
  command: ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.Mode?"
  depends_on: step4_24g_assoc
  capture: result_24g
pass_criteria:
- field: assoc_5g.AssocMac5g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: "5G -- Mode readback 前必須先確認 wl0 STA 已關聯"
- field: result_5g.error
  operator: equals
  value: 4
  description: "5G -- expected error code 4 because Mode is absent from the pWHM ODL"
- field: result_5g.message
  operator: contains
  value: doesn't exist in odl
  description: "5G -- missing-ODL message must be explicit"
- field: assoc_24g.AssocMac24g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: "2.4G -- Mode readback 前必須先確認 wl2 STA 已關聯"
- field: result_24g.error
  operator: equals
  value: 4
  description: "2.4G -- expected error code 4 because Mode is absent from the pWHM ODL"
- field: result_24g.message
  operator: contains
  value: doesn't exist in odl
  description: "2.4G -- missing-ODL message must be explicit"
verification_command:
  - DUT# wl -i wl0 assoclist
  - 'DUT# ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.Mode?"'
  - DUT# wl -i wl2 assoclist
  - 'DUT# ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.Mode?"'
results_reference:
  v4.0.3:
    5g: Not Supported
    6g: Skip
    2.4g: Not Supported
    comment: |
      Live evidence (BCM v4.0.3):
      5G: ubus-cli returns ERROR code 4 -- "mode doesn't exist in odl"
      2.4G: ubus-cli returns ERROR code 4 -- "mode doesn't exist in odl"
      Parameter is absent from pWHM ODL (not just unsupported -- completely missing).
      Workbook BCM v4.0.3 column: Not Supported / Not Supported.
