id: wifi-llapi-r239-getssidstats-unicastpacketsreceived
name: getSSIDStats() — WiFi.SSID.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 239
  object: WiFi.SSID.{i}.
  api: getSSIDStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.SSID.{i}.getSSIDStats() UnicastPacketsReceived : 0,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW SSID4, SSID6 and SSID8
- id: step2
  action: exec
  target: DUT
  command: Run Ping between station's
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Get stats UnicastPacketsReceived ubus-cli "WiFi.SSID.?" | grep \.UnicastPacketsReceived WiFi.SSID.4.Stats.UnicastPacketsReceived=0
    WiFi.SSID.6.Stats.UnicastPacketsReceived=0 WiFi.SSID.8.Stats.UnicastPacketsReceived=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getSSIDStats() 執行不應回傳 error
