id: "wifi-llapi-getRadioStats"
name: "getRadioStats() BroadcastPacketsReceived counter verification"
version: "1.0"

source:
  report: "6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx"
  sheet: "Wifi_LLAPI"
  row: 191
  object: "WiFi.Radio.{i}."
  api: "getRadioStats()"

platform:
  prplos: "4.0.3"
  bdk: "6.3.1"

topology:
  links:
    - from: STA
      to: DUT
      band: "5g"
    - from: DUT
      to: EndpointPC
      interface: eth1

  devices:
    DUT:
      role: ap
      transport: serial
      config:
        - iface: "5g"
          mode: ap
          ssid: "{{SSID_5G}}"
          key: "{{KEY_5G}}"
          mlo: false

    STA:
      role: sta
      transport: adb
      config:
        - iface: "5g"
          mode: sta
          ssid: "{{SSID_5G}}"
          key: "{{KEY_5G}}"

    EndpointPC:
      role: endpoint
      transport: ssh
      config:
        - iface: eth0
          speed: "1G"

env_verify:
  - action: ping
    from: STA
    to: DUT
    expect: pass
  - action: ping
    from: DUT
    to: EndpointPC
    expect: pass

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     <fill hlapi_command>
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.getRadioStats()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
  - id: record_initial
    action: exec
    target: DUT
    command: |
      ubus-cli "WiFi.Radio.*.getRadioStats()" | grep BroadcastPacketsReceived
    capture: initial_counters

  - id: generate_traffic
    action: exec
    target: STA
    command: |
      arping -I {{STA_WIFI_IF}} -c 200 {{DUT_IP}}
    depends_on: record_initial
    timeout: 60

  - id: record_final
    action: exec
    target: DUT
    command: |
      ubus-cli "WiFi.Radio.*.getRadioStats()" | grep BroadcastPacketsReceived
    capture: final_counters
    depends_on: generate_traffic

pass_criteria:
  - field: final_counters.BroadcastPacketsReceived
    operator: ">"
    reference: initial_counters.BroadcastPacketsReceived
    description: "BroadcastPacketsReceived 計數器應在產生廣播流量後增加"

verification_command: |
  ubus-cli "WiFi.Radio.*.getRadioStats()" 2>/dev/null | sed -n "1,200p" || true
  ubus-cli "WiFi.Radio.*.getRadioAirStats()" 2>/dev/null | sed -n "1,200p" || true
  ubus-cli "WiFi.Radio.*.getRadioStats?" 2>/dev/null || true
  cat /proc/net/dev | grep -E "Inter-|wl0|wl1|wl2"
  wl -i wl0 counters 2>/dev/null | sed -n "1,40p" || true

bands: ["5g", "6g", "2.4g"]
