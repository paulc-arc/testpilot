id: wifi-llapi-r063-discoverymethodenabled-accesspoint-fils
name: DiscoveryMethodEnabled — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 68
  object: "WiFi.AccessPoint.{i}."
  api: "DiscoveryMethodEnabled"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.DiscoveryMethodEnabled=FILS
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.DiscoveryMethodEnabled=FILS
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.DiscoveryMethodEnabled=FILS
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.DiscoveryMethodEnabled?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 'ubus-cli WiFi.AccessPoint.1.DiscoveryMethodEnabled="FILS" > WiFi.AccessPoint.1.DiscoveryMethodEnabled=FILS ERROR:
    set WiFi.AccessPoint.1.DiscoveryMethodEnabled failed (10 - invalid value)'
  capture: result
pass_criteria:
- field: result.DiscoveryMethodEnabled
  operator: contains
  value: FILS
  description: DiscoveryMethodEnabled 應回傳包含 DiscoveryMethodEnabled=FILS

verification_command: |
  ubus-cli "WiFi.AccessPoint.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.AccessPoint.*.DiscoveryMethodEnabled?" 2>/dev/null || true
  wl -i wl0 bss 2>/dev/null || true; wl -i wl1 bss 2>/dev/null || true; wl -i wl2 bss 2>/dev/null || true
  wl -i wl0 assoclist; wl -i wl1 assoclist; wl -i wl2 assoclist

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : Cannot set DiscoveryMethodEnabled to FILS'
  v4.0.3:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: not supported by pwhm.can set with ubus-cli WiFi.AccessPoint.1.DiscoveryMethodEnabled="FILSDiscovery"
