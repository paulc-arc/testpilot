id: wifi-llapi-r247-bytesreceived-ssid-stats
name: BytesReceived — WiFi.SSID.{i}.Stats.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 247
  object: WiFi.SSID.{i}.Stats.
  api: BytesReceived
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.SSID.{i}.Stats.BytesReceived=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW SSID4, SSID6 and SSID8
- id: step2
  action: exec
  target: DUT
  command: Run Ping between station's
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Get stats BytesReceived ubus-cli WiFi.SSID.*.Stats.BytesReceived? > WiFi.SSID.*.Stats.BytesReceived? WiFi.SSID.4.Stats.BytesReceived=6395774
    WiFi.SSID.6.Stats.BytesReceived=1606747084 WiFi.SSID.8.Stats.BytesReceived=903667
  depends_on: step2
  capture: result
pass_criteria:
- field: result.BytesReceived
  operator: contains
  value: '0'
  description: BytesReceived 應回傳包含 BytesReceived=0
verification_command: 'cat /proc/net/dev | grep wl0


  root@prplOS:/# cat /proc/net/dev

  Inter-| Receive | Transmit

  face |bytes packets errs drop fifo frame compressed multicast|bytes packets errs drop fifo colls carrier compressed

  wl0: 6395774 33265 0 27 0 0 0 1207 153744631 225100 0 102 0 0 0 0

  wl1: 1606749304 1091082 0 10 0 0 0 13511 156618564 251946 0 83 0 0 0 0

  wl2: 903667 2955 0 41 0 0 0 56 52065676 146033 0 180 0 0 0 0'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
