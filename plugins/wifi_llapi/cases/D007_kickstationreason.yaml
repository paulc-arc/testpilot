id: wifi-llapi-D007-kickstationreason
aliases:
  - wifi-llapi-r003-kickstationreason
name: kickStationReason() — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 7
  object: "WiFi.AccessPoint.{i}."
  api: "kickStationReason()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.kickStationReason(macaddress=string, reason:int):bool
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
      - iface: 2.4g
        mode: sta
        ssid: '{{SSID_24G}}'
        key: '{{KEY_24G}}'
  links:
  - from: STA
    to: DUT
    band: 2.4g
test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT 2.4G baseline:
     - set Radio.3/SSID.8 for the 2.4G AP under test
     - configure AP5 as open with MFP disabled
     - enable AP5 before station association
  2) STA 2.4G preparation:
     - disable local AP5/AP6 on A0
     - clear wl2 AP child interface and switch wl2 to managed mode
     - connect wl2 to {{SSID_24G}}
  3) Association evidence:
     - A0: iw dev wl2 link
     - B0: wl -i wl2 assoclist
sta_env_setup: |
  DUT 2.4G AP baseline:
    ubus-cli WiFi.Radio.3.Enable=1
    ubus-cli WiFi.Radio.3.BeaconPeriod=100
    ubus-cli WiFi.Radio.3.DTIMPeriod=3
    ubus-cli WiFi.Radio.3.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.3.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.3.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.3.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.3.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.3.OfdmaEnable=1
    ubus-cli WiFi.Radio.3.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.3.OperatingStandards=ax
    ubus-cli WiFi.Radio.3.RxChainCtrl=-1
    ubus-cli WiFi.Radio.3.TxChainCtrl=-1
    ubus-cli WiFi.Radio.3.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.3.Sensing.Enable=1
    ubus-cli WiFi.Radio.3.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.3.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.3.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.3.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.3.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.3.LongRetryLimit=6
    ubus-cli WiFi.Radio.3.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.3.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.8.SSID={{SSID_24G}}
    ubus-cli WiFi.AccessPoint.5.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.6.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.5.Security.ModeEnabled=None
    ubus-cli WiFi.AccessPoint.5.Security.MFPConfig=Disabled
    ubus-cli WiFi.AccessPoint.5.Enable=1
    sleep 4
  STA 2.4G preparation:
    ubus-cli WiFi.AccessPoint.5.Enable=0
    ubus-cli WiFi.AccessPoint.6.Enable=0
    killall wpa_supplicant 2>/dev/null || true
    iw dev wl2.1 del 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    iw dev wl2 set type managed
    ifconfig wl2 up
    sleep 2
  STA 2.4G connect verify:
    iw dev wl2 connect {{SSID_24G}}
    sleep 8
    iw dev wl2 link
  DUT association evidence:
    wl -i wl2 assoclist
test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.kickStationReason(macaddress=string, reason:int):bool
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.kickStationReason()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
      iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.*.MACAddress?"'
- id: step2
  action: exec
  target: DUT
  command: |
    MAC="$(wl -i wl2 assoclist 2>/dev/null | awk 'NR==1{print $2}')"
    ubus-cli "WiFi.AccessPoint.5.kickStationReason(macaddress=$MAC,reason=1)"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.*.AuthenticationState?"'
  depends_on: step2
  capture: result
pass_criteria:
- field: result.AuthenticationState
  operator: contains
  value: '0'
  description: kickStationReason 執行後應回傳 AuthenticationState=0
verification_command: |
  ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.*.MACAddress?"
  ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.*.AuthenticationState?"
  wl -i wl2 assoclist
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
