id: wifi-llapi-r151-dtimperiod
name: DTIMPeriod — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 190
  object: "WiFi.Radio.{i}."
  api: "DTIMPeriod"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.DTIMPeriod=3
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.DTIMPeriod=3
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.DTIMPeriod?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Check default DTIMPeriod: ubus-cli WiFi.Radio.*.DTIMPeriod? > WiFi.Radio.*.DTIMPeriod? WiFi.Radio.1.DTIMPeriod=3
    WiFi.Radio.2.DTIMPeriod=3 WiFi.Radio.3.DTIMPeriod=3'
- id: step2
  action: exec
  target: DUT
  command: 'Capture air beacons, check DTIM Period: 3'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Modify DTIMPeriod to any value: ubus-cli WiFi.Radio.*.DTIMPeriod=7'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: 'Get DTIMPeriod value again, compare them with driver return value and captured beacon packets status: ubus-cli
    WiFi.Radio.*.DTIMPeriod? > WiFi.Radio.*.DTIMPeriod? WiFi.Radio.1.DTIMPeriod=7 WiFi.Radio.2.DTIMPeriod=7 WiFi.Radio.3.DTIMPeriod=7'
  depends_on: step3
  capture: result
pass_criteria:
- field: result.DTIMPeriod
  operator: contains
  value: '3'
  description: DTIMPeriod 應回傳包含 DTIMPeriod=3
verification_command: 'cat /tmp/wl*_hapd.conf |grep dtim


  (Default)

  root@prplOS:/# cat /tmp/wl0_hapd.conf |grep dtim

  dtim_period=3

  dtim_period=3

  root@prplOS:/# cat /tmp/wl1_hapd.conf |grep dtim

  dtim_period=3

  dtim_period=3

  root@prplOS:/# cat /tmp/wl2_hapd.conf |grep dtim

  dtim_period=3

  dtim_period=3


  (After modify)

  root@prplOS:/# cat /tmp/wl0_hapd.conf |grep dtim

  dtim_period=7

  dtim_period=7

  root@prplOS:/# cat /tmp/wl1_hapd.conf |grep dtim

  dtim_period=7

  dtim_period=7

  root@prplOS:/# cat /tmp/wl2_hapd.conf |grep dtim

  dtim_period=7

  dtim_period=7'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
