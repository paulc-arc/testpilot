id: wifi-llapi-D084-encryptionmode-accesspoint-security
name: "EncryptionMode — WiFi.AccessPoint.{i}.Security"
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 78
  object: WiFi.AccessPoint.{i}.Security
  api: EncryptionMode
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.Security.EncryptionMode?"'
llapi_support: Not Supported
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; EncryptionMode is calibrated as an AP-only Security getter with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before reading `Security.EncryptionMode`
  - live 0320 probe showed AP1/AP3/AP5 all return `EncryptionMode="Default"` on the current firmware
  - the same probe showed live hostapd security is not `Default`: wl0/wl2 expose `wpa_key_mgmt=WPA-PSK` with `wpa_pairwise=CCMP`, while wl1 exposes `wpa_key_mgmt=SAE` with `wpa_pairwise=CCMP`
  - workbook row 78 keeps BCM v4.0.3 at `Not Supported / Not Supported / Not Supported` with comment `hardcode in pwhm`
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - confirm wl0 / wl1 / wl2 BSS instances remain reachable
  2) Per-band probe:
     - read `WiFi.AccessPoint.{i}.Security.ModeEnabled`
     - read `WiFi.AccessPoint.{i}.Security.EncryptionMode`
     - inspect the matching `/tmp/wlX_hapd.conf` security lines
  3) Verdict model:
     - this is a workbook-preserving `Not Supported` read-only case
     - the case passes only when the getter stays at the hardcoded `Default` shape while hostapd still exposes real WPA/SAE + CCMP config on the same band
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Read `Security.ModeEnabled` on AP1 / AP3 / AP5.
  2) Read `Security.EncryptionMode` on AP1 / AP3 / AP5.
  3) Inspect the matching `wpa_key_mgmt` / `wpa_pairwise` / `rsn_pairwise` lines in `/tmp/wl0_hapd.conf`, `/tmp/wl1_hapd.conf`, and `/tmp/wl2_hapd.conf`.
  4) Confirm the getter remains `Default` even though hostapd still exposes active non-default WPA/SAE + CCMP config.
  Verdict: Not Supported. The current DUT returns a hardcoded `EncryptionMode="Default"` on every band while hostapd still exposes real `CCMP` security state, matching workbook row 78 comment `hardcode in pwhm`.

steps:
- id: step1_security_mode_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    MODE=$(ubus-cli "WiFi.AccessPoint.1.Security.ModeEnabled?" | sed -n 's/.*ModeEnabled="\([^"]*\)".*/\1/p'); printf 'ModeEnabled5g=%s\n' "$MODE"
  capture: security_mode_5g
- id: step2_encryption_mode_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    ENC=$(ubus-cli "WiFi.AccessPoint.1.Security.EncryptionMode?" | sed -n 's/.*EncryptionMode="\([^"]*\)".*/\1/p'); printf 'EncryptionMode5g=%s\n' "$ENC"
  depends_on: step1_security_mode_5g
  capture: encryption_mode_5g
- id: step3_security_hostapd_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    KM=$(grep -m1 '^wpa_key_mgmt=' /tmp/wl0_hapd.conf | cut -d= -f2- | xargs || true); PW=$(grep -m1 '^wpa_pairwise=' /tmp/wl0_hapd.conf | cut -d= -f2- | xargs || true); RSN=$(grep -m1 '^rsn_pairwise=' /tmp/wl0_hapd.conf | cut -d= -f2- | xargs || true); printf 'HostapdKeyMgmt5g=%s\n' "${KM:-ABSENT}"; printf 'HostapdPairwise5g=%s\n' "${PW:-ABSENT}"; printf 'HostapdRsnPairwise5g=%s\n' "${RSN:-ABSENT}"
  depends_on: step2_encryption_mode_5g
  capture: security_hostapd_5g
- id: step4_security_mode_6g
  action: exec
  target: DUT
  band: 6g
  command: >-
    MODE=$(ubus-cli "WiFi.AccessPoint.3.Security.ModeEnabled?" | sed -n 's/.*ModeEnabled="\([^"]*\)".*/\1/p'); printf 'ModeEnabled6g=%s\n' "$MODE"
  capture: security_mode_6g
- id: step5_encryption_mode_6g
  action: exec
  target: DUT
  band: 6g
  command: >-
    ENC=$(ubus-cli "WiFi.AccessPoint.3.Security.EncryptionMode?" | sed -n 's/.*EncryptionMode="\([^"]*\)".*/\1/p'); printf 'EncryptionMode6g=%s\n' "$ENC"
  depends_on: step4_security_mode_6g
  capture: encryption_mode_6g
- id: step6_security_hostapd_6g
  action: exec
  target: DUT
  band: 6g
  command: >-
    KM=$(grep -m1 '^wpa_key_mgmt=' /tmp/wl1_hapd.conf | cut -d= -f2- | xargs || true); PW=$(grep -m1 '^wpa_pairwise=' /tmp/wl1_hapd.conf | cut -d= -f2- | xargs || true); RSN=$(grep -m1 '^rsn_pairwise=' /tmp/wl1_hapd.conf | cut -d= -f2- | xargs || true); printf 'HostapdKeyMgmt6g=%s\n' "${KM:-ABSENT}"; printf 'HostapdPairwise6g=%s\n' "${PW:-ABSENT}"; printf 'HostapdRsnPairwise6g=%s\n' "${RSN:-ABSENT}"
  depends_on: step5_encryption_mode_6g
  capture: security_hostapd_6g
- id: step7_security_mode_24g
  action: exec
  target: DUT
  band: 2.4g
  command: >-
    MODE=$(ubus-cli "WiFi.AccessPoint.5.Security.ModeEnabled?" | sed -n 's/.*ModeEnabled="\([^"]*\)".*/\1/p'); printf 'ModeEnabled24g=%s\n' "$MODE"
  capture: security_mode_24g
- id: step8_encryption_mode_24g
  action: exec
  target: DUT
  band: 2.4g
  command: >-
    ENC=$(ubus-cli "WiFi.AccessPoint.5.Security.EncryptionMode?" | sed -n 's/.*EncryptionMode="\([^"]*\)".*/\1/p'); printf 'EncryptionMode24g=%s\n' "$ENC"
  depends_on: step7_security_mode_24g
  capture: encryption_mode_24g
- id: step9_security_hostapd_24g
  action: exec
  target: DUT
  band: 2.4g
  command: >-
    KM=$(grep -m1 '^wpa_key_mgmt=' /tmp/wl2_hapd.conf | cut -d= -f2- | xargs || true); PW=$(grep -m1 '^wpa_pairwise=' /tmp/wl2_hapd.conf | cut -d= -f2- | xargs || true); RSN=$(grep -m1 '^rsn_pairwise=' /tmp/wl2_hapd.conf | cut -d= -f2- | xargs || true); printf 'HostapdKeyMgmt24g=%s\n' "${KM:-ABSENT}"; printf 'HostapdPairwise24g=%s\n' "${PW:-ABSENT}"; printf 'HostapdRsnPairwise24g=%s\n' "${RSN:-ABSENT}"
  depends_on: step8_encryption_mode_24g
  capture: security_hostapd_24g

pass_criteria:
- field: security_mode_5g.ModeEnabled5g
  operator: equals
  value: WPA2-Personal
  description: 5G AP1 / wl0 should stay on the documented WPA2 baseline.
- field: encryption_mode_5g.EncryptionMode5g
  operator: equals
  value: Default
  description: 5G AP1 / wl0 getter is currently hardcoded to Default.
- field: security_hostapd_5g.HostapdKeyMgmt5g
  operator: equals
  value: WPA-PSK
  description: 5G AP1 / wl0 hostapd still exposes a real WPA-PSK key management mode.
- field: security_hostapd_5g.HostapdPairwise5g
  operator: equals
  value: CCMP
  description: 5G AP1 / wl0 hostapd still exposes a real CCMP pairwise cipher.
- field: security_hostapd_5g.HostapdRsnPairwise5g
  operator: equals
  value: CCMP
  description: 5G AP1 / wl0 hostapd still exposes a real CCMP RSN cipher.
- field: encryption_mode_5g.EncryptionMode5g
  operator: not_equals
  reference: security_hostapd_5g.HostapdPairwise5g
  description: 5G AP1 / wl0 hardcodes EncryptionMode to Default instead of exposing the live CCMP cipher.
- field: security_mode_6g.ModeEnabled6g
  operator: equals
  value: WPA3-Personal
  description: 6G AP3 / wl1 should stay on the documented WPA3 baseline.
- field: encryption_mode_6g.EncryptionMode6g
  operator: equals
  value: Default
  description: 6G AP3 / wl1 getter is currently hardcoded to Default.
- field: security_hostapd_6g.HostapdKeyMgmt6g
  operator: equals
  value: SAE
  description: 6G AP3 / wl1 hostapd still exposes a real SAE key management mode.
- field: security_hostapd_6g.HostapdPairwise6g
  operator: equals
  value: CCMP
  description: 6G AP3 / wl1 hostapd still exposes a real CCMP pairwise cipher.
- field: security_hostapd_6g.HostapdRsnPairwise6g
  operator: equals
  value: CCMP
  description: 6G AP3 / wl1 hostapd still exposes a real CCMP RSN cipher.
- field: encryption_mode_6g.EncryptionMode6g
  operator: not_equals
  reference: security_hostapd_6g.HostapdPairwise6g
  description: 6G AP3 / wl1 hardcodes EncryptionMode to Default instead of exposing the live CCMP cipher.
- field: security_mode_24g.ModeEnabled24g
  operator: equals
  value: WPA2-Personal
  description: 2.4G AP5 / wl2 should stay on the documented WPA2 baseline.
- field: encryption_mode_24g.EncryptionMode24g
  operator: equals
  value: Default
  description: 2.4G AP5 / wl2 getter is currently hardcoded to Default.
- field: security_hostapd_24g.HostapdKeyMgmt24g
  operator: equals
  value: WPA-PSK
  description: 2.4G AP5 / wl2 hostapd still exposes a real WPA-PSK key management mode.
- field: security_hostapd_24g.HostapdPairwise24g
  operator: equals
  value: CCMP
  description: 2.4G AP5 / wl2 hostapd still exposes a real CCMP pairwise cipher.
- field: security_hostapd_24g.HostapdRsnPairwise24g
  operator: equals
  value: CCMP
  description: 2.4G AP5 / wl2 hostapd still exposes a real CCMP RSN cipher.
- field: encryption_mode_24g.EncryptionMode24g
  operator: not_equals
  reference: security_hostapd_24g.HostapdPairwise24g
  description: 2.4G AP5 / wl2 hardcodes EncryptionMode to Default instead of exposing the live CCMP cipher.

verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.Security.ModeEnabled?"'
  - 'ubus-cli "WiFi.AccessPoint.1.Security.EncryptionMode?"'
  - 'grep -Ei ''^(wpa_key_mgmt|wpa_pairwise|rsn_pairwise|sae_password|wep_key)'' /tmp/wl0_hapd.conf || true'
  - 'ubus-cli "WiFi.AccessPoint.3.Security.ModeEnabled?"'
  - 'ubus-cli "WiFi.AccessPoint.3.Security.EncryptionMode?"'
  - 'grep -Ei ''^(wpa_key_mgmt|wpa_pairwise|rsn_pairwise|sae_password|wep_key)'' /tmp/wl1_hapd.conf || true'
  - 'ubus-cli "WiFi.AccessPoint.5.Security.ModeEnabled?"'
  - 'ubus-cli "WiFi.AccessPoint.5.Security.EncryptionMode?"'
  - 'grep -Ei ''^(wpa_key_mgmt|wpa_pairwise|rsn_pairwise|sae_password|wep_key)'' /tmp/wl2_hapd.conf || true'

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC: API return "Default"'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: '0320 serialwrap live probe showed AP1/AP3/AP5 all return `EncryptionMode="Default"` while hostapd still exposes live WPA/SAE + CCMP security lines; workbook row 78 keeps this getter as `hardcode in pwhm`.'
