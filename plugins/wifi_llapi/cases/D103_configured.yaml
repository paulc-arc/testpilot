id: wifi-llapi-D103-configured
name: Configured — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  baseline: 0310-BGW720-300
  row: 105
  object: WiFi.AccessPoint.{i}.WPS.
  api: Configured
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WPS.Configured?"
llapi_support: Support
implemented_by: Vendor Module
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: "Topology:\n  - DUT: COM0 (B0, AP role)\n  Transport:\n  - DUT via serialwrap COM0\n  Baseline:\n  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal\n  - 6G  = AP3 / wl1 / testpilot6G /\
  \ WPA3-Personal / SAE\n  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal\n  Notes:\n  - Read-only getter, all 3 bands return Configured=1"
steps:
- id: step_5g_getter
  action: exec
  target: DUT
  command:
    - 'echo "Configured5g=$(ubus-cli ''WiFi.AccessPoint.1.WPS.Configured?'' 2>/dev/null | grep -o ''Configured=[0-9]*'' | cut -d= -f2)"'
  capture: cfg_5g
- id: step_6g_getter
  action: exec
  target: DUT
  depends_on: step_5g_getter
  command:
    - 'echo "Configured6g=$(ubus-cli ''WiFi.AccessPoint.3.WPS.Configured?'' 2>/dev/null | grep -o ''Configured=[0-9]*'' | cut -d= -f2)"'
  capture: cfg_6g
- id: step_24g_getter
  action: exec
  target: DUT
  depends_on: step_6g_getter
  command:
    - 'echo "Configured24g=$(ubus-cli ''WiFi.AccessPoint.5.WPS.Configured?'' 2>/dev/null | grep -o ''Configured=[0-9]*'' | cut -d= -f2)"'
  capture: cfg_24g
pass_criteria:
- field: cfg_5g.Configured5g
  operator: equals
  value: '1'
  description: 5g WPS Configured=1
- field: cfg_6g.Configured6g
  operator: equals
  value: '1'
  description: 6g WPS Configured=1
- field: cfg_24g.Configured24g
  operator: equals
  value: '1'
  description: 2.4g WPS Configured=1
verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.WPS.Configured?"'
  - 'ubus-cli "WiFi.AccessPoint.3.WPS.Configured?"'
  - 'ubus-cli "WiFi.AccessPoint.5.WPS.Configured?"'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'All 3 bands: Configured=1.'
