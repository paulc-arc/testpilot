id: wifi-llapi-r351-ac-vi-stats-wmmbytessent-radio
name: AC_VI — WiFi.Radio.{i}.Stats.WmmBytesSent.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 351
  object: WiFi.Radio.{i}.Stats.WmmBytesSent.
  api: AC_VI
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Stats.WmmBytesSent.AC_VI=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect two WiFi station (use another WiFi7 GW as station with built-in IPERF3)
- id: step2
  action: exec
  target: DUT
  command: Run IPERF "iperf3 -c <server> -u -b 20M --tos 0x88"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Execute command ubus-cli "WiFi.Radio.*.getRadioStats()"
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Verify Radio Stats.WmmBytesSent.AC_VI ubus-cli WiFi.Radio.*.Stats.WmmBytesSent.AC_VI? > WiFi.Radio.*.Stats.WmmBytesSent.AC_VI?
    WiFi.Radio.1.Stats.WmmBytesSent.AC_VI=25861532 WiFi.Radio.2.Stats.WmmBytesSent.AC_VI=6517858 WiFi.Radio.3.Stats.WmmBytesSent.AC_VI=25861532
  depends_on: step3
  capture: result
pass_criteria:
- field: result.AC_VI
  operator: contains
  value: '0'
  description: AC_VI 應回傳包含 AC_VI=0
verification_command: 'wl -i wl0 wme_counters


  root@prplOS:/# wl -i wl0 wme_counters

  AC_VI: tx frames: 17265 bytes: 25861532 failed frames: 0 failed bytes: 0


  root@prplOS:/# wl -i wl0 wme_counters

  AC_VI: tx frames: 4352 bytes: 6517858 failed frames: 0 failed bytes: 0


  root@prplOS:/# wl -i wl2 wme_counters

  AC_VO: tx frames: 17278 bytes: 25866428 failed frames: 0 failed bytes: 0'
results_reference:
