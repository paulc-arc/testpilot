    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW.
- id: step2
  action: exec
  target: DUT
  command: Verify Associated Station DownlinkMCS. ubus-cli WiFi.AccessPoint.*.AssociatedDevice.? | grep DownlinkMCS WiFi.AccessPoint.1.AssociatedDevice.1.DownlinkMCS=0
    WiFi.AccessPoint.3.AssociatedDevice.1.DownlinkMCS=0 WiFi.AccessPoint.5.AssociatedDevice.1.DownlinkMCS=0
  depends_on: step1
  capture: result
pass_criteria:
- field: result.DownlinkMCS
  operator: contains
  value: '0'
  description: DownlinkMCS 應回傳包含 DownlinkMCS=0
verification_command: 'root@prplOS:/# wl -i wl0 sta_info 4A:0A:A5:80:23:7B | grep -A 1 ''^rx''

  rx nrate

  eht mcs 8 Nss 2 Tx Exp 0 bw80 ldpc 2xLTF GI 0.8us auto'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
