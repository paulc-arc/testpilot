results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: '0319 serialwrap live probe on AP1/AP3/AP5 showed MACFilterAddressList and the same-band MACFiltering.Entry tree both start empty. After addEntry and after delEntry, a bounded wait of about two seconds gives a stable readback where the getter and entry tree converge together to the same band-specific MAC and then back to empty. D079 intentionally stays AP-only and does not depend on the separate MACFiltering.Mode semantics handled by D081.'
