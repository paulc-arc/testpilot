  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.?" 2>&1); printf '%s\n' "$OUT" | grep -c '^WiFi\.AccessPoint\.1\.MACFiltering\.Entry\.[0-9][0-9]*\.MACAddress=' | sed 's/^/EntryCount5g=/'; VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MACFiltering\.Entry\.[0-9][0-9]*\.MACAddress="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$VALUE" ]; then VALUE=$(printf '%s' "$VALUE" | tr '[:lower:]' '[:upper:]'); printf 'EntryMac5g=%s\n' "$VALUE"; else echo 'EntryMac5g=EMPTY'; fi
  depends_on: step1_state_baseline_5g
  capture: entry_baseline_5g
