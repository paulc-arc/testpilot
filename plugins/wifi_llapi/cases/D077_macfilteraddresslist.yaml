id: wifi-llapi-D077-macfilteraddresslist-accesspoint
name: "MACFilterAddressList — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 71
  object: WiFi.AccessPoint.{i}.
  api: MACFilterAddressList
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.MACFilterAddressList?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: |
  Topology:
  - DUT: COM0 (AP role; MACFilterAddressList is calibrated as an AP-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing MACFilterAddressList
  - live 0319 probe showed the northbound getter and the `MACFiltering.Entry` tree stay empty at baseline
  - on all three bands, `MACFiltering.addEntry(mac=...)` populates both `MACFilterAddressList` and the `MACFiltering.Entry` tree, and `MACFiltering.delEntry(mac=...)` clears both again
  - `MACFiltering.Mode` is intentionally out of scope for D079; the AP1/AP3/AP5 mode semantics are handled separately by D081
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - remove the band-specific probe MAC from AP1 / AP3 / AP5 before starting the getter check
     - confirm the northbound getter and the `MACFiltering.Entry` tree are empty before adding a test MAC
  2) Per-band MACFilterAddressList probe:
     - add one band-specific MAC with `MACFiltering.addEntry(mac=...)`
     - wait about two seconds for the northbound getter to converge, then capture the same MAC from `MACFilterAddressList?`
     - capture the same MAC from the `MACFiltering.Entry` tree
     - delete the same MAC with `MACFiltering.delEntry(mac=...)`
     - wait about two seconds after delete, then confirm the getter and the entry tree both return to the empty baseline
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    ubus-cli "WiFi.AccessPoint.1.MACFiltering.delEntry(mac=62:2F:B8:66:BB:82)" 2>/dev/null || true
    ubus-cli "WiFi.AccessPoint.3.MACFiltering.delEntry(mac=FA:DD:AC:24:5A:B4)" 2>/dev/null || true
    ubus-cli "WiFi.AccessPoint.5.MACFiltering.delEntry(mac=FA:A0:DF:91:47:7C)" 2>/dev/null || true
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Keep AP1, AP3, and AP5 enabled on the documented non-open baseline.
  2) For each band, confirm `MACFilterAddressList?` starts empty and the `MACFiltering.Entry` tree exposes no MAC address entry.
  3) Add one band-specific MAC with `MACFiltering.addEntry(mac=...)` on the same AP.
  4) Wait about two seconds, then cross-check the same band-specific MAC from both the northbound getter and the `MACFiltering.Entry` tree.
  5) Delete the same MAC with `MACFiltering.delEntry(mac=...)`, wait about two seconds, and confirm both surfaces return to the empty baseline.
  6) Verdict: Pass. The live 0319 probe on AP1/AP3/AP5 showed the getter/list flow converges cleanly on all three bands without depending on the separate `MACFiltering.Mode` behavior.
steps:
- id: step1_state_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    VALUE=$(ubus-cli "WiFi.AccessPoint.1.MACFilterAddressList?" | sed -n 's/^WiFi\.AccessPoint\.1\.MACFilterAddressList="\([^"]*\)".*/\1/p'); if [ -n "$VALUE" ]; then VALUE=$(printf '%s' "$VALUE" | tr '[:lower:]' '[:upper:]'); printf 'MACFilterAddressList5g=%s\n' "$VALUE"; else echo 'MACFilterAddressList5g=EMPTY'; fi
  capture: state_baseline_5g
- id: step2_entry_baseline_5g
