id: wifi-llapi-r139-beaconperiod
name: BeaconPeriod — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 178
  object: "WiFi.Radio.{i}."
  api: "BeaconPeriod"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.BeaconPeriod=100
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.BeaconPeriod=100
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.BeaconPeriod=100
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.BeaconPeriod?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Get BeaconPeriod default value: ubus-cli WiFi.Radio.*.BeaconPeriod? > WiFi.Radio.*.BeaconPeriod? WiFi.Radio.1.BeaconPeriod=100
    WiFi.Radio.2.BeaconPeriod=100 WiFi.Radio.3.BeaconPeriod=100'
- id: step2
  action: exec
  target: DUT
  command: 'Set BeaconPeriod to 1000: ubus-cli WiFi.Radio.*.BeaconPeriod=1000 > WiFi.Radio.*.BeaconPeriod=1000 WiFi.Radio.1.
    WiFi.Radio.1.BeaconPeriod=1000 WiFi.Radio.2. WiFi.Radio.2.BeaconPeriod=1000 WiFi.Radio.3. WiFi.Radio.3.BeaconPeriod=1000'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Using Wireshark, capture beacon packets and check the beacon interval at which the gateway broadcasts.
  depends_on: step2
  capture: result
pass_criteria:
- field: result.BeaconPeriod
  operator: contains
  value: '100'
  description: BeaconPeriod 應回傳包含 BeaconPeriod=100
verification_command: 'root@prplOS:/# cat /tmp/wl0_hapd.conf |grep beacon_int

  beacon_int=1000

  beacon_int=1000

  root@prplOS:/# cat /tmp/wl1_hapd.conf |grep beacon_int

  beacon_int=1000

  beacon_int=1000

  root@prplOS:/# cat /tmp/wl2_hapd.conf |grep beacon_int

  beacon_int=1000

  beacon_int=1000'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
