id: wifi-llapi-D114-getstationstats-avgsignalstrengthbychain
name: getStationStats() AvgSignalStrengthByChain — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 114
  object: WiFi.AccessPoint.{i}.
  api: getStationStats()
  baseline: 0310-BGW720-300
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.getStationStats()"
llapi_support: Support
implemented_by: pWHM
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
      - iface: wl0
        mode: sta
        band: 5g
        ssid: testpilot5G
        security: WPA2-Personal
        key: '00000000'
      - iface: wl1
        mode: sta
        band: 6g
        ssid: testpilot6G
        security: WPA3-Personal
        key_mgmt: SAE
        key: '00000000'
      - iface: wl2
        mode: sta
        band: 2.4g
        ssid: testpilot2G
        security: WPA2-Personal
        key: '00000000'
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: STA
    to: DUT
    band: 6g
  - from: STA
    to: DUT
    band: 2.4g
test_environment: |
  Topology:
  - DUT: COM1 (B0, AP role)
  - STA: COM0 (A0, STA role)
  Transport:
  - DUT/STA via serialwrap COM0/COM1
  Baseline:
  - 5G = AP1 / wl0 / testpilot5G / WPA2-Personal
  - 6G = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE
  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal
  Pre-check:
  - STA verifies per-band link on wl0 / wl1 / wl2 before each getter
  - DUT wl -i wl{0,1,2} assoclist -> live STA MAC
  Notes:
  - Active 0403 returns a single integer dBm average, not a comma-separated chain list
  - Sequential per-band validation only; no simultaneous multi-band STA association
steps:
- id: step1_5g_sta_join
  action: exec
  target: STA
  band: 5g
  command:
  - iw dev wl0 link
  - wpa_cli -p /var/run/wpa_supplicant -i wl0 status
- id: step2_5g_assoc
  action: exec
  target: DUT
  band: 5g
  command: wl -i wl0 assoclist
  capture: assoc_5g
- id: step3_5g_getstationstats
  action: exec
  target: DUT
  band: 5g
  command: ubus-cli "WiFi.AccessPoint.1.getStationStats()"
  capture: result_5g
  depends_on: step2_5g_assoc
- id: step4_6g_sta_join
  action: exec
  target: STA
  band: 6g
  command:
  - iw dev wl1 link
  - wpa_cli -p /var/run/wpa_supplicant -i wl1 status
  - wl -i wl1 status
- id: step5_6g_assoc
  action: exec
  target: DUT
  band: 6g
  command: wl -i wl1 assoclist
  capture: assoc_6g
  depends_on: step4_6g_sta_join
- id: step6_6g_getstationstats
  action: exec
  target: DUT
  band: 6g
  command: ubus-cli "WiFi.AccessPoint.3.getStationStats()"
  capture: result_6g
  depends_on: step5_6g_assoc
- id: step7_24g_sta_join
  action: exec
  target: STA
  band: 2.4g
  command:
  - iw dev wl2 link
  - wpa_cli -p /var/run/wpa_supplicant -i wl2 status
- id: step8_24g_assoc
  action: exec
  target: DUT
  band: 2.4g
  command: wl -i wl2 assoclist
  capture: assoc_24g
  depends_on: step7_24g_sta_join
- id: step9_24g_getstationstats
  action: exec
  target: DUT
  band: 2.4g
  command: ubus-cli "WiFi.AccessPoint.5.getStationStats()"
  capture: result_24g
  depends_on: step8_24g_assoc
pass_criteria:
- field: assoc_5g
  operator: not_equals
  value: ''
  band: 5g
  description: AP1 should have at least one associated STA
- field: result_5g.AvgSignalStrengthByChain
  operator: regex
  value: "^-?\\d+$"
  band: 5g
  description: AvgSignalStrengthByChain should be an integer dBm
- field: result_5g.AvgSignalStrengthByChain
  operator: <
  value: '0'
  band: 5g
  description: 5G AvgSignalStrengthByChain should remain a negative dBm value
- field: assoc_6g
  operator: not_equals
  value: ''
  band: 6g
  description: AP3 should have at least one associated STA
- field: result_6g.AvgSignalStrengthByChain
  operator: regex
  value: "^-?\\d+$"
  band: 6g
  description: AvgSignalStrengthByChain should be an integer dBm
- field: result_6g.AvgSignalStrengthByChain
  operator: <
  value: '0'
  band: 6g
  description: 6G AvgSignalStrengthByChain should remain a negative dBm value
- field: assoc_24g
  operator: not_equals
  value: ''
  band: 2.4g
  description: AP5 should have at least one associated STA
- field: result_24g.AvgSignalStrengthByChain
  operator: regex
  value: "^-?\\d+$"
  band: 2.4g
  description: AvgSignalStrengthByChain should be an integer dBm
- field: result_24g.AvgSignalStrengthByChain
  operator: <
  value: '0'
  band: 2.4g
  description: 2.4G AvgSignalStrengthByChain should remain a negative dBm value
verification_command:
  - wl -i wl0 assoclist
  - ubus-cli "WiFi.AccessPoint.1.getStationStats()" 2>&1 | grep AvgSignalStrengthByChain
  - wl -i wl1 assoclist
  - ubus-cli "WiFi.AccessPoint.3.getStationStats()" 2>&1 | grep AvgSignalStrengthByChain
  - wl -i wl2 assoclist
  - ubus-cli "WiFi.AccessPoint.5.getStationStats()" 2>&1 | grep AvgSignalStrengthByChain
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: AvgSignalStrengthByChain field verified via getStationStats() on AP1/AP3/AP5.
