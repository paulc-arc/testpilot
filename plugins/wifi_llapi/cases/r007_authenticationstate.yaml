id: wifi-llapi-r007-authenticationstate
name: AuthenticationState — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 7
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: AuthenticationState
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.AuthenticationState=1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW
- id: step2
  action: exec
  target: DUT
  command: Verify Associated station Authentication state [1=connected, 0=Disconnected] ubus-cli WiFi.AccessPoint.*.AssociatedDevice.?
    | grep AuthenticationState WiFi.AccessPoint.1.AssociatedDevice.1.AuthenticationState=1 WiFi.AccessPoint.3.AssociatedDevice.1.AuthenticationState=1
    WiFi.AccessPoint.5.AssociatedDevice.1.AuthenticationState=1
  depends_on: step1
  capture: result
pass_criteria:
- field: result.AuthenticationState
  operator: contains
  value: '1'
  description: AuthenticationState 應回傳包含 AuthenticationState=1
verification_command: 'roroot@prplOS:/# wl -i wl0 sta_info 4A:0A:A5:80:23:7B | grep state

  state: AUTHENTICATED ASSOCIATED AUTHORIZED'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
