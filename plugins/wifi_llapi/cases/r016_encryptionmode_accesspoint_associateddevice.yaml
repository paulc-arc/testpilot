id: wifi-llapi-r016-encryptionmode-accesspoint-associateddevice
name: EncryptionMode — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 16
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: EncryptionMode
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.EncryptionMode=AES
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW.
- id: step2
  action: exec
  target: DUT
  command: 'Verify Associated Station EncryptionMode: WiFi.AccessPoint.1.AssociatedDevice.1.ProbeReqCaps.EncryptionMode="Default"
    WiFi.AccessPoint.3.AssociatedDevice.1.ProbeReqCaps.EncryptionMode="Default" WiFi.AccessPoint.5.AssociatedDevice.1.ProbeReqCaps.EncryptionMode="Default"'
  depends_on: step1
  capture: result
pass_criteria:
- field: result.EncryptionMode
  operator: contains
  value: AES
  description: EncryptionMode 應回傳包含 EncryptionMode=AES
verification_command: 'wl -i wl0 sta_info ${STA_MAC}

  auth: WPA3-SAE-PSK

  crypto: AES_CCM'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC: wld_ap_hostapd_getStaInfo doesn''t support cipher paser'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: wld_ap_hostapd_getStatinfo(old version hostapd)
