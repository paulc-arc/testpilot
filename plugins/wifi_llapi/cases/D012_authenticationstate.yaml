id: wifi-llapi-D012-authenticationstate
aliases:
- wifi-llapi-r007-authenticationstate
name: "AuthenticationState \u2014 WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 7
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: AuthenticationState
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.AuthenticationState?"
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
      - iface: 6g
        mode: sta
        ssid: TestPilot_BTM
        key: testpilot6g
  links:
  - from: STA
    to: DUT
    band: 6g
test_environment: |
  Topology:
  - DUT: COM0 (AP role)
  - STA: COM1 (station role for this case; do not rely on the old A0/B0 heuristic)
  Transport:
  - serialwrap attach COM0 / COM1
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / TestPilot_BTM
  - 6G: DUT wl1 / AP3 / SSID.6 / TestPilot_BTM
  - 2.4G: DUT wl2 / AP5 / SSID.8 / TestPilot_24G
  Preconditions:
  - keep only one associated station on AP3 so AssociatedDevice.1 stays deterministic
  - use the validated 6G single-band baseline for this case
setup_steps: |
  1) DUT 6G baseline:
     - enable Radio.2 / SSID.6 / AP3
     - configure AP3 as WPA3-Personal with MFP required
     - keep the validated live SSID/credential pair as TestPilot_BTM / testpilot6g
  2) STA 6G preparation:
     - disable local AP3/AP4 on COM1
     - move COM1 br-lan off 192.168.1.0/24 so later traffic checks do not self-hit the local bridge
     - reset wl1 and its wpa_supplicant control socket
     - connect wl1 to TestPilot_BTM with SAE
  3) Association evidence:
     - COM1: iw dev wl1 link ; wpa_cli -p /var/run/wpa_supplicant -i wl1 status
     - COM0: wl -i wl1 assoclist
sta_env_setup: |
  DUT 6G AP baseline:
    ubus-cli WiFi.Radio.2.Enable=1
    ubus-cli WiFi.Radio.2.BeaconPeriod=100
    ubus-cli WiFi.Radio.2.DTIMPeriod=3
    ubus-cli WiFi.Radio.2.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.2.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.2.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.2.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.2.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.2.OfdmaEnable=1
    ubus-cli WiFi.Radio.2.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.2.OperatingStandards=ax
    ubus-cli WiFi.Radio.2.RxChainCtrl=-1
    ubus-cli WiFi.Radio.2.TxChainCtrl=-1
    ubus-cli WiFi.Radio.2.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.2.Sensing.Enable=1
    ubus-cli WiFi.Radio.2.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.2.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.2.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.2.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.2.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.2.LongRetryLimit=6
    ubus-cli WiFi.Radio.2.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.2.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.6.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.3.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.4.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.3.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.3.MultiAPType=FronthaulBSS
    ubus-cli WiFi.AccessPoint.3.Enable=1
  STA 6G preparation:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    ubus-cli WiFi.AccessPoint.3.Enable=0
    ubus-cli WiFi.AccessPoint.4.Enable=0
    wpa_cli terminate 2>/dev/null || true
    sleep 1
    rm -f /var/run/wpa_supplicant/wl1 2>/dev/null || true
    iw dev wl1.1 del 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl1 set type managed
    ifconfig wl1 up
    mkdir -p /var/run/wpa_supplicant
    printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\nnetwork={\nssid="TestPilot_BTM"\nkey_mgmt=SAE\nsae_password="testpilot6g"\nieee80211w=2\nscan_ssid=1\n}\n' > /tmp/wpa_wl1.conf
    wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf -C /var/run/wpa_supplicant
    sleep 3
  STA 6G connect verify:
    wpa_cli -p /var/run/wpa_supplicant -i wl1 reconnect
    sleep 8
    iw dev wl1 link
    wpa_cli -p /var/run/wpa_supplicant -i wl1 status
  DUT association evidence:
    wl -i wl1 assoclist
test_procedure: |
  1) Confirm AP3 currently has one associated 6G station on wl1.
  2) Normalize the driver state for that STA into DriverAuthState=1 when wl1 sta_info shows AUTHENTICATED ASSOCIATED AUTHORIZED.
  3) Read WiFi.AccessPoint.3.AssociatedDevice.1.AuthenticationState on DUT and compare it against the normalized driver state instead of writing a sample value.
steps:
- id: step1
  action: exec
  target: DUT
  command: wl -i wl1 assoclist | sed -n 's/^assoclist \([0-9A-Fa-f:]*\).*/AssocMAC=\1/p'
  capture: assoc_driver
- id: step2
  action: exec
  target: DUT
  command: 'STA_MAC=$(wl -i wl1 assoclist | awk ''NR==1{print $2}''); [ -n "$STA_MAC" ] && if wl -i wl1 sta_info $STA_MAC | grep -q ''state: AUTHENTICATED ASSOCIATED AUTHORIZED''; then echo ''DriverAuthState=1''; else echo ''DriverAuthState=0''; fi'
  depends_on: step1
  capture: driver_state
- id: step3
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.AuthenticationState?"
  depends_on: step2
  capture: result
pass_criteria:
- field: assoc_driver.AssocMAC
  operator: regex
  value: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
  description: AP3 should first expose a single live 6G STA MAC from wl1 assoclist.
- field: driver_state.DriverAuthState
  operator: equals
  value: '1'
  description: wl1 sta_info should confirm the station is authenticated, associated, and authorized.
- field: result.AuthenticationState
  operator: equals
  reference: driver_state.DriverAuthState
  description: AuthenticationState should match the normalized driver auth state for the same station.
verification_command: |
  wl -i wl1 assoclist
  STA_MAC=$(wl -i wl1 assoclist | awk 'NR==1{print $2}')
  ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.AuthenticationState?"
  wl -i wl1 sta_info $STA_MAC | grep "state:"
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Serialwrap 6G retest returned AuthenticationState=1 and matched wl1 sta_info state.
