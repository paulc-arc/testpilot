id: wifi-llapi-r283-multiaptypessupported
name: MultiAPTypesSupported — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 283
  object: WiFi.Radio.{i}.
  api: MultiAPTypesSupported
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.MultiAPTypesSupported="FronthaulBSS,BackhaulBSS,BackhaulSTA"
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Get MultiAP type Supported mode ubus-cli WiFi.Radio.*.MultiAPTypesSupported? > WiFi.Radio.*.MultiAPTypesSupported?
    WiFi.Radio.1.MultiAPTypesSupported="FronthaulBSS,BackhaulBSS,BackhaulSTA" WiFi.Radio.2.MultiAPTypesSupported="FronthaulBSS,BackhaulBSS,BackhaulSTA"
    WiFi.Radio.3.MultiAPTypesSupported="FronthaulBSS,BackhaulBSS,BackhaulSTA"
- id: step2
  action: exec
  target: DUT
  command: 'Try set to one of the supported type. ubus-cli WiFi.Radio.*.MultiAPTypesSupported="BackhaulBSS" > WiFi.Radio.*.MultiAPTypesSupported=BackhaulBSS
    ERROR: set WiFi.Radio.*.MultiAPTypesSupported failed (15 - is read only) ubus-cli WiFi.Radio.1.MultiAPTypesSupported="BackhaulBSS"
    > WiFi.Radio.1.MultiAPTypesSupported=BackhaulBSS ERROR: set WiFi.Radio.1.MultiAPTypesSupported failed (15 - is read only)'
  depends_on: step1
  capture: result
pass_criteria:
- field: result.MultiAPTypesSupported
  operator: contains
  value: '"FronthaulBSS,BackhaulBSS,BackhaulSTA"'
  description: MultiAPTypesSupported 應回傳包含 MultiAPTypesSupported="FronthaulBSS,BackhaulBSS,BackhaulSTA"
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : Could not set base on the supported mode'
  v4.0.3:
    5g: skip
    6g: skip
    2.4g: skip
    comment: this parameter is a prpl-specific extension (custom parameter) and hardcoding in pwhm
