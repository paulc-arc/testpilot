id: wifi-llapi-r244-ssid
name: SSID — WiFi.SSID.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 322
  object: "WiFi.SSID.{i}."
  api: "SSID"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.SSID.{i}.SSID=InternetBox_DK
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.SSID.{i}.SSID=InternetBox_DK
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.SSID.{i}.SSID=InternetBox_DK
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.SSID.*.SSID?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. get SSID BSSID ubus-cli WiFi.SSID.? | grep \.SSID= WiFi.SSID.4.SSID="!!5OpenWrt_1" WiFi.SSID.6.SSID="6G_Primary-BE"
    WiFi.SSID.8.SSID="!!24OpenWrt_1"
- id: step2
  action: exec
  target: DUT
  command: Use WiFi analyzer to verify the SSID broadcast from GW
  depends_on: step1
  capture: result
pass_criteria:
- field: result.SSID
  operator: contains
  value: InternetBox_DK
  description: SSID 應回傳包含 SSID=InternetBox_DK
verification_command: 'root@prplOS:/# iw dev wl0 info | grep ssid

  ssid !!5OpenWrt_1

  root@prplOS:/# iw dev wl1 info | grep ssid

  ssid 6OpenWrt_1

  root@prplOS:/# iw dev wl2 info | grep ssid

  ssid !!24OpenWrt_1'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
