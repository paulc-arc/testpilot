id: wifi-llapi-r094-enable-accesspoint-wps
name: Enable — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 106
  object: "WiFi.AccessPoint.{i}.WPS."
  api: "Enable"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.WPS.Enable=1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.WPS.Enable=1
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.WPS.Enable=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.WPS.Enable?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Set GW WPS to Enable ubus-cli WiFi.AccessPoint.1.WPS.Enable=1 > WiFi.AccessPoint.1.WPS.Enable=1 WiFi.AccessPoint.1.WPS.
    WiFi.AccessPoint.1.WPS.Enable=1 ubus-cli WiFi.AccessPoint.3.WPS.Enable=1 > WiFi.AccessPoint.3.WPS.Enable=1 WiFi.AccessPoint.3.WPS.
    WiFi.AccessPoint.3.WPS.Enable=1 ubus-cli WiFi.AccessPoint.5.WPS.Enable=1 > WiFi.AccessPoint.5.WPS.Enable=1 WiFi.AccessPoint.5.WPS.
    WiFi.AccessPoint.5.WPS.Enable=1
- id: step2
  action: exec
  target: DUT
  command: Verify GW WPS Setting ubus-cli WiFi.AccessPoint.? | grep .WPS.Enable= WiFi.AccessPoint.1.WPS.Enable=1 WiFi.AccessPoint.3.WPS.Enable=1
    WiFi.AccessPoint.5.WPS.Enable=1
  depends_on: step1
  capture: result
pass_criteria:
- field: result.Enable
  operator: contains
  value: '1'
  description: Enable 應回傳包含 Enable=1
verification_command: 'cat /tmp/wl0_hapd.conf |grep wps_state


  root@prplOS:/# cat /tmp/wl0_hapd.conf |grep wps_state

  wps_state=0

  wps_state=2

  root@prplOS:/# cat /tmp/wl2_hapd.conf |grep wps_state

  wps_state=0

  wps_state=2

  root@prplOS:/# cat /tmp/wl1_hapd.conf |grep wps_state

  wps_state=0

  wps_state=0

  root@prplOS:/#'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Not Supported
    2.4g: Fail
    comment: 'ARC : 5G Primary and 2.4G Primary state shows "0"'
  v4.0.3:
    5g: pass
    6g: Not Supported
    2.4g: pass
    comment: ''
