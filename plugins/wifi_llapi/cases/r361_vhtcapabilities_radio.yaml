id: wifi-llapi-r361-vhtcapabilities-radio
name: VHTCapabilities — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 496
  object: "WiFi.Radio.{i}."
  api: "VHTCapabilities"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.VHTCapabilities="AAAAAA=="
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.VHTCapabilities="AAAAAA=="
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.VHTCapabilities="AAAAAA=="
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.VHTCapabilities?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Try to get API default value: ubus-cli WiFi.Radio.*.VHTCapabilities.? > WiFi.Radio.*.VHTCapabilities.? ERROR:
    get WiFi.Radio.*.VHTCapabilities. failed (2 - object not found)'
  capture: result
pass_criteria:
- field: result.VHTCapabilities
  operator: contains
  value: '"AAAAAA=="'
  description: VHTCapabilities 應回傳包含 VHTCapabilities="AAAAAA=="

verification_command: |
  ubus-cli "WiFi.Radio.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.Radio.*.VHTCapabilities?" 2>/dev/null || true
  wl -i wl0 status; wl -i wl1 status; wl -i wl2 status
  wl -i wl0 channel 2>/dev/null || true; wl -i wl1 channel 2>/dev/null || true; wl -i wl2 channel 2>/dev/null || true

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API return object not found'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: raw values, in base64 as per the Tr181 Spec
