id: wifi-llapi-r363-ac-be-stats-wmmbytesreceived-ssid
name: AC_BE — WiFi.SSID.{i}.Stats.WmmBytesReceived.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 363
  object: WiFi.SSID.{i}.Stats.WmmBytesReceived.
  api: AC_BE
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.SSID.{i}.Stats.WmmBytesReceived.AC_BE=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect two WiFi station (use another WiFi7 GW as station with built-in IPERF3)
- id: step2
  action: exec
  target: DUT
  command: Run IPERF between Station "iperf3 -c 192.168.1.1 -u -b 20M "
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Verify SSID Stats WmmBytesReceived.AC_BE ubus-cli WiFi.SSID.6.? | grep Received.AC_BE WiFi.SSID.6.Stats.WmmBytesReceived.AC_BE=0
  depends_on: step2
  capture: result
pass_criteria:
- field: result.AC_BE
  operator: contains
  value: '0'
  description: AC_BE 應回傳包含 AC_BE=0
verification_command: 'root@prplOS:/# ubus-cli "WiFi.Radio.*.getRadioStats()"?

