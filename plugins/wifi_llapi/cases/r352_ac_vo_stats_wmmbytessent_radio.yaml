id: wifi-llapi-r352-ac-vo-stats-wmmbytessent-radio
name: AC_VO — WiFi.Radio.{i}.Stats.WmmBytesSent.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 487
  object: "WiFi.Radio.{i}.Stats.WmmBytesSent."
  api: "AC_VO"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Stats.WmmBytesSent.AC_VO=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.Stats.WmmBytesSent.AC_VO=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.Stats.WmmBytesSent.AC_VO?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect two WiFi station (use another WiFi7 GW as station with built-in IPERF3)
- id: step2
  action: exec
  target: DUT
  command: Run IPERF "iperf3 -c <server> -u -b 20M --tos 0xB8"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Execute command ubus-cli "WiFi.Radio.*.getRadioStats()"
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Verify Radio Stats.WmmBytesSent.AC_VO ubus-cli WiFi.Radio.*.Stats.WmmBytesSent.AC_VO? > WiFi.Radio.*.Stats.WmmBytesSent.AC_VO?
    WiFi.Radio.1.Stats.WmmBytesSent.AC_VO=25862027 WiFi.Radio.2.Stats.WmmBytesSent.AC_VO=972 WiFi.Radio.3.Stats.WmmBytesSent.AC_VO=25866428
  depends_on: step3
  capture: result
pass_criteria:
- field: result.AC_VO
  operator: contains
  value: '0'
  description: AC_VO 應回傳包含 AC_VO=0
verification_command: 'root@prplOS:/# wl -i wl0 wme_counters

  AC_VO: tx frames: 17268 bytes: 25862027 failed frames: 2 failed bytes: 104


  root@prplOS:/# wl -i wl1 wme_counters

  AC_VO: tx frames: 6 bytes: 972 failed frames: 0 failed bytes: 0


  root@prplOS:/# wl -i wl2 wme_counters

  AC_VO: tx frames: 17278 bytes: 25866428 failed frames: 0 failed bytes: 0'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
