id: wifi-llapi-r088-status-accesspoint
name: Status — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 88
  object: WiFi.AccessPoint.{i}.
  api: Status
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Status=Enabled
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Set Access Point Enable=1, Disable=0 ubus-cli WiFi.AccessPoint.{i}.Enable=1
- id: step2
  action: exec
  target: DUT
  command: Get Access Point Status ubus-cli WiFi.AccessPoint.? | grep .Status WiFi.AccessPoint.1.Status="Enabled" WiFi.AccessPoint.3.Status="Enabled"
    WiFi.AccessPoint.5.Status="Enabled"
  depends_on: step1
  capture: result
pass_criteria:
- field: result.Status
  operator: contains
  value: Enabled
  description: Status 應回傳包含 Status=Enabled
verification_command: 'root@prplOS:/# wl -i wl0 bss

  up

  root@prplOS:/# wl -i wl1 bss

  up

  root@prplOS:/# wl -i wl2 bss

  up'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
