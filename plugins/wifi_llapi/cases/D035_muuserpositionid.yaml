id: wifi-llapi-r030-muuserpositionid
name: MUUserPositionId — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 35
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "MUUserPositionId"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.MUUserPositionId=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

sta_env_setup: |
  STA env setup baseline (COM1 / A0, serialwrap):
  1) Enable STA radios:
     ubus-cli WiFi.Radio.1.Enable=1
     ubus-cli WiFi.Radio.2.Enable=1
     ubus-cli WiFi.Radio.3.Enable=1
  2) 5G connect verify (wl0 -> B0_5G_AP):
     ubus-cli WiFi.AccessPoint.1.Enable=0
     ubus-cli WiFi.AccessPoint.2.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl0.1 del 2>/dev/null || true
     iw dev wl0 set type managed
     ifconfig wl0 up
     iw dev wl0 connect B0_5G_AP
     sleep 3
     iw dev wl0 link
  3) 6G connect verify (wl1 -> B0_6G_AP, SAE):
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl1.1 del 2>/dev/null || true
     iw dev wl1 set type managed
     ifconfig wl1 up
     printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\n' > /tmp/wpa_wl1.conf
     wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf
     wpa_cli -i wl1 remove_network all
     wpa_cli -i wl1 add_network
     wpa_cli -i wl1 set_network 0 ssid '"B0_6G_AP"'
     wpa_cli -i wl1 set_network 0 key_mgmt SAE
     wpa_cli -i wl1 set_network 0 sae_password '"B0StaTest1234"'
     wpa_cli -i wl1 set_network 0 ieee80211w 2
     wpa_cli -i wl1 set_network 0 scan_ssid 1
     wpa_cli -i wl1 enable_network 0
     wpa_cli -i wl1 reconnect
     sleep 10
     iw dev wl1 link
  4) 2.4G connect verify (wl2 -> B0_24G_AP):
     ubus-cli WiFi.AccessPoint.5.Enable=0
     ubus-cli WiFi.AccessPoint.6.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl2.1 del 2>/dev/null || true
     iw dev wl2 set type managed
     ifconfig wl2 up
     iw dev wl2 connect B0_24G_AP
     sleep 3
     iw dev wl2 link
  5) DUT association evidence (COM0):
     wl -i wl0 assoclist
     wl -i wl1 assoclist
     wl -i wl2 assoclist

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.MUUserPositionId=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.MUUserPositionId?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: \\Connect WiFi Station
- id: step2
  action: exec
  target: DUT
  command: Run IPERF3 between Station's and GW at the same time
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Get station caps wl -i wl0 sta_info 34:19:4d:a4:b5:09 | grep ''caps'' HT caps 0x9ef: LDPC 40MHz SGI20 SGI40 STBC-Tx
    STBC-Rx VHT caps 0xff: LDPC SGI80 SGI160 STBC-Tx STBC-Rx SU-BFR SU-BFE MU-BFR HE caps 0xc6639: LDPC HE-HTC SU-BFR SU&MU-BFE
    EHT caps 0x105: SU-BFR SU&MU-BFE wl -i wl1 sta_info 38:06:E6:92:B0:4A | grep ''caps'' HT caps 0x0: HE caps 0xc6639: LDPC
    HE-HTC SU-BFR SU&MU-BFE EHT caps 0x105: SU-BFR SU&MU-BFE'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: 'get MUUserPositionId ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.MUUserPositionId? sitionId? CFG80211-ERROR)
    wl_cfg80211_sta_info : GET STA INFO failed, -21 WiFi.AccessPoint.1.AssociatedDevice.1.MUUserPositionId=0 WiFi.AccessPoint.3.AssociatedDevice.1.MUUserPositionId=0
    WiFi.AccessPoint.5.AssociatedDevice.1.MUUserPositionId=0'
  depends_on: step3
  capture: result
pass_criteria:
- field: result.MUUserPositionId
  operator: contains
  value: '0'
  description: MUUserPositionId 應回傳包含 MUUserPositionId=0
verification_command: wl -i wl0 sta_info ${STA_MAC}
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : Stations and GW support MIMO and both stations run IPERF3 at the same time but the MUUserPositionId always
      return "0"'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: defintion in pwhm only
