id: wifi-llapi-r267-csistats
name: csiStats() — WiFi.Radio.{i}.Sensing.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 267
  object: WiFi.Radio.{i}.Sensing.
  api: csiStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Sensing.csiStats()
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Record the API counters in the beginning: ubus-cli "WiFi.Radio.*.Sensing.csiStats()" > WiFi.Radio.*.Sensing.csiStats()
    WiFi.Radio.1.Sensing.csiStats() returned [ { M2MTransmitCounter = 0, NullFrameAckFailCounter = 0, NullFrameCounter = 0,
    ReceivedOverflowCounter = 0, TransmitFailCounter = 0, UserTransmitCounter = 0, UserTransmitFailCounter = 0, VendorCounters
    = { } } ] WiFi.Radio.3.Sensing.csiStats() returned [ { M2MTransmitCounter = 0, NullFrameAckFailCounter = 0, NullFrameCounter
    = 0, ReceivedOverflowCounter = 0, TransmitFailCounter = 0, UserTransmitCounter = 0, UserTransmitFailCounter = 0, VendorCounters
    = { } } ] WiFi.Radio.2.Sensing.csiStats() returned [ { M2MTransmitCounter = 0, NullFrameAckFailCounter = 0, NullFrameCounter
    = 0, ReceivedOverflowCounter = 0, TransmitFailCounter = 0, UserTransmitCounter = 0, UserTransmitFailCounter = 0, VendorCounters
    = { } } ]'
- id: step2
  action: exec
  target: DUT
  command: 'Add a few scanable STAs for each radio with .Sensing.addClient(): (5G) ubus-cli "WiFi.Radio.1.Sensing.addClient(MACAddress=''A0:29:42:60:23:BD'',
    MonitorInterval=100)" ubus-cli "WiFi.Radio.1.Sensing.addClient(MACAddress=''14:85:7F:20:18:44'', MonitorInterval=10)"
    (6G) ubus-cli "WiFi.Radio.2.Sensing.addClient(MACAddress=''00:90:4C:55:20:A8'', MonitorInterval=1000)" ubus-cli "WiFi.Radio.2.Sensing.addClient(MACAddress=''64:75:DA:4E:51:76'',
    MonitorInterval=100)" ubus-cli "WiFi.Radio.2.Sensing.addClient(MACAddress=''18:60:41:00:2B:AE'', MonitorInterval=10)"
    (2.4G) ubus-cli "WiFi.Radio.3.Sensing.addClient(MACAddress=''8A:10:18:1E:D9:14'', MonitorInterval=1000)" ubus-cli "WiFi.Radio.3.Sensing.addClient(MACAddress=''70:97:41:29:FD:9E'',
    MonitorInterval=100)" ubus-cli "WiFi.Radio.3.Sensing.addClient(MACAddress=''6E:15:DB:33:D7:D8'', MonitorInterval=10)"'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Wait for some time(10~20 minutes), check if counters in csiStats() increase: ubus-cli "WiFi.Radio.*.Sensing.csiStats()"
    > WiFi.Radio.*.Sensing.csiStats() WiFi.Radio.1.Sensing.csiStats() returned [ { M2MTransmitCounter = 0, NullFrameAckFailCounter
    = 0, NullFrameCounter = 0, ReceivedOverflowCounter = 0, TransmitFailCounter = 0, UserTransmitCounter = 0, UserTransmitFailCounter
    = 0, VendorCounters = { } } ] WiFi.Radio.3.Sensing.csiStats() returned [ { M2MTransmitCounter = 0, NullFrameAckFailCounter
    = 0, NullFrameCounter = 0, ReceivedOverflowCounter = 0, TransmitFailCounter = 0, UserTransmitCounter = 0, UserTransmitFailCounter
    = 0, VendorCounters = { } } ] WiFi.Radio.2.Sensing.csiStats() returned [ { M2MTransmitCounter = 0, NullFrameAckFailCounter
    = 0, NullFrameCounter = 0, ReceivedOverflowCounter = 0, TransmitFailCounter = 0, UserTransmitCounter = 0, UserTransmitFailCounter
    = 0, VendorCounters = { } } ]'
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: csiStats() 執行不應回傳 error
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: "support; skip netlink erro in console\n1) Sensing.Enable; invoke whm_brcm_csi_setup_withclk(), enable csi\n\
      2) csiStats(); invoke whm_brcm_radcsi_updateStats->whm_brcm_csi_update_stats\nroot@prplOS:/# wl -i wl1 assoclist; wl\
      \ -i wl1 csimon reset_cnts;wl -i wl1 csimon\n add 00:90:4C:4C:94:31; wl -i wl1 csimon enable; sleep 5; wl -i wl1 csimon\
      \ disab\nle; wl -i wl1 csimon del 00:90:4C:4C:94:31; wl -i wl1 csimon state;ubus call WiF\ni.Radio.2.Sensing csiStats"
