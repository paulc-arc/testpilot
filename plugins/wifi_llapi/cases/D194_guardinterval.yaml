id: wifi-llapi-D194-guardinterval
aliases:
  - wifi-llapi-r155-guardinterval
name: GuardInterval — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 194
  object: "WiFi.Radio.{i}."
  api: "GuardInterval"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.GuardInterval=Auto
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT 5G baseline:
     - set Radio.1/SSID.4 for the 5G AP under test
     - configure AP1 as open with MFP disabled
     - enable AP1 before station association
  2) STA 5G preparation:
     - disable local AP1/AP2 on A0
     - clear wl0 AP child interface and switch wl0 to managed mode
     - connect wl0 to {{SSID_5G}}
  3) Association evidence:
     - A0: iw dev wl0 link
     - B0: wl -i wl0 assoclist
sta_env_setup: |
  DUT 5G AP baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.1.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.1.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.OfdmaEnable=1
    ubus-cli WiFi.Radio.1.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.1.OperatingStandards=ax
    ubus-cli WiFi.Radio.1.RxChainCtrl=-1
    ubus-cli WiFi.Radio.1.TxChainCtrl=-1
    ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.1.Sensing.Enable=1
    ubus-cli WiFi.Radio.1.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.1.LongRetryLimit=6
    ubus-cli WiFi.Radio.1.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.1.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.4.SSID={{SSID_5G}}
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.2.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=None
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Disabled
    ubus-cli WiFi.AccessPoint.1.Enable=1
  STA 5G preparation:
    ubus-cli WiFi.AccessPoint.1.Enable=0
    ubus-cli WiFi.AccessPoint.2.Enable=0
    killall wpa_supplicant 2>/dev/null || true
    iw dev wl0.1 del 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl0 set type managed
    ifconfig wl0 up
  STA 5G connect verify:
    iw dev wl0 connect {{SSID_5G}}
    sleep 2
    iw dev wl0 link
  DUT association evidence:
    wl -i wl0 assoclist
test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.GuardInterval=Auto
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.GuardInterval?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 'Setting value: ["400nsec''","800nsec","1xLTF_0.8us","1xLTF_1.6us","2xLTF_0.8us","2xLTF_1.6us","4xLTF_0.8us","4xLTF_1.6us","Auto"]'
- id: step2
  action: exec
  target: DUT
  command: Get GI Default value ubus-cli WiFi.Radio.*.GuardInterval? > WiFi.Radio.*.GuardInterval? WiFi.Radio.1.GuardInterval="Auto"
    WiFi.Radio.2.GuardInterval="Auto" WiFi.Radio.3.GuardInterval="Auto"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Try Set GI to "1xLTF_1.6us" ubus-cli WiFi.Radio.*.GuardInterval="1xLTF_1.6us" > WiFi.Radio.*.GuardInterval=1xLTF_1.6us
    WiFi.Radio.1. WiFi.Radio.1.GuardInterval="1xLTF_1.6us" WiFi.Radio.2. WiFi.Radio.2.GuardInterval="1xLTF_1.6us" WiFi.Radio.3.
    WiFi.Radio.3.GuardInterval="1xLTF_1.6us"
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Verify GI settings ubus-cli WiFi.Radio.*.GuardInterval? > WiFi.Radio.*.GuardInterval? WiFi.Radio.1.GuardInterval="1xLTF_1.6us"
    WiFi.Radio.2.GuardInterval="1xLTF_1.6us" WiFi.Radio.3.GuardInterval="1xLTF_1.6us"
  depends_on: step3
  capture: result
pass_criteria:
- field: result.GuardInterval
  operator: contains
  value: Auto
  description: GuardInterval 應回傳包含 GuardInterval=Auto
verification_command: 'BRCM: CSP CS00012439197


  --

  root@prplOS:/# wl -i wl0 nrate

  eht mcs 13 Nss 4 Tx Exp 0 bw160 2xLTF GI 0.8us auto

  root@prplOS:/# wl -i wl0 sgi_tx

  -1'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'support

      pwhm only supports const char* Rad_SupGI[] = {"Auto", "400nsec", "800nsec", 0}; that means index 0/1/2 and sgi_tx -1/1/0.
      Basically this Property doesn''t support EHT guardInterval, just keep the code. And use "Auto" for HE/EHT mode'
