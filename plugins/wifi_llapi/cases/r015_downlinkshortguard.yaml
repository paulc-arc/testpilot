id: wifi-llapi-r015-downlinkshortguard
name: DownlinkShortGuard — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 15
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: DownlinkShortGuard
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.DownlinkShortGuard=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW.
- id: step2
  action: exec
  target: DUT
  command: Verify Associated Station DownlinkShortGuard ubus-cli WiFi.AccessPoint.*.AssociatedDevice.? | grep DownlinkShortGuard
    WiFi.AccessPoint.1.AssociatedDevice.1.DownlinkShortGuard=0 WiFi.AccessPoint.3.AssociatedDevice.1.DownlinkShortGuard=0
    WiFi.AccessPoint.5.AssociatedDevice.1.DownlinkShortGuard=0
  depends_on: step1
  capture: result
pass_criteria:
- field: result.DownlinkShortGuard
  operator: contains
  value: '0'
  description: DownlinkShortGuard 應回傳包含 DownlinkShortGuard=0
verification_command: 'root@prplOS:/# wl -i wl0 sta_info 4A:0A:A5:80:23:7B | grep -A 1 ''^rx''

  rx nrate

  eht mcs 8 Nss 2 Tx Exp 0 bw80 ldpc 2xLTF GI 0.8us auto'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: API rerurn 0
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
