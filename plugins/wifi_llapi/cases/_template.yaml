# Test case YAML 範本
# 每個 .yaml 檔描述一條 test case
# 以 _ 開頭的檔案會被 plugin 忽略

id: "template-example"
name: "Example test case"
version: "1.0"

source:
  report: "6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx"
  sheet: "Wifi_LLAPI"
  row: 0                             # 對應 xlsx 的行號

platform:
  prplos: "4.0.3"
  bdk: "6.3.1"

# --- 拓撲與連線 ---
topology:
  links:
    - from: STA
      to: DUT
      band: "5g"                     # 2.4g / 5g / 6g
    - from: DUT
      to: EndpointPC
      interface: eth1

  devices:
    DUT:
      role: ap
      transport: serial
      config:
        - iface: "5g"
          mode: ap
          ssid: "{{SSID_5G}}"
          key: "{{KEY_5G}}"
          mlo: false
        - iface: wan
          type: ethernet
          port: eth0
        - iface: lan
          type: ethernet
          port: eth1

    STA:
      role: sta
      transport: adb
      config:
        - iface: "5g"
          mode: sta
          ssid: "{{SSID_5G}}"
          key: "{{KEY_5G}}"

    EndpointPC:
      role: endpoint
      transport: ssh
      config:
        - iface: eth0
          speed: "1G"

# --- 環境驗證 ---
env_verify:
  - action: ping
    from: STA
    to: DUT
    expect: pass

# --- 測試步驟 ---

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     <fill hlapi_command>
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
  - id: step1
    action: exec
    target: DUT
    command: |
      echo "replace with actual test command"
    capture: result1

  - id: step2
    action: exec
    target: DUT
    command: |
      echo "replace with verification command"
    capture: result2
    depends_on: step1

# --- 通過條件 ---
pass_criteria:
  - field: result2
    operator: "contains"
    value: "expected output"
    description: "描述此條件驗證的目的"

# --- 測試頻段（可選，指定需要重複測試的頻段）---

verification_command: |
  ubus-cli "WiFi.?" | sed -n "1,200p"
  wl -i wl0 status 2>/dev/null || true; wl -i wl1 status 2>/dev/null || true; wl -i wl2 status 2>/dev/null || true

bands: ["5g", "6g", "2.4g"]
