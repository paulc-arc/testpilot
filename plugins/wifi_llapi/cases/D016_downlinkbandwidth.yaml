id: wifi-llapi-D016-downlinkbandwidth
name: "DownlinkBandwidth — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: "1.1"
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 16
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "DownlinkBandwidth"
  baseline: "BCM v4.0.3"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.{i}.AssociatedDevice.1.DownlinkBandwidth?"'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
  links:
    - from: STA
      to: DUT
      band: 5g
    - from: STA
      to: DUT
      band: 6g
    - from: STA
      to: DUT
      band: 2.4g

test_environment: |
  Topology:
  - DUT: COM0 (BGW720-300, AP role)
  - STA: COM1 (BCM board, STA role)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping (live baseline 2026-04-02):
  - 5G:   DUT AP.1 / wl0 / SSID=testpilot5G    ↔ STA wl0 / WPA2-Personal
  - 6G:   DUT AP.3 / wl1 / SSID=testpilot6G    ↔ STA wl1 / WPA3-Personal + SAE
  - 2.4G: DUT AP.5 / wl2 / SSID=testpilot2G    ↔ STA wl2 / WPA2-Personal
  Preconditions:
  - keep exactly one associated STA on each target AP so AssociatedDevice.1 remains deterministic
  - reuse the validated deterministic single-band baseline from verify_env; do not keep all three bands associated simultaneously
  - for each band, DownlinkBandwidth must match the same STA's `wl sta_info` `link bandwidth = XX MHZ` sample

setup_steps: |
  Sequential per-band (5G → 6G → 2.4G); no simultaneous multi-band connections.
  [5G]
  1) STA wl0 verify DUT AP.1 association on the deterministic WPA2-Personal baseline:
     iw dev wl0 link
     wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  2) DUT AP.1 verify the associated STA and compare DownlinkBandwidth with wl0 sta_info:
     ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"
     ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DownlinkBandwidth?"
     wl -i wl0 sta_info <STA_MAC> | grep "link bandwidth"
  [6G]
  1) STA wl1 verify DUT AP.3 association on the validated WPA3/SAE baseline:
     iw dev wl1 link
     wpa_cli -p /var/run/wpa_supplicant -i wl1 status
     wl -i wl1 status
  2) DUT AP.3 verify the associated STA and compare DownlinkBandwidth with wl1 sta_info:
     ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress?"
     ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.DownlinkBandwidth?"
     wl -i wl1 sta_info <STA_MAC> | grep "link bandwidth"
  [2.4G]
  1) STA wl2 verify DUT AP.5 association on the deterministic WPA2-Personal baseline:
     iw dev wl2 link
     wpa_cli -p /var/run/wpa_supplicant -i wl2 status
  2) DUT AP.5 verify the associated STA and compare DownlinkBandwidth with wl2 sta_info:
     ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.MACAddress?"
     ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DownlinkBandwidth?"
     wl -i wl2 sta_info <STA_MAC> | grep "link bandwidth"

test_procedure: |
  For each active band (5G, 6G, then 2.4G):
  1) STA verifies target AP association on the deterministic baseline prepared by verify_env
     (5G=testpilot5G WPA2-Personal, 6G=testpilot6G WPA3/SAE, 2.4G=testpilot2G WPA2-Personal).
  2) Record the live AssociatedDevice.1 MAC from DUT and confirm it is a valid station MAC.
  3) Read `DownlinkBandwidth` from DUT.
  4) Cross-check the same STA with `wl sta_info` and normalize `link bandwidth = XX MHZ` into an integer MHz value.
  Pass:
  - DUT exposes one live STA MAC for the target band.
  - `DownlinkBandwidth` is a legal bandwidth integer (`20|40|80|160|320`).
  - Driver `link bandwidth` is a legal bandwidth integer for the same STA.
  - LLAPI `DownlinkBandwidth` equals the driver bandwidth for the same band.

steps:
  - id: step1_5g_sta_join
    action: exec
    target: STA
    band: 5g
    command:
      - iw dev wl0 link
      - wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  - id: step2_5g_assoc
    action: exec
    target: DUT
    band: 5g
    command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"'
    depends_on: step1_5g_sta_join
    capture: assoc_5g
  - id: step3_5g_get
    action: exec
    target: DUT
    band: 5g
    command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DownlinkBandwidth?"'
    depends_on: step2_5g_assoc
    capture: result_5g
  - id: step4_5g_driver_bw
    action: exec
    target: DUT
    band: 5g
    command: 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); [ -n "$STA_MAC" ] && wl -i wl0 sta_info $STA_MAC | sed -n ''s/.*link bandwidth = *\([0-9][0-9]*\) MHZ.*/DriverDownlinkBandwidth5g=\1/p'''
    depends_on: step3_5g_get
    capture: driver_bw_5g
  - id: step5_6g_sta_join
    action: exec
    target: STA
    band: 6g
    command:
      - iw dev wl1 link
      - wpa_cli -p /var/run/wpa_supplicant -i wl1 status
      - wl -i wl1 status
  - id: step6_6g_assoc
    action: exec
    target: DUT
    band: 6g
    command: 'ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress?"'
    depends_on: step5_6g_sta_join
    capture: assoc_6g
  - id: step7_6g_get
    action: exec
    target: DUT
    band: 6g
    command: 'ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.DownlinkBandwidth?"'
    depends_on: step6_6g_assoc
    capture: result_6g
  - id: step8_6g_driver_bw
    action: exec
    target: DUT
    band: 6g
    command: 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); [ -n "$STA_MAC" ] && wl -i wl1 sta_info $STA_MAC | sed -n ''s/.*link bandwidth = *\([0-9][0-9]*\) MHZ.*/DriverDownlinkBandwidth6g=\1/p'''
    depends_on: step7_6g_get
    capture: driver_bw_6g
  - id: step9_24g_sta_join
    action: exec
    target: STA
    band: 2.4g
    command:
      - iw dev wl2 link
      - wpa_cli -p /var/run/wpa_supplicant -i wl2 status
  - id: step10_24g_assoc
    action: exec
    target: DUT
    band: 2.4g
    command: 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.MACAddress?"'
    depends_on: step9_24g_sta_join
    capture: assoc_24g
  - id: step11_24g_get
    action: exec
    target: DUT
    band: 2.4g
    command: 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DownlinkBandwidth?"'
    depends_on: step10_24g_assoc
    capture: result_24g
  - id: step12_24g_driver_bw
    action: exec
    target: DUT
    band: 2.4g
    command: 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); [ -n "$STA_MAC" ] && wl -i wl2 sta_info $STA_MAC | sed -n ''s/.*link bandwidth = *\([0-9][0-9]*\) MHZ.*/DriverDownlinkBandwidth24g=\1/p'''
    depends_on: step11_24g_get
    capture: driver_bw_24g

pass_criteria:
  - field: assoc_5g.MACAddress
    operator: regex
    value: '(?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$'
    description: "5G: AP1 AssociatedDevice.1 must resolve to a live station MAC."
  - field: result_5g.DownlinkBandwidth
    operator: regex
    value: '^(20|40|80|160|320)$'
    description: "5G: DownlinkBandwidth must normalize to a legal channel width."
  - field: driver_bw_5g.DriverDownlinkBandwidth5g
    operator: regex
    value: '^(20|40|80|160|320)$'
    description: "5G: wl0 sta_info must emit a legal link bandwidth for the same STA."
  - field: result_5g.DownlinkBandwidth
    operator: equals
    reference: driver_bw_5g.DriverDownlinkBandwidth5g
    description: "5G: LLAPI DownlinkBandwidth must match wl0 sta_info link bandwidth."
  - field: assoc_6g.MACAddress
    operator: regex
    value: '(?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$'
    description: "6G: AP3 AssociatedDevice.1 must resolve to a live station MAC."
  - field: result_6g.DownlinkBandwidth
    operator: regex
    value: '^(20|40|80|160|320)$'
    description: "6G: DownlinkBandwidth must normalize to a legal channel width."
  - field: driver_bw_6g.DriverDownlinkBandwidth6g
    operator: regex
    value: '^(20|40|80|160|320)$'
    description: "6G: wl1 sta_info must emit a legal link bandwidth for the same STA."
  - field: result_6g.DownlinkBandwidth
    operator: equals
    reference: driver_bw_6g.DriverDownlinkBandwidth6g
    description: "6G: LLAPI DownlinkBandwidth must match wl1 sta_info link bandwidth."
  - field: assoc_24g.MACAddress
    operator: regex
    value: '(?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$'
    description: "2.4G: AP5 AssociatedDevice.1 must resolve to a live station MAC."
  - field: result_24g.DownlinkBandwidth
    operator: regex
    value: '^(20|40|80|160|320)$'
    description: "2.4G: DownlinkBandwidth must normalize to a legal channel width."
  - field: driver_bw_24g.DriverDownlinkBandwidth24g
    operator: regex
    value: '^(20|40|80|160|320)$'
    description: "2.4G: wl2 sta_info must emit a legal link bandwidth for the same STA."
  - field: result_24g.DownlinkBandwidth
    operator: equals
    reference: driver_bw_24g.DriverDownlinkBandwidth24g
    description: "2.4G: LLAPI DownlinkBandwidth must match wl2 sta_info link bandwidth."

verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"'
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.DownlinkBandwidth?"'
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p'')'
  - 'wl -i wl0 sta_info $STA_MAC | grep "link bandwidth ="'
  - 'ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress?"'
  - 'ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.DownlinkBandwidth?"'
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p'')'
  - 'wl -i wl1 sta_info $STA_MAC | grep "link bandwidth ="'
  - 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.MACAddress?"'
  - 'ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.DownlinkBandwidth?"'
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.5.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p'')'
  - 'wl -i wl2 sta_info $STA_MAC | grep "link bandwidth ="'

results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: "0401 row 16 expects Pass on all three bands; live verification must match each band's wl sta_info link bandwidth sample."
