id: wifi-llapi-D065-bridgeinterface
name: "BridgeInterface — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 65
  object: WiFi.AccessPoint.{i}.
  api: BridgeInterface
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.BridgeInterface?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; BridgeInterface is validated as an AP-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline
  - validate the read-only BridgeInterface getter against hostapd config and live bridge membership
setup_steps: |
  1) DUT bridge baseline:
     - keep AP1 / AP3 / AP5 enabled on the default non-open baseline
     - confirm wl0 / wl1 / wl2 BSS instances are up before readback
  2) DUT readback:
     - query BridgeInterface on AP1, AP3, and AP5
     - cross-check each band's hostapd config bridge= line
     - confirm br-lan still owns wl0 / wl1 / wl2
sta_env_setup: |
  DUT:
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Read WiFi.AccessPoint.1/3/5.BridgeInterface directly from the DUT.
  2) Cross-check each radio's hostapd config file for bridge=br-lan.
  3) Confirm the live sysfs master bridge for wl0 / wl1 / wl2 is still br-lan.
  Verdict: Pass. The BridgeInterface getter matches hostapd config and the live Linux bridge master on 5G, 6G, and 2.4G.
steps:
- id: step1_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.AccessPoint.1.BridgeInterface?"'
  capture: result_5g
- id: step2_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.AccessPoint.3.BridgeInterface?"'
  depends_on: step1_5g
  capture: result_6g
- id: step3_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.AccessPoint.5.BridgeInterface?"'
  depends_on: step2_6g
  capture: result_24g
- id: step4_5g_config
  action: exec
  target: DUT
  band: 5g
  command: >-
    grep '^bridge=' /tmp/wl0_hapd.conf | awk -F= '/^bridge=/ {if (count == 0) first=$2; if ($2 != first) mismatch=1; count++} END {print "BridgeConfig5g=" first; print "BridgeConfig5gCount=" count+0; print "BridgeConfig5gMismatch=" mismatch+0}'
  depends_on: step3_24g
  capture: config_5g
- id: step5_6g_config
  action: exec
  target: DUT
  band: 6g
  command: >-
    grep '^bridge=' /tmp/wl1_hapd.conf | awk -F= '/^bridge=/ {if (count == 0) first=$2; if ($2 != first) mismatch=1; count++} END {print "BridgeConfig6g=" first; print "BridgeConfig6gCount=" count+0; print "BridgeConfig6gMismatch=" mismatch+0}'
  depends_on: step4_5g_config
  capture: config_6g
- id: step6_24g_config
  action: exec
  target: DUT
  band: 2.4g
  command: >-
    grep '^bridge=' /tmp/wl2_hapd.conf | awk -F= '/^bridge=/ {if (count == 0) first=$2; if ($2 != first) mismatch=1; count++} END {print "BridgeConfig24g=" first; print "BridgeConfig24gCount=" count+0; print "BridgeConfig24gMismatch=" mismatch+0}'
  depends_on: step5_6g_config
  capture: config_24g
- id: step7_bridge_state
  action: exec
  target: DUT
  command:
    - cat /sys/class/net/wl0/master/uevent | sed -n 's/^INTERFACE=/BridgeMaster5g=/p'
    - cat /sys/class/net/wl1/master/uevent | sed -n 's/^INTERFACE=/BridgeMaster6g=/p'
    - cat /sys/class/net/wl2/master/uevent | sed -n 's/^INTERFACE=/BridgeMaster24g=/p'
  depends_on: step6_24g_config
  capture: bridge_state
pass_criteria:
- field: result_5g.BridgeInterface
  operator: equals
  value: br-lan
  description: 5G AP1 BridgeInterface should read back br-lan.
- field: result_6g.BridgeInterface
  operator: equals
  value: br-lan
  description: 6G AP3 BridgeInterface should read back br-lan.
- field: result_24g.BridgeInterface
  operator: equals
  value: br-lan
  description: 2.4G AP5 BridgeInterface should read back br-lan.
- field: config_5g.BridgeConfig5g
  operator: equals
  reference: result_5g.BridgeInterface
  description: wl0 hostapd bridge config should match the 5G BridgeInterface getter.
- field: config_5g.BridgeConfig5gCount
  operator: equals
  value: '2'
  description: wl0 hostapd config should expose two bridge=br-lan lines in the current dual-BSS file.
- field: config_5g.BridgeConfig5gMismatch
  operator: equals
  value: '0'
  description: All wl0 bridge= lines should agree on the same bridge name.
- field: config_6g.BridgeConfig6g
  operator: equals
  reference: result_6g.BridgeInterface
  description: wl1 hostapd bridge config should match the 6G BridgeInterface getter.
- field: config_6g.BridgeConfig6gCount
  operator: equals
  value: '2'
  description: wl1 hostapd config should expose two bridge=br-lan lines in the current dual-BSS file.
- field: config_6g.BridgeConfig6gMismatch
  operator: equals
  value: '0'
  description: All wl1 bridge= lines should agree on the same bridge name.
- field: config_24g.BridgeConfig24g
  operator: equals
  reference: result_24g.BridgeInterface
  description: wl2 hostapd bridge config should match the 2.4G BridgeInterface getter.
- field: config_24g.BridgeConfig24gCount
  operator: equals
  value: '2'
  description: wl2 hostapd config should expose two bridge=br-lan lines in the current dual-BSS file.
- field: config_24g.BridgeConfig24gMismatch
  operator: equals
  value: '0'
  description: All wl2 bridge= lines should agree on the same bridge name.
- field: bridge_state.BridgeMaster5g
  operator: equals
  reference: result_5g.BridgeInterface
  description: wl0's live Linux bridge master should match the 5G BridgeInterface getter.
- field: bridge_state.BridgeMaster6g
  operator: equals
  reference: result_6g.BridgeInterface
  description: wl1's live Linux bridge master should match the 6G BridgeInterface getter.
- field: bridge_state.BridgeMaster24g
  operator: equals
  reference: result_24g.BridgeInterface
  description: wl2's live Linux bridge master should match the 2.4G BridgeInterface getter.
verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.BridgeInterface?"'
  - 'ubus-cli "WiFi.AccessPoint.3.BridgeInterface?"'
  - 'ubus-cli "WiFi.AccessPoint.5.BridgeInterface?"'
  - 'grep ''^bridge='' /tmp/wl0_hapd.conf | awk -F= ''/^bridge=/ {if (count == 0) first=$2; if ($2 != first) mismatch=1; count++} END {print "BridgeConfig5g=" first; print "BridgeConfig5gCount=" count+0; print "BridgeConfig5gMismatch=" mismatch+0}'''
  - 'grep ''^bridge='' /tmp/wl1_hapd.conf | awk -F= ''/^bridge=/ {if (count == 0) first=$2; if ($2 != first) mismatch=1; count++} END {print "BridgeConfig6g=" first; print "BridgeConfig6gCount=" count+0; print "BridgeConfig6gMismatch=" mismatch+0}'''
  - 'grep ''^bridge='' /tmp/wl2_hapd.conf | awk -F= ''/^bridge=/ {if (count == 0) first=$2; if ($2 != first) mismatch=1; count++} END {print "BridgeConfig24g=" first; print "BridgeConfig24gCount=" count+0; print "BridgeConfig24gMismatch=" mismatch+0}'''
  - 'cat /sys/class/net/wl0/master/uevent | sed -n ''s/^INTERFACE=/BridgeMaster5g=/p'''
  - 'cat /sys/class/net/wl1/master/uevent | sed -n ''s/^INTERFACE=/BridgeMaster6g=/p'''
  - 'cat /sys/class/net/wl2/master/uevent | sed -n ''s/^INTERFACE=/BridgeMaster24g=/p'''
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: '5G/6G/2.4G serialwrap readback all returned BridgeInterface="br-lan"; /tmp/wl0_hapd.conf, /tmp/wl1_hapd.conf, and /tmp/wl2_hapd.conf each exposed two bridge=br-lan lines; and wl0/wl1/wl2 all resolved to Linux bridge master br-lan via /sys/class/net/*/master/uevent. This case is calibrated as Pass across all three executed bands.'
