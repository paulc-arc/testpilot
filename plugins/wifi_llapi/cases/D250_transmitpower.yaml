id: wifi-llapi-r180-transmitpower
name: TransmitPower — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 250
  object: "WiFi.Radio.{i}."
  api: "TransmitPower"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.TransmitPower=50
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.TransmitPower=50
  3) Read back with ubus-cli after each set; do not use wl txpwr_percent as the verification source on BGW720.

sta_env_setup: |
  STA env setup baseline (COM1 / A0, serialwrap):
  1) Enable STA radios:
     ubus-cli WiFi.Radio.1.Enable=1
     ubus-cli WiFi.Radio.2.Enable=1
     ubus-cli WiFi.Radio.3.Enable=1
  2) 5G connect verify (wl0 -> B0_5G_AP):
     ubus-cli WiFi.AccessPoint.1.Enable=0
     ubus-cli WiFi.AccessPoint.2.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl0.1 del 2>/dev/null || true
     iw dev wl0 set type managed
     ifconfig wl0 up
     iw dev wl0 connect B0_5G_AP
     sleep 3
     iw dev wl0 link
  3) 6G connect verify (wl1 -> B0_6G_AP, SAE):
     wpa_cli terminate 2>/dev/null || true
     sleep 1
     iw dev wl1.1 del 2>/dev/null || true
     iw dev wl1 disconnect 2>/dev/null || true
     iw dev wl1 set type managed
     ifconfig wl1 up
     printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\n' > /tmp/wpa_wl1.conf
     wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf
     sleep 2
     wpa_cli -i wl1 remove_network all
     wpa_cli -i wl1 add_network
     wpa_cli -i wl1 set_network 0 ssid '"B0_6G_AP"'
     wpa_cli -i wl1 set_network 0 key_mgmt SAE
     wpa_cli -i wl1 set_network 0 sae_password '"B0StaTest1234"'
     wpa_cli -i wl1 set_network 0 ieee80211w 2
     wpa_cli -i wl1 set_network 0 scan_ssid 1
     wpa_cli -i wl1 enable_network 0
     wpa_cli -i wl1 reconnect
     sleep 15
     iw dev wl1 link
     wpa_cli -i wl1 status
  4) 2.4G connect verify (wl2 -> B0_24G_AP):
     ubus-cli WiFi.AccessPoint.5.Enable=0
     ubus-cli WiFi.AccessPoint.6.Enable=0
     killall wpa_supplicant 2>/dev/null || true
     iw dev wl2.1 del 2>/dev/null || true
     iw dev wl2 set type managed
     ifconfig wl2 up
     iw dev wl2 connect B0_24G_AP
     sleep 3
     iw dev wl2 link
  5) DUT association evidence (COM0):
     wl -i wl0 assoclist
     wl -i wl1 assoclist
     wl -i wl2 assoclist

test_procedure: |
  1) Set TransmitPower=50 and read back with ubus-cli.
  2) Set TransmitPower=100 and read back with ubus-cli.
  3) Cross-check with verification_command (iw txpower / HLAPI readback).

steps:
- id: step1
  action: exec
  target: DUT
  command: 'Set all radios to 50 percent: ubus-cli WiFi.Radio.1.TransmitPower=50; ubus-cli WiFi.Radio.2.TransmitPower=50; ubus-cli WiFi.Radio.3.TransmitPower=50'
- id: step2
  action: exec
  target: DUT
  command: 'Read back 50 percent setting: ubus-cli WiFi.Radio.*.TransmitPower?'
  depends_on: step1
  capture: result_50
- id: step3
  action: exec
  target: DUT
  command: 'Set all radios back to 100 percent: ubus-cli WiFi.Radio.1.TransmitPower=100; ubus-cli WiFi.Radio.2.TransmitPower=100; ubus-cli WiFi.Radio.3.TransmitPower=100'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: 'Read back 100 percent setting: ubus-cli WiFi.Radio.*.TransmitPower?'
  depends_on: step3
  capture: result_100
pass_criteria:
- field: result_50.TransmitPower
  operator: equals
  value: '50'
  description: HLAPI readback 必須能反映 50% 設定。
- field: result_100.TransmitPower
  operator: equals
  value: '100'
  description: HLAPI readback 必須能反映 100% 設定。
verification_command: |
  ubus-cli "WiFi.Radio.*.TransmitPower?"
  iw dev wl0 info | grep -i txpower
  iw dev wl1 info | grep -i txpower
  iw dev wl2 info | grep -i txpower
  # BGW720 active path is vendor nl80211 TLV based; wl txpwr_percent is not the source of truth here.
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : The return from "wl -i wl[i] txpwr_percent"will always be 100.'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Commited
