id: wifi-llapi-d334-retranscount
name: "RetransCount — WiFi.SSID.{i}.Stats."
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 334
  object: WiFi.SSID.{i}.Stats.
  api: RetransCount
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.SSID.{i}.Stats.RetransCount?"'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
        - iface: 5g
          mode: sta
          ssid: TestPilot_BTM
          key: testpilot6g
        - iface: 6g
          mode: sta
          ssid: TestPilot_BTM
          key: testpilot6g
        - iface: 2.4g
          mode: sta
          ssid: TestPilot_24G
          key: ''
  links:
    - from: STA
      to: DUT
      band: 5g
    - from: STA
      to: DUT
      band: 6g
    - from: STA
      to: DUT
      band: 2.4g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (single active STA link only; validate 5G -> 6G -> 2.4G sequentially)
  Mapping:
  - 5G = wl0 / SSID.4 / STA MAC 2c:59:17:00:04:85
  - 6G = wl1 / SSID.6 / STA MAC 2c:59:17:00:04:86
  - 2.4G = wl2 / SSID.8 / STA MAC 2c:59:17:00:04:97
  Rules:
  - move COM1 br-lan off 192.168.1.0/24 before any ping attempt
  - attempt STA-generated traffic before the final readback for each band
  - on 2.4G, keep the traffic attempt even if ping still drops; judge by direct/getSSIDStats/driver consistency
setup_steps: |
  DUT baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.SSID.4.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.1.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.Radio.2.Enable=1
    ubus-cli WiFi.SSID.6.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.3.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.Radio.3.Enable=1
    ubus-cli WiFi.SSID.8.SSID=TestPilot_24G
    ubus-cli WiFi.AccessPoint.5.Security.ModeEnabled=None
    ubus-cli WiFi.AccessPoint.5.Security.MFPConfig=Disabled
    ubus-cli WiFi.AccessPoint.5.Enable=1
  STA reset before each band:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    wpa_cli terminate 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    ip addr flush dev wl0 2>/dev/null || true
    ip addr flush dev wl1 2>/dev/null || true
    ip addr flush dev wl2 2>/dev/null || true
sta_env_setup: |
  5G example:
    iw dev wl0 set type managed
    ifconfig wl0 up
    wpa_supplicant -B -D nl80211 -i wl0 -c /tmp/wpa_wl0.conf -C /var/run/wpa_supplicant
    wpa_cli -p /var/run/wpa_supplicant -i wl0 reconnect
  6G example:
    iw dev wl1 disconnect 2>/dev/null || true
    ifconfig wl1 down
    wl -i wl1 down
    wl -i wl1 ap 0
    iw dev wl1 set type managed
    wl -i wl1 up
    ifconfig wl1 up
    wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf -C /var/run/wpa_supplicant
    wpa_cli -p /var/run/wpa_supplicant -i wl1 enable_network 0
    wpa_cli -p /var/run/wpa_supplicant -i wl1 select_network 0
    wpa_cli -p /var/run/wpa_supplicant -i wl1 reconnect
  2.4G example:
    iw dev wl2 set type managed
    ifconfig wl2 up
    iw dev wl2 connect TestPilot_24G
  Traffic attempt:
    ifconfig wlX 192.168.1.X netmask 255.255.255.0 up
    ip route replace 192.168.1.0/24 dev wlX src 192.168.1.X
    ip neigh flush dev wlX
    ping -I wlX -c 5 -W 1 192.168.1.1
    sleep 2
    ping -I wlX -c 5 -W 1 192.168.1.1
test_procedure: |
  1) Validate this counter sequentially on 5G, then 6G, then 2.4G; keep only one associated STA link active.
  2) For each band, capture assoclist, direct Stats, getSSIDStats(), and the matching driver view before the traffic attempt.
  3) Attempt STA-generated ping traffic with a static IP on the active STA interface, wait 2 seconds, then reread the same counter.
  4) Use the final reread for the manual judgment.
  5) Pass when direct Stats.RetransCount equals getSSIDStats().RetransCount on 5G/6G/2.4G and the matching low-32 view of wl if_counters txretrans.
steps:
- id: assoc_5g
  action: exec
  target: DUT
  command: wl -i wl0 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac5g=\1/p'
  capture: assoc_5g
- id: direct_5g
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.SSID.4.Stats.RetransCount?"'
  depends_on: assoc_5g
  capture: direct_5g
- id: getssid_5g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n 's/^[[:space:]]*RetransCount = \([0-9][0-9]*\).*/GetSSIDStatsRetransCount5g=\1/p'
  depends_on: direct_5g
  capture: getssid_5g
- id: driver_5g
  action: exec
  target: DUT
  command: v=$(wl -i wl0 if_counters | sed -n 's/.*txretrans \([0-9][0-9]*\).*/\1/p'); printf "DriverRetransCount5g=%u\n" "$((v & 4294967295))"
  depends_on: getssid_5g
  capture: driver_5g
- id: assoc_6g
  action: exec
  target: DUT
  command: wl -i wl1 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac6g=\1/p'
  capture: assoc_6g
- id: direct_6g
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.SSID.6.Stats.RetransCount?"'
  depends_on: assoc_6g
  capture: direct_6g
- id: getssid_6g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n 's/^[[:space:]]*RetransCount = \([0-9][0-9]*\).*/GetSSIDStatsRetransCount6g=\1/p'
  depends_on: direct_6g
  capture: getssid_6g
- id: driver_6g
  action: exec
  target: DUT
  command: v=$(wl -i wl1 if_counters | sed -n 's/.*txretrans \([0-9][0-9]*\).*/\1/p'); printf "DriverRetransCount6g=%u\n" "$((v & 4294967295))"
  depends_on: getssid_6g
  capture: driver_6g
- id: assoc_24g
  action: exec
  target: DUT
  command: wl -i wl2 assoclist | tr 'A-F' 'a-f' | sed -n 's/^assoclist \([^ ]*\).*$/AssocMac24g=\1/p'
  capture: assoc_24g
- id: direct_24g
  action: exec
  target: DUT
  command: 'ubus-cli "WiFi.SSID.8.Stats.RetransCount?"'
  depends_on: assoc_24g
  capture: direct_24g
- id: getssid_24g
  action: exec
  target: DUT
  command: ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n 's/^[[:space:]]*RetransCount = \([0-9][0-9]*\).*/GetSSIDStatsRetransCount24g=\1/p'
  depends_on: direct_24g
  capture: getssid_24g
- id: driver_24g
  action: exec
  target: DUT
  command: v=$(wl -i wl2 if_counters | sed -n 's/.*txretrans \([0-9][0-9]*\).*/\1/p'); printf "DriverRetransCount24g=%u\n" "$((v & 4294967295))"
  depends_on: getssid_24g
  capture: driver_24g
pass_criteria:
- field: assoc_5g.AssocMac5g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 5g DUT assoclist must resolve the expected STA MAC 2c:59:17:00:04:85.
- field: direct_5g.RetransCount
  operator: equals
  reference: getssid_5g.GetSSIDStatsRetransCount5g
  description: 5g direct Stats.RetransCount must match getSSIDStats().RetransCount.
- field: direct_5g.RetransCount
  operator: equals
  reference: driver_5g.DriverRetransCount5g
  description: 5g direct Stats.RetransCount must match the low-32 view of wl0 if_counters txretrans.
- field: assoc_6g.AssocMac6g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 6g DUT assoclist must resolve the expected STA MAC 2c:59:17:00:04:86.
- field: direct_6g.RetransCount
  operator: equals
  reference: getssid_6g.GetSSIDStatsRetransCount6g
  description: 6g direct Stats.RetransCount must match getSSIDStats().RetransCount.
- field: direct_6g.RetransCount
  operator: equals
  reference: driver_6g.DriverRetransCount6g
  description: 6g direct Stats.RetransCount must match the low-32 view of wl1 if_counters txretrans.
- field: assoc_24g.AssocMac24g
  operator: regex
  value: (?i)^([0-9a-f]{2}:){5}[0-9a-f]{2}$
  description: 2.4g DUT assoclist must resolve the expected STA MAC 2c:59:17:00:04:97.
- field: direct_24g.RetransCount
  operator: equals
  reference: getssid_24g.GetSSIDStatsRetransCount24g
  description: 2.4g direct Stats.RetransCount must match getSSIDStats().RetransCount.
- field: direct_24g.RetransCount
  operator: equals
  reference: driver_24g.DriverRetransCount24g
  description: 2.4g direct Stats.RetransCount must match the low-32 view of wl2 if_counters txretrans.
verification_command: 
  - '# 5g'
  - wl -i wl0 assoclist
  - ubus-cli "WiFi.SSID.4.Stats.RetransCount?"
  - 'ubus-cli "WiFi.SSID.4.getSSIDStats()" | sed -n "s/^[[:space:]]*RetransCount = \([0-9][0-9]*\).*/GetSSIDStatsRetransCount5g=\1/p"'
  - 'v=$(wl -i wl0 if_counters | sed -n "s/.*txretrans \([0-9][0-9]*\).*/\1/p"); printf "DriverRetransCount5g=%u\n" "$((v & 4294967295))"'
  - ''
  - '# 6g'
  - wl -i wl1 assoclist
  - ubus-cli "WiFi.SSID.6.Stats.RetransCount?"
  - 'ubus-cli "WiFi.SSID.6.getSSIDStats()" | sed -n "s/^[[:space:]]*RetransCount = \([0-9][0-9]*\).*/GetSSIDStatsRetransCount6g=\1/p"'
  - 'v=$(wl -i wl1 if_counters | sed -n "s/.*txretrans \([0-9][0-9]*\).*/\1/p"); printf "DriverRetransCount6g=%u\n" "$((v & 4294967295))"'
  - ''
  - '# 2.4g'
  - wl -i wl2 assoclist
  - ubus-cli "WiFi.SSID.8.Stats.RetransCount?"
  - 'ubus-cli "WiFi.SSID.8.getSSIDStats()" | sed -n "s/^[[:space:]]*RetransCount = \([0-9][0-9]*\).*/GetSSIDStatsRetransCount24g=\1/p"'
  - 'v=$(wl -i wl2 if_counters | sed -n "s/.*txretrans \([0-9][0-9]*\).*/\1/p"); printf "DriverRetransCount24g=%u\n" "$((v & 4294967295))"'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'Brcm'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'Workbook v4.0.3 keeps SSID-level RetransCount as Fail; current multiband serialwrap probe exact-closes direct Stats, getSSIDStats(), and the low-32 view of wl if_counters txretrans on SSID.4/6/8 (5g=0, 6g=0, 2.4g=0) while preserving the workbook-directed raw fail projection.'
