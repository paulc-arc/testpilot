id: wifi-llapi-D279-getscanresults-bandwidth
aliases:
  - wifi-llapi-r205-getscanresults-bandwidth
name: getScanResults() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 279
  object: "WiFi.Radio.{i}."
  api: "getScanResults()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.{i}.getScanResults()Bandwidth : 20,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
      - iface: 6g
        mode: sta
        ssid: '{{SSID_6G}}'
        key: '{{KEY_6G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: STA
    to: DUT
    band: 6g
test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT 5G + 6G baseline:
     - set Radio.1/SSID.4 for the 5G AP under test
     - configure AP1 as open with MFP disabled
     - enable AP1 before station association
     - set Radio.2/SSID.6 for the 6G AP under test
     - configure AP3 for WPA3-SAE with MFP required
     - enable AP3 before station association
  2) STA 5G + 6G preparation:
     - disable local AP1/AP2 on A0
     - clear wl0 AP child interface and switch wl0 to managed mode
     - connect wl0 to {{SSID_5G}}
     - disable local AP3/AP4 on A0
     - reset wl1 and its wpa_supplicant control socket
     - connect wl1 to {{SSID_6G}} with SAE
  3) Association evidence:
     - A0: iw dev wl0 link ; iw dev wl1 link ; wpa_cli -p /var/run/wpa_supplicant -i wl1 status
     - B0: wl -i wl0 assoclist ; wl -i wl1 assoclist
sta_env_setup: |
  DUT 5G AP baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.1.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.1.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.OfdmaEnable=1
    ubus-cli WiFi.Radio.1.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.1.OperatingStandards=ax
    ubus-cli WiFi.Radio.1.RxChainCtrl=-1
    ubus-cli WiFi.Radio.1.TxChainCtrl=-1
    ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.1.Sensing.Enable=1
    ubus-cli WiFi.Radio.1.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.1.LongRetryLimit=6
    ubus-cli WiFi.Radio.1.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.1.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.4.SSID={{SSID_5G}}
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.2.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=None
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Disabled
    ubus-cli WiFi.AccessPoint.1.Enable=1
  DUT 6G AP baseline:
    ubus-cli WiFi.Radio.2.Enable=1
    ubus-cli WiFi.Radio.2.BeaconPeriod=100
    ubus-cli WiFi.Radio.2.DTIMPeriod=3
    ubus-cli WiFi.Radio.2.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.2.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.2.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.2.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.2.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.2.OfdmaEnable=1
    ubus-cli WiFi.Radio.2.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.2.OperatingStandards=ax
    ubus-cli WiFi.Radio.2.RxChainCtrl=-1
    ubus-cli WiFi.Radio.2.TxChainCtrl=-1
    ubus-cli WiFi.Radio.2.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.2.Sensing.Enable=1
    ubus-cli WiFi.Radio.2.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.2.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.2.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.2.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.2.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.2.LongRetryLimit=6
    ubus-cli WiFi.Radio.2.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.2.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.6.SSID={{SSID_6G}}
    ubus-cli WiFi.AccessPoint.3.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.4.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase={{KEY_6G}}
    ubus-cli WiFi.AccessPoint.3.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.3.MultiAPType=FronthaulBSS
    ubus-cli WiFi.AccessPoint.3.Enable=1
  STA 5G preparation:
    ubus-cli WiFi.AccessPoint.1.Enable=0
    ubus-cli WiFi.AccessPoint.2.Enable=0
    killall wpa_supplicant 2>/dev/null || true
    iw dev wl0.1 del 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl0 set type managed
    ifconfig wl0 up
  STA 5G connect verify:
    iw dev wl0 connect {{SSID_5G}}
    sleep 2
    iw dev wl0 link
  STA 6G preparation:
    ubus-cli WiFi.AccessPoint.3.Enable=0
    ubus-cli WiFi.AccessPoint.4.Enable=0
    wpa_cli terminate 2>/dev/null || true
    sleep 1
    rm -f /var/run/wpa_supplicant/wl1 2>/dev/null || true
    iw dev wl1.1 del 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl1 set type managed
    ifconfig wl1 up
    mkdir -p /var/run/wpa_supplicant
    printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\nnetwork={\nssid="{{SSID_6G}}"\nkey_mgmt=SAE\nsae_password="{{KEY_6G}}"\nieee80211w=2\nscan_ssid=1\n}\n' > /tmp/wpa_wl1.conf
    wpa_supplicant -B -D nl80211 -i wl1 -c /tmp/wpa_wl1.conf -C /var/run/wpa_supplicant
    sleep 3
  STA 6G connect verify:
    wpa_cli -p /var/run/wpa_supplicant -i wl1 reconnect
    sleep 8
    iw dev wl1 link
    wpa_cli -p /var/run/wpa_supplicant -i wl1 status
  DUT association evidence:
    wl -i wl0 assoclist
    wl -i wl1 assoclist
test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.getScanResults()Bandwidth : 20,
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.getScanResults()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Setup another AP as a data collecting target, try collect the target's Wi-Fi air radio info. Compare the acture
    value and API returned value. [5GHz] ubus-cli "WiFi.Radio.*.getScanResults()" | grep -i 1C:F4:3F:73:C7 * -A 15 -B1 { BSSID
    = "1C:F4:3F:73:C7:48", Bandwidth = 160, CentreChannel = 50, Channel = 36, ChannelUtilization = 195, EncryptionMode = "Default",
    Noise = 0, OperatingStandards = "a,n,ac,ax,be", RSSI = -34, SSID = "AAAAA_S7-5", SecurityModeEnabled = "WPA2-WPA3-Personal",
    SignalNoiseRatio = 0, SignalStrength = -34, StationCount = 0, WPSConfigMethodsSupported = "" }, -- [2.4G] { BSSID = "1C:F4:3F:73:C7:40",
    Bandwidth = 20, CentreChannel = 13, Channel = 13, ChannelUtilization = 196, EncryptionMode = "Default", Noise = 0, OperatingStandards
    = "b,g,n,ax,be", RSSI = -36, SSID = "MagentaWLAN-9EOE", SecurityModeEnabled = "WPA2-WPA3-Personal", SignalNoiseRatio =
    0, SignalStrength = -36, StationCount = 0, WPSConfigMethodsSupported = "" } [6GHz] ubus-cli "WiFi.Radio.2.getScanResults()"
    | grep -i 18:60:41:00:0 f:2b -A 15 -B1 { BSSID = "18:60:41:00:0F:2B", Bandwidth = 320, CentreChannel = 127, Channel =
    149, ChannelUtilization = 70, EncryptionMode = "Default", Noise = 0, OperatingStandards = "ax,be", RSSI = -86, SSID =
    "!iphone17_G5", SecurityModeEnabled = "WPA3-Personal", SignalNoiseRatio = 0, SignalStrength = -86, StationCount = 0, WPSConfigMethodsSupported
    = "" },
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getScanResults() 執行不應回傳 error
