id: wifi-llapi-r279-longretrylimit
name: LongRetryLimit — WiFi.Radio.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 279
  object: WiFi.Radio.{i}.
  api: LongRetryLimit
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.LongRetryLimit=6
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Check API default value: ubus-cli WiFi.Radio.*.LongRetryLimit? > WiFi.Radio.*.LongRetryLimit? WiFi.Radio.1.LongRetryLimit=6
    WiFi.Radio.2.LongRetryLimit=6 WiFi.Radio.3.LongRetryLimit=6'
- id: step2
  action: exec
  target: DUT
  command: 'Try modify the API to any other value: ubus-cli WiFi.Radio.*.LongRetryLimit=10'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check API value again and compare with driver return value: ubus-cli WiFi.Radio.*.LongRetryLimit? > WiFi.Radio.*.LongRetryLimit?
    WiFi.Radio.1.LongRetryLimit=10 WiFi.Radio.2.LongRetryLimit=10 WiFi.Radio.3.LongRetryLimit=10'
  depends_on: step2
  capture: result
pass_criteria:
- field: result.LongRetryLimit
  operator: contains
  value: '6'
  description: LongRetryLimit 應回傳包含 LongRetryLimit=6
verification_command: '(default)

  root@prplOS:/# iw phy phy0 info | grep "Retry long limit"

  Retry long limit: 4

  root@prplOS:/# iw phy phy1 info | grep "Retry long limit"

  Retry long limit: 4

  root@prplOS:/# iw phy phy2 info | grep "Retry long limit"

  Retry long limit: 4


  (LongRetryLimit=10)

  root@prplOS:/# iw phy phy0 info | grep "Retry long limit"

  Retry long limit: 4

  root@prplOS:/# iw phy phy1 info | grep "Retry long limit"

  Retry long limit: 4

  root@prplOS:/# iw phy phy2 info | grep "Retry long limit"

  Retry long limit: 4'
results_reference:
