id: wifi-llapi-r085-sha256enable
name: SHA256Enable — WiFi.AccessPoint.{i}.Security
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 93
  object: "WiFi.AccessPoint.{i}.Security"
  api: "SHA256Enable"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Security.SHA256Enable=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Security.SHA256Enable=0
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Security.SHA256Enable=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.Security.SHA256Enable?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '"Test Procedure: 1.Set/Get SHA256Enable Set Command: ubus-cli WiFi.AccessPoint.{i}.Security.SHA256Enable= Get
    Command: ubus-cli WiFi.AccessPoint.{i}.Security.SHA256Enable? 2.check hostapd config&webGUI cat /tmp/wlx_hapd.conf"'
  capture: result
pass_criteria:
- field: result.SHA256Enable
  operator: contains
  value: '0'
  description: SHA256Enable 應回傳包含 SHA256Enable=0
verification_command: cat /tmp/wl0_hapd.conf |grep sae_password
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : wl[i]_hapd.conf always return 0'
  v4.0.3:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: not supported by pwhm
