id: wifi-llapi-D092-wepkey-accesspoint-security
name: "WEPKey \u2014 WiFi.AccessPoint.{i}.Security"
version: '1.0'
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 94
  object: "WiFi.AccessPoint.{i}.Security"
  api: "WEPKey"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Security.WEPKey=AABBCCDDEEFF0
llapi_support: Support
implemented_by: pWHM
bands:
  - 5g
  - 6g
  - 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  Transport:
  - serialwrap attach COM0
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / WPA2-Personal / 00000000
test_procedure: |
  Per band (5G=AP1/wl0, 6G=AP3/wl1, 2.4G=AP5/wl2):
  1) Capture baseline: LLAPI WEPKey getter + hostapd wep grep
  2) Set WEPKey=AABBCCDDEEFF0
  3) Readback: LLAPI getter + hostapd wep grep cross-check
  4) Restore WEPKey=123456789ABCD and verify
  Expected: all 3 bands accept setter and readback new key, but hostapd
  has NO wep lines at all (WEP deprecated under WPA2/WPA3 ModeEnabled)
  -> Fail-shaped mismatch.

steps:
  - id: step1_baseline_5g
    action: exec
    target: DUT
    command:
      - echo "BaselineWEPKey5g=$(ubus-cli 'WiFi.AccessPoint.1.Security.WEPKey?' 2>/dev/null | grep -o 'WEPKey="[^"]*"' | cut -d'"' -f2)"
      - echo "HostapdWep5g=$(grep -ic wep /tmp/wl0_hapd.conf 2>/dev/null || echo 0)"
    capture: baseline_5g

  - id: step2_set_5g
    action: exec
    target: DUT
    depends_on: step1_baseline_5g
    command: 'ubus-cli WiFi.AccessPoint.1.Security.WEPKey=AABBCCDDEEFF0'
    capture: set_5g

  - id: step3_readback_5g
    action: exec
    target: DUT
    depends_on: step2_set_5g
    command:
      - sleep 2
      - echo "GetterWEPKey5g=$(ubus-cli 'WiFi.AccessPoint.1.Security.WEPKey?' 2>/dev/null | grep -o 'WEPKey="[^"]*"' | cut -d'"' -f2)"
      - echo "HostapdWepAfter5g=$(grep -ic wep /tmp/wl0_hapd.conf 2>/dev/null || echo 0)"
    capture: readback_5g

  - id: step4_restore_5g
    action: exec
    target: DUT
    depends_on: step3_readback_5g
    command:
      - ubus-cli WiFi.AccessPoint.1.Security.WEPKey=123456789ABCD
      - sleep 2
      - echo "RestoredWEPKey5g=$(ubus-cli 'WiFi.AccessPoint.1.Security.WEPKey?' 2>/dev/null | grep -o 'WEPKey="[^"]*"' | cut -d'"' -f2)"
    capture: restore_5g

  - id: step5_baseline_6g
    action: exec
    target: DUT
    depends_on: step4_restore_5g
    command:
      - echo "BaselineWEPKey6g=$(ubus-cli 'WiFi.AccessPoint.3.Security.WEPKey?' 2>/dev/null | grep -o 'WEPKey="[^"]*"' | cut -d'"' -f2)"
      - echo "HostapdWep6g=$(grep -ic wep /tmp/wl1_hapd.conf 2>/dev/null || echo 0)"
    capture: baseline_6g

  - id: step6_set_6g
    action: exec
    target: DUT
    depends_on: step5_baseline_6g
    command: 'ubus-cli WiFi.AccessPoint.3.Security.WEPKey=AABBCCDDEEFF0'
    capture: set_6g

  - id: step7_readback_6g
    action: exec
    target: DUT
    depends_on: step6_set_6g
    command:
      - sleep 2
      - echo "GetterWEPKey6g=$(ubus-cli 'WiFi.AccessPoint.3.Security.WEPKey?' 2>/dev/null | grep -o 'WEPKey="[^"]*"' | cut -d'"' -f2)"
      - echo "HostapdWepAfter6g=$(grep -ic wep /tmp/wl1_hapd.conf 2>/dev/null || echo 0)"
    capture: readback_6g

  - id: step8_restore_6g
    action: exec
    target: DUT
    depends_on: step7_readback_6g
    command:
      - ubus-cli WiFi.AccessPoint.3.Security.WEPKey=123456789ABCD
      - sleep 2
      - echo "RestoredWEPKey6g=$(ubus-cli 'WiFi.AccessPoint.3.Security.WEPKey?' 2>/dev/null | grep -o 'WEPKey="[^"]*"' | cut -d'"' -f2)"
    capture: restore_6g

  - id: step9_baseline_24g
    action: exec
    target: DUT
    depends_on: step8_restore_6g
    command:
      - echo "BaselineWEPKey24g=$(ubus-cli 'WiFi.AccessPoint.5.Security.WEPKey?' 2>/dev/null | grep -o 'WEPKey="[^"]*"' | cut -d'"' -f2)"
      - echo "HostapdWep24g=$(grep -ic wep /tmp/wl2_hapd.conf 2>/dev/null || echo 0)"
    capture: baseline_24g

  - id: step10_set_24g
    action: exec
    target: DUT
    depends_on: step9_baseline_24g
    command: 'ubus-cli WiFi.AccessPoint.5.Security.WEPKey=AABBCCDDEEFF0'
    capture: set_24g

  - id: step11_readback_24g
    action: exec
    target: DUT
    depends_on: step10_set_24g
    command:
      - sleep 2
      - echo "GetterWEPKey24g=$(ubus-cli 'WiFi.AccessPoint.5.Security.WEPKey?' 2>/dev/null | grep -o 'WEPKey="[^"]*"' | cut -d'"' -f2)"
      - echo "HostapdWepAfter24g=$(grep -ic wep /tmp/wl2_hapd.conf 2>/dev/null || echo 0)"
    capture: readback_24g

  - id: step12_restore_24g
    action: exec
    target: DUT
    depends_on: step11_readback_24g
    command:
      - ubus-cli WiFi.AccessPoint.5.Security.WEPKey=123456789ABCD
      - sleep 2
      - echo "RestoredWEPKey24g=$(ubus-cli 'WiFi.AccessPoint.5.Security.WEPKey?' 2>/dev/null | grep -o 'WEPKey="[^"]*"' | cut -d'"' -f2)"
    capture: restore_24g

pass_criteria:
  - field: baseline_5g.BaselineWEPKey5g
    operator: equals
    value: '123456789ABCD'
    description: '5G baseline WEPKey should be 123456789ABCD'
  - field: readback_5g.GetterWEPKey5g
    operator: equals
    value: 'AABBCCDDEEFF0'
    description: '5G getter reads back AABBCCDDEEFF0 after setter'
  - field: restore_5g.RestoredWEPKey5g
    operator: equals
    value: '123456789ABCD'
    description: '5G WEPKey restored to 123456789ABCD'
  - field: baseline_6g.BaselineWEPKey6g
    operator: equals
    value: '123456789ABCD'
    description: '6G baseline WEPKey should be 123456789ABCD'
  - field: readback_6g.GetterWEPKey6g
    operator: equals
    value: 'AABBCCDDEEFF0'
    description: '6G getter reads back AABBCCDDEEFF0 after setter'
  - field: restore_6g.RestoredWEPKey6g
    operator: equals
    value: '123456789ABCD'
    description: '6G WEPKey restored to 123456789ABCD'
  - field: baseline_24g.BaselineWEPKey24g
    operator: equals
    value: '123456789ABCD'
    description: '2.4G baseline WEPKey should be 123456789ABCD'
  - field: readback_24g.GetterWEPKey24g
    operator: equals
    value: 'AABBCCDDEEFF0'
    description: '2.4G getter reads back AABBCCDDEEFF0 after setter'
  - field: restore_24g.RestoredWEPKey24g
    operator: equals
    value: '123456789ABCD'
    description: '2.4G WEPKey restored to 123456789ABCD'

verification_command:
  - 'grep -i wep /tmp/wl0_hapd.conf 2>/dev/null || echo NO_WEP_LINES_5G'
  - 'grep -i wep /tmp/wl1_hapd.conf 2>/dev/null || echo NO_WEP_LINES_6G'
  - 'grep -i wep /tmp/wl2_hapd.conf 2>/dev/null || echo NO_WEP_LINES_24G'

results_reference:
  v4.0.1:
    5g: Pass
    6g: Not Supported
    2.4g: Pass
    comment: 'v4.0.1 considered setter/getter alone as Pass; 6G marked Not Supported for WEP'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'LLAPI setter accepted and getter reads back on all 3 bands, but hostapd has NO wep lines at all (ModeEnabled is WPA2/WPA3, not WEP). Fail-shaped no-op on all bands.'
