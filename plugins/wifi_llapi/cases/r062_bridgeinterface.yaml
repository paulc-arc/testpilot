id: wifi-llapi-r062-bridgeinterface
name: BridgeInterface — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 67
  object: "WiFi.AccessPoint.{i}."
  api: "BridgeInterface"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.BridgeInterface=bridge
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.BridgeInterface=bridge
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.BridgeInterface=bridge
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.BridgeInterface?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli WiFi.AccessPoint.? | grep BridgeInterface WiFi.AccessPoint.1.BridgeInterface="br-lan" WiFi.AccessPoint.3.BridgeInterface="br-lan"
    WiFi.AccessPoint.5.BridgeInterface="br-lan"
  capture: result
pass_criteria:
- field: result.BridgeInterface
  operator: contains
  value: bridge
  description: BridgeInterface 應回傳包含 BridgeInterface=bridge
verification_command: 'cat /tmp/wl0_hapd.conf |grep bridge


  root@prplOS:/# brctl show

  bridge name bridge id STP enabled interfaces

  br-lcm 8000.6c15db74c0b3 no

  br-lan 8000.6c15db74c0b1 no wl0.1

  eth3

  wl1

  eth1

  wl2.1

  wl2

  eth2

  wl0

  wl1.1

  br-guest 8000.6c15db74c0b2 no'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
