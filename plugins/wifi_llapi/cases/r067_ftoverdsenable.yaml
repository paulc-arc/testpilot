id: wifi-llapi-r067-ftoverdsenable
name: FTOverDSEnable — WiFi.AccessPoint.{i}.IEEE80211r.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 73
  object: "WiFi.AccessPoint.{i}.IEEE80211r."
  api: "FTOverDSEnable"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.IEEE80211r.FTOverDSEnable=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.IEEE80211r.FTOverDSEnable=0
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.IEEE80211r.FTOverDSEnable=0
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.IEEE80211r.FTOverDSEnable?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: //Set IEEE80211r.Enabled=1 ubus-cli WiFi.AccessPoint.1.IEEE80211r.Enabled=1 //set FTOverDSEnable=1 ubus-cli WiFi.AccessPoint.?
    | grep .IEEE80211r.FTOverDSEnable=1 WiFi.AccessPoint.1.IEEE80211r.FTOverDSEnable=1 WiFi.AccessPoint.2.IEEE80211r.FTOverDSEnable=1
    WiFi.AccessPoint.3.IEEE80211r.FTOverDSEnable=1
  capture: result
pass_criteria:
- field: result.FTOverDSEnable
  operator: contains
  value: '0'
  description: FTOverDSEnable 應回傳包含 FTOverDSEnable=0
verification_command: 'cat /tmp/wl0_hapd.conf |grep ft_over_ds


  Beacon Packet should include:

  Mobility Domain

  Mobility Domain ID: xxxx

  FT Capability and Policy: 0x0? (bitmask)


  0000 .... = FT-over-DS: 0 (not supported)

  .... 000. = FT-over-Air: 1 (supported)


  Key line:

  FT-over-DS: 1 → FT-over-DS enabled

  FT-over-DS: 0 → FT-over-DS disabled'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'Function need to check

      To check function, make sure to enable the following

      IEEE80211r.Enabled=1

      IEEE80211r.FTOverDSEnable=1

      IEEE80211r.MobilityDomain=xxxx'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
