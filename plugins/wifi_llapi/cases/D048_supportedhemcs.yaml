id: wifi-llapi-D048-supportedhemcs
name: "SupportedHeMCS — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 50
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: SupportedHeMCS
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.SupportedHeMCS?"'
llapi_support: Not Supported
implemented_by: pWHM
bands: ["5g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
    STA:
      role: sta
      transport: serial
      selector: COM0
      config:
      - iface: 5g
        mode: sta
        ssid: TestPilot_BTM
        key: testpilot6g
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM1 (AP role)
  - STA: COM0 (station role for this case; do not rely on the old A0/B0 heuristic)
  Transport:
  - serialwrap attach COM0 / COM1
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / TestPilot_BTM
  - 6G: DUT wl1 / AP3 / SSID.6 / TestPilot_BTM
  - 2.4G: DUT wl2 / AP5 / SSID.8 / TestPilot_24G
  Preconditions:
  - keep only one associated station on AP1 so AssociatedDevice.1 stays deterministic
  - use the validated 5G single-band WPA3 baseline for this case
setup_steps: |
  1) DUT 5G baseline:
     - enable Radio.1 / SSID.4 / AP1
     - configure AP1 as WPA3-Personal with MFP required
     - keep the validated live SSID/credential pair as TestPilot_BTM / testpilot6g
  2) STA 5G preparation:
     - disable local AP1/AP2 on COM1
     - move COM1 br-lan off 192.168.1.0/24 to avoid bridge self-hit side effects
     - reset wl0 and its wpa_supplicant control socket
     - connect wl0 to TestPilot_BTM with SAE
  3) Association evidence:
     - COM1: iw dev wl0 link ; wpa_cli -p /var/run/wpa_supplicant -i wl0 status
     - COM0: wl -i wl0 assoclist
sta_env_setup: |
  DUT 5G AP baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.1.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.1.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.OfdmaEnable=1
    ubus-cli WiFi.Radio.1.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.1.OperatingStandards=ax
    ubus-cli WiFi.Radio.1.RxChainCtrl=-1
    ubus-cli WiFi.Radio.1.TxChainCtrl=-1
    ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.1.Sensing.Enable=1
    ubus-cli WiFi.Radio.1.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.1.LongRetryLimit=6
    ubus-cli WiFi.Radio.1.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.1.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.4.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.2.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.1.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.1.Enable=1
  STA 5G preparation:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    ubus-cli WiFi.AccessPoint.1.Enable=0
    ubus-cli WiFi.AccessPoint.2.Enable=0
    wpa_cli terminate 2>/dev/null || true
    rm -f /var/run/wpa_supplicant/wl0 2>/dev/null || true
    iw dev wl0.1 del 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    iw dev wl0 set type managed
    ifconfig wl0 up
    mkdir -p /var/run/wpa_supplicant
    printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\nnetwork={\nssid="TestPilot_BTM"\nkey_mgmt=SAE\nsae_password="testpilot6g"\nieee80211w=2\nscan_ssid=1\n}\n' > /tmp/wpa_wl0.conf
    wpa_supplicant -B -D nl80211 -i wl0 -c /tmp/wpa_wl0.conf -C /var/run/wpa_supplicant
    sleep 3
  STA 5G connect verify:
    wpa_cli -p /var/run/wpa_supplicant -i wl0 reconnect
    sleep 10
    iw dev wl0 link
    wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  DUT association evidence:
    wl -i wl0 assoclist
test_procedure: |
  1) Resolve COM1 wl0's live STA MAC and require AP1 AssociatedDevice.1 to point to that same station.
  2) Query WiFi.AccessPoint.1.AssociatedDevice.1.SupportedHeMCS on DUT and record the not-supported error.
  3) Cross-check the same AssociatedDevice entry for Rx/TxSupportedHeMCS sibling fields.
  4) Confirm wl0 sta_info for the same STA still exposes HE capability lines and a driver he mcs line, so the limitation is the missing standalone LLAPI field rather than lack of HE support.
steps:
- id: step1
  action: exec
  target: STA
  command: cat /sys/class/net/wl0/address | tr 'a-f' 'A-F' | sed 's/^/StaMac=/'
  capture: sta_identity
- id: step2
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"
  depends_on: step1
  capture: assoc_entry
- id: step3
  action: exec
  target: DUT
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.SupportedHeMCS?" 2>&1); printf '%s\n' "$OUT"; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/error=\1/p'; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/message=\2/p'
  depends_on: step2
  capture: result
- id: step4
  action: exec
  target: DUT
  command: >-
    ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | sed -n 's/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress="\([^"]*\)".*/SiblingAssocMac=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.RxSupportedHeMCS="\([^"]*\)".*/DriverRxSupportedHeMCS=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxSupportedHeMCS="\([^"]*\)".*/DriverTxSupportedHeMCS=\1/p'
  depends_on: step3
  capture: sibling_support
- id: step5
  action: exec
  target: DUT
  command: >-
    STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n 's/.*MACAddress="\([^"]*\)".*/\1/p'); STA_MAC_LOWER=$(echo "$STA_MAC" | tr 'A-F' 'a-f'); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC_LOWER | awk '/HE caps/ {he=1} /MCS SET/ {mcs=1} /HE SET/ {heset=1} /he mcs/ {hemcs=1} END {if (he) print "DriverHeCapsPresent=1"; if (mcs) print "DriverMCSSetPresent=1"; if (heset) print "DriverHeSetPresent=1"; if (hemcs) print "DriverHeMcsLinePresent=1"}'
  depends_on: step4
  capture: driver_capability
pass_criteria:
- field: sta_identity.StaMac
  operator: regex
  value: ^([0-9A-F]{2}:){5}[0-9A-F]{2}$
  description: COM1 wl0 must resolve to a concrete live STA MAC before DUT-side validation.
- field: assoc_entry.MACAddress
  operator: regex
  value: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
  description: AP1 AssociatedDevice.1 must first resolve to the live 5G STA MAC.
- field: assoc_entry.MACAddress
  operator: equals
  reference: sta_identity.StaMac
  description: AP1 AssociatedDevice.1 must correspond to the same COM1 wl0 station used for this manual checkpoint.
- field: result.error
  operator: equals
  value: '4'
  description: Standalone SupportedHeMCS should fail with error 4 because the parameter is not exposed.
- field: result.message
  operator: contains
  value: parameter not found
  description: The not-supported readback should explicitly report parameter not found.
- field: sibling_support.SiblingAssocMac
  operator: equals
  reference: assoc_entry.MACAddress
  description: Sibling field evidence must come from the same AssociatedDevice entry.
- field: sibling_support.DriverRxSupportedHeMCS
  operator: regex
  value: ^[0-9]+(,[0-9]+)*$
  description: RxSupportedHeMCS should still expose a concrete HE MCS list for the same STA.
- field: sibling_support.DriverTxSupportedHeMCS
  operator: regex
  value: ^[0-9]+(,[0-9]+)*$
  description: TxSupportedHeMCS should still expose a concrete HE MCS list for the same STA.
- field: driver_capability.DriverAssocMac
  operator: equals
  reference: assoc_entry.MACAddress
  description: Driver capability evidence must target the same AssociatedDevice MAC resolved in step2.
- field: driver_capability.DriverHeCapsPresent
  operator: equals
  value: '1'
  description: wl0 sta_info must still expose HE capability data for the same STA.
- field: driver_capability.DriverMCSSetPresent
  operator: equals
  value: '1'
  description: wl0 sta_info must still expose an MCS SET line for the same STA.
- field: driver_capability.DriverHeSetPresent
  operator: equals
  value: '1'
  description: wl0 sta_info must still expose an HE SET line for the same STA.
- field: driver_capability.DriverHeMcsLinePresent
  operator: equals
  value: '1'
  description: wl0 sta_info must still expose a driver he mcs line for the same STA.
verification_command:
  - 'cat /sys/class/net/wl0/address | tr ''a-f'' ''A-F'' | sed ''s/^/StaMac=/'''
  - 'OUT=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.SupportedHeMCS?" 2>&1); printf ''%s\n'' "$OUT"; printf ''%s\n'' "$OUT" | sed -n ''s/.*failed (\([0-9][0-9]*\) - \(.*\))/error=\1/p''; printf ''%s\n'' "$OUT" | sed -n ''s/.*failed (\([0-9][0-9]*\) - \(.*\))/message=\2/p'''
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.?" | sed -n ''s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.MACAddress="\([^"]*\)".*/SiblingAssocMac=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.RxSupportedHeMCS="\([^"]*\)".*/DriverRxSupportedHeMCS=\1/p; s/^WiFi\.AccessPoint\.1\.AssociatedDevice\.1\.TxSupportedHeMCS="\([^"]*\)".*/DriverTxSupportedHeMCS=\1/p'''
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); STA_MAC_LOWER=$(echo "$STA_MAC" | tr ''A-F'' ''a-f''); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && wl -i wl0 sta_info $STA_MAC_LOWER | awk ''/HE caps/ {he=1} /MCS SET/ {mcs=1} /HE SET/ {heset=1} /he mcs/ {hemcs=1} END {if (he) print "DriverHeCapsPresent=1"; if (mcs) print "DriverMCSSetPresent=1"; if (heset) print "DriverHeSetPresent=1"; if (hemcs) print "DriverHeMcsLinePresent=1"}'''
results_reference:
  v4.0.3:
    5g: Pass
    6g: Fail
    2.4g: Fail