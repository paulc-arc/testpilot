id: wifi-llapi-r254-multicastpacketsreceived
name: MulticastPacketsReceived — WiFi.SSID.{i}.Stats.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 254
  object: WiFi.SSID.{i}.Stats.
  api: MulticastPacketsReceived
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.SSID.{i}.Stats.MulticastPacketsReceived=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi station to GW
- id: step2
  action: exec
  target: DUT
  command: Create Multicast group and send Multicast Data between station's and GW Station server = iperf -s -u -B 239.1.2.3%br0
    -i 1 Station Joiner = iperf -c 239.1.2.3 -u -t 10 -b 20M -i 1 -t 100
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Check MulticastPacketsReceived ubus-cli WiFi.SSID.*.Stats.MulticastPacketsReceived? > WiFi.SSID.*.Stats.MulticastPacketsReceived?
    WiFi.SSID.4.Stats.MulticastPacketsReceived=1207 WiFi.SSID.6.Stats.MulticastPacketsReceived=13518 WiFi.SSID.8.Stats.MulticastPacketsReceived=56
  depends_on: step2
  capture: result
pass_criteria:
- field: result.MulticastPacketsReceived
  operator: contains
  value: '0'
  description: MulticastPacketsReceived 應回傳包含 MulticastPacketsReceived=0
verification_command: 'cat /proc/net/dev | grep wl0


  root@prplOS:/# cat /proc/net/dev

  Inter-| Receive | Transmit

  face |bytes packets errs drop fifo frame compressed multicast|bytes packets errs drop fifo colls carrier compressed

  wl0: 6395774 33265 0 27 0 0 0 1207 153744631 225100 0 102 0 0 0 0

  wl1: 1606749304 1091082 0 10 0 0 0 13511 156618564 251946 0 83 0 0 0 0

  wl2: 903667 2955 0 41 0 0 0 56 52065676 146033 0 180 0 0 0 0'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
