  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'Clean-start official rerun 20260412T054702963914 exact-closed the source-backed snapshot rewrite on all three bands: 5g=461, 6g=592, 2.4g=707; direct Stats matched getSSIDStats() and wl if_counters txframe plus matching wds txframe on SSID.4/6/8.'
