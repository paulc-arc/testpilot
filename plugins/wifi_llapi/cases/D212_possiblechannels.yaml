id: d212-radio-possiblechannels
name: D212 Radio PossibleChannels
source:
  row: 212
  object: WiFi.Radio.{i}.
  api: PossibleChannels
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: read-only getter exact-closes the active 0403 tri-band PossibleChannels lists
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.PossibleChannels?"
  expected: PossibleChannels 回傳有效值
  description: Radio.1 (5g) PossibleChannels getter（live=36,40,...,177）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.PossibleChannels?"
  expected: PossibleChannels 回傳有效值
  description: Radio.2 (6g) PossibleChannels getter（live=1,5,...,233）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.PossibleChannels?"
  expected: PossibleChannels 回傳有效值
  description: Radio.3 (2.4g) PossibleChannels getter（live=1,...,14）
pass_criteria:
- field: getter_5g.PossibleChannels
  operator: regex
  value: ".+"
- field: getter_6g.PossibleChannels
  operator: regex
  value: ".+"
- field: getter_24g.PossibleChannels
  operator: regex
  value: ".+"
