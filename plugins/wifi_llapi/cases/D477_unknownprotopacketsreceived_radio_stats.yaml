id: d477-radio-stats-unknownprotopacketsreceived
name: D477 Radio Stats UnknownProtoPacketsReceived
source:
  row: 477
  object: WiFi.Radio.{i}.Stats.
  api: UnknownProtoPacketsReceived
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: workbook row 477 keeps this radio-level counter on Pass; note V477 records direct Stats.UnknownProtoPacketsReceived matching wl counters rxbadproto on all radios.
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_direct
  target: dut
  action: exec
  capture: direct_5g
  command: 'ubus-cli "WiFi.Radio.1.Stats.UnknownProtoPacketsReceived?"'
  expected: Stats.UnknownProtoPacketsReceived getter 回傳有效值
  description: Radio.1 (5g) direct Stats.UnknownProtoPacketsReceived
- id: step_5g_driver
  target: dut
  action: exec
  capture: driver_5g
  command: wl -i wl0 counters | awk '{for(i=1;i<=NF;i++) if($i=="rxbadproto") print "DriverUnknownProtoPacketsReceived5g="$(i+1)}'
  expected: wl0 counters 匯出 rxbadproto
  description: Radio.1 (5g) driver rxbadproto
- id: step_6g_direct
  target: dut
  action: exec
  capture: direct_6g
  command: 'ubus-cli "WiFi.Radio.2.Stats.UnknownProtoPacketsReceived?"'
  expected: Stats.UnknownProtoPacketsReceived getter 回傳有效值
  description: Radio.2 (6g) direct Stats.UnknownProtoPacketsReceived
- id: step_6g_driver
  target: dut
  action: exec
  capture: driver_6g
  command: wl -i wl1 counters | awk '{for(i=1;i<=NF;i++) if($i=="rxbadproto") print "DriverUnknownProtoPacketsReceived6g="$(i+1)}'
  expected: wl1 counters 匯出 rxbadproto
  description: Radio.2 (6g) driver rxbadproto
- id: step_24g_direct
  target: dut
  action: exec
  capture: direct_24g
  command: 'ubus-cli "WiFi.Radio.3.Stats.UnknownProtoPacketsReceived?"'
  expected: Stats.UnknownProtoPacketsReceived getter 回傳有效值
  description: Radio.3 (2.4g) direct Stats.UnknownProtoPacketsReceived
- id: step_24g_driver
  target: dut
  action: exec
  capture: driver_24g
  command: wl -i wl2 counters | awk '{for(i=1;i<=NF;i++) if($i=="rxbadproto") print "DriverUnknownProtoPacketsReceived24g="$(i+1)}'
  expected: wl2 counters 匯出 rxbadproto
  description: Radio.3 (2.4g) driver rxbadproto
pass_criteria:
- field: direct_5g.UnknownProtoPacketsReceived
  operator: equals
  reference: driver_5g.DriverUnknownProtoPacketsReceived5g
  description: 5g direct Stats.UnknownProtoPacketsReceived must match wl0 counters rxbadproto.
- field: direct_6g.UnknownProtoPacketsReceived
  operator: equals
  reference: driver_6g.DriverUnknownProtoPacketsReceived6g
  description: 6g direct Stats.UnknownProtoPacketsReceived must match wl1 counters rxbadproto.
- field: direct_24g.UnknownProtoPacketsReceived
  operator: equals
  reference: driver_24g.DriverUnknownProtoPacketsReceived24g
  description: 2.4g direct Stats.UnknownProtoPacketsReceived must match wl2 counters rxbadproto.
verification_command:
  - 'ubus-cli "WiFi.Radio.1.Stats.UnknownProtoPacketsReceived?"'
  - 'wl -i wl0 counters | awk ''{for(i=1;i<=NF;i++) if($i=="rxbadproto") print "DriverUnknownProtoPacketsReceived5g="$(i+1)}'''
  - 'ubus-cli "WiFi.Radio.2.Stats.UnknownProtoPacketsReceived?"'
  - 'wl -i wl1 counters | awk ''{for(i=1;i<=NF;i++) if($i=="rxbadproto") print "DriverUnknownProtoPacketsReceived6g="$(i+1)}'''
  - 'ubus-cli "WiFi.Radio.3.Stats.UnknownProtoPacketsReceived?"'
  - 'wl -i wl2 counters | awk ''{for(i=1;i<=NF;i++) if($i=="rxbadproto") print "DriverUnknownProtoPacketsReceived24g="$(i+1)}'''
