id: wifi-llapi-r309-rrmoffchannelmaxduration
name: RrmOffChannelMaxDuration — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 309
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: RrmOffChannelMaxDuration
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.RrmOffChannelMaxDuration=4
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW with one station 802.11k Enable and the other one 802.11k Disable.
- id: step2
  action: exec
  target: DUT
  command: 'Verify Station station 802.11k Enable Check whether RRM is ON or OFF using: wl sta_info <MAC> | grep -i rrm If
    802.11k Enable then you will see RRM-related output (flags / capabilities): If nothing appears 0x0 then RRM is Disable/not
    supported or not advertised'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check Station capabilities: wl sta_info <MAC> | grep -i rrm Using Octoscope as Station 02:10:5E:BA:A9:00 - 802.11k
    Enable 02:10:5E:8B:5B:00 - 802.11k Disable wl sta_info 02:10:5E:BA:A9:00 | grep -i rrm RRM capability = 0xc0000da73 Link_Measurement
    Neighbor_Report Beacon_Passive Beacon_Active Beacon_Table Channel_load_Measurement Statistics_Measurement LCI_Measurement
    Tx_Stream_Category_Measurement Triggered_Tx_stream_Category_Measurement FTM_Range_Reporting Civic_Location_Measurement  wl
    sta_info 02:10:5E:8B:5B:00 | grep -i rrm RRM capability = 0x0 '
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Try to set Station 802.11k from Enable to Disable and Disble to Enable then re-connect station. 02:10:5E:BA:A9:00
    - 802.11k Disable 02:10:5E:8B:5B:00 - 802.11k Enable
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: 'Check Station capabilities: wl sta_info <MAC> | grep -i rrm wl sta_info 02:10:5E:BA:A9:00 | grep -i rrm RRM capability
    = 0x0 wl sta_info 02:10:5E:8B:5B:00 | grep -i rrm RRM capability = 0xc0000da73 Link_Measurement Neighbor_Report Beacon_Passive
    Beacon_Active Beacon_Table Channel_load_Measurement Statistics_Measurement LCI_Measurement Tx_Stream_Category_Measurement
    Triggered_Tx_stream_Category_Measurement FTM_Range_Reporting Civic_Location_Measurement'
  depends_on: step4
  capture: result
pass_criteria:
- field: result.RrmOffChannelMaxDuration
  operator: contains
  value: '4'
  description: RrmOffChannelMaxDuration 應回傳包含 RrmOffChannelMaxDuration=4
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
