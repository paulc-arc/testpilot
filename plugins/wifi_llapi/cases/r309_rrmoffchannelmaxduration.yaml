id: wifi-llapi-r309-rrmoffchannelmaxduration
name: RrmOffChannelMaxDuration — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 416
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "RrmOffChannelMaxDuration"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.RrmOffChannelMaxDuration=4
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.RrmOffChannelMaxDuration=4
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.RrmOffChannelMaxDuration?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW with one station 802.11k Enable and the other one 802.11k Disable.
- id: step2
  action: exec
  target: DUT
  command: 'Verify Station station 802.11k Enable Check whether RRM is ON or OFF using: wl sta_info <MAC> | grep -i rrm If
    802.11k Enable then you will see RRM-related output (flags / capabilities): If nothing appears 0x0 then RRM is Disable/not
    supported or not advertised'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Check Station capabilities: wl sta_info <MAC> | grep -i rrm Using Octoscope as Station 02:10:5E:BA:A9:00 - 802.11k
    Enable 02:10:5E:8B:5B:00 - 802.11k Disable wl sta_info 02:10:5E:BA:A9:00 | grep -i rrm RRM capability = 0xc0000da73 Link_Measurement
    Neighbor_Report Beacon_Passive Beacon_Active Beacon_Table Channel_load_Measurement Statistics_Measurement LCI_Measurement
    Tx_Stream_Category_Measurement Triggered_Tx_stream_Category_Measurement FTM_Range_Reporting Civic_Location_Measurement  wl
    sta_info 02:10:5E:8B:5B:00 | grep -i rrm RRM capability = 0x0 '
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Try to set Station 802.11k from Enable to Disable and Disble to Enable then re-connect station. 02:10:5E:BA:A9:00
    - 802.11k Disable 02:10:5E:8B:5B:00 - 802.11k Enable
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: 'Check Station capabilities: wl sta_info <MAC> | grep -i rrm wl sta_info 02:10:5E:BA:A9:00 | grep -i rrm RRM capability
    = 0x0 wl sta_info 02:10:5E:8B:5B:00 | grep -i rrm RRM capability = 0xc0000da73 Link_Measurement Neighbor_Report Beacon_Passive
    Beacon_Active Beacon_Table Channel_load_Measurement Statistics_Measurement LCI_Measurement Tx_Stream_Category_Measurement
    Triggered_Tx_stream_Category_Measurement FTM_Range_Reporting Civic_Location_Measurement'
  depends_on: step4
  capture: result
pass_criteria:
- field: result.RrmOffChannelMaxDuration
  operator: contains
  value: '4'
  description: RrmOffChannelMaxDuration 應回傳包含 RrmOffChannelMaxDuration=4

verification_command: |
  # Generate traffic before readback for stats-like AssociatedDevice fields.
  STA_MAC="$(wl -i wl0 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  [ -z "$STA_MAC" ] && STA_MAC="$(wl -i wl1 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  [ -z "$STA_MAC" ] && STA_MAC="$(wl -i wl2 assoclist 2>/dev/null | awk "NR==1{print $2}")"
  wl -i wl0 assoclist; wl -i wl1 assoclist; wl -i wl2 assoclist
  ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.?" | sed -n "1,120p"
  ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.RrmOffChannelMaxDuration?" 2>/dev/null || true
  [ -n "$STA_MAC" ] && wl -i wl0 sta_info "$STA_MAC" | sed -n "1,120p"
  iw dev wl0 station dump 2>/dev/null | sed -n "1,120p"

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
