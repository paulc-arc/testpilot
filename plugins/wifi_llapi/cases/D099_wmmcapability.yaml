id: wifi-llapi-D099-wmmcapability
name: WMMCapability — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 101
  object: WiFi.AccessPoint.{i}.
  api: WMMCapability
  baseline: 0310-BGW720-300
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WMMCapability?"
llapi_support: Support
implemented_by: Vendor Module
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: 'Topology:

  - DUT: COM0 (B0, AP role)

  Transport:

  - DUT via serialwrap COM0

  Baseline:

  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal

  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE

  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal

  Notes:

  - Read-only getter, all 3 bands return WMMCapability=1

  - hostapd wmm_enabled=1 on all bands confirms driver convergence

  '
steps:
- id: step_5g_getter
  action: exec
  target: DUT
  command:
  - echo "WMMCapability5g=$(ubus-cli 'WiFi.AccessPoint.1.WMMCapability?' 2>/dev/null | grep -o 'WMMCapability=[0-9]*' | cut -d= -f2)"
  - echo "HapdWmm5g=$(grep 'wmm_enabled=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  capture: wmm_5g
- id: step_6g_getter
  action: exec
  target: DUT
  depends_on: step_5g_getter
  command:
  - echo "WMMCapability6g=$(ubus-cli 'WiFi.AccessPoint.3.WMMCapability?' 2>/dev/null | grep -o 'WMMCapability=[0-9]*' | cut -d= -f2)"
  - echo "HapdWmm6g=$(grep 'wmm_enabled=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  capture: wmm_6g
- id: step_24g_getter
  action: exec
  target: DUT
  depends_on: step_6g_getter
  command:
  - echo "WMMCapability24g=$(ubus-cli 'WiFi.AccessPoint.5.WMMCapability?' 2>/dev/null | grep -o 'WMMCapability=[0-9]*' | cut -d= -f2)"
  - echo "HapdWmm24g=$(grep 'wmm_enabled=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
  capture: wmm_24g
pass_criteria:
- field: wmm_5g.WMMCapability5g
  operator: equals
  value: '1'
  description: 5G WMMCapability=1
- field: wmm_5g.HapdWmm5g
  operator: equals
  value: '1'
  description: 5G hostapd wmm_enabled=1
- field: wmm_6g.WMMCapability6g
  operator: equals
  value: '1'
  description: 6G WMMCapability=1
- field: wmm_6g.HapdWmm6g
  operator: equals
  value: '1'
  description: 6G hostapd wmm_enabled=1
- field: wmm_24g.WMMCapability24g
  operator: equals
  value: '1'
  description: 2.4G WMMCapability=1
- field: wmm_24g.HapdWmm24g
  operator: equals
  value: '1'
  description: 2.4G hostapd wmm_enabled=1
verification_command:
  - 'grep ''wmm_enabled='' /tmp/wl0_hapd.conf /tmp/wl1_hapd.conf /tmp/wl2_hapd.conf'
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'All 3 bands: WMMCapability=1, hostapd wmm_enabled=1.'
