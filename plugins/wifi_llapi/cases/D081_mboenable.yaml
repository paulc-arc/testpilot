- id: step1_mbo_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.MBOEnable?" 2>&1); VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MBOEnable=\([0-9][0-9]*\).*/\1/p' | head -n 1); if [ -n "$VALUE" ]; then printf 'BaselineGetterMbo5g=%s\n' "$VALUE"; else echo 'BaselineGetterMbo5g=EMPTY'; fi; CFG=$(grep -n '^mbo=' /tmp/wl0_hapd.conf 2>/dev/null || true); HAPD=$(printf '%s\n' "$CFG" | sed -n 's/^[0-9][0-9]*:mbo=\([0-9][0-9]*\).*/\1/p' | head -n 1); if [ -n "$HAPD" ]; then printf 'BaselineHostapdMbo5g=%s\n' "$HAPD"; else echo 'BaselineHostapdMbo5g=ABSENT'; fi; COUNT=$(printf '%s\n' "$CFG" | sed '/^$/d' | wc -l | tr -d ' '); printf 'BaselineHostapdMboCount5g=%s\n' "$COUNT"
  capture: mbo_baseline_5g
- id: step2_mbo_enable_5g
