id: wifi-llapi-D081-mboenable
name: "MBOEnable — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 75
  object: WiFi.AccessPoint.{i}.
  api: MBOEnable
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.1.MBOEnable=0
llapi_support: Support
implemented_by: Vendor Module
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: |
  Topology:
  - DUT: COM0 (AP role; MBOEnable is calibrated as an AP-only setter/getter case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing MBOEnable
  - live 0320 probe showed AP1/AP3/AP5 all start from `MBOEnable=0`
  - `/tmp/wl0_hapd.conf`, `/tmp/wl1_hapd.conf`, and `/tmp/wl2_hapd.conf` all keep `mbo=` absent at baseline
  - the workbook v4.0.3 row says `Pass`, but the 0320 serialwrap retest showed the northbound setter/readback path converges `0 -> 1 -> 0` while hostapd `mbo=` stays absent on all three bands
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - capture the current getter and hostapd `mbo=` baseline on all three bands
  2) Per-band MBOEnable probe:
     - set `MBOEnable=1` on the same AP
     - allow hostapd reload to settle, then re-read the getter and hostapd `mbo=` state
     - restore the same AP back to `0`
     - allow hostapd reload to settle, then re-read the getter and hostapd `mbo=` state
  3) Verdict model:
     - this is a failure-shaped checkpoint, not a pass-path config convergence case
     - the case passes only when the live evidence proves the northbound setter/readback changes while hostapd `mbo=` remains absent
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Capture baseline getter + hostapd `mbo=` state on AP1 / AP3 / AP5.
  2) Set `MBOEnable=1` on the same AP and re-read the getter / hostapd state after settle.
  3) Restore `MBOEnable=0` and re-read the getter / hostapd state again after settle.
  4) Confirm the northbound setter/readback changes `0 -> 1 -> 0` while hostapd `mbo=` remains absent throughout on all three bands.
  Verdict: Fail. The current DUT accepts the northbound setter but still does not project the state into hostapd `mbo=`, so the workbook `Pass` path is not yet live-aligned.

