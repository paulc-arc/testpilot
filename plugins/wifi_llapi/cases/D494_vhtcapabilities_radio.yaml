id: d494-radio-vhtcapabilities
name: D494 Radio VHTCapabilities
source:
  row: 494
  object: WiFi.Radio.{i}.
  api: VHTCapabilities
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Not Supported
    2.4g: Not Supported
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
steps:
- id: step_5g_getter
  target: dut
  action: exec
  capture: getter_5g
  command: >-
    OUT=$(ubus-cli "protected;WiFi.Radio.1.VHTCapabilities?" 2>&1 || true); printf '%s\n' "$OUT"; printf '%s\n' "$OUT" | sed -n 's/.*WiFi.Radio.1.VHTCapabilities="\([^"]*\)"/VHTCapabilities=\1/p'
  expected: base64 value via protected ubus access
  description: "Radio.1 (5g) VHTCapabilities protected getter - live=dliDDw=="
- id: step_6g_getter
  target: dut
  action: exec
  capture: getter_6g
  command: >-
    OUT=$(ubus-cli "WiFi.Radio.2.VHTCapabilities?" 2>&1 || true); printf '%s\n' "$OUT"; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/error=\1/p'; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/message=\2/p'
  expected: error 4 / parameter not found
  description: "Radio.2 (6g) VHTCapabilities getter - Not Supported"
- id: step_24g_getter
  target: dut
  action: exec
  capture: getter_24g
  command: >-
    OUT=$(ubus-cli "WiFi.Radio.3.VHTCapabilities?" 2>&1 || true); printf '%s\n' "$OUT"; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/error=\1/p'; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/message=\2/p'
  expected: error 4 / parameter not found
  description: "Radio.3 (2.4g) VHTCapabilities getter - Not Supported"
pass_criteria:
- field: getter_5g.VHTCapabilities
  operator: regex
  value: .+
- field: getter_6g.error
  operator: equals
  value: '4'
- field: getter_6g.message
  operator: equals
  value: parameter not found
- field: getter_24g.error
  operator: equals
  value: '4'
- field: getter_24g.message
  operator: equals
  value: parameter not found
