id: d430-radio-channel
name: D430 Radio Channel
source:
  row: 430
  object: WiFi.Radio.{i}.
  api: Channel
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.Channel?"
  expected: Channel 回傳有效值
  description: Radio.1 (5g) Channel getter
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.Channel?"
  expected: Channel 回傳有效值
  description: Radio.2 (6g) Channel getter
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.Channel?"
  expected: Channel 回傳有效值
  description: Radio.3 (2.4g) Channel getter
pass_criteria:
- field: getter_5g.Channel
  operator: regex
  value: ^-?\d+$
- field: getter_6g.Channel
  operator: regex
  value: ^-?\d+$
- field: getter_24g.Channel
  operator: regex
  value: ^-?\d+$
