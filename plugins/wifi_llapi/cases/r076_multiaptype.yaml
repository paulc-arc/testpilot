id: wifi-llapi-r076-multiaptype
name: MultiAPType — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 84
  object: "WiFi.AccessPoint.{i}."
  api: "MultiAPType"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.MultiAPType=BackhaulBSS
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.MultiAPType=BackhaulBSS
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.MultiAPType=BackhaulBSS
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.MultiAPType?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: \\Check Default settinh root@prplOS:~# ubus-cli WiFi.AccessPoint.*.MultiAPType? > WiFi.AccessPoint.*.MultiAPType?
    WiFi.AccessPoint.1.MultiAPType="FronthaulBSS,BackhaulBSS" WiFi.AccessPoint.2.MultiAPType="FronthaulBSS,BackhaulBSS" WiFi.AccessPoint.3.MultiAPType="FronthaulBSS,BackhaulBSS"
    WiFi.AccessPoint.4.MultiAPType="FronthaulBSS,BackhaulBSS" WiFi.AccessPoint.5.MultiAPType="FronthaulBSS,BackhaulBSS" WiFi.AccessPoint.6.MultiAPType="FronthaulBSS,BackhaulBSS"
- id: step2
  action: exec
  target: DUT
  command: Set MultiAPType to FronthaulBSS only root@prplOS:~# ubus-cli WiFi.AccessPoint.*.MultiAPType= FronthaulBSS > WiFi.AccessPoint.*.MultiAPType=
    FronthaulBSS WiFi.AccessPoint.1.MultiAPType="FronthaulBSS" WiFi.AccessPoint.2.MultiAPType="FronthaulBSS" WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"
    WiFi.AccessPoint.4.MultiAPType="FronthaulBSS" WiFi.AccessPoint.5.MultiAPType="FronthaulBSS" WiFi.AccessPoint.6.MultiAPType="FronthaulBSS"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Check the settings root@prplOS:~# ubus-cli WiFi.AccessPoint.*.MultiAPType? > WiFi.AccessPoint.*.MultiAPType? WiFi.AccessPoint.1.MultiAPType="FronthaulBSS"
    WiFi.AccessPoint.2.MultiAPType="FronthaulBSS" WiFi.AccessPoint.3.MultiAPType="FronthaulBSS" WiFi.AccessPoint.4.MultiAPType="FronthaulBSS"
    WiFi.AccessPoint.5.MultiAPType="FronthaulBSS" WiFi.AccessPoint.6.MultiAPType="FronthaulBSS"
  depends_on: step2
  capture: result
pass_criteria:
- field: result.MultiAPType
  operator: contains
  value: BackhaulBSS
  description: MultiAPType 應回傳包含 MultiAPType=BackhaulBSS
verification_command: 'wl -i wl0 map

  cat /tmp/wl0_hapd.conf | grep multi_ap


  root@prplOS:~# cat /tmp/wl0_hapd.conf | grep multi_ap

  multi_ap=2

  multi_ap=2

  root@prplOS:~# cat /tmp/wl2_hapd.conf | grep multi_ap

  multi_ap=2

  multi_ap=2

  root@prplOS:~# cat /tmp/wl1_hapd.conf | grep multi_ap

  multi_ap=2

  multi_ap=2

  root@prplOS:~# wl -i wl0 map

  0x1: Fronthaul-BSS

  root@prplOS:~#'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: '-Test only FronthaulBSS.

      -Will test the BH when MESH are ready'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
