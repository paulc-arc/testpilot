id: wifi-llapi-r081-modeenabled-accesspoint-security
name: ModeEnabled — WiFi.AccessPoint.{i}.Security
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 89
  object: "WiFi.AccessPoint.{i}.Security"
  api: "ModeEnabled"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Security.ModeEnabled=WPA3-Personal
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Security.ModeEnabled=WPA3-Personal
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Security.ModeEnabled=WPA3-Personal
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.Security.ModeEnabled?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Set security mode to WPA3-Personal ubus-cli WiFi.AccessPoint.*.Security.ModeEnabled=WPA3-Personal > WiFi.AccessPoint.*.Security.ModeEnabled=WPA3-Personal
    WiFi.AccessPoint.1.Security.ModeEnabled="WPA3-Personal" WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal" WiFi.AccessPoint.5.Security.
- id: step2
  action: exec
  target: DUT
  command: Verify security mode ubus-cli WiFi.AccessPoint.? | grep .Security.ModeEnabled WiFi.AccessPoint.1.Security.ModeEnabled="WPA3-Personal"
    WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal" WiFi.AccessPoint.5.Security.ModeEnabled="WPA3-Personal"
  depends_on: step1
  capture: result
pass_criteria:
- field: result.ModeEnabled
  operator: contains
  value: WPA3-Personal
  description: ModeEnabled 應回傳包含 ModeEnabled=WPA3-Personal
verification_command: 'cat /tmp/wl0_hapd.conf | grep wpa

  and other related parameters


  root@prplOS:/# cat /tmp/wl0_hapd.conf | grep wpa

  wpa=2

  wpa_key_mgmt=SAE FT-SAE

  wpa_pairwise=CCMP

  wpa_group_rekey=0

  wpa_ptk_rekey=0

  wpa_passphrase=87654321

  wpa_disable_eapol_key_retries=0

  wpa_group_update_count=8

  wpa_pairwise_update_count=8

  wpa=2

  wpa_key_mgmt=WPA-PSK

  wpa_pairwise=CCMP

  wpa_passphrase=password

  wpa_group_rekey=0

  wpa_ptk_rekey=0

  wpa_disable_eapol_key_retries=0

  wpa_group_update_count=8

  wpa_pairwise_update_count=8

  multi_ap_backhaul_wpa_passphrase=password'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
