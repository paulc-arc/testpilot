    comment: '0320 serialwrap live probe showed AP1/AP3/AP5 all accept and read back `MultiAPType=BackhaulBSS`, and the driver `wl -i wlX map` converges from `0x3` to `0x2`, but hostapd only partially flips from `multi_ap=3/3` to `multi_ap=1/3` before restore. The current DUT still does not fully converge the hostapd config to backhaul-only, so D084 is calibrated as Fail/Fail/Fail.'
