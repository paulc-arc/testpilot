id: wifi-llapi-D082-multiaptype
name: "MultiAPType — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 82
  object: WiFi.AccessPoint.{i}.
  api: MultiAPType
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.1.MultiAPType=FronthaulBSS
llapi_support: Support
implemented_by: Vendor Module
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; MultiAPType is calibrated as an AP-only setter/getter case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing MultiAPType
  - workbook row 82 uses `WiFi.AccessPoint.*.MultiAPType=FronthaulBSS`, so each radio pair must move together (AP1/AP2, AP3/AP4, AP5/AP6)
  - workbook row 82 expects the AP to start from the dual-role getter baseline `FronthaulBSS,BackhaulBSS`
  - active 0403 ODL still exposes `AccessPoint.MultiAPType` as a persistent string whose supported values include `FronthaulBSS` and `BackhaulBSS`
  - after setting `MultiAPType=FronthaulBSS`, workbook H expects hostapd `multi_ap=2` and driver `wl -i wlX map = 0x1: Fronthaul-BSS`
  - the pass path is a deterministic AP-only round-trip: dual-role baseline -> fronthaul-only -> dual-role restore on each radio pair (AP1/AP2, AP3/AP4, AP5/AP6)
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - capture the current getter, hostapd `multi_ap=`, and driver `wl -i wlX map` baseline on all three bands
  2) Per-band MultiAPType probe:
     - set `MultiAPType=FronthaulBSS` on both AccessPoints that share the same radio
     - allow hostapd reload to settle, then re-read the getter, hostapd `multi_ap=`, and driver map
     - restore the same AP back to `"FronthaulBSS,BackhaulBSS"`
     - allow hostapd reload to settle, then re-read the getter, hostapd `multi_ap=`, and driver map
  3) Verdict model:
     - this is a workbook-pass config convergence case
     - the case passes only when getter, hostapd `multi_ap=2`, and driver map `0x1: Fronthaul-BSS` all align after the setter, then return to dual-role after restore
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.2.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.4.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    ubus-cli WiFi.AccessPoint.6.Enable=1
    ubus-cli 'WiFi.AccessPoint.1.MultiAPType="FronthaulBSS,BackhaulBSS"'
    ubus-cli 'WiFi.AccessPoint.2.MultiAPType="FronthaulBSS,BackhaulBSS"'
    ubus-cli 'WiFi.AccessPoint.3.MultiAPType="FronthaulBSS,BackhaulBSS"'
    ubus-cli 'WiFi.AccessPoint.4.MultiAPType="FronthaulBSS,BackhaulBSS"'
    ubus-cli 'WiFi.AccessPoint.5.MultiAPType="FronthaulBSS,BackhaulBSS"'
    ubus-cli 'WiFi.AccessPoint.6.MultiAPType="FronthaulBSS,BackhaulBSS"'
    sleep 10
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Capture baseline getter + hostapd `multi_ap=` + driver map on AP1 / AP3 / AP5.
  2) Set `MultiAPType=FronthaulBSS` on both AccessPoints that share the same radio and re-read the getter / hostapd / driver state after settle.
  3) Restore both AccessPoints on the same radio back to `MultiAPType="FronthaulBSS,BackhaulBSS"` and re-read the getter / hostapd / driver state again after settle.
  4) Confirm the northbound setter/readback and driver map change to `FronthaulBSS`, `multi_ap=2`, and `0x1: Fronthaul-BSS` on all three bands before restore returns everything to the dual-role baseline.
  Verdict: Pass. The workbook row exact-closes only when AP1 / AP3 / AP5 all converge to fronthaul-only and then restore back to the dual-role baseline.

