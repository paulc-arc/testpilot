id: wifi-llapi-D082-multiaptype
name: "MultiAPType — WiFi.AccessPoint.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 76
  object: WiFi.AccessPoint.{i}.
  api: MultiAPType
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.1.MultiAPType=BackhaulBSS
llapi_support: Support
implemented_by: Vendor Module
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
  links: []
test_environment: |
  Topology:
  - DUT: COM0 (AP role; MultiAPType is calibrated as an AP-only setter/getter case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / AP3 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / AP5 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep AP1, AP3, and AP5 enabled on the documented non-open baseline before probing MultiAPType
  - live 0320 probe showed AP1/AP3/AP5 all start from `MultiAPType="FronthaulBSS,BackhaulBSS"`
  - `/tmp/wl0_hapd.conf`, `/tmp/wl1_hapd.conf`, and `/tmp/wl2_hapd.conf` each start with two `multi_ap=3` lines
  - `wl -i wl0 map`, `wl -i wl1 map`, and `wl -i wl2 map` all start from `0x3: Fronthaul-BSS Backhaul-BSS`
  - the workbook v4.0.3 row says `Pass`, but the 0320 serialwrap retest showed the northbound setter/readback and driver map converge to `BackhaulBSS`, while hostapd only partially flips from `multi_ap=3/3` to `multi_ap=1/3` on all three bands
setup_steps: |
  1) DUT baseline:
     - keep AP1 / AP3 / AP5 enabled on the documented non-open baseline
     - capture the current getter, hostapd `multi_ap=`, and driver `wl -i wlX map` baseline on all three bands
  2) Per-band MultiAPType probe:
     - set `MultiAPType=BackhaulBSS` on the same AP
     - allow hostapd reload to settle, then re-read the getter, hostapd `multi_ap=`, and driver map
     - restore the same AP back to `"FronthaulBSS,BackhaulBSS"`
     - allow hostapd reload to settle, then re-read the getter, hostapd `multi_ap=`, and driver map
  3) Verdict model:
     - this is a failure-shaped checkpoint, not a pass-path config convergence case
     - the case passes only when the live evidence proves the northbound setter/readback and driver map converge while hostapd remains split as `1/3` instead of fully converging to backhaul-only
sta_env_setup: |
  DUT:
    ubus-cli WiFi.AccessPoint.1.Enable=1
    ubus-cli WiFi.AccessPoint.3.Enable=1
    ubus-cli WiFi.AccessPoint.5.Enable=1
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Capture baseline getter + hostapd `multi_ap=` + driver map on AP1 / AP3 / AP5.
  2) Set `MultiAPType=BackhaulBSS` on the same AP and re-read the getter / hostapd / driver state after settle.
  3) Restore `MultiAPType="FronthaulBSS,BackhaulBSS"` and re-read the getter / hostapd / driver state again after settle.
  4) Confirm the northbound setter/readback and driver map change to `BackhaulBSS`, while hostapd only partially flips from `3/3` to `1/3` on all three bands before restore returns everything to the dual-role baseline.
  Verdict: Fail. The current DUT accepts the northbound setter and updates the driver map, but hostapd does not fully converge to backhaul-only on any band, so the workbook `Pass` path is not yet live-aligned.

steps:
- id: step1_multiap_baseline_5g
  action: exec
  target: DUT
  band: 5g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.1.MultiAPType?" 2>&1); VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MultiAPType="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$VALUE" ]; then printf 'BaselineGetterMultiAp5g=%s\n' "$VALUE"; else echo 'BaselineGetterMultiAp5g=EMPTY'; fi; CFG=$(grep -n '^multi_ap=' /tmp/wl0_hapd.conf 2>/dev/null || true); C1=$(printf '%s\n' "$CFG" | grep -c 'multi_ap=1'); C3=$(printf '%s\n' "$CFG" | grep -c 'multi_ap=3'); TOT=$(printf '%s\n' "$CFG" | sed '/^$/d' | wc -l | tr -d ' '); printf 'BaselineHostapdBackhaulCount5g=%s\n' "$C1"; printf 'BaselineHostapdBothCount5g=%s\n' "$C3"; printf 'BaselineHostapdTotalCount5g=%s\n' "$TOT"; MAP=$(wl -i wl0 map 2>&1 | sed -n '/^0x/p' | head -n 1 | sed 's/[[:space:]]\\+/ /g; s/^ //; s/ $//'); if [ -n "$MAP" ]; then printf 'BaselineDriverMap5g=%s\n' "$MAP"; else echo 'BaselineDriverMap5g=EMPTY'; fi
  capture: multiap_baseline_5g
- id: step2_multiap_set_backhaul_5g
