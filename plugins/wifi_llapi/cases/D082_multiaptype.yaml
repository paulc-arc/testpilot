verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.MultiAPType?"'
  - 'grep -n ''^multi_ap='' /tmp/wl0_hapd.conf 2>/dev/null || true'
  - wl -i wl0 map
  - ubus-cli WiFi.AccessPoint.1.MultiAPType=BackhaulBSS
  - sleep 5
  - 'ubus-cli "WiFi.AccessPoint.1.MultiAPType?"'
  - 'grep -n ''^multi_ap='' /tmp/wl0_hapd.conf 2>/dev/null || true'
  - wl -i wl0 map
  - 'ubus-cli ''WiFi.AccessPoint.1.MultiAPType="FronthaulBSS,BackhaulBSS"'''
  - sleep 5
  - 'ubus-cli "WiFi.AccessPoint.1.MultiAPType?"'
  - 'grep -n ''^multi_ap='' /tmp/wl0_hapd.conf 2>/dev/null || true'
  - wl -i wl0 map

