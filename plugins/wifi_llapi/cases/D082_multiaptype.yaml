  depends_on: step2_multiap_set_backhaul_5g
  capture: multiap_after_set_5g
- id: step4_multiap_restore_5g
  action: exec
  target: DUT
  band: 5g
  command:
    - printf 'RestoreMultiApType5g=FronthaulBSS,BackhaulBSS\n'
    - ubus-cli 'WiFi.AccessPoint.1.MultiAPType="FronthaulBSS,BackhaulBSS"'
  depends_on: step3_multiap_after_set_5g
  capture: multiap_restore_5g
- id: step5_multiap_after_restore_5g
