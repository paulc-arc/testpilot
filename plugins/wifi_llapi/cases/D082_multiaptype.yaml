    OUT=$(ubus-cli "WiFi.AccessPoint.1.MultiAPType?" 2>&1); VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MultiAPType="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$VALUE" ]; then printf 'BaselineGetterMultiAp5g=%s\n' "$VALUE"; else echo 'BaselineGetterMultiAp5g=EMPTY'; fi; CFG=$(grep -n '^multi_ap=' /tmp/wl0_hapd.conf 2>/dev/null || true); C2=$(printf '%s\n' "$CFG" | grep -c 'multi_ap=2'); C3=$(printf '%s\n' "$CFG" | grep -c 'multi_ap=3'); TOT=$(printf '%s\n' "$CFG" | sed '/^$/d' | wc -l | tr -d ' '); printf 'BaselineHostapdFronthaulCount5g=%s\n' "$C2"; printf 'BaselineHostapdBothCount5g=%s\n' "$C3"; printf 'BaselineHostapdTotalCount5g=%s\n' "$TOT"; MAP=$(wl -i wl0 map 2>&1 | sed -n '/^0x/p' | head -n 1 | tr -s ' ' | xargs); if [ -n "$MAP" ]; then printf 'BaselineDriverMap5g=%s\n' "$MAP"; else echo 'BaselineDriverMap5g=EMPTY'; fi
