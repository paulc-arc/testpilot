pass_criteria:
- field: multiap_baseline_5g.BaselineGetterMultiAp5g
  operator: equals
  value: FronthaulBSS,BackhaulBSS
  description: 5G AP1 / wl0 getter should start from the dual-role baseline.
- field: multiap_baseline_5g.BaselineHostapdBackhaulCount5g
  operator: equals
  value: '0'
  description: 5G AP1 / wl0 hostapd should start with zero backhaul-only lines.
- field: multiap_baseline_5g.BaselineHostapdBothCount5g
  operator: equals
  value: '2'
  description: 5G AP1 / wl0 hostapd should start with two dual-role lines.
- field: multiap_baseline_5g.BaselineHostapdTotalCount5g
