  depends_on: step2_multiap_set_fronthaul_5g
  capture: multiap_after_set_5g
- id: step4_multiap_restore_5g
  action: exec
  target: DUT
  band: 5g
  command:
    - printf 'RestoreMultiApType5g=FronthaulBSS,BackhaulBSS\n'
