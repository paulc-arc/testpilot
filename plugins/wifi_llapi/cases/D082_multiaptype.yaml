    sleep 5; OUT=$(ubus-cli "WiFi.AccessPoint.1.MultiAPType?" 2>&1); VALUE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MultiAPType="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$VALUE" ]; then printf 'AfterRestoreGetterMultiAp5g=%s\n' "$VALUE"; else echo 'AfterRestoreGetterMultiAp5g=EMPTY'; fi; CFG=$(grep -n '^multi_ap=' /tmp/wl0_hapd.conf 2>/dev/null || true); C1=$(printf '%s\n' "$CFG" | grep -c 'multi_ap=1'); C3=$(printf '%s\n' "$CFG" | grep -c 'multi_ap=3'); TOT=$(printf '%s\n' "$CFG" | sed '/^$/d' | wc -l | tr -d ' '); printf 'AfterRestoreHostapdBackhaulCount5g=%s\n' "$C1"; printf 'AfterRestoreHostapdBothCount5g=%s\n' "$C3"; printf 'AfterRestoreHostapdTotalCount5g=%s\n' "$TOT"; MAP=$(wl -i wl0 map 2>&1 | sed -n '/^0x/p' | head -n 1 | sed 's/[[:space:]]\\+/ /g; s/^ //; s/ $//'); if [ -n "$MAP" ]; then printf 'AfterRestoreDriverMap5g=%s\n' "$MAP"; else echo 'AfterRestoreDriverMap5g=EMPTY'; fi
