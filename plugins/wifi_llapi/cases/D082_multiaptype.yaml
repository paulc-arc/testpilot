  value: '0'
  description: 5G AP1 / wl0 hostapd should clear backhaul-only lines after restore.
- field: multiap_after_restore_5g.AfterRestoreHostapdBothCount5g
  operator: equals
  value: '2'
  description: 5G AP1 / wl0 hostapd should restore two dual-role lines.
- field: multiap_after_restore_5g.AfterRestoreHostapdTotalCount5g
  operator: equals
