  value: '0x3: Fronthaul-BSS Backhaul-BSS'
  description: 5G AP1 / wl0 driver map should start in dual-role mode.
- field: multiap_set_backhaul_5g.RequestedMultiApType5g
  operator: equals
  value: BackhaulBSS
  description: 5G AP1 / wl0 should request backhaul-only mode.
- field: multiap_after_set_5g.AfterSetGetterMultiAp5g
  operator: equals
  value: BackhaulBSS
  description: 5G AP1 / wl0 getter should follow the setter to backhaul-only.
- field: multiap_after_set_5g.AfterSetHostapdBackhaulCount5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 hostapd only partially flips to backhaul-only after the setter.
- field: multiap_after_set_5g.AfterSetHostapdBothCount5g
  operator: equals
  value: '1'
  description: 5G AP1 / wl0 hostapd incorrectly keeps one dual-role line after the setter.
- field: multiap_after_set_5g.AfterSetHostapdTotalCount5g
  operator: equals
  value: '2'
  description: 5G AP1 / wl0 hostapd still has two total multi_ap lines after the setter.
- field: multiap_after_set_5g.AfterSetDriverMap5g
  operator: equals
  value: '0x2: Backhaul-BSS'
  description: 5G AP1 / wl0 driver map does follow the setter to backhaul-only.
- field: multiap_restore_5g.RestoreMultiApType5g
