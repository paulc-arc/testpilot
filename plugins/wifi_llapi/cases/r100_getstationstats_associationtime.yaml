id: wifi-llapi-r100-getstationstats-associationtime
name: getStationStats() — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 100
  object: WiFi.AccessPoint.{i}.
  api: getStationStats()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.AccessPoint.{i}.getStationStats() AssociationTime : 2021-06-11T06:54:25Z,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW.
- id: step2
  action: exec
  target: DUT
  command: Verify connected Station AssociationTime ubus-cli "WiFi.AccessPoint.*.getStationStats()" | grep -E 'AssociationTime|
    AuthenticationState|MACAddress' AssociationTime = "2025-12-26T09:28:04Z", AuthenticationState = 1, MACAddress = "E6:52:AF:E9:4E:08"
  depends_on: step1
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getStationStats() 執行不應回傳 error
verification_command: 'root@prplOS:/# date

  Fri Dec 26 09:28:21 UTC 2025'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
