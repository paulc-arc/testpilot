id: wifi-llapi-r027-mugroupid
name: MUGroupId — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 27
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: MUGroupId
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.MUGroupId=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: \\Connect two WiFi Station to the Radio
- id: step2
  action: exec
  target: DUT
  command: 'Check Capabilities to make sure it support ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.? | grep HeCapabil ities
    WiFi.AccessPoint.1.AssociatedDevice.1.HeCapabilities=""SU&MU-BFE"" WiFi.AccessPoint.1.AssociatedDevice.2.HeCapabilities=""SU&MU-BFE""
    Note: SU-BFE → Single-User Beamforming EE (STA can be beamformed to). MU-BFE → Multi-User Beamforming EE (STA can be part
    of MU-MIMO downlink). So the station SU & MU-BFE is able to receive MU-MIMO transmissions from the AP. This is a requirement
    for MU-MIMO grouping.'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Play youtube in station for 5Minutes
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Check MUGroupId ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.MUGroupId? > WiFi.AccessPoint.*.AssociatedDevice.*.MUGroupId?
    WiFi.AccessPoint.1.AssociatedDevice.1.MUGroupId=0 WiFi.AccessPoint.1.AssociatedDevice.2.MUGroupId=0"
  depends_on: step3
  capture: result
pass_criteria:
- field: result.MUGroupId
  operator: contains
  value: '0'
  description: MUGroupId 應回傳包含 MUGroupId=0
verification_command: wl -i wl0 sta_info ${STA_MAC}
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API MUGroupId always "0"'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: defintion in pwhm only
