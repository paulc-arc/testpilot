id: wifi-llapi-r182-txchainctrl
name: TxChainCtrl — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 252
  object: "WiFi.Radio.{i}."
  api: "TxChainCtrl"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.TxChainCtrl=-1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.TxChainCtrl=-1
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.TxChainCtrl=-1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.TxChainCtrl?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Get default Radio TxChainCtrl ubus-cli WiFi.Radio.*.TxChainCtrl? > WiFi.Radio.1.TxChainCtrl? WiFi.Radio.1.TxChainCtrl=-1
    WiFi.Radio.2.TxChainCtrl=-1 WiFi.Radio.3.TxChainCtrl=-1
- id: step2
  action: exec
  target: DUT
  command: Set Radio TxChainCtrl to 3 then verify the setting in the driver ubus-cli WiFi.Radio.1.TxChainCtrl=3 > WiFi.Radio.1.TxChainCtrl=3
    WiFi.Radio.1. WiFi.Radio.1.TxChainCtrl=3 Test goal_x0001_ TxChainCtrl Default / production _x0001_ -1 Force SISO_x0001_
    1 Force 2×2 _x0001_3 Force 3×3 _x0001_7 Max capability 15
  depends_on: step1
  capture: result
pass_criteria:
- field: result.TxChainCtrl
  operator: contains
  value: '-1'
  description: TxChainCtrl 應回傳包含 TxChainCtrl=-1
verification_command: 'Default:

  root@prplOS:/# wl -i wl0 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl1 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl2 txchain

  15 (0xf)


  TxChainCtrl=3

  root@prplOS:/# wl -i wl0 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl1 txchain

  15 (0xf)

  root@prplOS:/# wl -i wl2 txchain

  15 (0xf)'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : the value in the driver always 15 (0xf)'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: Need to commit
