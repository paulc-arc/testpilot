id: wifi-llapi-r266-delclient
name: delClient() — WiFi.Radio.{i}.Sensing.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 358
  object: "WiFi.Radio.{i}.Sensing."
  api: "delClient()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.Sensing.delClient(MACAddress )
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.Sensing.delClient(MACAddress )
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.Sensing.delClient()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Try delete an added client: ubus-cli "WiFi.Radio.*.Sensing.delClient(MACAddress=''a0:29:42:60: 23:be'')" >
    WiFi.Radio.*.Sensing.delClient(MACAddress=''a0:29:42:60:23:be'') WiFi.Radio.1.Sensing.delClient() returned [ "" ] WiFi.Radio.3.Sensing.delClient()
    returned [ "" ] WiFi.Radio.2.Sensing.delClient() returned [ "" ]'
- id: step2
  action: exec
  target: DUT
  command: 'Try delete non-existing client: ubus-cli "WiFi.Radio.*.Sensing.delClient(MACAddress=''00:00:00:00: 00:00'')" >
    WiFi.Radio.*.Sensing.delClient(MACAddress=''00:00:00:00:00:00'') WiFi.Radio.1.Sensing.delClient() returned [ "" ] WiFi.Radio.3.Sensing.delClient()
    returned [ "" ] WiFi.Radio.2.Sensing.delClient() returned [ "" ]'
  depends_on: step1
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: delClient() 應回傳非空結果

verification_command: |
  ubus-cli "WiFi.Radio.*.?" | sed -n "1,200p"
  ubus-cli "WiFi.Radio.*.delClient?" 2>/dev/null || true
  wl -i wl0 status; wl -i wl1 status; wl -i wl2 status
  wl -i wl0 channel 2>/dev/null || true; wl -i wl1 channel 2>/dev/null || true; wl -i wl2 channel 2>/dev/null || true

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: 'Delete a non-added client is also optional so this API should be verified with csiStats().

      The step will be:

      1. Add one client for each radio.

      2. Verify the client will make csiStats()''s counters increasing.

      3. Delete each client.

      4. The csiStats()''s counters should stop increasing.'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
