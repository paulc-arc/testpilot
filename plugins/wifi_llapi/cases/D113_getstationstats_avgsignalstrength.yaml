id: wifi-llapi-D113-getstationstats-avgsignalstrength
name: getStationStats() AvgSignalStrength — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 115
  object: WiFi.AccessPoint.{i}.
  api: getStationStats()
  baseline: 0310-BGW720-300
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.getStationStats()"
llapi_support: Support
implemented_by: pWHM
bands:
- 5g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
      - iface: wl0
        mode: sta
        band: 5g
        ssid: testpilot5G
        security: WPA2-Personal
        key: '00000000'
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role)
  Transport:
  - DUT/STA via serialwrap COM0/COM1
  Baseline:
  - 5G = AP1 / wl0 / testpilot5G / WPA2-Personal
  Pre-check:
  - COM1 iw dev wl0 link -> connected
  - DUT wl -i wl0 assoclist -> STA MAC
  Notes:
  - Live value was 0; field populated but may return 0
  - Only 5G tested (COM1 associated to AP1)
steps:
- id: step1_assoc_precheck
  action: exec
  target: DUT
  command: wl -i wl0 assoclist
  capture: assoc_check
- id: step2_getstationstats
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.getStationStats()"
  capture: stats_output
  depends_on: step1_assoc_precheck
pass_criteria:
- field: assoc_check
  operator: not_equals
  value: ''
  band: 5g
  description: AP1 should have at least one associated STA
- field: stats_output.AvgSignalStrength
  operator: regex
  value: "^-?\\d+$"
  band: 5g
  description: AvgSignalStrength should be an integer
verification_command:
  - ubus-cli "WiFi.AccessPoint.1.getStationStats()" 2>&1 | grep AvgSignalStrength
results_reference:
  v4.0.3:
    5g: Pass
    6g: N/A
    2.4g: N/A
    comment: 5G-only, AvgSignalStrength field verified via getStationStats() on AP1
