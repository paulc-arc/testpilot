id: wifi-llapi-D186-nractiverxantenna
aliases:
  - wifi-llapi-r147-nractiverxantenna
name: NrActiveRxAntenna — WiFi.Radio.{i}.DriverStatus.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 186
  object: "WiFi.Radio.{i}.DriverStatus."
  api: "NrActiveRxAntenna"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.DriverStatus.NrActiveRxAntenna=4
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT 5G baseline:
     - set Radio.1/SSID.4 for the 5G AP under test
     - configure AP1 as open with MFP disabled
     - enable AP1 before station association
  2) STA 5G preparation:
     - disable local AP1/AP2 on A0
     - clear wl0 AP child interface and switch wl0 to managed mode
     - connect wl0 to {{SSID_5G}}
  3) Association evidence:
     - A0: iw dev wl0 link
     - B0: wl -i wl0 assoclist
sta_env_setup: |
  DUT 5G AP baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.1.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.1.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.OfdmaEnable=1
    ubus-cli WiFi.Radio.1.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.1.OperatingStandards=ax
    ubus-cli WiFi.Radio.1.RxChainCtrl=-1
    ubus-cli WiFi.Radio.1.TxChainCtrl=-1
    ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.1.Sensing.Enable=1
    ubus-cli WiFi.Radio.1.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.1.LongRetryLimit=6
    ubus-cli WiFi.Radio.1.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.1.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.4.SSID={{SSID_5G}}
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.2.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=None
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Disabled
    ubus-cli WiFi.AccessPoint.1.Enable=1
  STA 5G preparation:
    ubus-cli WiFi.AccessPoint.1.Enable=0
    ubus-cli WiFi.AccessPoint.2.Enable=0
    killall wpa_supplicant 2>/dev/null || true
    iw dev wl0.1 del 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl0 set type managed
    ifconfig wl0 up
  STA 5G connect verify:
    iw dev wl0 connect {{SSID_5G}}
    sleep 2
    iw dev wl0 link
  DUT association evidence:
    wl -i wl0 assoclist
test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.DriverStatus.NrActiveRxAntenna=4
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.DriverStatus.NrActiveRxAntenna?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '1. Check GW Radio DriverStatus.NrActiveRxAntenna: ubus-cli WiFi.Radio.*.DriverStatus.NrActiveRxAntenna? > WiFi.Radio.*.DriverStatus.NrActiveRxAntenna?
    WiFi.Radio.1.DriverStatus.NrActiveRxAntenna=-1 WiFi.Radio.2.DriverStatus.NrActiveRxAntenna=-1 WiFi.Radio.3.DriverStatus.NrActiveRxAntenna=-1'
  capture: result
pass_criteria:
- field: result.NrActiveRxAntenna
  operator: contains
  value: '4'
  description: NrActiveRxAntenna 應回傳包含 NrActiveRxAntenna=4
verification_command: 'wl -i wl0 rxchain


  root@prplOS:/# wl -i wl0 rxchain

  15 (0xf)

  root@prplOS:/# wl -i wl1 rxchain

  15 (0xf)

  root@prplOS:/# wl -i wl2 rxchain

  15 (0xf)


  Value _x0001_Hex_x0001_Meaning

  1 0x1_x0001_1×1 (chain 0 only)

  3 0x3_x0001_2×2 (chains 0–1)

  7 0x7_x0001_3×3 (chains 0–2)

  15 0xF_x0001_4×4 (chains 0–3)'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API should return 4'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: need to check(Leon)
