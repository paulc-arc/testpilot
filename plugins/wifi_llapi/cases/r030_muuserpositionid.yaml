id: wifi-llapi-r030-muuserpositionid
name: MUUserPositionId — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 30
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: MUUserPositionId
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.MUUserPositionId=0
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1
steps:
- id: step1
  action: exec
  target: DUT
  command: \\Connect WiFi Station
- id: step2
  action: exec
  target: DUT
  command: Run IPERF3 between Station's and GW at the same time
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Get station caps wl -i wl0 sta_info 34:19:4d:a4:b5:09 | grep ''caps'' HT caps 0x9ef: LDPC 40MHz SGI20 SGI40 STBC-Tx
    STBC-Rx VHT caps 0xff: LDPC SGI80 SGI160 STBC-Tx STBC-Rx SU-BFR SU-BFE MU-BFR HE caps 0xc6639: LDPC HE-HTC SU-BFR SU&MU-BFE
    EHT caps 0x105: SU-BFR SU&MU-BFE wl -i wl1 sta_info 38:06:E6:92:B0:4A | grep ''caps'' HT caps 0x0: HE caps 0xc6639: LDPC
    HE-HTC SU-BFR SU&MU-BFE EHT caps 0x105: SU-BFR SU&MU-BFE'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: 'get MUUserPositionId ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.MUUserPositionId? sitionId? CFG80211-ERROR)
    wl_cfg80211_sta_info : GET STA INFO failed, -21 WiFi.AccessPoint.1.AssociatedDevice.1.MUUserPositionId=0 WiFi.AccessPoint.3.AssociatedDevice.1.MUUserPositionId=0
    WiFi.AccessPoint.5.AssociatedDevice.1.MUUserPositionId=0'
  depends_on: step3
  capture: result
pass_criteria:
- field: result.MUUserPositionId
  operator: contains
  value: '0'
  description: MUUserPositionId 應回傳包含 MUUserPositionId=0
verification_command: wl -i wl0 sta_info ${STA_MAC}
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : Stations and GW support MIMO and both stations run IPERF3 at the same time but the MUUserPositionId always
      return "0"'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: defintion in pwhm only
