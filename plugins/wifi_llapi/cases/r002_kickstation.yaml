id: wifi-llapi-r002-kickstation
name: kickStation() — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 6
  object: "WiFi.AccessPoint.{i}."
  api: "kickStation()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.kickStation(macaddress=string):bool"
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli "WiFi.AccessPoint.{i}.kickStation(macaddress=string):bool"
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.kickStation()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW.
- id: step2
  action: exec
  target: DUT
  command: Verify station authentication state = 1 ubus-cli WiFi.AccessPoint.1.? | grep -E 'Associated.1.MACAddress|AuthenticationState'
    WiFi.AccessPoint.1.AssociatedDevice.{i}.AuthenticationState=1 WiFi.AccessPoint.1.AssociatedDevice.{i}.MACAddress="42:33:64:A3:9F:B0"
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Disconnect station using kick command ubus-cli "WiFi.AccessPoint.1.kickStation(macaddress=42:33:64:A3:9F:B0)"
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Verify station Authentication state = 0 ubus-cli WiFi.AccessPoint.1.? | grep -E 'Associated1.MACAddress|AuthenticationState'
    WiFi.AccessPoint.1.AssociatedDevice.{i}.AuthenticationState=0 WiFi.AccessPoint.1.AssociatedDevice.{i}.MACAddress="42:33:64:A3:9F:B0""
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: Repeat step 1 to step 4 by connecting WiFi station to AccessPoint.3 and AccessPoint.5
  depends_on: step4
  capture: result
pass_criteria:
- field: result.kickStation()
  operator: contains
  value: string):bool"
  description: kickStation() 應回傳包含 kickStation()=string):bool"
verification_command: 'AuthenticationState=1 "The station has successfully completed the association procedure and is listed
  in the AP association table"

  root@prplOS:/# wl -i wl0 assoclist

  assoclist 42:33:64:A3:9F:B0


  AuthenticationState=0 "The station is not associated with the AP and therefore does not appear in the AP association table."

  root@prplOS:/# wl -i wl0 assoclist'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
