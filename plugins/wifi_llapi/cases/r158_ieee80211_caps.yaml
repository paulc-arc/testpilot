id: wifi-llapi-r158-ieee80211-caps
name: IEEE80211_Caps — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 197
  object: "WiFi.Radio.{i}."
  api: "IEEE80211_Caps"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.IEEE80211_Caps=WPA2 BURST WME WME_TKIPMIC BGSCAN UAPSD DOTH IMPL_BF EXPL_BF
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.IEEE80211_Caps=WPA2 BURST WME WME_TKIPMIC BGSCAN UAPSD DOTH IMPL_BF EXPL_BF
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.IEEE80211_Caps=WPA2 BURST WME WME_TKIPMIC BGSCAN UAPSD DOTH IMPL_BF EXPL_BF
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.IEEE80211_Caps?"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Get Radio Default value of IEEE80211_Caps ubus-cli WiFi.Radio.*.IEEE80211_Caps? > WiFi.Radio.*.IEEE80211_Caps?
    WiFi.Radio.1.IEEE80211_Caps="160MHz UAPSD WEP TKIP AES AES_CCM SAE EXPL_BF IMPL_BF MU_MIMO DFS_OFFLOAD OWE SAE_PWE WME"
    WiFi.Radio.2.IEEE80211_Caps="320MHz 160MHz UAPSD SAE EXPL_BF IMPL_BF MU_MIMO OWE SAE_PWE WME" WiFi.Radio.3.IEEE80211_Caps="UAPSD
    WEP TKIP AES AES_CCM SAE EXPL_BF IMPL_BF MU_MIMO OWE SAE_PWE WME"
- id: step2
  action: exec
  target: DUT
  command: Check Capability in Beacon frame | Capability | Wireshark path | ------------------------ | ---------------------------
    | WME / UAPSD | Beacon → WMM IE | 160/320 MHz | VHT / HE / EHT Operation IE | MU-MIMO | VHT/HE Capabilities IE | Beamforming
    | VHT/HE/EHT Capabilities | SAE / OWE | RSN IE → AKM list
  depends_on: step1
  capture: result
pass_criteria:
- field: result.IEEE80211_Caps
  operator: contains
  value: WPA2 BURST WME WME_TKIPMIC BGSCAN UAPSD DOTH IMPL_BF EXPL_BF
  description: IEEE80211_Caps 應回傳包含 IEEE80211_Caps=WPA2 BURST WME WME_TKIPMIC BGSCAN UAPSD DOTH IMPL_BF EXPL_BF
