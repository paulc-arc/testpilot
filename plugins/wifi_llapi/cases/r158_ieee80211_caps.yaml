    WiFi.Radio.2.IEEE80211_Caps="320MHz 160MHz UAPSD SAE EXPL_BF IMPL_BF MU_MIMO OWE SAE_PWE WME" WiFi.Radio.3.IEEE80211_Caps="UAPSD
    WEP TKIP AES AES_CCM SAE EXPL_BF IMPL_BF MU_MIMO OWE SAE_PWE WME"
- id: step2
  action: exec
  target: DUT
  command: Check Capability in Beacon frame | Capability | Wireshark path | ------------------------ | ---------------------------
    | WME / UAPSD | Beacon → WMM IE | 160/320 MHz | VHT / HE / EHT Operation IE | MU-MIMO | VHT/HE Capabilities IE | Beamforming
    | VHT/HE/EHT Capabilities | SAE / OWE | RSN IE → AKM list
  depends_on: step1
  capture: result
