id: wifi-llapi-D044-signalnoiseratio
name: "SignalNoiseRatio — WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 46
  object: WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
  api: SignalNoiseRatio
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.SignalNoiseRatio?"'
llapi_support: Support
implemented_by: pWHM
bands: ["5g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
    STA:
      role: sta
      transport: serial
      selector: COM1
      config:
      - iface: 5g
        mode: sta
        ssid: TestPilot_BTM
        key: testpilot6g
  links:
  - from: STA
    to: DUT
    band: 5g
test_environment: |
  Topology:
  - DUT: COM0 (AP role)
  - STA: COM1 (station role for this case; do not rely on the old A0/B0 heuristic)
  Transport:
  - serialwrap attach COM0 / COM1
  Live band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4 / TestPilot_BTM
  - 6G: DUT wl1 / AP3 / SSID.6 / TestPilot_BTM
  - 2.4G: DUT wl2 / AP5 / SSID.8 / TestPilot_24G
  Preconditions:
  - keep only one associated station on AP1 so AssociatedDevice.1 stays deterministic
  - use the validated 5G single-band WPA3 baseline for this case
setup_steps: |
  1) DUT 5G baseline:
     - enable Radio.1 / SSID.4 / AP1
     - configure AP1 as WPA3-Personal with MFP required
     - keep the validated live SSID/credential pair as TestPilot_BTM / testpilot6g
  2) STA 5G preparation:
     - disable local AP1/AP2 on COM1
     - move COM1 br-lan off 192.168.1.0/24 to avoid bridge self-hit side effects
     - reset wl0 and its wpa_supplicant control socket
     - connect wl0 to TestPilot_BTM with SAE
  3) Association evidence:
     - COM1: iw dev wl0 link ; wpa_cli -p /var/run/wpa_supplicant -i wl0 status
     - COM0: wl -i wl0 assoclist
sta_env_setup: |
  DUT 5G AP baseline:
    ubus-cli WiFi.Radio.1.Enable=1
    ubus-cli WiFi.Radio.1.BeaconPeriod=100
    ubus-cli WiFi.Radio.1.DTIMPeriod=3
    ubus-cli WiFi.Radio.1.DriverConfig.FragmentationThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.RtsThreshold=-1
    ubus-cli WiFi.Radio.1.DriverConfig.TPCMode=Auto
    ubus-cli WiFi.Radio.1.ExplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.ImplicitBeamFormingEnabled=1
    ubus-cli WiFi.Radio.1.OfdmaEnable=1
    ubus-cli WiFi.Radio.1.ObssCoexistenceEnable=0
    ubus-cli WiFi.Radio.1.OperatingStandards=ax
    ubus-cli WiFi.Radio.1.RxChainCtrl=-1
    ubus-cli WiFi.Radio.1.TxChainCtrl=-1
    ubus-cli WiFi.Radio.1.Vendor.Brcm.RegulatoryDomainRev=0
    ubus-cli WiFi.Radio.1.Sensing.Enable=1
    ubus-cli WiFi.Radio.1.IEEE80211ax.BssColorPartial=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.NonSRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.PSRDisallowed=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMaxOffset=0
    ubus-cli WiFi.Radio.1.IEEE80211ax.SRGOBSSPDMinOffset=0
    ubus-cli WiFi.Radio.1.LongRetryLimit=6
    ubus-cli WiFi.Radio.1.MultiUserMIMOEnabled=1
    ubus-cli WiFi.Radio.1.TargetWakeTimeEnable=1
    ubus-cli WiFi.SSID.4.SSID=TestPilot_BTM
    ubus-cli WiFi.AccessPoint.1.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.2.IEEE80211u.QoSMapSet=
    ubus-cli WiFi.AccessPoint.1.Security.ModeEnabled=WPA3-Personal
    ubus-cli WiFi.AccessPoint.1.Security.SAEPassphrase=testpilot6g
    ubus-cli WiFi.AccessPoint.1.Security.MFPConfig=Required
    ubus-cli WiFi.AccessPoint.1.Enable=1
  STA 5G preparation:
    ifconfig br-lan 192.168.88.1 netmask 255.255.255.0 up
    ubus-cli WiFi.AccessPoint.1.Enable=0
    ubus-cli WiFi.AccessPoint.2.Enable=0
    wpa_cli terminate 2>/dev/null || true
    rm -f /var/run/wpa_supplicant/wl0 2>/dev/null || true
    iw dev wl0.1 del 2>/dev/null || true
    iw dev wl0 disconnect 2>/dev/null || true
    iw dev wl1 disconnect 2>/dev/null || true
    iw dev wl2 disconnect 2>/dev/null || true
    iw dev wl0 set type managed
    ifconfig wl0 up
    mkdir -p /var/run/wpa_supplicant
    printf 'ctrl_interface=/var/run/wpa_supplicant\nupdate_config=1\nsae_pwe=2\nnetwork={\nssid="TestPilot_BTM"\nkey_mgmt=SAE\nsae_password="testpilot6g"\nieee80211w=2\nscan_ssid=1\n}\n' > /tmp/wpa_wl0.conf
    wpa_supplicant -B -D nl80211 -i wl0 -c /tmp/wpa_wl0.conf -C /var/run/wpa_supplicant
    sleep 3
  STA 5G connect verify:
    wpa_cli -p /var/run/wpa_supplicant -i wl0 reconnect
    sleep 10
    iw dev wl0 link
    wpa_cli -p /var/run/wpa_supplicant -i wl0 status
  DUT association evidence:
    wl -i wl0 assoclist
test_procedure: |
  1) Confirm the 5G STA is associated to AP1 and resolve its live MAC address.
  2) Read WiFi.AccessPoint.1.AssociatedDevice.1.SignalNoiseRatio on DUT.
  3) Cross-check the same STA against iw dev wl0 station dump `signal:` plus wl0 sta_info `per antenna noise floor:` and compute a driver-side SNR.
  4) Pass when SignalNoiseRatio remains a live positive integer and stays within 2 dB of the computed driver SNR for the same STA.
steps:
- id: step1
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?"
  capture: assoc_entry
- id: step2
  action: exec
  target: DUT
  command: ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.SignalNoiseRatio?"
  depends_on: step1
  capture: result
- id: step3
  action: exec
  target: DUT
  command: 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); STA_MAC_LOWER=$(echo "$STA_MAC" | tr ''A-F'' ''a-f''); SIGNAL=$(iw dev wl0 station dump | awk -v mac="$STA_MAC_LOWER" ''$1=="Station" && $2==mac {matched=1; next} $1=="Station" {matched=0} matched && $1=="signal:" {print $2; exit}''); NOISE=$(wl -i wl0 sta_info $STA_MAC_LOWER | awk ''/per antenna noise floor:/ {print $5; exit}''); [ -n "$STA_MAC" ]; echo DriverAssocMac=$STA_MAC; [ -n "$SIGNAL" ]; echo DriverSignal=$SIGNAL; [ -n "$NOISE" ]; echo DriverNoise=$NOISE; echo DriverSignalNoiseRatio=$((SIGNAL - NOISE)); echo DriverSignalNoiseRatioMin=$((SIGNAL - NOISE - 2)); echo DriverSignalNoiseRatioMax=$((SIGNAL - NOISE + 2))'
  depends_on: step2
  capture: driver_snr
pass_criteria:
- field: assoc_entry.MACAddress
  operator: regex
  value: ^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$
  description: AP1 AssociatedDevice.1 must first resolve to the live 5G STA MAC.
- field: result.SignalNoiseRatio
  operator: regex
  value: ^[0-9]+$
  description: SignalNoiseRatio should be a live non-negative integer.
- field: result.SignalNoiseRatio
  operator: '>'
  value: '0'
  description: SignalNoiseRatio should be positive for the associated 5G STA.
- field: driver_snr.DriverAssocMac
  operator: equals
  reference: assoc_entry.MACAddress
  description: Driver-side SNR calculation must target the same AssociatedDevice MAC resolved in step1.
- field: driver_snr.DriverSignal
  operator: regex
  value: ^-[0-9]+$
  description: iw station dump must emit a concrete negative signal value for the same STA.
- field: driver_snr.DriverNoise
  operator: regex
  value: ^-[0-9]+$
  description: wl0 sta_info must emit a concrete negative noise-floor value for the same STA.
- field: driver_snr.DriverSignalNoiseRatio
  operator: regex
  value: ^[0-9]+$
  description: Driver-side SNR must be derived as a concrete positive integer.
- field: result.SignalNoiseRatio
  operator: '>='
  reference: driver_snr.DriverSignalNoiseRatioMin
  description: LLAPI SignalNoiseRatio should stay within 2 dB below the computed driver SNR for the same STA.
- field: result.SignalNoiseRatio
  operator: '<='
  reference: driver_snr.DriverSignalNoiseRatioMax
  description: LLAPI SignalNoiseRatio should stay within 2 dB above the computed driver SNR for the same STA.
verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.SignalNoiseRatio?"'
  - 'STA_MAC=$(ubus-cli "WiFi.AccessPoint.1.AssociatedDevice.1.MACAddress?" | sed -n ''s/.*MACAddress="\([^"]*\)".*/\1/p''); STA_MAC_LOWER=$(echo "$STA_MAC" | tr ''A-F'' ''a-f''); SIGNAL=$(iw dev wl0 station dump | awk -v mac="$STA_MAC_LOWER" ''$1=="Station" && $2==mac {matched=1; next} $1=="Station" {matched=0} matched && $1=="signal:" {print $2; exit}''); NOISE=$(wl -i wl0 sta_info $STA_MAC_LOWER | awk ''/per antenna noise floor:/ {print $5; exit}''); [ -n "$STA_MAC" ] && echo DriverAssocMac=$STA_MAC && [ -n "$SIGNAL" ] && echo DriverSignal=$SIGNAL && [ -n "$NOISE" ] && echo DriverNoise=$NOISE && [ -n "$SIGNAL" ] && [ -n "$NOISE" ] && echo DriverSignalNoiseRatio=$((SIGNAL - NOISE)) && echo DriverSignalNoiseRatioMin=$((SIGNAL - NOISE - 2)) && echo DriverSignalNoiseRatioMax=$((SIGNAL - NOISE + 2))'
results_reference:
  v4.0.3:
    5g: Pass
    6g: N/A
    2.4g: N/A
    comment: '5G serialwrap retest returned SignalNoiseRatio=63; iw dev wl0 station dump reported DriverSignal=-36 and wl0 sta_info reported DriverNoise=-99, yielding DriverSignalNoiseRatio=63 for the same AssociatedDevice MAC. Non-executed bands remain N/A until separately calibrated.'
