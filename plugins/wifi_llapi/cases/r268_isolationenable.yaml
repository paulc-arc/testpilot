id: wifi-llapi-r268-isolationenable
name: IsolationEnable — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 268
  object: WiFi.AccessPoint.{i}.
  api: IsolationEnable
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.IsolationEnable=0
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect two WiFi station to the Radio
- id: step2
  action: exec
  target: DUT
  command: Run ping between Station - by default isolation = disable so ping is OK -Enable Isolation ubus-cli WiFi.AccessPoint.5.IsolationEnable=1
    --Ping between station should failed after enable Isolation -Disable Isolation ubus-cli WiFi.AccessPoint.5.IsolationEnable=0
    --Ping between station success after disable Isolation
  depends_on: step1
  capture: result
pass_criteria:
- field: result.IsolationEnable
  operator: contains
  value: '0'
  description: IsolationEnable 應回傳包含 IsolationEnable=0
results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
