id: wifi-llapi-r238-getssidstats-retranscount
name: getSSIDStats() — WiFi.SSID.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 315
  object: "WiFi.SSID.{i}."
  api: "getSSIDStats()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.SSID.{i}.getSSIDStats() RetransCount : 0,'
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.SSID.{i}.getSSIDStats() RetransCount : 0,
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.SSID.*.getSSIDStats()"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi Station to GW SSID4, SSID6 and SSID8
- id: step2
  action: exec
  target: DUT
  command: Run Iperf overnight between station
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Get stats RetransCount ubus-cli "WiFi.SSID.8.getSSIDStats()" | grep \.RetransCount RetransCount = 0, ubus-cli "WiFi.SSID.6.getSSIDStats()"
    | grep \.RetransCount RetransCount = 0, ubus-cli "WiFi.SSID.4.getSSIDStats()" | grep \.RetransCount RetransCount = 0,
  depends_on: step2
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getSSIDStats() 執行不應回傳 error
verification_command: 'cat /proc/net/dev | grep wl0


  /proc/net/dev does not have 802.11-specific retry counters'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API always return "0"'
  v4.0.3:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: only per radio
