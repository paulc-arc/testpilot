id: wifi-llapi-r082-modessupported
name: ModesSupported — WiFi.AccessPoint.{i}.Security
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 90
  object: "WiFi.AccessPoint.{i}.Security"
  api: "ModesSupported"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.Security.ModesSupported=None,WEP-64,WEP-128,WEP-128iv,WPA-Personal,WPA2-Personal,WPA-WPA2-Personal,WPA3-Personal,WPA2-WPA3-Personal,E-None,WPA-Enterprise,WPA2-Enterprise,WPA-WPA2-Enterprise
llapi_support: Support
implemented_by: Vendor Module
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.Security.ModesSupported=None,WEP-64,WEP-128,WEP-128iv,WPA-Personal,WPA2-Personal,WPA-WPA2-Personal,WPA3-Personal,WPA2-WPA3-Personal,E-None,WPA-Enterprise,WPA2-Enterprise,WPA-WPA2-Enterprise
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.Security.ModesSupported?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: '"Test Procedure:'
- id: step2
  action: exec
  target: DUT
  command: 'Set/Get Security Key PassPhrase Set Command: ubus-cli WiFi.AccessPoint.{i}.Security.KeyPassPhrase=""12345678""
    Get command: ubus-cli WiFi.AccessPoint.{i}.Security.KeyPassPhrase?'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: 'Set/Get Security Mode Set Command: ubus-cli WiFi.AccessPoint.{i}.Security.ModeEnabled="""" Get command: ubus-cli
    WiFi.AccessPoint.{i}.Security.ModeEnabled?'
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Connect WiFi Station
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: 'Connect WiFi Station and Check Security Mode Command: ubus-cli WiFi.AccessPoint.{i}.? | grep \SecurityModeEnabled='
  depends_on: step4
- id: step6
  action: exec
  target: DUT
  command: 'Repeat step 2 and 4 ""set to other supported Security Mode"" Note: Please use below command to set security Key/SAE
    For WEP: ubus-cli WiFi.AccessPoint.{i}.Security.WEPKey=""12345678"" For WPA or WP2: ubus-cli WiFi.AccessPoint.{i}.Security.KeyPassPhrase=""12345678""
    For WPA3: ubus-cli WiFi.AccessPoint.{i}.Security.SAEPassphrase=""12345678"""_x0001__x0001__x0001__x0001__x0001__x0001__x0001__x0001__x0001_'
  depends_on: step5
  capture: result
pass_criteria:
- field: result.ModesSupported
  operator: contains
  value: None,WEP-64,WEP-128,WEP-128iv,WPA-Personal,WPA2-Personal,WPA-WPA2-Personal,WPA3-Personal,WPA2-WPA3-Personal,E-None,WPA-Enterprise,WPA2-Enterprise,WPA-WPA2-Enterprise
  description: ModesSupported 應回傳包含 ModesSupported=None,WEP-64,WEP-128,WEP-128iv,WPA-Personal,WPA2-Personal,WPA-WPA2-Personal,WPA3-Personal,WPA2-WPA3-Personal,E-None,WPA-Enterprise,WPA2-Enterprise,WPA-WPA2-Enterprise

verification_command: |
  ubus-cli "WiFi.AccessPoint.*.Security.?" | sed -n "1,160p"
  ubus-cli "WiFi.AccessPoint.*.Security.ModesSupported?" 2>/dev/null || true
  cat /tmp/wl*_hapd.conf | grep -Ei "wpa|wpa_key_mgmt|sae|owe|psk|ieee80211w|wep|pairwise"
  hostapd_cli -i wl0 get_config 2>/dev/null | grep -Ei "wpa|key_mgmt|rsn_pairwise|ieee80211w" || true

results_reference:
  v4.0.1:
    5g: Pass
    6g: Fail
    2.4g: Fail
    comment: 'BRCM: CSP CS00012439197'
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
