id: wifi-llapi-r093-configured
name: Configured — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 105
  object: "WiFi.AccessPoint.{i}.WPS."
  api: "Configured"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.WPS.Configured=1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
    EndpointPC:
      role: endpoint
      transport: ssh
  links:
  - from: STA
    to: DUT
    band: 5g
  - from: DUT
    to: EndpointPC
    interface: eth1

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.WPS.Configured=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.WPS.Configured?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Get WPS Configured state ubus-cli WiFi.AccessPoint.*.WPS.Configured ? > WiFi.AccessPoint.*.WPS.Configured ?
    WiFi.AccessPoint.1.WPS.Configured=1 WiFi.AccessPoint.3.WPS.Configured=1 WiFi.AccessPoint.5.WPS.Configured=1 wps_state_x0001_Meaning
    (hostapd / WPS spec) 0_x0001_WPS disabled 1_x0001_Unconfigured (no credentials set via WPS yet) 2_x0001_Configured (credentials
    already set)
  capture: result
pass_criteria:
- field: result.Configured
  operator: contains
  value: '1'
  description: Configured 應回傳包含 Configured=1
verification_command: 'root@prplOS:/# cat /tmp/wl0_hapd.conf |grep wps_state

  wps_state=2

  root@prplOS:/# cat /tmp/wl1_hapd.conf |grep wps_state

  wps_state=0

  root@prplOS:/# cat /tmp/wl2_hapd.conf |grep wps_state

  wps_state=2'
results_reference:
  v4.0.1:
    5g: Pass
    6g: Not Supported
    2.4g: Pass
    comment: 'Note: WPS was tested in 5G 11ac and 2G 11n because no wif7 card support WPS

      - 6GHz do not support WPS.'
  v4.0.3:
    5g: To be tested
    6g: To be tested
    2.4g: To be tested
    comment: ''
