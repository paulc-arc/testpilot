id: d183-radio-fragmentationthreshold
name: D183 Radio FragmentationThreshold
source:
  row: 144
  object: WiFi.Radio.{i}.DriverConfig.
  api: FragmentationThreshold
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.DriverConfig.FragmentationThreshold?"
  expected: FragmentationThreshold 回傳整數值
  description: Radio.1 (5g) FragmentationThreshold getter（live=-1）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.DriverConfig.FragmentationThreshold?"
  expected: FragmentationThreshold 回傳整數值
  description: Radio.2 (6g) FragmentationThreshold getter（live=-1）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.DriverConfig.FragmentationThreshold?"
  expected: FragmentationThreshold 回傳整數值
  description: Radio.3 (2.4g) FragmentationThreshold getter（live=-1）
pass_criteria:
- field: getter_5g.FragmentationThreshold
  operator: regex
  value: ^-?\d+$
- field: getter_6g.FragmentationThreshold
  operator: regex
  value: ^-?\d+$
- field: getter_24g.FragmentationThreshold
  operator: regex
  value: ^-?\d+$
