id: wifi-llapi-D097-vendorie
name: "VendorIE / createVendorIE() — WiFi.AccessPoint.{i}.VendorIEs."
version: '1.0'
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 99
  object: "WiFi.AccessPoint.{i}.VendorIEs."
  api: "VendorIE,createVendorIE()"
  baseline: "0310-BGW720-300"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.VendorIEs.createVendorIE()"
llapi_support: Not Support
implemented_by: Vendor Module
bands:
  - 5g
  - 6g
  - 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (B0, AP role)
  Transport:
  - DUT via serialwrap COM0
  Baseline:
  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal
  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE
  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal
  Notes:
  - VendorIEs.Enable=0 exists on all bands (tree is not empty)
  - createVendorIE() fails with status 1 unknown error on all bands
steps:
  # ---------- 5G ----------
  - id: step1_5g_vendorie
    action: exec
    target: DUT
    command:
      - echo "Enable5g=$(ubus-cli 'WiFi.AccessPoint.1.VendorIEs.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
      - CREATE5G=$(ubus-cli 'WiFi.AccessPoint.1.VendorIEs.createVendorIE()' 2>&1)
      - echo "CreateResult5g=$CREATE5G"
    capture: vie_5g

  # ---------- 6G ----------
  - id: step2_6g_vendorie
    action: exec
    target: DUT
    depends_on: step1_5g_vendorie
    command:
      - echo "Enable6g=$(ubus-cli 'WiFi.AccessPoint.3.VendorIEs.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
      - CREATE6G=$(ubus-cli 'WiFi.AccessPoint.3.VendorIEs.createVendorIE()' 2>&1)
      - echo "CreateResult6g=$CREATE6G"
    capture: vie_6g

  # ---------- 2.4G ----------
  - id: step3_24g_vendorie
    action: exec
    target: DUT
    depends_on: step2_6g_vendorie
    command:
      - echo "Enable24g=$(ubus-cli 'WiFi.AccessPoint.5.VendorIEs.Enable?' 2>/dev/null | grep -o 'Enable=[0-9]*' | cut -d= -f2)"
      - CREATE24G=$(ubus-cli 'WiFi.AccessPoint.5.VendorIEs.createVendorIE()' 2>&1)
      - echo "CreateResult24g=$CREATE24G"
    capture: vie_24g

pass_criteria:
  - field: vie_5g.Enable5g
    operator: equals
    value: '0'
    description: '5G VendorIEs.Enable should be 0'
  - field: vie_5g.CreateResult5g
    operator: contains
    value: 'ERROR'
    description: '5G createVendorIE() should return ERROR'
  - field: vie_6g.Enable6g
    operator: equals
    value: '0'
    description: '6G VendorIEs.Enable should be 0'
  - field: vie_6g.CreateResult6g
    operator: contains
    value: 'ERROR'
    description: '6G createVendorIE() should return ERROR'
  - field: vie_24g.Enable24g
    operator: equals
    value: '0'
    description: '2.4G VendorIEs.Enable should be 0'
  - field: vie_24g.CreateResult24g
    operator: contains
    value: 'ERROR'
    description: '2.4G createVendorIE() should return ERROR'

verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.VendorIEs.?"'
  - 'ubus-cli "WiFi.AccessPoint.3.VendorIEs.?"'
  - 'ubus-cli "WiFi.AccessPoint.5.VendorIEs.?"'

results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass