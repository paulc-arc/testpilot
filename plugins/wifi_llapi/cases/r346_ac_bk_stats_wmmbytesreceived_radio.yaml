- id: step3
  action: exec
  target: DUT
  command: Verify Radio Stats.WmmBytesReceived.AC_BK ubus-cli WiFi.Radio.*.? | grep WmmBytesReceived.AC_BK WiFi.Radio.1.Stats.WmmBytesReceived.AC_BK=26199340
