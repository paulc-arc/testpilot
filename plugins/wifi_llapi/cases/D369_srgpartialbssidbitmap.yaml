id: wifi-llapi-D369-srgpartialbssidbitmap
name: "SRGPartialBSSIDBitmap — WiFi.Radio.{i}.IEEE80211ax."
version: '1.1'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 276
  object: WiFi.Radio.{i}.IEEE80211ax.
  api: SRGPartialBSSIDBitmap
  baseline: BCM v4.0.3
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: 'ubus-cli WiFi.Radio.1.IEEE80211ax.SRGPartialBSSIDBitmap="1"'
llapi_support: Support
implemented_by: Vendor Module
bands: ["5g", "6g", "2.4g"]
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (AP role; SRGPartialBSSIDBitmap is validated as a Radio-only case with no STA transport)
  Live band mapping:
  - 5G: DUT wl0 / Radio.1 / SSID.4 / testpilot5G / WPA2-Personal / 00000000
  - 6G: DUT wl1 / Radio.2 / SSID.6 / testpilot6G / WPA3-Personal / SAE / 00000000
  - 2.4G: DUT wl2 / Radio.3 / SSID.8 / testpilot2G / WPA2-Personal / 00000000
  Preconditions:
  - keep Radio.1 / Radio.2 / Radio.3 on the documented non-open baseline
  - the default getter on all three bands is `SRGPartialBSSIDBitmap=""`
  - 0319 serialwrap probe showed Radio.1 / Radio.2 accepted `SRGPartialBSSIDBitmap="1"` and read it back as `"1"`, but `/tmp/wl0_hapd.conf` and `/tmp/wl1_hapd.conf` still exposed zero `he_spr_srg_partial_bssid=` lines
  - Radio.3 rejected the same setter with `failed (4 - parameter not found)` and its getter stayed empty
setup_steps: |
  1) DUT baseline:
     - keep wl0 / wl1 / wl2 BSS instances up on the default non-open baseline
     - confirm `/tmp/wl0_hapd.conf`, `/tmp/wl1_hapd.conf`, and `/tmp/wl2_hapd.conf` exist before the bitmap probe
  2) Setter / getter probe:
     - read the default SRGPartialBSSIDBitmap getter on Radio.1 / Radio.2 / Radio.3
     - write `SRGPartialBSSIDBitmap="1"` on Radio.1 / Radio.2 and confirm northbound readback changes to `"1"`
     - attempt the same setter on Radio.3 and record the `parameter not found` error
  3) hostapd cross-check:
     - inspect `/tmp/wl[0-2]_hapd.conf` for `he_spr_srg_partial_bssid=`
     - every band should keep the line count at `0`, proving the parameter never reaches Broadcom hostapd/runtime config
  4) Cleanup:
     - restore Radio.1 / Radio.2 / Radio.3 back to `SRGPartialBSSIDBitmap=""`
sta_env_setup: |
  DUT:
    wl -i wl0 bss
    wl -i wl1 bss
    wl -i wl2 bss
test_procedure: |
  1) Read WiFi.Radio.1/2/3.IEEE80211ax.SRGPartialBSSIDBitmap and confirm the default is empty.
  2) Set `SRGPartialBSSIDBitmap="1"` on Radio.1 / Radio.2 and confirm each getter reads back `"1"`.
  3) Try the same setter on Radio.3; it should fail with `error=4 / parameter not found`, and the getter should remain empty.
  4) Cross-check `/tmp/wl0_hapd.conf`, `/tmp/wl1_hapd.conf`, and `/tmp/wl2_hapd.conf`: no band should expose `he_spr_srg_partial_bssid=`.
  5) Restore all three bands back to `SRGPartialBSSIDBitmap=""`.
  Verdict: Mixed-band checkpoint. 5G and 6G are Fail-shaped mismatches because northbound readback changes to `"1"` while hostapd config never projects `he_spr_srg_partial_bssid=`, and 2.4G is Not Supported because the setter fails with `parameter not found`.
steps:
- id: step1_default_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.Radio.1.IEEE80211ax.SRGPartialBSSIDBitmap?"'
  capture: default_5g
- id: step2_default_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.Radio.2.IEEE80211ax.SRGPartialBSSIDBitmap?"'
  depends_on: step1_default_5g
  capture: default_6g
- id: step3_default_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.Radio.3.IEEE80211ax.SRGPartialBSSIDBitmap?"'
  depends_on: step2_default_6g
  capture: default_24g
- id: step4_set_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.Radio.1.IEEE80211ax.SRGPartialBSSIDBitmap="1"'
  depends_on: step3_default_24g
  capture: set_5g
- id: step5_set_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli WiFi.Radio.2.IEEE80211ax.SRGPartialBSSIDBitmap="1"'
  depends_on: step4_set_5g
  capture: set_6g
- id: step6_invalid_24g
  action: exec
  target: DUT
  band: 2.4g
  command: >-
    OUT=$(ubus-cli "WiFi.Radio.3.IEEE80211ax.SRGPartialBSSIDBitmap=1" 2>&1); printf '%s\n' "$OUT"; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/error=\1/p'; printf '%s\n' "$OUT" | sed -n 's/.*failed (\([0-9][0-9]*\) - \(.*\))/message=\2/p'
  depends_on: step5_set_6g
  capture: invalid_24g
- id: step7_after_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli "WiFi.Radio.1.IEEE80211ax.SRGPartialBSSIDBitmap?"'
  depends_on: step6_invalid_24g
  capture: after_5g
- id: step8_after_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli "WiFi.Radio.2.IEEE80211ax.SRGPartialBSSIDBitmap?"'
  depends_on: step7_after_5g
  capture: after_6g
- id: step9_after_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli "WiFi.Radio.3.IEEE80211ax.SRGPartialBSSIDBitmap?"'
  depends_on: step8_after_6g
  capture: after_24g
- id: step10_cfg_5g_after
  action: exec
  target: DUT
  band: 5g
  command: grep -c '^he_spr_srg_partial_bssid=' /tmp/wl0_hapd.conf | sed 's/^/HostapdSrgPartialBssidLines=/'
  depends_on: step9_after_24g
  capture: cfg_5g_after
- id: step11_cfg_6g_after
  action: exec
  target: DUT
  band: 6g
  command: grep -c '^he_spr_srg_partial_bssid=' /tmp/wl1_hapd.conf | sed 's/^/HostapdSrgPartialBssidLines=/'
  depends_on: step10_cfg_5g_after
  capture: cfg_6g_after
- id: step12_cfg_24g_after
  action: exec
  target: DUT
  band: 2.4g
  command: grep -c '^he_spr_srg_partial_bssid=' /tmp/wl2_hapd.conf | sed 's/^/HostapdSrgPartialBssidLines=/'
  depends_on: step11_cfg_6g_after
  capture: cfg_24g_after
- id: step13_restore_5g
  action: exec
  target: DUT
  band: 5g
  command: 'ubus-cli WiFi.Radio.1.IEEE80211ax.SRGPartialBSSIDBitmap=""'
  depends_on: step12_cfg_24g_after
  capture: restore_5g
- id: step14_restore_6g
  action: exec
  target: DUT
  band: 6g
  command: 'ubus-cli WiFi.Radio.2.IEEE80211ax.SRGPartialBSSIDBitmap=""'
  depends_on: step13_restore_5g
  capture: restore_6g
- id: step15_restore_24g
  action: exec
  target: DUT
  band: 2.4g
  command: 'ubus-cli WiFi.Radio.3.IEEE80211ax.SRGPartialBSSIDBitmap=""'
  depends_on: step14_restore_6g
  capture: restore_24g
