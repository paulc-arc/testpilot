  - 'ubus-cli WiFi.Radio.1.IEEE80211ax.SRGPartialBSSIDBitmap=""'
  - 'ubus-cli "WiFi.Radio.2.IEEE80211ax.SRGPartialBSSIDBitmap?"'
  - 'ubus-cli WiFi.Radio.2.IEEE80211ax.SRGPartialBSSIDBitmap="1"'
  - 'ubus-cli "WiFi.Radio.2.IEEE80211ax.SRGPartialBSSIDBitmap?"'
