id: wifi-llapi-D093-ssidadvertisementenabled
name: "SSIDAdvertisementEnabled — WiFi.AccessPoint.{i}."
version: '1.0'
source:
  report: "0310-BGW720-300_LLAPI_Test_Report.xlsx"
  sheet: Wifi_LLAPI
  row: 93
  object: "WiFi.AccessPoint.{i}."
  api: "SSIDAdvertisementEnabled"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.SSIDAdvertisementEnabled=1
llapi_support: Support
implemented_by: pWHM
bands:
  - 5g
  - 6g
  - 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: |
  Topology:
  - DUT: COM1 (B0, AP role)
  Transport:
  - DUT via serialwrap COM0
  Baseline:
  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal
  - 6G  = AP3 / wl1 / testpilot6G / WPA3-Personal / SAE
  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal
  Notes:
  - workbook row 93 is the advertised-state case (`SSIDAdvertisementEnabled=1`)
  - active 0403 source maps `SSIDAdvertisementEnabled` through bool-reverse `wlHide`, so `1 -> wlHide=0 -> hostapd ignore_broadcast_ssid=0`
  - the raw workbook H cell still contains one stale `ignore_broadcast_ssid=2` example, but live 0403 source/runtime keep the authoritative pass path at `getter=1` with `ignore_broadcast_ssid=0`
  - Dual-BSS config: each wlX_hapd.conf has two ignore_broadcast_ssid lines; this case inspects the first BSS only
steps:
  # ---------- 5G ----------
  - id: step1_baseline_5g
    action: exec
    target: DUT
    command:
      - echo "BaselineAdv5g=$(ubus-cli 'WiFi.AccessPoint.1.SSIDAdvertisementEnabled?' 2>/dev/null | grep -o 'SSIDAdvertisementEnabled=[0-9]*' | cut -d= -f2)"
      - echo "BaselineHapd5g=$(grep 'ignore_broadcast_ssid=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: baseline_5g

  - id: step2_set_5g
    action: exec
    target: DUT
    depends_on: step1_baseline_5g
    command: 'ubus-cli WiFi.AccessPoint.1.SSIDAdvertisementEnabled=1'
    capture: set_5g

  - id: step3_readback_5g
    action: exec
    target: DUT
    depends_on: step2_set_5g
    command:
      - sleep 3
      - echo "GetterAdv5g=$(ubus-cli 'WiFi.AccessPoint.1.SSIDAdvertisementEnabled?' 2>/dev/null | grep -o 'SSIDAdvertisementEnabled=[0-9]*' | cut -d= -f2)"
      - echo "HapdAfterSet5g=$(grep 'ignore_broadcast_ssid=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: readback_5g

  - id: step4_restore_5g
    action: exec
    target: DUT
    depends_on: step3_readback_5g
    command:
      - ubus-cli WiFi.AccessPoint.1.SSIDAdvertisementEnabled=1
      - sleep 3
      - echo "RestoredAdv5g=$(ubus-cli 'WiFi.AccessPoint.1.SSIDAdvertisementEnabled?' 2>/dev/null | grep -o 'SSIDAdvertisementEnabled=[0-9]*' | cut -d= -f2)"
      - echo "RestoredHapd5g=$(grep 'ignore_broadcast_ssid=' /tmp/wl0_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: restore_5g

  # ---------- 6G ----------
  - id: step5_baseline_6g
    action: exec
    target: DUT
    depends_on: step4_restore_5g
    command:
      - echo "BaselineAdv6g=$(ubus-cli 'WiFi.AccessPoint.3.SSIDAdvertisementEnabled?' 2>/dev/null | grep -o 'SSIDAdvertisementEnabled=[0-9]*' | cut -d= -f2)"
      - echo "BaselineHapd6g=$(grep 'ignore_broadcast_ssid=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: baseline_6g

  - id: step6_set_6g
    action: exec
    target: DUT
    depends_on: step5_baseline_6g
    command: 'ubus-cli WiFi.AccessPoint.3.SSIDAdvertisementEnabled=1'
    capture: set_6g

  - id: step7_readback_6g
    action: exec
    target: DUT
    depends_on: step6_set_6g
    command:
      - sleep 3
      - echo "GetterAdv6g=$(ubus-cli 'WiFi.AccessPoint.3.SSIDAdvertisementEnabled?' 2>/dev/null | grep -o 'SSIDAdvertisementEnabled=[0-9]*' | cut -d= -f2)"
      - echo "HapdAfterSet6g=$(grep 'ignore_broadcast_ssid=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: readback_6g

  - id: step8_restore_6g
    action: exec
    target: DUT
    depends_on: step7_readback_6g
    command:
      - ubus-cli WiFi.AccessPoint.3.SSIDAdvertisementEnabled=1
      - sleep 3
      - echo "RestoredAdv6g=$(ubus-cli 'WiFi.AccessPoint.3.SSIDAdvertisementEnabled?' 2>/dev/null | grep -o 'SSIDAdvertisementEnabled=[0-9]*' | cut -d= -f2)"
      - echo "RestoredHapd6g=$(grep 'ignore_broadcast_ssid=' /tmp/wl1_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: restore_6g

  # ---------- 2.4G ----------
  - id: step9_baseline_24g
    action: exec
    target: DUT
    depends_on: step8_restore_6g
    command:
      - echo "BaselineAdv24g=$(ubus-cli 'WiFi.AccessPoint.5.SSIDAdvertisementEnabled?' 2>/dev/null | grep -o 'SSIDAdvertisementEnabled=[0-9]*' | cut -d= -f2)"
      - echo "BaselineHapd24g=$(grep 'ignore_broadcast_ssid=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: baseline_24g

  - id: step10_set_24g
    action: exec
    target: DUT
    depends_on: step9_baseline_24g
    command: 'ubus-cli WiFi.AccessPoint.5.SSIDAdvertisementEnabled=1'
    capture: set_24g

  - id: step11_readback_24g
    action: exec
    target: DUT
    depends_on: step10_set_24g
    command:
      - sleep 3
      - echo "GetterAdv24g=$(ubus-cli 'WiFi.AccessPoint.5.SSIDAdvertisementEnabled?' 2>/dev/null | grep -o 'SSIDAdvertisementEnabled=[0-9]*' | cut -d= -f2)"
      - echo "HapdAfterSet24g=$(grep 'ignore_broadcast_ssid=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: readback_24g

  - id: step12_restore_24g
    action: exec
    target: DUT
    depends_on: step11_readback_24g
    command:
      - ubus-cli WiFi.AccessPoint.5.SSIDAdvertisementEnabled=1
      - sleep 3
      - echo "RestoredAdv24g=$(ubus-cli 'WiFi.AccessPoint.5.SSIDAdvertisementEnabled?' 2>/dev/null | grep -o 'SSIDAdvertisementEnabled=[0-9]*' | cut -d= -f2)"
      - echo "RestoredHapd24g=$(grep 'ignore_broadcast_ssid=' /tmp/wl2_hapd.conf 2>/dev/null | head -1 | cut -d= -f2)"
    capture: restore_24g

pass_criteria:
  - field: baseline_5g.BaselineAdv5g
    operator: equals
    value: '1'
    description: '5G baseline SSIDAdvertisementEnabled should be 1'
  - field: readback_5g.GetterAdv5g
    operator: equals
    value: '1'
    description: '5G getter reads back 1 after setter'
  - field: readback_5g.HapdAfterSet5g
    operator: equals
    value: '0'
    description: '5G hostapd ignore_broadcast_ssid stays at 0 (advertised)'
  - field: restore_5g.RestoredAdv5g
    operator: equals
    value: '1'
    description: '5G SSIDAdvertisementEnabled restored to 1'
  - field: restore_5g.RestoredHapd5g
    operator: equals
    value: '0'
    description: '5G hostapd ignore_broadcast_ssid restored to 0'
  - field: baseline_6g.BaselineAdv6g
    operator: equals
    value: '1'
    description: '6G baseline SSIDAdvertisementEnabled should be 1'
  - field: readback_6g.GetterAdv6g
    operator: equals
    value: '1'
    description: '6G getter reads back 1 after setter'
  - field: readback_6g.HapdAfterSet6g
    operator: equals
    value: '0'
    description: '6G hostapd ignore_broadcast_ssid stays at 0 (advertised)'
  - field: restore_6g.RestoredAdv6g
    operator: equals
    value: '1'
    description: '6G SSIDAdvertisementEnabled restored to 1'
  - field: restore_6g.RestoredHapd6g
    operator: equals
    value: '0'
    description: '6G hostapd ignore_broadcast_ssid restored to 0'
  - field: baseline_24g.BaselineAdv24g
    operator: equals
    value: '1'
    description: '2.4G baseline SSIDAdvertisementEnabled should be 1'
  - field: readback_24g.GetterAdv24g
    operator: equals
    value: '1'
    description: '2.4G getter reads back 1 after setter'
  - field: readback_24g.HapdAfterSet24g
    operator: equals
    value: '0'
    description: '2.4G hostapd ignore_broadcast_ssid stays at 0 (advertised)'
  - field: restore_24g.RestoredAdv24g
    operator: equals
    value: '1'
    description: '2.4G SSIDAdvertisementEnabled restored to 1'
  - field: restore_24g.RestoredHapd24g
    operator: equals
    value: '0'
    description: '2.4G hostapd ignore_broadcast_ssid restored to 0'

verification_command:
  - 'grep ignore_broadcast_ssid /tmp/wl0_hapd.conf'
  - 'grep ignore_broadcast_ssid /tmp/wl1_hapd.conf'
  - 'grep ignore_broadcast_ssid /tmp/wl2_hapd.conf'

results_reference:
  v4.0.1:
    5g: Pass
    6g: Pass
    2.4g: Pass
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: >-
      workbook row 93 is the advertised-state case: all 3 bands keep
      `SSIDAdvertisementEnabled=1`, getter reads back `1`, and hostapd
      `ignore_broadcast_ssid` remains `0` on AP1 / AP3 / AP5.
