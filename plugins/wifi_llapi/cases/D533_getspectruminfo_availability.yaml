    comment: 'Multiband source-backed retest: active 0403 serializes `availability` through `_getSpectrumInfo()` -> `s_prepareSpectrumOutputWithChanFilter()` -> `amxc_var_add_key(uint32_t, ..., "availability", llEntry->availability)`, and the sync refresh path `wld_rad_nl80211_updateUsageStatsFromSurveyInfo()` derives `chanInfo.availability` from survey timing (`(timeOn - timeBusy) / timeOn` for idle channels, or `free_time / total_time` when in-use airtime stats are available). Real runner replay therefore locks the public 5g/6g/2.4g shape to integer percentage values rather than the stale fail-shaped workbook carry-over.'
