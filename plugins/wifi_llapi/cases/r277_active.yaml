id: wifi-llapi-r277-active
name: Active — WiFi.AccessPoint.{i}.AssociatedDevice.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 372
  object: "WiFi.AccessPoint.{i}.AssociatedDevice.{i}."
  api: "Active"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.Active=1
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) STA preparation on COM1:
     iw dev wl0 set type managed; ifconfig wl0 up
     iw dev wl1 set type managed; ifconfig wl1 up
     iw dev wl2 set type managed; ifconfig wl2 up
  3) 6G dependency before wl1 association:
     ubus-cli WiFi.AccessPoint.3.Security.ModeEnabled="WPA3-Personal"
     ubus-cli WiFi.AccessPoint.3.Security.SAEPassphrase="B0StaTest1234"
     ubus-cli WiFi.AccessPoint.3.Security.MFPConfig="Required"
     ubus-cli WiFi.AccessPoint.3.MultiAPType="FronthaulBSS"

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.AccessPoint.{i}.AssociatedDevice.{i}.Active=1
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.AccessPoint.*.AssociatedDevice.*.Active?"
  3) For stats/AssociatedDevice cases, generate traffic (ping/iperf) before re-read.
  4) STA link validation:
     iw dev wl0 link
     iw dev wl1 link
     wpa_cli -i wl1 status
     iw dev wl2 link
  5) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Connect WiFi station to GW
- id: step2
  action: exec
  target: DUT
  command: Check Associated Device Status ubus-cli WiFi.AccessPoint.*.AssociatedDevice.*.? | grep -E 'Activ e|MAC' WiFi.AccessPoint.1.AssociatedDevice.11.Active=1
    WiFi.AccessPoint.1.AssociatedDevice.11.MACAddress="34:19:4D:A4:B5:09" WiFi.AccessPoint.1.AssociatedDevice.12.Active=1
    WiFi.AccessPoint.1.AssociatedDevice.12.MACAddress="42:B7:35:6A:17:8E" WiFi.AccessPoint.1.AssociatedDevice.13.Active=1
    WiFi.AccessPoint.1.AssociatedDevice.13.MACAddress="12:E3:C4:78:7B:6F" WiFi.AccessPoint.3.AssociatedDevice.1.Active=1 WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress="38:06:E6:92:B0:4A"
    WiFi.AccessPoint.5.AssociatedDevice.3.Active=1 WiFi.AccessPoint.5.AssociatedDevice.3.MACAddress="E4:60:17:EB:A9:83"
  depends_on: step1
  capture: result
pass_criteria:
- field: result.Active
  operator: contains
  value: '1'
  description: Active 應回傳包含 Active=1
verification_command: 'root@prplOS:/# wl -i wl0 assoclist

  assoclist 34:19:4D:A4:B5:09

  assoclist 12:E3:C4:78:7B:6F

  assoclist 42:B7:35:6A:17:8E

  root@prplOS:/# wl -i wl1 assoclist

  assoclist 38:06:E6:92:B0:4A

  root@prplOS:/# wl -i wl2 assoclist

  assoclist E4:60:17:EB:A9:83'
results_reference:
  v4.0.1:
    5g: Pass
    6g: pass
    2.4g: Pass
    comment: ''
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
    comment: ''
