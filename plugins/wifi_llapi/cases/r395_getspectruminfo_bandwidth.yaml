id: wifi-llapi-r395-getspectruminfo-bandwidth
name: getSpectrumInfo() — WiFi.Radio.{i}.
version: '1.0'
source:
  report: "0302-AT&T_LLAPI_Test_Report_20260107.xlsx"
  sheet: Wifi_LLAPI
  row: 530
  object: "WiFi.Radio.{i}."
  api: "getSpectrumInfo()"
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.Radio.{i}.getSpectrumInfo() bandwidth
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial

test_environment: |
  Topology:
  - DUT: COM0 (B0, AP role)
  - STA: COM1 (A0, STA role, STA-required cases only)
  Transport:
  - serialwrap attach COM0 / COM1
  Band mapping:
  - 5G: DUT wl0 / AP1 / SSID.4
  - 6G: DUT wl1 / AP3 / SSID.6
  - 2.4G: DUT wl2 / AP5 / SSID.8
  Pre-check:
  - cat /proc/socinfo | grep Revision | cut -d: -f2
  - iw dev
  - ubus-cli "WiFi.Radio.?" | sed -n "1,120p"

setup_steps: |
  1) DUT baseline on COM0:
     ubus-cli WiFi.AccessPoint.1.Enable=1
     ubus-cli WiFi.AccessPoint.3.Enable=1
     ubus-cli WiFi.AccessPoint.5.Enable=1
  2) Apply case command context on DUT:
     ubus-cli WiFi.Radio.{i}.getSpectrumInfo() bandwidth
  3) For pure query cases, keep configuration unchanged and only collect readback evidence.

test_procedure: |
  1) Execute case command on DUT:
     ubus-cli WiFi.Radio.{i}.getSpectrumInfo() bandwidth
  2) LLAPI readback on DUT:
     ubus-cli "WiFi.Radio.*.getSpectrumInfo()"
  3) Cross-check with verification_command (driver/hostapd/iw/proc evidence).

steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Power On the GW.
- id: step2
  action: exec
  target: DUT
  command: Verify SpectrumInfo() bandwidth ubus-cli "WiFi.Radio.*.getSpectrumInfo() bandwidth" > WiFi.Radio.*.getSpectrumInfo()
    bandwidth WiFi.Radio.1.getSpectrumInfo() returned [ [ ] ] WiFi.Radio.2.getSpectrumInfo() returned [ [ ] ] WiFi.Radio.3.getSpectrumInfo()
    returned [ [ ] ]
  depends_on: step1
  capture: result
pass_criteria:
- field: result
  operator: not_contains
  value: error
  description: getSpectrumInfo() 執行不應回傳 error
verification_command: 'root@prplOS:/# wl -i wl0 chanspec

  36 (0xd024)


  Channel: 36, Band: 5 GHz, Bandwidth: 20 MHz

  Hex breakdown: 0xd024

  Bits_x0001_ Meaning

  0x0024_x0001_Channel 36

  0x1000_x0001_5 GHz band

  0xC000_x0001_20 MHz


  root@prplOS:/# wl -i wl1 chanspec

  6g1 (0x5001)


  Channel: 1, Band: 6 GHz, Bandwidth: 20 MHz

  Hex breakdown: 0x5001

  Bits_x0001_ Meaning

  0x0001_x0001_Channel 1

  0x4000_x0001_6 GHz band

  0x1000_x0001_20 MHz



  root@prplOS:/# wl -i wl2 chanspec

  1 (0x1001)


  Channel: 1, Band: 2.4 GHz, Bandwidth: 20 MHz

  Hex breakdown: 0x1001

  Bits_x0001_ Meaning

  0x0001_x0001_Channel 1

  0x1000_x0001_2.4 GHz band

  0x0000_x0001_20 MHz'
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : API return "empty"'
  v4.0.3:
    5g: Fail
    6g: Fail
