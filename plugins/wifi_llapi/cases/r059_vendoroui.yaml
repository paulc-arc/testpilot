    WiFi.AccessPoint.3.AssociatedDevice.1.VendorOUI="00:10:18,00:50:F2" WiFi.AccessPoint.5.AssociatedDevice.1.VendorOUI="00:90:4C,00:10:18,00:50:F2"'
  capture: result
pass_criteria:
- field: result.VendorOUI
  operator: contains
  value: 00:50:F2
