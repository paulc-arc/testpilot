verification_command: 'wl -i wl0 sta_info ${STA_MAC}

  VENDOR OUI VALUE[0] 00:90:4C

  VENDOR OUI VALUE[1] 00:10:18

  VENDOR OUI VALUE[2] 00:50:F2'
