id: d356-radio-sensing-enable
name: D356 Radio Enable
source:
  row: 264
  object: WiFi.Radio.{i}.
  api: Enable
  baseline: 0310-BGW720-300
bands:
- 5g
- 6g
- 2.4g
llapi_support: Support
results_reference:
  v4.0.3:
    5g: Pass
    6g: Pass
    2.4g: Pass
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM0
steps:
- id: step_5g_getter
  target: dut
  action: read
  capture: getter_5g
  command: ubus-cli "WiFi.Radio.1.Sensing.Enable?"
  expected: Enable 回傳有效值
  description: Radio.1 (5g) Enable getter（live=1）
- id: step_6g_getter
  target: dut
  action: read
  capture: getter_6g
  command: ubus-cli "WiFi.Radio.2.Sensing.Enable?"
  expected: Enable 回傳有效值
  description: Radio.2 (6g) Enable getter（live=1）
- id: step_24g_getter
  target: dut
  action: read
  capture: getter_24g
  command: ubus-cli "WiFi.Radio.3.Sensing.Enable?"
  expected: Enable 回傳有效值
  description: Radio.3 (2.4g) Enable getter（live=1）
pass_criteria:
- field: getter_5g.Enable
  operator: regex
  value: ^[01]$
- field: getter_6g.Enable
  operator: regex
  value: ^[01]$
- field: getter_24g.Enable
  operator: regex
  value: ^[01]$
