  description: 5G AP1 / wl0 should start from BlackList on the current live baseline.
- field: mode_baseline_5g.BaselineMacaddrAcl5g
  operator: equals
  value: '0'
  description: 5G AP1 / wl0 hostapd should keep macaddr_acl=0 on the BlackList baseline.
- field: mode_baseline_5g.BaselineAclState5g
  operator: equals
  value: deny
  description: 5G AP1 / wl0 hostapd should point at deny_mac_file on the BlackList baseline.
- field: set_off_5g.SetOffStatus5g
  operator: equals
  value: invalid_value
  description: 5G AP1 / wl0 still rejects the workbook Off setter as invalid.
- field: mode_after_set_5g.AfterMode5g
