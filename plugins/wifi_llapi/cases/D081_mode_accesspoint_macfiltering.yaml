    OUT=$(ubus-cli WiFi.AccessPoint.3.MACFiltering.Mode=Off 2>&1 || true); printf '%s\n' "$OUT"; if printf '%s\n' "$OUT" | grep -q 'invalid value'; then echo 'SetOffStatus6g=invalid_value'; else echo 'SetOffStatus6g=accepted'; fi
  depends_on: step4_mode_baseline_6g
  capture: set_off_6g
- id: step6_mode_after_set_6g
  action: exec
  target: DUT
  band: 6g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.3.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.3\.MACFiltering\.Mode="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$MODE" ]; then printf 'AfterMode6g=%s\n' "$MODE"; else echo 'AfterMode6g=EMPTY'; fi; CFG=$(grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)=' /tmp/wl1_hapd.conf 2>/dev/null || true); ACL=$(printf '%s\n' "$CFG" | sed -n 's/^[0-9][0-9]*:macaddr_acl=\(.*\)$/\1/p' | head -n 1); if [ -n "$ACL" ]; then printf 'AfterMacaddrAcl6g=%s\n' "$ACL"; else echo 'AfterMacaddrAcl6g=ABSENT'; fi; if printf '%s\n' "$CFG" | grep -q 'accept_mac_file='; then echo 'AfterAclState6g=accept'; elif printf '%s\n' "$CFG" | grep -q 'deny_mac_file='; then echo 'AfterAclState6g=deny'; else echo 'AfterAclState6g=absent'; fi
  depends_on: step5_set_off_6g
