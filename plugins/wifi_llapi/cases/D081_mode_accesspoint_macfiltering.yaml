  action: exec
  target: DUT
  band: 6g
  command: >-
    OUT=$(ubus-cli "WiFi.AccessPoint.3.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.3\.MACFiltering\.Mode="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$MODE" ]; then printf 'BaselineMode6g=%s\n' "$MODE"; else echo 'BaselineMode6g=EMPTY'; fi; CFG=$(grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)=' /tmp/wl1_hapd.conf 2>/dev/null || true); ACL=$(printf '%s\n' "$CFG" | sed -n 's/^[0-9][0-9]*:macaddr_acl=\(.*\)$/\1/p' | head -n 1); if [ -n "$ACL" ]; then printf 'BaselineMacaddrAcl6g=%s\n' "$ACL"; else echo 'BaselineMacaddrAcl6g=ABSENT'; fi; if printf '%s\n' "$CFG" | grep -q 'accept_mac_file='; then echo 'BaselineAclState6g=accept'; elif printf '%s\n' "$CFG" | grep -q 'deny_mac_file='; then echo 'BaselineAclState6g=deny'; else echo 'BaselineAclState6g=absent'; fi
  capture: mode_baseline_6g
- id: step5_set_off_6g
