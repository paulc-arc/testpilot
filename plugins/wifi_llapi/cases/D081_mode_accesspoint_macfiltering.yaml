verification_command: |
  OUT=$(ubus-cli "WiFi.AccessPoint.1.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MACFiltering\.Mode="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$MODE" ]; then printf 'BaselineMode5g=%s\n' "$MODE"; else echo 'BaselineMode5g=EMPTY'; fi; grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)=' /tmp/wl0_hapd.conf 2>/dev/null || true
  OUT=$(ubus-cli WiFi.AccessPoint.1.MACFiltering.Mode=Off 2>&1 || true); printf '%s\n' "$OUT"
  OUT=$(ubus-cli "WiFi.AccessPoint.1.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.1\.MACFiltering\.Mode="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$MODE" ]; then printf 'AfterMode5g=%s\n' "$MODE"; else echo 'AfterMode5g=EMPTY'; fi; grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)=' /tmp/wl0_hapd.conf 2>/dev/null || true
  OUT=$(ubus-cli "WiFi.AccessPoint.3.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.3\.MACFiltering\.Mode="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$MODE" ]; then printf 'BaselineMode6g=%s\n' "$MODE"; else echo 'BaselineMode6g=EMPTY'; fi; grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)=' /tmp/wl1_hapd.conf 2>/dev/null || true
  OUT=$(ubus-cli WiFi.AccessPoint.3.MACFiltering.Mode=Off 2>&1 || true); printf '%s\n' "$OUT"
  OUT=$(ubus-cli "WiFi.AccessPoint.3.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.3\.MACFiltering\.Mode="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$MODE" ]; then printf 'AfterMode6g=%s\n' "$MODE"; else echo 'AfterMode6g=EMPTY'; fi; grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)=' /tmp/wl1_hapd.conf 2>/dev/null || true
  OUT=$(ubus-cli "WiFi.AccessPoint.5.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.5\.MACFiltering\.Mode="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$MODE" ]; then printf 'BaselineMode24g=%s\n' "$MODE"; else echo 'BaselineMode24g=EMPTY'; fi; grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)=' /tmp/wl2_hapd.conf 2>/dev/null || true
  OUT=$(ubus-cli WiFi.AccessPoint.5.MACFiltering.Mode=Off 2>&1 || true); printf '%s\n' "$OUT"
  OUT=$(ubus-cli "WiFi.AccessPoint.5.MACFiltering.Mode?" 2>&1); MODE=$(printf '%s\n' "$OUT" | sed -n 's/^WiFi\.AccessPoint\.5\.MACFiltering\.Mode="\([^"]*\)".*/\1/p' | head -n 1); if [ -n "$MODE" ]; then printf 'AfterMode24g=%s\n' "$MODE"; else echo 'AfterMode24g=EMPTY'; fi; grep -nE '^(macaddr_acl|accept_mac_file|deny_mac_file)=' /tmp/wl2_hapd.conf 2>/dev/null || true

results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: '0302 workbook comment already recorded Cannot switch Off on all three bands.'
  v4.0.3:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: '0319 serialwrap live probe showed `ubus-cli WiFi.AccessPoint.{1|3|5}.MACFiltering.Mode=Off` still returns `ERROR: ... invalid value` on AP1/AP3/AP5. AP1 remained `BlackList` with `macaddr_acl=0` + `deny_mac_file=/tmp/hostap_wl0.acl`, while AP3/AP5 remained `Off` with no ACL lines. The current DUT still does not accept the workbook Off setter path, so D081 is calibrated as Fail/Fail/Fail.'
