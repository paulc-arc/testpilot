  command: 1. Connect WiFi Station to SSID4, SSID6 and SSID8
- id: step2
  action: exec
  target: DUT
  command: Run Ping between Station and check BytesReceived ubus-cli "WiFi.SSID.?" | grep \.BytesReceived= WiFi.SSID.4.Stats.BytesReceived=1647695
    WiFi.SSID.6.Stats.BytesReceived=22734 WiFi.SSID.8.Stats.BytesReceived=10343765
  depends_on: step1
  capture: result
pass_criteria:
- field: result
