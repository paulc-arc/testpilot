id: wifi-llapi-D106-relaycredentialsenable
name: RelayCredentialsEnable — WiFi.AccessPoint.{i}.WPS.
version: '1.0'
source:
  report: 0310-BGW720-300_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  baseline: 0310-BGW720-300
  row: 106
  object: WiFi.AccessPoint.{i}.WPS.
  api: RelayCredentialsEnable
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli "WiFi.AccessPoint.{i}.WPS.RelayCredentialsEnable?"
llapi_support: Not Support
implemented_by: Vendor Module
bands:
- 5g
- 6g
- 2.4g
topology:
  devices:
    DUT:
      role: ap
      transport: serial
      selector: COM1
  links: []
test_environment: "Topology:\n  - DUT: COM1 (B0, AP role)\n  Transport:\n  - DUT via serialwrap COM0\n  Baseline:\n  - 5G  = AP1 / wl0 / testpilot5G / WPA2-Personal\n  - 6G  = AP3 / wl1 / testpilot6G /\
  \ WPA3-Personal / SAE\n  - 2.4G = AP5 / wl2 / testpilot2G / WPA2-Personal\n  Notes:\n  - Workbook row 106 is RelayCredentialsEnable, not UUID.\n  - Live getter still returns RelayCredentialsEnable=0 on all 3 bands.\n\
  \  - Active 0403 source only exposes a persistent default-false definition, and source survey found no active wps_cred_processing backing."
steps:
- id: step_5g_getter
  action: exec
  target: DUT
  command:
    - 'echo "RelayCred5g=$(ubus-cli ''WiFi.AccessPoint.1.WPS.RelayCredentialsEnable?'' 2>/dev/null | grep -o ''RelayCredentialsEnable=[0-9]*'' | cut -d= -f2)"'
  capture: relay_5g
- id: step_6g_getter
  action: exec
  target: DUT
  depends_on: step_5g_getter
  command:
    - 'echo "RelayCred6g=$(ubus-cli ''WiFi.AccessPoint.3.WPS.RelayCredentialsEnable?'' 2>/dev/null | grep -o ''RelayCredentialsEnable=[0-9]*'' | cut -d= -f2)"'
  capture: relay_6g
- id: step_24g_getter
  action: exec
  target: DUT
  depends_on: step_6g_getter
  command:
    - 'echo "RelayCred24g=$(ubus-cli ''WiFi.AccessPoint.5.WPS.RelayCredentialsEnable?'' 2>/dev/null | grep -o ''RelayCredentialsEnable=[0-9]*'' | cut -d= -f2)"'
  capture: relay_24g
pass_criteria:
- field: relay_5g.RelayCred5g
  operator: equals
  value: '0'
  description: 5g RelayCredentialsEnable=0
- field: relay_6g.RelayCred6g
  operator: equals
  value: '0'
  description: 6g RelayCredentialsEnable=0
- field: relay_24g.RelayCred24g
  operator: equals
  value: '0'
  description: 2.4g RelayCredentialsEnable=0
verification_command:
  - 'ubus-cli "WiFi.AccessPoint.1.WPS.RelayCredentialsEnable?"'
  - 'ubus-cli "WiFi.AccessPoint.3.WPS.RelayCredentialsEnable?"'
  - 'ubus-cli "WiFi.AccessPoint.5.WPS.RelayCredentialsEnable?"'
results_reference:
  v4.0.3:
    5g: Not Supported
    6g: Not Supported
    2.4g: Not Supported
    comment: 'Workbook row 106 remains Not Supported / Not Supported / Not Supported. Live getter still returns RelayCredentialsEnable=0 on all bands, but 0403 source survey only found the persistent default-false definition and no active wps_cred_processing backing.'
