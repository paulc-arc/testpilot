id: wifi-llapi-r004-sendbsstransferrequest
name: sendBssTransferRequest() — WiFi.AccessPoint.{i}.
version: '1.0'
source:
  report: 6.3.0GA_prplware_v403_LLAPI_Test_Report.xlsx
  sheet: Wifi_LLAPI
  row: 4
  object: WiFi.AccessPoint.{i}.
  api: sendBssTransferRequest()
platform:
  prplos: 4.0.3
  bdk: 6.3.1
hlapi_command: ubus-cli WiFi.AccessPoint.{i}.sendBssTransferRequest(mac:string, target:string, class:int, channel:int, wait:int,
  retries:int, validity:int, disassoc:int, bssidInfo:uint32):bool
llapi_support: Support
implemented_by: pWHM
topology:
  devices:
    DUT:
      role: ap
      transport: serial
    STA:
      role: sta
      transport: adb
      config:
      - iface: 5g
        mode: sta
        ssid: '{{SSID_5G}}'
        key: '{{KEY_5G}}'
  links:
  - from: STA
    to: DUT
    band: 5g
steps:
- id: step1
  action: exec
  target: DUT
  command: 1. Configure all radios (2.4G/5G/6G) to use the same SSID and Security mode.
- id: step2
  action: exec
  target: DUT
  command: 'Enable MBO (Multi-Band Operation: this Suggest clients move to another band ) root@prplOS:~# ubus-cli WiFi.AccessPoint.*.MBOEnable=1
    > WiFi.AccessPoint.*.MBOEnable=1 WiFi.AccessPoint.1.MBOEnable=1 WiFi.AccessPoint.3.MBOEnable=1 WiFi.AccessPoint.5.MBOEnable=1'
  depends_on: step1
- id: step3
  action: exec
  target: DUT
  command: Configure AP1, AP3 and AP5 IEEE80211r.MobilityDomain to use the same value ubus-cli WiFi.AccessPoint.{i}.IEEE80211r.MobilityDomain=25
  depends_on: step2
- id: step4
  action: exec
  target: DUT
  command: Connect WiFi Station to GW
  depends_on: step3
- id: step5
  action: exec
  target: DUT
  command: Check and make sure Station support BTM/11v WiFi.AccessPoint.3.AssociatedDevice.1.Capabilities="RRM,BTM,QOS_MAP,PMF"
  depends_on: step4
- id: step6
  action: exec
  target: DUT
  command: Verify that the station supports IEEE 802.11v (BSS Transition Management). ubus-cli WiFi.AccessPoint.*.AssociatedDevice.?
    | grep MAC WiFi.AccessPoint.3.AssociatedDevice.1.MACAddress="6A:8C:E6:7A:18:91"
  depends_on: step5
- id: step7
  action: exec
  target: DUT
  command: 'Trigger the station to transition from the 6 GHz SSID to the 5 GHz SSID using BSS Transition command. ubus-cli
    "WiFi.AccessPoint.3.sendBssTransferRequest(mac=6A:8C:E6: 7A:18:91,target=64:75:da:4e:51:75,class=1,channel=36,wait=0,retries=1,validity=1
    0,disassoc=1,bssidInfo=0)" > WiFi.AccessPoint.3.sendBssTransferRequest(mac=6A:8C:E6:7A:18:91,target=64:75:da:4e:51:75,class=1,channel=36,wait=0,retries=1,validity=10,disassoc=1,bssidInfo=0)
    ERROR: call (null) failed with status 1 - unknown error WiFi.AccessPoint.3.sendBssTransferRequest() returned [ "" ] ubus-cli
    "WiFi.AccessPoint.3.sendBssTransferRequest(mac=6A:8C:E6: 7A:18:91,target=TESt-11r,class=115,channel=36,wait=0,retries=1,validity=10,disas
    soc=1,bssidInfo=64:75:da:4e:51:75)" > WiFi.AccessPoint.3.sendBssTransferRequest(mac=6A:8C:E6:7A:18:91,target=TESt-11r,class=115,channel=36,wait=0,retries=1,validity=10,disassoc=1,bssidInfo=64:75:da:4e:51:75)
    ERROR: call (null) failed with status 7 - invalid function argument WiFi.AccessPoint.3.sendBssTransferRequest() returned
    [ "" ]'
  depends_on: step6
  capture: result
pass_criteria:
- field: result
  operator: not_empty
  value: ''
  description: sendBssTransferRequest() 應回傳非空結果
results_reference:
  v4.0.1:
    5g: Fail
    6g: Fail
    2.4g: Fail
    comment: 'ARC : Command return error'
